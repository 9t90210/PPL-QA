uter scale) with the actual time taken (inner scale). Read the groundspeed at the 60 index."}, {"q": "What is the specific gravity of AVGAS 100LL?", "a": "Approximately 0.72."}, {"q": "What type of navigation computer is the only one permitted in EASA/CAAT theoretical knowledge exams?", "a": "The Dalton-type analogue navigation computer (whiz wheel). Electronic flight computers are not permitted."}], "12 Flight Planning Essentials": [{"q": "What is the correct sequence of steps in VFR flight planning?", "a": "Choose route, obtain weather (TAF/METAR/winds), check NOTAMs/AIP, prepare chart (draw track, drift lines, timing marks), complete flight log, calculate fuel, and file flight plan if required."}, {"q": "What weather products must be checked before a VFR flight?", "a": "METARs and TAFs for departure, destination, and alternate aerodromes; a low-level forecast (Form 215 in UK); and spot wind chart (Form 214) for en-route winds."}, {"q": "What is the difference between Form 214 and Form 215 (UK)?", "a": "Form 214 (Spot Wind Chart) provides wind velocity and temperature at altitude. Form 215 (Low-Level Forecast) provides expected weather, cloud base, and visibility but does NOT include wind."}, {"q": "How is Safety Altitude calculated?", "a": "Safety Altitude = Highest Maximum Elevation Figure (MEF) along the route + 1,000 ft. This ensures terrain clearance in poor visibility."}, {"q": "What components make up a fuel plan?", "a": "Trip fuel + Alternate fuel + 10% contingency + 45 minutes holding fuel + minimum reserve. All must be aboard before departure."}, {"q": "When is a formal VFR flight plan mandatory?", "a": "When crossing FIR boundaries (international flights) or when operating in certain controlled airspace (Class C/D). It is good practice for all cross-country flights."}, {"q": "What is a 'track box' and what does it contain?", "a": "A track box is drawn on the chart alongside the track line containing Magnetic Heading, Track, Cruise Altitude, and Safety Altitude. It reduces head-down time by keeping key data visible on the chart."}, {"q": "Why should track lines be broken at checkpoints?", "a": "To avoid obscuring important chart details (airspace boundaries, elevation data, town names) underneath the drawn line."}, {"q": "What are '10-degree drift lines'?", "a": "Lines drawn at 10 degrees either side of the planned track from departure and destination. They allow instant visual estimation of track error in flight without mental math."}, {"q": "How often should timing checkpoints be selected along a route?", "a": "Every 5 to 10 minutes of flight time, choosing prominent and distinct visual features."}, {"q": "What is a reciprocal track and how is it calculated?", "a": "The reciprocal track is the track in the opposite direction. Calculate by adding or subtracting 180 degrees from the original track."}, {"q": "What information should be pre-written on the flight log?", "a": "From/To waypoints, Altitude/FL, Safety Altitude, Wind velocity, TAS, True Track, True Heading, Variation, Magnetic Heading, Groundspeed, Distance, Time, and ETA."}, {"q": "What equipment must a pilot carry for VFR navigation?", "a": "Current charts, navigation computer (Dalton), protractor/plotter, stopwatch, flight log, pens/pencils, and checklists."}, {"q": "What heading sequence appears on the flight log?", "a": "True Track -> True Heading (after applying drift) -> apply Variation -> Magnetic Heading. Then apply deviation from the compass card to get Compass Heading."}, {"q": "What should a pilot note about Restricted/Danger areas during planning?", "a": "Note their locations relative to the track, activity hours, altitude limits, and whether they require avoidance or are crossable when inactive."}, {"q": "Why is it important to select a viable alternate aerodrome?", "a": "In case weather deteriorates or an emergency occurs, the pilot needs a pre-planned diversion route with known frequencies, runway info, and fuel calculations already done."}, {"q": "What frequencies should be pre-written as part of the communications plan?", "a": "Departure, en-route (LARS/FIS), destination, and alternate aerodrome frequencies."}], "13 Practical Navigation Masterclass": [{"q": "What is the golden rule of airborne priorities?", "a": "1. Aviate (fly the aircraft accurately), 2. Navigate (maintain track and situational awareness), 3. Communicate (radio calls and ATC liaison)."}, {"q": "What is the HAT check performed when setting course?", "a": "H = Heading (correct and DI synchronized), A = Airspeed/Altitude (stabilized as planned), T = Time (start the stopwatch). Done immediately upon setting course."}, {"q": "What is the overhead departure method?", "a": "Climb to cruise altitude within the circuit, then fly over the airfield center and establish the outbound heading directly overhead. It is the most reliable method to set course."}, {"q": "What is the en-route departure method?", "a": "A faster departure method where the aircraft intercepts the outbound track directly after takeoff at an angle of 30-45 degrees. Timing starts at a pre-planned point on the track."}, {"q": "What is a 'lead-out feature'?", "a": "A prominent ground feature on or near the outbound track visible from the departure airfield. Aligning with it confirms heading accuracy and wind forecast validity."}, {"q": "What is the 2-minute rule for checkpoint identification?", "a": "Consult the chart approximately 2 minutes before the expected ETA for a checkpoint. Look at the map first, then look outside to confirm. Do not stare continuously at the map."}, {"q": "What is the FREDA check and when is it performed?", "a": "F=Fuel, R=Radio, E=Engine, D=DI (sync to compass every 15 mins), A=Altimeter. Performed routinely during cruise, typically every 15 minutes or at each checkpoint."}, {"q": "What is the LAI cycle?", "a": "Lookout (scan for traffic and weather), Attitude (check nose position and wings level), Instruments (verify heading, speed, time). This cycle maintains situational awareness."}, {"q": "What should you do if you miss a checkpoint?", "a": "Do NOT turn or circle. Maintain planned heading, airspeed, and altitude. Note the time the next checkpoint is due. Trust your flying and use DR to continue."}, {"q": "What is the 1-in-60 rule formula?", "a": "Track Error Angle = (Distance Off Track x 60) / Distance Along Track. A rule of thumb: 1 NM off track after 60 NM flown equals 1 degree of track error."}, {"q": "What is the double track error correction method?", "a": "Apply 2x the track error angle toward the track for the same time already flown, then reduce to a single track error correction to maintain the new track."}, {"q": "When is the closing angle method preferred over double track error?", "a": "When past the halfway point of a leg. Rather than regaining the original track, fly directly to the destination waypoint."}, {"q": "How do ETA errors compound?", "a": "Proportionally. If you are 2 minutes late at the halfway point, you will be approximately 4 minutes late at the destination (double the error)."}, {"q": "What is the correct map reading technique: map-to-ground or ground-to-map?", "a": "Map-to-ground. Identify features on the chart first, then confirm by looking outside. Ground-to-map (looking at ground first) can lead to wishful identification errors."}, {"q": "What should you do for a gross error check at the start of a leg?", "a": "Look for 'Big Picture' features (coastlines, major cities, mountain ranges) to confirm you are in the right area. This catches 180-degree heading errors immediately."}, {"q": "How do you convert True Heading to Compass Heading for the aircraft?", "a": "True Heading +/- Variation = Magnetic Heading +/- Deviation (from compass card) = Compass Heading. The compass deviation card is unique to each aircraft."}, {"q": "What four items should you carry for pre-flight VFR navigation?", "a": "Marked ICAO 1:500,000 chart, prepared VFR flight log, reliable stopwatch, and a Dalton-type navigation computer."}], "14 Aviation Radar Systems": [{"q": "What does RADAR stand for?", "a": "Radio Detection And Ranging."}, {"q": "How does Primary Surveillance Radar (PSR) work?", "a": "PSR transmits radio pulses that bounce off an aircraft's skin and return as echoes. Range is calculated from the time delay of the return signal. The target appears as a blip on the radar screen."}, {"q": "What are the main disadvantages of PSR?", "a": "It cannot identify specific aircraft (no identity data), provides no altitude information, and is susceptible to clutter from weather and terrain."}, {"q": "What is Secondary Surveillance Radar (SSR)?", "a": "SSR uses a ground-based interrogator and an aircraft-mounted transponder. The ground station interrogates on 1030 MHz; the aircraft transponder replies on 1090 MHz with coded data."}, {"q": "What are the SSR interrogation and reply frequencies?", "a": "The ground station interrogates on 1030 MHz. The aircraft transponder replies on 1090 MHz."}, {"q": "What is Mode A on a transponder?", "a": "Mode A transmits a 4-digit identification code (squawk code) to identify the aircraft."}, {"q": "What is Mode C on a transponder?", "a": "Mode C transmits pressure altitude data from an encoding altimeter, always referenced to the standard pressure of 1013.2 hPa (mb)."}, {"q": "What squawk code indicates a general emergency?", "a": "7700."}, {"q": "What squawk code indicates a communications failure?", "a": "7600."}, {"q": "What squawk code indicates a hijack?", "a": "7500."}, {"q": "What is the standard UK conspicuity squawk code for VFR flights?", "a": "7000."}, {"q": "Why should you switch to Standby (SBY) before changing transponder codes?", "a": "To avoid inadvertently passing through emergency codes (7700, 7600, 7500) while rotating the dials, which would trigger alerts."}, {"q": "What is Mode S and how does it differ from Mode A/C?", "a": "Mode S transmits a unique 24-bit aircraft identity code and allows selective interrogation of specific aircraft, reducing interference and clutter compared to Mode A/C."}, {"q": "What is the formula for maximum PSR range?", "a": "Max Range (NM) = 1.25 x (sqrt(h1) + sqrt(h2)), where h1 = radar antenna elevation in feet and h2 = aircraft altitude in feet."}, {"q": "What is an SRA (Surveillance Radar Approach)?", "a": "A non-precision approach where the controller provides azimuth guidance based on radar. The pilot maintains a standard 3-degree glideslope. Rate of descent (fpm) = half groundspeed in knots x 10."}, {"q": "What is a PAR (Precision Approach Radar)?", "a": "A precision approach radar providing both azimuth and glideslope guidance. Primarily available at military airfields."}, {"q": "What is 'ghosting' in radar?", "a": "False targets appearing on the radar screen caused by signal reflections from mountains or large obstacles, creating phantom aircraft positions."}, {"q": "What is 'shielding' in SSR?", "a": "Loss of transponder signal when the aircraft's attitude (e.g., steep bank) physically blocks the belly-mounted transponder antenna from the ground station's interrogation signal."}, {"q": "What does 'Squawk Ident' mean and what should the pilot do?", "a": "The controller is asking the pilot to press the IDENT button on the transponder, which causes the aircraft's return to flash or bloom on the radar screen for positive identification."}, {"q": "What is ASDE (Airport Surface Detection Equipment)?", "a": "A ground radar (also called Airfield Surface Movement Radar) at major airports that displays taxiways, runways, and aprons to track all surface movements in all weather conditions."}], "15 GPS and Flight Information Services": [{"q": "What is the difference between GNSS and GPS?", "a": "GNSS (Global Navigation Satellite System) is the generic ICAO term for all satellite navigation systems. GPS (Global Positioning System) is the specific US DoD system (NAVSTAR constellation)."}, {"q": "How many satellites are in the GPS NAVSTAR constellation and at what altitude?", "a": "24 to 32 satellites orbiting at approximately 10,900 NM (20,200 km) altitude, arranged in 6 orbital planes with 4 satellites per plane. They orbit the Earth twice per day."}, {"q": "How many satellites are needed for a 3D GPS fix?", "a": "A minimum of 4 satellites: 3 for position (latitude, longitude, altitude) and 1 additional to correct for receiver clock error."}, {"q": "What are the limitations of GPS for VFR pilots?", "a": "GPS can suffer signal shielding (steep banks blocking antenna, mountains), is subject to jamming/spoofing, and should only be used as a supplementary backup to visual navigation, not as the primary method."}, {"q": "Should VFR pilots plan routes using GPS as the primary navigation method?", "a": "No. Plan routes using standard dead-reckoning methods first, then enter the route into GPS. Use GPS to confirm visual navigation, not replace it."}, {"q": "What is FIS (Flight Information Service)?", "a": "FIS provides information useful for safe, orderly, and efficient flight. It is supplied by Air Traffic Service Units (ATSUs) and FIR Centres. It is the primary service for VFR pilots in uncontrolled airspace (Class G)."}, {"q": "What are the four levels of UK ATSOCAS (Air Traffic Services Outside Controlled Airspace)?", "a": "Basic Service, Traffic Service, Deconfliction Service, and Procedural Service. Each provides increasing levels of traffic information and deconfliction advice."}, {"q": "What does the Basic Service provide?", "a": "Weather, facility, and aerodrome information only. No traffic information is passed. Collision avoidance and terrain clearance are entirely the pilot's responsibility."}, {"q": "What does the Traffic Service provide?", "a": "Surveillance-derived traffic information on conflicting aircraft anticipated to pass within 3 NM and 3,000 ft. However, NO deconfliction advice is given; collision avoidance remains the pilot's responsibility."}, {"q": "What does the Deconfliction Service provide?", "a": "Traffic information plus deconfliction advice (radar vectors and height changes). It is primarily for IFR flights. VFR pilots should only accept vectors that keep them in VMC."}, {"q": "What is the Procedural Service?", "a": "A non-surveillance service providing vertical, lateral, and time-based deconfliction instructions. It relies on the pilot precisely following track and time allocations."}, {"q": "What is LARS (Lower Airspace Radar Service)?", "a": "LARS provides radar services (Basic or Traffic) outside controlled airspace up to FL95, within approximately 30 NM of participating military and civil aerodromes."}, {"q": "Who bears responsibility for collision avoidance and terrain clearance outside controlled airspace?", "a": "The pilot bears sole responsibility, regardless of what FIS service is being received."}, {"q": "What is the CARPARFE mnemonic for position reports?", "a": "C=Callsign, A=Aircraft type, R=Route (from/to), P=Position, A=Altitude, R=altimeter (QNH), F=Flight rules (VFR/IFR), E=Estimate (next point and time)."}, {"q": "What should a VFR pilot do if ATC issues a vector that would take them into cloud?", "a": "Immediately inform the controller and refuse the instruction. A VFR pilot must always remain in Visual Meteorological Conditions (VMC) and has the authority to refuse any instruction that compromises this."}, {"q": "What should be included in the initial radio call to an FIS unit?", "a": "Only your callsign and the type of service requested (e.g., 'Stephenville Approach, G-ABCD, Request Basic Service'). Wait for 'Pass your message' before giving full details."}, {"q": "What is the critical rule about receiving FIS?", "a": "Receiving FIS does NOT free the pilot from thorough flight planning and collision avoidance responsibility. Neither GPS nor FIS replaces the pilot's duty to Aviate, Navigate, and Communicate."}]}};

// Load user-added Q&A from localStorage
var USER_QA_KEY = "ppl_user_qa";
function getUserQA() {
  try { return JSON.parse(localStorage.getItem(USER_QA_KEY) || "{}"); } catch(e) { return {}; }
}
function saveUserQA(data) {
  localStorage.setItem(USER_QA_KEY, JSON.stringify(data));
}
function getQA(subject, topic) {
  var base = DATA[subject] && DATA[subject][topic] ? DATA[subject][topic] : [];
  var user = getUserQA();
  var key = subject + "::" + topic;
  var added = user[key] || [];
  return base.concat(added);
}
function addQA(subject, topic, q, a) {
  var user = getUserQA();
  var key = subject + "::" + topic;
  if (!user[key]) user[key] = [];
  user[key].push({q: q, a: a});
  saveUserQA(user);
}

// Stats
function getTotalQA() {
  var total = 0;
  var user = getUserQA();
  for (var s in DATA) for (var t in DATA[s]) {
    total += DATA[s][t].length;
    var key = s + "::" + t;
    total += (user[key] || []).length;
  }
  return total;
}
function getSubjectCount(subject) {
  return Object.keys(DATA[subject] || {}).length;
}
function getSubjectQACount(subject) {
  var total = 0;
  var user = getUserQA();
  for (var t in DATA[subject]) {
    total += DATA[subject][t].length;
    var key = subject + "::" + t;
    total += (user[key] || []).length;
  }
  return total;
}

// Toast
function toast(msg) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(function() { el.classList.remove("show"); }, 2000);
}

// Router
var currentView = "home";
var currentSubject = "";
var currentTopic = "";
var SUBJECTS = Object.keys(DATA);

function render() {
  var app = document.getElementById("app");
  if (currentView === "home") renderHome(app);
  else if (currentView === "subject") renderSubject(app);
  else if (currentView === "topic") renderTopic(app);
}

function renderHome(app) {
  var totalTopics = 0;
  for (var i = 0; i < SUBJECTS.length; i++) totalTopics += getSubjectCount(SUBJECTS[i]);
  var totalQA = getTotalQA();

  var html = "<h1>PPL Exam PREP</h1>";
  html += "<div class=\"subtitle\">EASA &amp; CAAT Thailand ? Private Pilot License</div>";
  html += "<div class=\"stats\">";
  html += "<div class=\"stat\"><div class=\"num\">" + SUBJECTS.length + "</div>Subjects</div>";
  html += "<div class=\"stat\"><div class=\"num\">" + totalTopics + "</div>Topics</div>";
  html += "<div class=\"stat\"><div class=\"num\">" + totalQA + "</div>Q&amp;A</div>";
  html += "</div>";
  html += "<ul class=\"list\">";
  for (var i = 0; i < SUBJECTS.length; i++) {
    var s = SUBJECTS[i];
    var count = getSubjectCount(s);
    var qaCount = getSubjectQACount(s);
    html += "<li><a data-idx=" + i + ">" + s + "<span class=\"count\">" + count + " topics ? " + qaCount + " Q&A</span></a></li>";
  }
  html += "</ul>";
  html += "<button class=\"btn btn-refresh\" id=\"refreshBtn\" style=\"margin-top:16px\">Refresh</button>";
  app.innerHTML = html;

  // Bind events
  document.getElementById("refreshBtn").onclick = function() { toast("Content is up to date"); };
  var items = app.querySelectorAll("[data-idx]");
  for (var i = 0; i < items.length; i++) {
    items[i].onclick = function() {
      currentSubject = SUBJECTS[parseInt(this.getAttribute("data-idx"))];
      currentView = "subject";
      render();
      window.scrollTo(0, 0);
    };
  }
}

function renderSubject(app) {
  var TOPICS = Object.keys(DATA[currentSubject] || {});
  var html = "<a class=\"back\" id=\"backHome\">Home</a>";
  html += "<h1>" + currentSubject + "</h1>";
  html += "<div class=\"subtitle\">" + TOPICS.length + " topics ? " + getSubjectQACount(currentSubject) + " Q&amp;A loaded</div>";
  html += "<ul class=\"list\">";
  for (var i = 0; i < TOPICS.length; i++) {
    var t = TOPICS[i];
    var qa = getQA(currentSubject, t);
    var badge = qa.length > 0 ? "<span class=\"badge\">" + qa.length + "</span>" : "<span class=\"count\">?</span>";
    html += "<li><a data-tidx=" + i + ">" + t + badge + "</a></li>";
  }
  html += "</ul>";
  app.innerHTML = html;

  document.getElementById("backHome").onclick = function() { currentView = "home"; render(); window.scrollTo(0, 0); };
  var items = app.querySelectorAll("[data-tidx]");
  for (var i = 0; i < items.length; i++) {
    items[i].onclick = function() {
      currentTopic = TOPICS[parseInt(this.getAttribute("data-tidx"))];
      currentView = "topic";
      render();
      window.scrollTo(0, 0);
    };
  }
}

function renderTopic(app) {
  var qa = getQA(currentSubject, currentTopic);
  var html = "<a class=\"back\" id=\"backSubject\">" + currentSubject + "</a>";
  html += "<h2>" + currentTopic + "</h2>";
  html += "<div class=\"subtitle\">" + qa.length + " questions</div>";

  if (qa.length === 0) {
    html += "<div style=\"padding:40px 0;text-align:center;color:var(--muted)\">No Q&amp;A yet.<br>Add below or run refresh to auto-generate.</div>";
  } else {
    html += "<div style=\"text-align:right;padding:4px 0\"><span class=\"toggle\" id=\"toggleAllBtn\">Show All Answers</span></div>";
    for (var i = 0; i < qa.length; i++) {
      html += "<div class=\"qa-card\">";
      html += "<div class=\"q\"><span class=\"qa-num\">Q" + (i + 1) + ".</span> " + escHtml(qa[i].q) + "</div>";
      html += "<span class=\"toggle\" data-tgl=\"1\">Show Answer</span>";
      html += "<div class=\"a\">" + escHtml(qa[i].a) + "</div>";
      html += "</div>";
    }
  }

  html += "<div class=\"add-section\">";
  html += "<h2>Add Q&amp;A</h2>";
  html += "<textarea id=\"newQ\" placeholder=\"Question...\" rows=\"2\"></textarea>";
  html += "<textarea id=\"newA\" placeholder=\"Answer...\" rows=\"2\"></textarea>";
  html += "<button class=\"btn btn-primary\" id=\"addBtn\">+ Add Q&amp;A</button>";
  html += "</div>";
  app.innerHTML = html;

  document.getElementById("backSubject").onclick = function() { currentView = "subject"; render(); window.scrollTo(0, 0); };

  // Toggle individual answers
  var toggles = app.querySelectorAll("[data-tgl]");
  for (var i = 0; i < toggles.length; i++) {
    toggles[i].onclick = function() {
      var a = this.nextElementSibling;
      if (a.classList.contains("show")) {
        a.classList.remove("show");
        this.textContent = "Show Answer";
      } else {
        a.classList.add("show");
        this.textContent = "Hide Answer";
      }
    };
  }

  // Toggle all
  var toggleAllBtn = document.getElementById("toggleAllBtn");
  if (toggleAllBtn) {
    toggleAllBtn.onclick = function() {
      var cards = app.querySelectorAll(".qa-card .a");
      var allShown = true;
      for (var j = 0; j < cards.length; j++) {
        if (!cards[j].classList.contains("show")) { allShown = false; break; }
      }
      for (var j = 0; j < cards.length; j++) {
        if (allShown) cards[j].classList.remove("show");
        else cards[j].classList.add("show");
      }
      var ts = app.querySelectorAll("[data-tgl]");
      for (var j = 0; j < ts.length; j++) ts[j].textContent = allShown ? "Show Answer" : "Hide Answer";
      toggleAllBtn.textContent = allShown ? "Show All Answers" : "Hide All Answers";
    };
  }

  // Add Q&A
  document.getElementById("addBtn").onclick = function() {
    var q = document.getElementById("newQ").value.trim();
    var a = document.getElementById("newA").value.trim();
    if (!q || !a) { toast("Enter both Q and A"); return; }
    addQA(currentSubject, currentTopic, q, a);
    toast("Q&A added!");
    render();
    setTimeout(function() { window.scrollTo(0, document.body.scrollHeight); }, 100);
  };
}

// Helpers
function escHtml(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// Init
render();
</script>
</body>
</html>

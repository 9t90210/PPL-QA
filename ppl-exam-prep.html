dissipation capacity is limited."},{"q":"What happens if the landing gear emergency extension system is used?","a":"The gear extends by gravity or an alternative mechanical method, bypassing the normal hydraulic or electrical system."},{"q":"What is the trunnion in a retractable gear system?","a":"The pivot point around which the landing gear leg rotates during retraction and extension."},{"q":"Why should pilots avoid applying brakes immediately after touchdown?","a":"The tyres need time to spin up to ground speed. Applying brakes on a non-rotating tyre causes flat spots and excessive wear."},{"q":"What effect does under-inflation have on aircraft tyres?","a":"Under-inflation causes excessive flexing of the sidewalls, leading to overheating, increased wear on the shoulders, and potential structural failure."},{"q":"What effect does over-inflation have on aircraft tyres?","a":"Over-inflation reduces the contact area, causes accelerated wear in the centre of the tread, and increases the risk of damage from impact."},{"q":"Why is nitrogen sometimes used to inflate aircraft tyres instead of air?","a":"Nitrogen is inert and contains no moisture, reducing the risk of internal corrosion and eliminating the possibility of combustion from heat buildup."},{"q":"What causes a ground loop in a tailwheel aircraft?","a":"An uncontrolled yaw during ground operations where the tailwheel aircraft's CG behind the main wheels amplifies any directional deviation."},{"q":"What is the hydraulic jack's role in retractable gear?","a":"The hydraulic jack provides the force to retract and extend the landing gear, driven by hydraulic fluid pressure from the aircraft's hydraulic system."},{"q":"When should cowl flaps typically be opened after landing?","a":"After landing during taxi, if the engine ran at high power, cowl flaps should remain open to allow adequate cooling airflow at low taxi speeds."},{"q":"What is the purpose of the breaker strips on aircraft tyres?","a":"Breaker strips are reinforcing layers between the plies and the tread that provide additional strength and protect the casing from damage."},{"q":"How does tyre pressure change with altitude?","a":"As altitude increases and atmospheric pressure decreases, the air trapped between the plies expands. Awl vents allow this air to escape safely."}],"3 Aviation Piston Engines":[{"q":"What is the standard configuration of a light aircraft piston engine?","a":"Four-stroke, horizontally opposed, gasoline (petrol), spark-ignition engine."},{"q":"What is the primary function of a piston engine?","a":"Expanding a working fluid in a cylinder against a reciprocating piston to convert chemical energy into mechanical energy."},{"q":"What are the three stages of energy conversion in a piston engine?","a":"Chemical (air-fuel mixture introduced), heat (spark ignites the compressed mixture), and mechanical (expanding gases force the piston down)."},{"q":"What are the four strokes of the Otto Cycle in order?","a":"Induction, Compression, Power, Exhaust. Mnemonic: Suck, Squeeze, Bang, Blow."},{"q":"How many crankshaft revolutions does one complete Otto cycle require?","a":"Two complete revolutions of the crankshaft produce four strokes and one power event."},{"q":"What is Top Dead Centre (TDC)?","a":"The absolute upper limit of piston travel within the cylinder."},{"q":"What is Bottom Dead Centre (BDC)?","a":"The absolute lower limit of piston travel within the cylinder."},{"q":"What is the stroke of a piston?","a":"The physical distance the piston travels between TDC and BDC."},{"q":"What are piston rings and what do they do?","a":"Crucial metallic seals bridging the micro-gap between the piston and cylinder wall. They prevent combustion gas blow-by and keep lubricating oil out of the combustion chamber."},{"q":"What is the function of the connecting rod?","a":"The physical steel link between the piston and the crankshaft, transmitting the force of combustion."},{"q":"What is the function of the crankshaft?","a":"The heavy central rotating shaft that converts the linear reciprocating movement of the pistons into smooth rotary motion to drive the propeller."},{"q":"What is the function of the camshaft?","a":"The camshaft controls engine timing through egg-shaped lobes that mechanically push the intake and exhaust valves open."},{"q":"At what speed does the camshaft rotate relative to the crankshaft?","a":"The camshaft rotates at exactly half (50%) the speed of the crankshaft."},{"q":"During the induction stroke, what is the valve and piston configuration?","a":"Piston moves downward from TDC to BDC, inlet valve is open, exhaust valve is closed. The vacuum created draws the air-fuel mixture into the cylinder."},{"q":"During the compression stroke, what is the valve configuration?","a":"Both inlet and exhaust valves are completely closed while the piston moves upward from BDC to TDC, compressing the air-fuel mixture."},{"q":"During the power stroke, what happens?","a":"The spark plug fires just before TDC. Both valves remain closed. The combustion forces the piston downward to BDC. This is the only stroke that generates mechanical energy."},{"q":"During the exhaust stroke, what occurs?","a":"The piston moves upward from BDC to TDC, the inlet valve is closed, and the exhaust valve is open, sweeping burnt gases out into the exhaust manifold."},{"q":"What is swept volume?","a":"The volume displaced by the piston as it travels from BDC to TDC. This defines the 'size' of the engine."},{"q":"What is clearance volume?","a":"The small pocket of space remaining at the top of the cylinder when the piston is at TDC."},{"q":"How is total volume calculated?","a":"Total Volume = Swept Volume + Clearance Volume."},{"q":"What is the compression ratio and how is it calculated?","a":"The compression ratio is Total Volume divided by Clearance Volume. A typical aviation petrol engine has a ratio around 7:1 to 8.5:1."},{"q":"If swept volume is 1800cc and clearance volume is 300cc, what is the compression ratio?","a":"Total Volume = 1800 + 300 = 2100cc. Compression ratio = 2100 / 300 = 7:1."},{"q":"How does engine RPM relate to power output?","a":"Power output increases as engine RPM increases because more RPM means more power strokes per minute."},{"q":"What determines the power of a normally aspirated engine at sea level?","a":"The power is proportional to the volume of air-fuel mixture induced into the cylinders."},{"q":"How does altitude affect a normally aspirated engine?","a":"As altitude increases, air density decreases. The volume of air drawn in remains the same but the mass of oxygen is drastically lower, reducing power output."},{"q":"Why do all certified aircraft piston engines feature dual ignition?","a":"For redundancy (safety) - if one magneto or spark plug fails, the engine continues running. For performance - two spark plugs provide faster, more uniform combustion."},{"q":"What is detonation in a piston engine?","a":"An explosive, uncontrolled secondary blast occurring after the spark plug fires, caused by high pressure/temperature and lean mixtures. It is harmful to pistons and causes overheating."},{"q":"What is pre-ignition?","a":"The premature ignition of the fuel-air mixture by a glowing hot spot (e.g., carbon deposit) before the spark plug fires. It causes severe engine damage and piston melting."},{"q":"How does pre-ignition differ from detonation in timing?","a":"Pre-ignition occurs before the spark plug fires, while detonation occurs after the spark plug fires."},{"q":"What percentage of fuel energy is converted to waste heat in a piston engine?","a":"Approximately 70% of fuel energy becomes waste heat, with only about 30% converted to useful mechanical power."},{"q":"What is the purpose of cylinder fins on an air-cooled engine?","a":"To increase the surface area of the cylinders, allowing ram air to carry heat away more efficiently."},{"q":"What provides internal cooling of the engine?","a":"The continuous circulation of lubricating oil absorbs and removes extreme heat from internal moving parts such as pistons and the crankshaft."},{"q":"Why are valve clearances set with gaps when the engine is cold?","a":"To accommodate thermal expansion. As the engine reaches operating temperature, the metal expands and the gaps close to the correct operational tolerance."},{"q":"Which stroke of the four-stroke cycle is the only one that generates mechanical energy?","a":"The power stroke (stroke 3) is the only stroke that generates mechanical energy."},{"q":"What is the advantage of a horizontally opposed engine layout?","a":"It provides excellent balance (opposing pistons cancel vibrations), a low profile for better visibility, and good weight distribution."},{"q":"Why is the exhaust valve typically larger and made of more heat-resistant material than the inlet valve?","a":"The exhaust valve is exposed to extremely hot combustion gases and must withstand much higher temperatures than the inlet valve."},{"q":"What is volumetric efficiency?","a":"The ratio of the actual volume of air-fuel mixture drawn into the cylinder compared to the theoretical maximum. Higher volumetric efficiency means more power."},{"q":"What happens if the compression ratio is too high in a petrol engine?","a":"Excessively high compression ratios lead to detonation, as the mixture auto-ignites from the heat of compression before the spark plug fires."},{"q":"How many times does each valve open in one complete Otto cycle?","a":"Each valve (inlet and exhaust) opens exactly once during one complete four-stroke cycle."},{"q":"What is blow-by in an engine?","a":"Blow-by is the leakage of high-pressure combustion gases past the piston rings into the crankcase, indicating worn or damaged rings."},{"q":"What is the purpose of the crankcase?","a":"The crankcase encloses and supports the crankshaft, provides mounting for the engine, and in wet-sump systems acts as the oil reservoir."},{"q":"What is the firing order and why is it important?","a":"The firing order is the specific sequence in which cylinders fire. It is designed to ensure smooth power delivery and minimize vibration."},{"q":"What causes an engine to run rough on one magneto during a magneto check?","a":"A small RPM drop (typically 75-175 RPM) is normal when running on one magneto. Excessive drop or rough running indicates fouled plugs, faulty leads, or magneto problems."},{"q":"What does a zero RPM drop during a magneto check indicate?","a":"A zero RPM drop indicates that the magneto being tested may have a grounding problem (live magneto), meaning it cannot be switched off. This is a safety hazard."},{"q":"What is the effect of using a lower octane fuel than specified?","a":"Using lower octane fuel than specified increases the risk of detonation, as the fuel has less resistance to auto-ignition under compression."},{"q":"What is brake horsepower (BHP)?","a":"The actual power output of the engine measured at the crankshaft, after accounting for internal friction losses."},{"q":"What is the function of the reduction gearbox found on some engines?","a":"A reduction gearbox reduces the propeller RPM relative to engine RPM, allowing the engine to run at efficient high speeds while keeping propeller tip speed below the speed of sound."},{"q":"Why must a piston engine be warmed up before applying full power?","a":"To allow oil to reach operating temperature and viscosity, metal components to expand to proper clearances, and fuel to vaporize properly for smooth combustion."},{"q":"What is indicated horsepower (IHP)?","a":"The theoretical power developed inside the cylinders by combustion, before subtracting friction losses. BHP = IHP minus friction horsepower."},{"q":"What is the purpose of valve overlap in the four-stroke cycle?","a":"Valve overlap occurs when both inlet and exhaust valves are briefly open near TDC at the end of the exhaust stroke. It improves cylinder scavenging by using exhaust gas momentum to help draw in fresh charge."}],"3A Aviation Diesel Resurgence":[{"q":"Why were diesel engines historically ignored for aviation?","a":"Due to their heavy weight and poor power-to-weight ratio compared to petrol engines."},{"q":"What has made diesel engines viable for modern light aircraft?","a":"Modern automobile diesel technology has improved the power-to-weight ratio sufficiently for light aircraft use."},{"q":"What are the three principal advantages of aviation diesel over petrol?","a":"Jet A1 fuel is cheaper and more globally available than AVGAS, specific fuel consumption is much lower (longer range), and diesel engines are more durable."},{"q":"What fuel do most aircraft diesel engines use?","a":"Jet A1 (AVTUR), which is a kerosene-based aviation turbine fuel."},{"q":"Why is Jet A1 considered safer than AVGAS?","a":"Jet A1 has a much lower fire and explosion risk compared to highly volatile aviation gasoline, making diesel aircraft inherently safer in a crash scenario."},{"q":"How does a diesel engine ignite its fuel?","a":"By compression ignition - the piston compresses pure air until the temperature rises massively, then fuel is injected into this superheated air where it spontaneously ignites."},{"q":"Do diesel engines have spark plugs?","a":"No, diesel engines have no spark plugs. Ignition is achieved purely through the heat of compression."},{"q":"What is the typical compression ratio of an aviation diesel engine?","a":"Aviation diesels can have compression ratios up to 25:1, with modern aero diesels typically running around 18:1."},{"q":"How does the compression ratio of a diesel compare to a petrol engine?","a":"A diesel compression ratio (approximately 18:1 to 25:1) is much higher than a petrol engine (approximately 7:1 to 8.5:1)."},{"q":"What is a glow plug in a diesel engine?","a":"An electrical heating element used to raise the temperature of the air in the cylinder to aid compression-ignition during cold starting."},{"q":"When are glow plugs used in a diesel engine?","a":"Only for a few seconds before cranking the engine. Once running, the cylinder retains enough heat for combustion and the glow plugs are turned off."},{"q":"How does power control differ between diesel and petrol engines?","a":"Diesel engines have no throttle valve - the intake is fully open all the time. Power is controlled solely by the amount of fuel injected."},{"q":"Why do diesel engines have higher volumetric efficiency than petrol engines?","a":"Because they have no throttle valve restricting airflow. The intake is always fully open, eliminating pumping losses."},{"q":"What fuel injection system do modern aero diesels use?","a":"Electronic common-rail fuel injection, where a high-pressure pump pressurizes a common tube (rail) and electronic injectors spray atomized fuel directly into the combustion chambers."},{"q":"What was the Centurion 1.7?","a":"Based on a Mercedes automotive block, it was the first modern diesel fitted to a certified airframe (Diamond DA40). It is a liquid-cooled, turbocharged, 4-cylinder in-line engine."},{"q":"What are the performance metrics of the Centurion 1.7?","a":"135 HP, 302 lb-ft torque, 18:1 compression ratio, and cruise consumption of 15-20 litres per hour."},{"q":"What is the SMA SR305 diesel engine?","a":"A horizontally-opposed, air-cooled, four-cylinder diesel engine developed by SMA in France, producing 200 HP up to 10,000 ft. Certified for Cessna 182 and Piper PA28."},{"q":"Why are almost all modern aero diesels turbocharged?","a":"Because diesel engines are built to withstand high compression, they easily handle turbocharger boost pressures, allowing them to maintain sea-level power up to high altitudes."},{"q":"What advantage does turbocharging give a diesel over a normally aspirated petrol engine at altitude?","a":"A turbocharged diesel maintains 100% power up to 10,000 feet or more, while a normally aspirated petrol engine loses power steadily with altitude."},{"q":"What is FADEC and how does it simplify diesel engine operation?","a":"Full Authority Digital Engine Control manages fuel injection and propeller pitch electronically. The pilot only has one power lever, with no mixture control or manual prop control needed."},{"q":"Why is there no mixture control on a diesel aircraft?","a":"Diesel engines always run lean automatically because power is controlled by fuel quantity injected, not by throttling air. The FADEC optimises the mixture at all times."},{"q":"What cooling system do many converted automotive diesels (like the Centurion) use?","a":"Liquid cooling using water/glycol, which prevents shock cooling during rapid descents and provides very stable operating temperatures."},{"q":"What is the disadvantage of liquid cooling on a diesel aircraft engine?","a":"It adds the weight and complexity of radiators, coolant lines, and coolant fluid."},{"q":"Why is Jet A1 not a good lubricant?","a":"Jet A1 has poor lubricity. High-pressure diesel injection pumps that rely on fuel for internal lubrication must be specially engineered and hardened to withstand the poor lubricity of AVTUR."},{"q":"How does the fuel consumption of an aviation diesel compare to a petrol engine?","a":"Aviation diesels typically burn 30-40% less fuel per hour than comparable petrol engines."},{"q":"Why is AVGAS becoming problematic globally?","a":"AVGAS contains lead (environmental concern), has limited and declining availability worldwide, and its price is higher and increasing."},{"q":"What is the advantage of a single power lever in a diesel aircraft?","a":"It replaces the traditional three-lever system (throttle, propeller, mixture), greatly simplifying cockpit workload and reducing the risk of pilot error."},{"q":"How does a turbocharger work on an aviation diesel?","a":"Exhaust gases spin a turbine wheel, which is connected via a central shaft to a compressor wheel that forces additional ambient air into the engine intake, maintaining power at altitude."},{"q":"What is shock cooling and how does liquid cooling prevent it?","a":"Shock cooling is rapid temperature drop in air-cooled cylinders during descent. Liquid cooling uses a thermostat to maintain stable engine temperature regardless of power and airspeed changes."},{"q":"What type of engine layout does the SMA SR305 use compared to the Centurion?","a":"The SMA SR305 uses a traditional horizontally-opposed layout and is air-cooled, while the Centurion uses an in-line layout and is liquid-cooled."},{"q":"What is the fuel consumption advantage that makes diesel attractive for flight training?","a":"With cruise consumption as low as 15-20 litres per hour versus 30-40 litres for comparable petrol engines, operating costs are dramatically reduced."},{"q":"What operational cycle does an aviation diesel engine use?","a":"The four-stroke diesel cycle (compression-ignition), not the Otto cycle used by petrol engines."},{"q":"Why must aviation diesel injection pumps be specially engineered?","a":"Because Jet A1 has poor lubricity compared to automotive diesel. The pumps must be specially hardened and coated to survive on dry Jet A1."},{"q":"What is the primary reason diesel engines are more durable than petrol engines?","a":"Diesel engines are built much more robustly to withstand the extreme cylinder pressures of high compression ratios, resulting in longer time between overhauls."},{"q":"Can an aviation diesel engine run on automotive diesel fuel?","a":"While chemically similar, aviation operations require Jet A1 (AVTUR) as specified by the engine manufacturer and aviation regulations."},{"q":"What environmental benefit do diesel aircraft engines offer?","a":"They burn lead-free Jet A1 fuel instead of leaded AVGAS, eliminating lead emissions from aircraft exhaust."},{"q":"How does the torque output of a diesel engine compare to a petrol engine of similar displacement?","a":"Diesel engines produce significantly higher torque than comparable petrol engines, resulting in superior static thrust for take-off."},{"q":"What is the key difference in the induction stroke between diesel and petrol engines?","a":"A diesel engine draws in only pure air during induction, while a petrol engine draws in a pre-mixed air-fuel charge."},{"q":"Why does the Centurion diesel require a reduction gearbox?","a":"The engine operates at high RPM for efficiency, but the propeller must turn at lower RPM to keep tip speed subsonic. The gearbox reduces prop speed."},{"q":"What is the typical TBO (time between overhaul) advantage of a diesel over a petrol aero engine?","a":"Diesel aero engines often have TBOs of 2000+ hours, compared to 1200-2000 hours for typical petrol aero engines, due to their more robust construction."},{"q":"How does the availability of Jet A1 compare to AVGAS at airports worldwide?","a":"Jet A1 is available at virtually every airport that services jet aircraft worldwide, while AVGAS has limited and declining distribution infrastructure."},{"q":"What role does the FADEC play in engine starting of a diesel aircraft?","a":"The FADEC manages glow plug activation timing, fuel injection sequence, and engine parameters during startup, making the process largely automated."},{"q":"Why is diesel fuel less volatile than AVGAS?","a":"Diesel (kerosene) has a much higher flash point than aviation gasoline, meaning it requires significantly more heat to ignite and does not readily evaporate into explosive vapors."},{"q":"What is common-rail injection?","a":"A fuel system where a high-pressure pump feeds a shared fuel rail at constant high pressure, and individual electronic injectors open for precise durations to meter fuel to each cylinder."},{"q":"What is the flash point difference between Jet A1 and AVGAS?","a":"Jet A1 has a flash point of approximately 38 degrees C, while AVGAS has a flash point of approximately -40 degrees C, making AVGAS far more flammable."},{"q":"How does a diesel aircraft perform in terms of range compared to a petrol aircraft?","a":"Diesel aircraft typically achieve 30-40% greater range for the same fuel load due to significantly lower specific fuel consumption."},{"q":"What cooling system advantage does the air-cooled SMA SR305 have over the Centurion?","a":"The SMA SR305 requires no liquid cooling radiators, keeping the installation simpler and lighter."},{"q":"Why is carburetor icing not a concern for diesel aircraft?","a":"Diesel engines use direct fuel injection into the cylinder rather than a carburetor. There is no venturi or throttle plate where ice could form from fuel vaporization."},{"q":"What does AVTUR stand for?","a":"Aviation Turbine Fuel, the military/international designation for Jet A1 kerosene-based fuel used in both turbine and diesel aircraft engines."},{"q":"Why is a reduction gearbox essential on most modern aviation diesel engines?","a":"Modern diesels operate at high RPM (up to 4000+) for peak efficiency, but the propeller must turn much slower. The gearbox typically reduces prop speed by about 1.69:1."}],"4 Aircraft Engine Cooling":[{"q":"What percentage of fuel energy becomes useful power in a piston engine?","a":"Only approximately 30% becomes useful power; the remaining 70% is waste heat that must be managed."},{"q":"How is the 70% waste heat dissipated from a piston engine?","a":"Approximately 40% leaves via exhaust gases and approximately 30% remains in engine components and oil, which must be removed by the cooling system."},{"q":"What are the dangers of engine overheating?","a":"Overheating expands internal parts, destroys oil lubricating properties, and causes severe friction or seizure."},{"q":"What abnormal combustion risk does overheating create?","a":"High temperatures cause detonation (violent uncontrolled explosion of the fuel-air mixture) and pre-ignition (hot spots igniting the charge before the spark plug fires)."},{"q":"What are the dangers of overcooling an engine?","a":"Overcooling reduces Brake Horse Power (BHP), causes uneven contraction of components, increases oil viscosity, and prevents proper fuel vaporization."},{"q":"What cooling system do most light aircraft use?","a":"Air cooling, where cylinders feature fins to increase the surface area exposed to airflow."},{"q":"What is the purpose of cylinder cooling fins?","a":"To increase the surface area of the cylinder exposed to ram air, allowing more efficient heat transfer from the engine to the passing airflow."},{"q":"How does oil contribute to engine cooling?","a":"Oil circulates through the hottest internal parts of the engine, absorbing heat and dissipating it via the oil cooler."},{"q":"What is the function of the engine cowling?","a":"The cowling streamlines the engine, reduces drag, and creates a pressurized environment to force air through the cooling fins."},{"q":"What are baffles in the engine cooling system?","a":"Close-fitting directional guides that force cooling air strictly over the cylinder fins, ensuring even and effective cooling."},{"q":"What are cowl flaps (gills)?","a":"Manually controlled vents at the rear of the cowling that open to accelerate airflow and increase cooling, or close to retain heat."},{"q":"When should cowl flaps be open during take-off?","a":"Cowl flaps must be open during take-off because high power combined with low airspeed creates rapid heating."},{"q":"What is the cowl flap position during cruise?","a":"Cowl flaps should be partially closed during cruise to maintain optimum cylinder head temperatures while reducing aerodynamic drag."},{"q":"When is engine overheating most likely to occur?","a":"During high-power, low-airspeed operations such as take-off, initial climb, and extended ground operations."},{"q":"What should a pilot do if cylinder head temperature (CHT) exceeds limits?","a":"Reduce power, increase airspeed (lower nose attitude), open cowl flaps fully, and enrich the mixture."},{"q":"How does enriching the mixture help cool the engine?","a":"Excess fuel absorbs heat as it vaporizes in the cylinder, providing an internal cooling effect that lowers combustion temperatures."},{"q":"What is shock cooling?","a":"A rapid temperature drop in air-cooled cylinders caused by reducing power suddenly while maintaining high airspeed, such as during a steep descent."},{"q":"How can shock cooling be avoided?","a":"By reducing power gradually and avoiding steep descents at high speed. Maintain some power during descent to keep engine temperatures stable."},{"q":"What damage can shock cooling cause?","a":"Rapid, uneven contraction of cylinder components can cause cracking of cylinder heads and barrels."},{"q":"What is the surge valve in the oil cooling system?","a":"A valve that allows cold, thick oil to bypass the oil cooler during engine warm-up, ensuring adequate oil flow before the oil reaches operating temperature."},{"q":"What pre-flight checks relate to engine cooling?","a":"Ensure air inlets and outlets are unobstructed, check baffle condition, verify cowling security, and confirm cowl flap operation."},{"q":"Why do rear cylinders tend to run hotter than front cylinders?","a":"Rear cylinders receive air that has already been heated by passing over the front cylinders, reducing cooling effectiveness."},{"q":"What instrument monitors engine cooling effectiveness?","a":"The Cylinder Head Temperature (CHT) gauge, which measures the temperature of the hottest cylinder head."},{"q":"What is the normal operating range for CHT in a typical light aircraft?","a":"Typically between 150 and 260 degrees C, depending on the engine type. The maximum limit is marked with a red line on the gauge."},{"q":"What is the relationship between mixture setting and engine temperature?","a":"A lean mixture produces higher combustion temperatures, while a rich mixture runs cooler due to the cooling effect of excess fuel vaporization."},{"q":"Why should the engine oil level be checked as part of cooling system pre-flight?","a":"Oil is a critical cooling medium for internal engine components. Low oil level reduces the system's ability to absorb and dissipate heat."},{"q":"What happens to cooling effectiveness during a prolonged climb?","a":"Cooling can become marginal because high power settings produce maximum heat while the low airspeed reduces cooling airflow over the fins."},{"q":"How does high ambient temperature affect engine cooling?","a":"High ambient temperature reduces the temperature differential between the engine and the cooling air, making heat rejection less efficient."},{"q":"What is the function of the firewall in the engine compartment?","a":"A fire-resistant bulkhead that separates the engine compartment from the cockpit, preventing fire and fumes from reaching the occupants."},{"q":"Why are air-cooled engines lighter than liquid-cooled engines?","a":"Air-cooled engines do not need radiators, coolant, hoses, water pumps, or thermostats, resulting in significant weight savings."},{"q":"What is the disadvantage of air cooling compared to liquid cooling?","a":"Air cooling is less precise and more variable - cylinder temperatures depend on airspeed and ambient conditions, and the engine is more susceptible to shock cooling."},{"q":"How does ground running at idle affect engine temperature?","a":"Prolonged ground running at idle provides minimal cooling airflow with sufficient heat generation to cause cylinder temperatures to rise above normal limits."},{"q":"What is the augmenter tube used for in some engine installations?","a":"An augmenter tube uses the velocity of exhaust gases to draw additional cooling air through the engine compartment, supplementing the normal cooling airflow."},{"q":"What is the relationship between cowl flap position and drag?","a":"Open cowl flaps increase aerodynamic drag. Closing them reduces drag but also reduces cooling airflow through the engine compartment."},{"q":"Why must broken or bent baffles be repaired promptly?","a":"Damaged baffles allow cooling air to bypass the cylinder fins, creating hot spots and uneven cooling that can lead to overheating and engine damage."},{"q":"What happens if the oil cooler becomes blocked?","a":"The surge valve (bypass valve) opens to allow oil to continue flowing, but the oil will not be cooled effectively, leading to rising oil temperatures."},{"q":"During which phase of flight should cowl flaps be fully closed?","a":"Cowl flaps may be fully closed during high-speed cruise at moderate power if CHT is within limits, to minimize drag and maximize speed."},{"q":"What is the thermal cycle that engine components endure?","a":"Components repeatedly heat and expand during operation, then cool and contract when shut down. This cycling can cause fatigue cracking over time."},{"q":"How does altitude affect engine cooling?","a":"Although ambient temperature decreases with altitude (improving cooling), air density also decreases, reducing the mass of cooling air flowing over the fins."},{"q":"What is the effect of operating with one magneto on engine temperature?","a":"Single-magneto operation produces a slightly slower burn, which can result in higher exhaust gas temperatures and slightly different CHT readings."},{"q":"Why is the CHT probe typically placed on the hottest cylinder?","a":"To provide the pilot with worst-case temperature information, ensuring that if the monitored cylinder is within limits, all others should also be safe."},{"q":"What operational factors increase the risk of overheating?","a":"High power settings, low airspeed, high ambient temperatures, lean mixture settings, steep climbs, and prolonged ground operations."},{"q":"How does a rich mixture provide extra cooling at take-off power?","a":"The excess fuel vaporizes inside the combustion chamber, absorbing latent heat and lowering peak combustion temperatures, providing an internal cooling effect."},{"q":"What is the maximum rate of temperature change recommended during descent?","a":"A CHT drop rate of no more than approximately 50 degrees F (28 degrees C) per minute is generally recommended to avoid shock cooling."},{"q":"What role does the exhaust system play in engine cooling?","a":"The exhaust system removes approximately 40% of waste heat from the engine by carrying hot combustion gases away from the cylinders."},{"q":"What is cylinder head temperature limit exceedance and what should a pilot do?","a":"If CHT exceeds the red line, the pilot should immediately reduce power, increase airspeed, open cowl flaps, enrich the mixture, and if necessary, land as soon as practicable."},{"q":"What is the effect of missing or damaged cylinder baffles on engine operations?","a":"Missing or damaged baffles disrupt the directed airflow over cylinder fins, causing localized overheating, uneven thermal expansion, and potential engine damage."},{"q":"How does the oil temperature gauge relate to engine cooling?","a":"The oil temperature gauge indicates the temperature of oil leaving the engine. Rising oil temperature indicates the engine is running hotter and the oil's cooling capacity is being stressed."},{"q":"Why is it important to warm up the engine before run-up checks?","a":"Cold oil has high viscosity providing poor lubrication, metal clearances are not yet at operating values, and fuel vaporization is incomplete - all of which increase wear and risk."},{"q":"What is the primary advantage of the cylinder head temperature gauge over the oil temperature gauge for monitoring cooling?","a":"The CHT gauge responds much faster to temperature changes than the oil temperature gauge, giving the pilot earlier warning of overheating conditions."}],"5 Aircraft Engine Lubrication":[{"q":"What is the primary function of engine oil in an aircraft piston engine?","a":"The primary function is to reduce friction between moving metal surfaces, preventing wear and damage."},{"q":"What are the secondary functions of engine oil?","a":"Cooling internal engine components, cleaning deposits from engine surfaces, and sealing the micro-gaps between piston rings and cylinder walls."},{"q":"What is a wet sump lubrication system?","a":"A system where oil is stored in the bottom of the crankcase (sump). It is simpler and lighter but the oil level can only be accurately checked after the engine has been stopped for 15-20 minutes."},{"q":"What is a dry sump lubrication system?","a":"A system where oil is stored in a separate external tank. The oil level can be checked immediately because all oil drains back to the tank quickly."},{"q":"When should you check the oil level on a wet sump engine?","a":"Wait 15-20 minutes after engine shutdown to allow oil to drain back from the engine passages into the sump for an accurate reading."},{"q":"When can you check the oil level on a dry sump engine?","a":"Immediately, because the oil is stored in a separate tank and drains back quickly through the scavenge pump."},{"q":"What does high oil temperature typically indicate about oil pressure?","a":"High oil temperature is usually accompanied by low oil pressure because hot oil thins (loses viscosity) and cannot maintain pressure."},{"q":"What is the function of the pressure relief (surge) valve in the oil system?","a":"The surge valve limits maximum oil pressure by opening to relieve excess pressure and bypass oil back to the sump or tank."},{"q":"What happens to oil pressure if there is an oil leak?","a":"Oil pressure drops (low pressure) because the system loses oil volume, reducing the pump's ability to maintain pressure."},{"q":"What does SAE 15W-50 mean on an engine oil?","a":"It is a multi-grade oil designation showing the range of viscosity. 15W indicates winter (cold) viscosity and 50 indicates the viscosity at operating temperature."},{"q":"What is the difference between straight mineral oil and ashless dispersant (compound) oil?","a":"Straight mineral oil (green/clear) is used for new engine break-in. Ashless dispersant oil (darker) is used in run-in engines and contains additives to keep contaminants in suspension."},{"q":"Within what time period must oil pressure register after engine start?","a":"Oil pressure must register within 30 seconds of engine start. If it does not, the engine should be shut down immediately."},{"q":"What causes abnormally high oil pressure?","a":"Cold oil (high viscosity) or a faulty pressure relief valve stuck closed. As the oil warms, pressure should decrease to normal."},{"q":"What are the common causes of low oil pressure?","a":"Low oil level, high oil temperature (thinning oil), worn bearings, oil leaks, or a faulty pressure relief valve stuck open."},{"q":"What actions should a pilot take for low oil pressure?","a":"Reduce power, lower the nose to improve cooling airflow, enrich the mixture, and prepare for a precautionary or emergency landing."},{"q":"What does a fluctuating oil pressure needle indicate?","a":"Small fluctuations suggest a sticking pressure relief valve. Large fluctuations indicate the sump is running dry or the pump is sucking air."},{"q":"What does zero oil pressure in flight indicate?","a":"Pump failure or total oil loss. The engine will seize soon. The pilot must prepare for an immediate emergency landing."},{"q":"What happens if the oil cooler becomes blocked?","a":"The oil cooler bypass valve opens to maintain oil flow, but the oil will not be cooled, leading to rapidly rising oil temperatures."},{"q":"Where is the oil temperature sensor typically located?","a":"After the oil cooler but before the oil enters the hot engine sections, measuring the temperature of oil about to enter the engine."},{"q":"What is viscosity in relation to engine oil?","a":"Viscosity is a measure of oil's resistance to flow. High viscosity means thick oil (cold), low viscosity means thin oil (hot)."},{"q":"How does temperature affect oil viscosity?","a":"As temperature increases, oil viscosity decreases (oil becomes thinner). As temperature decreases, viscosity increases (oil becomes thicker)."},{"q":"What is the oil cooler's function?","a":"The oil cooler is an air-to-oil heat exchanger that removes heat from the oil before it returns to the engine, maintaining oil at proper operating temperature."},{"q":"What are the components of a typical dry sump oil system in order of flow?","a":"Oil tank, pressure pump, pressure filter, engine (lubricating moving parts), scavenge pump, surge valve, oil cooler, back to oil tank."},{"q":"What is the function of the scavenge pump?","a":"The scavenge pump collects oil from the bottom of the engine and returns it to the external oil tank in a dry sump system."},{"q":"Why does the scavenge pump have a larger capacity than the pressure pump?","a":"To ensure all oil is quickly removed from the engine crankcase, preventing oil accumulation and foaming."},{"q":"What is the purpose of the oil pressure filter?","a":"To remove contaminants, metal particles, and combustion byproducts from the oil before it enters the engine bearings and moving parts."},{"q":"What happens if the oil filter becomes blocked?","a":"A bypass valve opens to maintain oil flow to the engine, but the oil will be unfiltered, increasing the risk of wear and damage."},{"q":"What is oil dilution?","a":"The contamination of engine oil with fuel, typically from over-rich running or incomplete combustion. It reduces oil viscosity and lubricating effectiveness."},{"q":"What causes blue smoke from the engine exhaust?","a":"Blue smoke indicates oil is entering and burning in the combustion chamber, typically due to worn piston rings or valve guide seals."},{"q":"What is the function of oil scrapers (oil control rings)?","a":"Oil scraper rings on the piston prevent excessive oil from passing up into the combustion chamber while maintaining a thin film of oil on the cylinder wall for lubrication."},{"q":"How often should engine oil be changed in a light aircraft?","a":"According to the manufacturer's recommended intervals, typically every 50 hours of operation or every 4-6 months, whichever comes first."},{"q":"What is foaming of engine oil and why is it dangerous?","a":"Foaming occurs when air becomes mixed with oil, creating bubbles. Foamed oil has poor lubricating and heat-transfer properties, potentially leading to bearing failure."},{"q":"What is the normal oil pressure range for a typical light aircraft engine?","a":"Typically 25-90 PSI depending on the engine type, with a green arc on the gauge showing the normal operating range."},{"q":"What is the normal oil temperature range?","a":"Typically 75-120 degrees C (167-248 degrees F) depending on the engine, with green arc marking normal range on the gauge."},{"q":"Why should you never mix different types of oil in an aircraft engine?","a":"Mixing mineral oil with ashless dispersant oil can cause chemical reactions, precipitate sludge, and block oil passages, leading to engine damage."},{"q":"What does the oil quantity indicate about engine health?","a":"Excessive oil consumption may indicate worn piston rings, valve guides, or crankshaft seals. Sudden oil loss indicates a leak or seal failure requiring immediate attention."},{"q":"How does oil provide a sealing function?","a":"Oil fills the micro-gaps between piston rings and cylinder walls, preventing combustion gas blow-by and maintaining compression pressure."},{"q":"What is an oil analysis program?","a":"A preventive maintenance technique where oil samples are regularly analysed for metal particles, contaminants, and degradation to detect early signs of engine wear."},{"q":"What is the purpose of the oil filler cap breather?","a":"It allows crankcase pressure to vent while preventing contaminants from entering. Excessive blow-by gases indicate worn piston rings."},{"q":"What oil system indications would suggest an imminent engine failure?","a":"Rapidly falling oil pressure combined with rising oil temperature, or sudden total loss of oil pressure, indicate severe problems requiring immediate action."},{"q":"What is the relationship between oil pressure and oil temperature during warm-up?","a":"Cold oil has high viscosity causing initially high oil pressure. As the engine warms and oil temperature rises, viscosity decreases and oil pressure settles to normal range."},{"q":"Why is the oil temperature gauge slower to respond than the oil pressure gauge?","a":"The oil temperature sensor measures the thermal mass of oil, which changes slowly. The pressure gauge responds instantly to changes in pump output and system resistance."},{"q":"What should a pilot do if oil temperature is high but oil pressure is normal?","a":"Open cowl flaps, enrich the mixture slightly, increase airspeed if possible, and monitor closely. If temperature continues to rise, reduce power and plan to land."},{"q":"What is the function of the full-flow oil filter versus the bypass filter?","a":"A full-flow filter processes all oil before it reaches the engine. A bypass filter processes a portion of oil flow and provides finer filtration over time."},{"q":"How does the oil system assist in removing lead deposits from the engine?","a":"Oil circulation helps wash lead deposits from cylinder walls and valve guides, carrying them to the filter. This is one reason regular oil changes are important in engines running leaded AVGAS."},{"q":"What is the main difference between oil pressure in a wet sump and dry sump system?","a":"Both systems use a pressure pump to deliver oil, but a dry sump system generally provides more consistent oil pressure because the external tank prevents oil starvation during unusual attitudes."},{"q":"Why is oil level critical for engine cooling?","a":"Oil absorbs approximately 10-15% of total engine heat. Insufficient oil reduces the system's heat absorption capacity, potentially leading to overheating."},{"q":"What is the colour coding of oil pressure and temperature gauges?","a":"Green arc indicates normal operating range, yellow arc indicates caution range, and red line indicates maximum or minimum limits not to be exceeded."},{"q":"What indicates that an oil change is overdue?","a":"Darkened or opaque oil, increasing oil consumption, metallic particles on the oil filter or dipstick, and oil that smells burnt or acrid."},{"q":"What happens when you run an engine at idle with an excessively rich mixture for extended periods?","a":"The excess fuel washes oil from the cylinder walls, dilutes the sump oil, and promotes spark plug fouling and lead deposit buildup - all degrading lubrication and ignition."}],"6 Aircraft Ignition":[{"q":"What type of ignition system do light aircraft piston engines use?","a":"A dual magneto ignition system with two independent magnetos, each powering its own set of spark plugs."},{"q":"Why do aircraft engines use dual ignition?","a":"For redundancy (safety - engine continues running if one system fails) and for performance (two flame fronts provide faster, more complete combustion)."},{"q":"What is a magneto?","a":"A self-contained electrical generator that produces high-voltage electricity for the spark plugs, driven mechanically by the engine and independent of the aircraft electrical system."},{"q":"Why is magneto independence from the electrical system important?","a":"The engine will continue to run even with a total electrical failure (dead battery, failed alternator), because magnetos generate their own electricity."},{"q":"How many spark plugs does each cylinder have in a dual ignition system?","a":"Each cylinder has two spark plugs - one fired by the left magneto and one by the right magneto."},{"q":"What is the purpose of the ignition switch positions L, R, BOTH, and OFF?","a":"L = left magneto only, R = right magneto only, BOTH = both magnetos operating (normal flight), OFF = both magnetos grounded (engine stops)."},{"q":"How does a magneto ground circuit work?","a":"In the OFF position, the magneto primary circuit is grounded (short-circuited), preventing spark generation. In the ON position, the ground is removed, allowing the magneto to fire."},{"q":"Why is a live magneto dangerous?","a":"If the ground wire is broken, the magneto remains live even in the OFF position. Moving the propeller could start the engine unexpectedly, causing serious injury."},{"q":"What is the dead-cut check?","a":"A check performed before shutdown by momentarily switching to OFF. If the engine falters, the grounding circuit works correctly. If it continues running, a magneto ground wire may be broken."},{"q":"What is the acceptable RPM drop during a magneto check?","a":"Typically 75-175 RPM drop when switching from BOTH to a single magneto. The drop must be within limits and similar between L and R."},{"q":"What does an excessive RPM drop on one magneto indicate?","a":"Fouled spark plugs, faulty ignition leads, incorrect timing, or a failing magneto on that side."},{"q":"What does zero RPM drop on one magneto during a check indicate?","a":"The opposite magneto may not be grounding properly (broken P-lead), meaning it cannot be turned off - a safety hazard requiring maintenance."},{"q":"What are the main components of a magneto?","a":"A rotating permanent magnet, a primary coil, a secondary coil, a cam-operated breaker (contact points), a capacitor (condenser), and a distributor."},{"q":"What is the function of the capacitor (condenser) in a magneto?","a":"It absorbs the current when the contact points open, preventing arcing across the points and enabling rapid collapse of the magnetic field for high-voltage spark generation."},{"q":"What is the distributor's function in the magneto?","a":"The distributor routes the high-voltage spark to each spark plug in the correct firing order."},{"q":"What is ignition timing?","a":"The precise moment the spark plug fires relative to piston position, usually a few degrees before TDC to allow the combustion flame front to develop maximum pressure as the piston reaches TDC."},{"q":"What happens if ignition timing is too advanced?","a":"The mixture ignites too early, creating excessive pressure while the piston is still rising. This causes detonation, rough running, overheating, and potential engine damage."},{"q":"What happens if ignition timing is too retarded?","a":"The mixture ignites too late, resulting in incomplete combustion, loss of power, high exhaust temperatures, and wasted fuel."},{"q":"What is spark plug fouling?","a":"The accumulation of carbon, lead, or oil deposits on the spark plug electrodes, which prevents proper spark generation and causes misfiring."},{"q":"How can a pilot help prevent spark plug fouling?","a":"By proper leaning at low power settings, avoiding prolonged idle with rich mixture, and performing regular magneto ground checks at cruise RPM."},{"q":"What are the two types of spark plugs used in aircraft?","a":"Fine wire (typically iridium or platinum) plugs that resist fouling better, and massive electrode plugs that are more robust but more prone to fouling."},{"q":"What is the impulse coupling on a magneto?","a":"A mechanical device that retards the timing and provides a stronger spark during engine starting by snapping the magneto through quickly, compensating for low cranking speed."},{"q":"Why is an impulse coupling necessary?","a":"At low cranking speeds during start, the magneto generates weak sparks. The impulse coupling accelerates the magnet rotation briefly to generate a hotter spark for reliable starting."},{"q":"What is a shower of sparks starting system?","a":"An alternative starting aid that uses the aircraft battery to generate a continuous stream of sparks through a vibrator unit, ensuring reliable ignition during cranking."},{"q":"What is the function of ignition harness (ignition leads)?","a":"Heavily shielded high-voltage cables that carry the spark from the magneto distributor to the spark plugs while preventing radio frequency interference."},{"q":"Why are ignition leads shielded?","a":"To prevent electromagnetic interference (EMI) from the high-voltage ignition pulses affecting radio communications and navigation equipment."},{"q":"What effect does altitude have on magneto performance?","a":"At high altitude, lower air pressure makes it easier for the spark to jump the plug gap, but the thinner air-fuel mixture may be harder to ignite consistently."},{"q":"Why should the ignition switch never be left in the OFF position during flight?","a":"With ignition OFF, unburned fuel collects in the cylinders and exhaust. If the magnetos are switched back on, the accumulated fuel could ignite causing a backfire or engine damage."},{"q":"What maintenance is required for magnetos?","a":"Regular inspection and replacement of contact breaker points, capacitor testing, timing verification, and magneto overhaul at specified intervals (typically 500 hours)."},{"q":"What is cross-firing in the distributor?","a":"An internal fault where the high-voltage spark jumps to the wrong terminal in the distributor, firing the incorrect cylinder and causing rough running or engine damage."},{"q":"How does moisture affect magneto operation?","a":"Moisture can cause tracking (electrical leakage across insulating surfaces), leading to weak or misdirected sparks. This is why pre-flight magneto checks are important, especially in humid conditions."},{"q":"What is the E-gap angle in a magneto?","a":"The precise position of the rotating magnet where the primary circuit is broken, designed to produce maximum spark energy. It is typically 10-12 degrees past neutral."},{"q":"Why do aircraft use magnetos instead of battery-powered ignition systems?","a":"Magnetos are self-powered, mechanically reliable, and independent of the electrical system. They continue to operate during electrical failures, providing critical redundancy."},{"q":"What is flashover in a magneto?","a":"An internal electrical breakdown where the high voltage arcs across a damaged or contaminated insulator instead of going to the spark plug, causing a misfire."},{"q":"How does lead fouling of spark plugs occur?","a":"Lead from leaded AVGAS (100LL) deposits on the spark plug electrodes. It is worsened by running rich at low power. Periodic lean operation at cruise helps burn off deposits."},{"q":"What is the hot mag check?","a":"A check after engine start where each magneto is tested individually by switching between L, R, and BOTH to verify proper RPM drop and smooth operation."},{"q":"What is the difference between magneto timing and valve timing?","a":"Magneto timing determines when the spark occurs relative to piston position. Valve timing determines when intake and exhaust valves open and close relative to the crankshaft position."},{"q":"Why does running on one magneto reduce engine performance?","a":"With only one spark plug firing per cylinder, combustion is slower and less complete, resulting in reduced power and slightly higher fuel consumption."},{"q":"What is the function of the magneto's primary coil?","a":"The primary coil generates a magnetic field that, when rapidly collapsed by opening the contact points, induces a high voltage in the secondary coil through electromagnetic induction."},{"q":"What voltage does the magneto secondary coil produce?","a":"The secondary coil produces approximately 15,000-25,000 volts, sufficient to create a spark across the spark plug gap."},{"q":"What should a pilot do if the magneto check reveals no RPM drop on one magneto?","a":"Do not fly. A zero drop indicates a possible broken P-lead (ground wire), meaning that magneto cannot be switched off. The aircraft requires maintenance."},{"q":"How does the magneto cam operate the contact points?","a":"The cam has lobes (one per cylinder) that push the contact points apart at the precise moment needed to collapse the primary magnetic field and generate a spark."},{"q":"What is the role of the spark plug gap in ignition?","a":"The gap must be precisely set - too narrow produces a weak spark, too wide requires excessive voltage and may cause misfiring, especially at high altitude."},{"q":"How are spark plugs designated by heat range?","a":"Hot plugs have a longer insulator nose retaining more heat (for low-power engines). Cold plugs dissipate heat faster (for high-power engines). Using the wrong type causes fouling or pre-ignition."},{"q":"What pre-flight inspection should be done on the ignition system?","a":"Verify the ignition switch operates properly through all positions, ensure the P-leads are secure, and check that the key cannot be removed in any position except OFF."},{"q":"Why must the propeller be treated as live at all times?","a":"Even with the magneto switch OFF, a broken P-lead can leave a magneto live. Moving the propeller could generate a spark and start the engine unexpectedly."},{"q":"What is the relationship between engine RPM and magneto spark intensity?","a":"Magneto spark intensity increases with engine RPM because the magnet rotates faster, inducing greater voltage. At idle, sparks are weaker."},{"q":"What causes after-firing (backfiring) in the exhaust?","a":"Unburned fuel igniting in the hot exhaust manifold, typically caused by an excessively rich mixture, faulty ignition, or incorrect timing."},{"q":"How does the dual magneto system contribute to more complete combustion?","a":"Two spark plugs create two flame fronts that converge from opposite sides of the combustion chamber, burning the mixture faster and more completely than a single plug."},{"q":"What is the maximum allowable difference in RPM drop between left and right magneto checks?","a":"Typically 50 RPM maximum difference between the two magnetos. A larger differential suggests one system is underperforming and requires maintenance."}],"7 Aircraft Carburation":[{"q":"What is the function of the carburettor?","a":"To meter and mix fuel with air in the correct proportions and deliver the vaporised mixture to the engine cylinders."},{"q":"What is the chemically correct (stoichiometric) air-fuel ratio?","a":"Approximately 15:1 by weight (15 parts air to 1 part fuel). This gives complete combustion with no excess air or fuel."},{"q":"What is a rich mixture?","a":"A mixture with more fuel than the stoichiometric ratio (e.g., 12:1). It runs cooler but wastes fuel and produces less power."},{"q":"What is a lean mixture?","a":"A mixture with less fuel than stoichiometric (e.g., 18:1). It is more fuel-efficient but runs hotter and risks detonation if too lean."},{"q":"What is the venturi effect used in a carburettor?","a":"Air flowing through a narrowing in the intake passage (venturi) accelerates, causing a pressure drop that draws fuel from the float chamber through the main jet."},{"q":"What is the function of the float chamber?","a":"To maintain a constant level of fuel available at the main jet by using a float and needle valve that controls fuel inflow from the fuel supply."},{"q":"What is the throttle valve (butterfly valve)?","a":"A rotatable disc in the carburettor that controls engine power by regulating the volume of air-fuel mixture entering the cylinders."},{"q":"What is the mixture control and what does it do?","a":"A pilot-operated control that adjusts the fuel-to-air ratio, typically by varying the fuel flow to the main jet. It is used to lean the mixture at altitude or for engine shutdown."},{"q":"Why must the mixture be leaned at altitude?","a":"As altitude increases, air density decreases but the carburettor continues to meter the same amount of fuel, making the mixture excessively rich. Leaning restores the correct ratio."},{"q":"What is carburettor icing?","a":"Ice formation in the carburettor caused by the temperature drop from fuel vaporization and air expansion through the venturi, potentially blocking airflow and causing engine failure."},{"q":"At what temperature range is carburettor icing most likely?","a":"Carburettor icing can occur at ambient temperatures between -10 degrees C and +30 degrees C, with relative humidity above 50%. It is most common around 0-20 degrees C."},{"q":"What are the symptoms of carburettor icing?","a":"In a fixed-pitch propeller aircraft: gradual RPM drop. In a constant-speed propeller aircraft: manifold pressure drop with RPM remaining constant initially."},{"q":"How does carburettor heat work?","a":"It diverts heated air (typically warmed by the exhaust manifold) through an alternate air passage into the carburettor, raising the temperature to melt or prevent ice formation."},{"q":"What happens to engine performance when carburettor heat is applied?","a":"RPM initially drops because the heated air is less dense, reducing the mass of air entering the cylinders. If ice was present, RPM will then rise as the ice melts."},{"q":"Should carburettor heat be applied fully or partially?","a":"Always fully HOT or fully COLD. Partial carburettor heat is dangerous because it can raise the temperature into the ideal icing range without being hot enough to prevent ice."},{"q":"What is the danger of using carburettor heat on the ground?","a":"Carburettor heat bypasses the air filter, allowing unfiltered air containing dust, dirt, and debris to enter the engine, causing accelerated wear."},{"q":"What is an accelerator pump in a carburettor?","a":"A small pump that injects a squirt of extra fuel when the throttle is opened rapidly, preventing a momentary lean condition (hesitation) during sudden power increases."},{"q":"What is the idle cut-off position of the mixture control?","a":"The fully lean position that completely stops fuel flow to the engine, used as the normal method of shutting down the engine."},{"q":"Why is the engine shut down using mixture idle cut-off rather than the ignition switch?","a":"Cutting fuel flow ensures the cylinders are purged of fuel, reducing the risk of fire and preventing hydraulic lock from fuel pooling in the cylinders."},{"q":"What is vapour lock?","a":"A condition where fuel vaporises in the fuel lines before reaching the carburettor, creating gas bubbles that block fuel flow and cause engine power loss or failure."},{"q":"What conditions promote vapour lock?","a":"High ambient temperatures, low fuel pressure, long fuel lines routed near hot engine components, and high altitude (lower atmospheric pressure)."},{"q":"What is the function of the idling jet?","a":"The idling jet provides fuel at low power settings when airflow through the main venturi is insufficient to draw fuel from the main jet."},{"q":"What is fuel injection and how does it differ from a carburettor?","a":"Fuel injection sprays metered fuel directly into the intake ports or cylinders, providing more precise mixture distribution, eliminating carburettor icing risk, and improving power output."},{"q":"What is the advantage of fuel injection over carburettion?","a":"Better fuel distribution to all cylinders, immunity to carburettor icing, improved fuel economy, and better hot-start characteristics."},{"q":"What is the disadvantage of fuel injection?","a":"More expensive, more complex, susceptible to vapour lock in hot weather, and more difficult to restart when hot."},{"q":"What is impact icing in the air intake?","a":"Ice forming on the air filter or intake structure from visible moisture (rain, cloud) at temperatures near freezing. It is prevented by using alternate air or carburettor heat."},{"q":"What is throttle ice?","a":"Ice forming downstream of the throttle valve due to the pressure and temperature drop as air expands past the partially closed butterfly."},{"q":"What is fuel evaporation ice?","a":"Ice forming from the cooling effect of fuel vaporising in the carburettor venturi. This can occur even in warm ambient temperatures with sufficient humidity."},{"q":"When should carburettor heat be applied as a precaution?","a":"During descents at reduced power, during prolonged low-power operations, and whenever conditions favour icing (temperature 0-20 degrees C with visible moisture or high humidity)."},{"q":"What is the best power mixture?","a":"A slightly rich mixture (approximately 12:1) that produces maximum power output. Used for take-off and climb."},{"q":"What is the best economy mixture?","a":"A slightly lean mixture that produces maximum range per unit of fuel consumed, typically set by leaning until EGT peaks then enriching slightly."},{"q":"What does peak EGT indicate?","a":"Peak Exhaust Gas Temperature indicates stoichiometric mixture. Best power is typically 100-150 degrees F rich of peak. Best economy is at or slightly lean of peak."},{"q":"What is the effect of the mixture on engine temperature?","a":"Rich mixtures run cooler (excess fuel provides cooling), lean mixtures run hotter (less fuel cooling, more complete combustion). Excessively lean mixtures risk detonation."},{"q":"What is derichment?","a":"The gradual automatic leaning of the mixture by the carburettor as the throttle is opened, designed to provide the correct ratio at various power settings."},{"q":"What happens if the float valve in the carburettor sticks open?","a":"Fuel continuously floods the float chamber, causing an excessively rich mixture, fuel overflow, potential engine flooding, and fire risk."},{"q":"What does a rough engine during leaning indicate?","a":"The mixture has been leaned too aggressively, causing lean misfire. The pilot should immediately enrich the mixture until the engine runs smoothly."},{"q":"How is mixture typically adjusted for take-off at a high-altitude airport?","a":"The mixture may need to be leaned from full rich for take-off at airports above approximately 3000-5000 ft, as full rich will be excessively rich in the lower density air."},{"q":"What is the automatic mixture control (AMC)?","a":"A device in some carburettors that automatically adjusts the mixture ratio as altitude changes, reducing the need for manual leaning."},{"q":"What is the function of the mixture control idle cut-off during pre-flight?","a":"During pre-flight, ensuring the mixture is at idle cut-off prevents the engine from starting accidentally during propeller movement."},{"q":"How does carburettor icing differ from induction icing?","a":"Carburettor icing forms from fuel vaporization and throttle expansion inside the carburettor. Induction icing (impact icing) forms on the external air filter from supercooled water droplets."},{"q":"What is the purpose of an alternate air source on fuel-injected engines?","a":"Since fuel-injected engines have no carburettor heat, an alternate air source provides unfiltered air from inside the engine cowling if the main air filter becomes blocked by ice or debris."},{"q":"What are the three types of carburettor icing?","a":"Fuel evaporation icing (venturi area), throttle icing (downstream of butterfly valve), and impact icing (air intake filter area from visible moisture)."},{"q":"Why does carburettor icing cause a richer mixture?","a":"Ice restricts airflow through the venturi, reducing air volume while fuel flow remains relatively constant, resulting in an excessively rich mixture."},{"q":"What is the economiser valve in a carburettor?","a":"A valve that provides extra fuel enrichment at high power settings (full throttle) for additional cooling and detonation prevention during take-off and climb."},{"q":"What would happen if a pilot took off with carburettor heat ON?","a":"Reduced engine power due to decreased air density, risk of detonation from higher intake temperatures, and ingestion of unfiltered air potentially damaging the engine."},{"q":"How can a pilot confirm carburettor ice has been cleared?","a":"After applying full carburettor heat, the RPM initially drops then rises above the pre-application value as ice melts. The engine runs smoothly when ice is cleared."},{"q":"What is the function of the diffuser in a carburettor?","a":"The diffuser (also called the main discharge nozzle) is a tube in the venturi through which fuel is drawn by the pressure differential. It atomises fuel for better mixing with air."},{"q":"Why does the carburettor mixture become richer as altitude increases without adjustment?","a":"Air density decreases with altitude, reducing the mass of air entering the venturi. However, the fuel metering remains relatively constant since fuel density does not change significantly, resulting in a richer mixture."},{"q":"What is the correct procedure for leaning the mixture using EGT?","a":"Slowly move the mixture control toward lean while monitoring EGT. Peak EGT indicates stoichiometric. For best economy, operate at or slightly lean of peak. For best power, enrich 100-150 degrees F rich of peak."},{"q":"Why is it important to return the mixture to full rich before increasing power?","a":"Increasing power with a lean mixture risks detonation because the higher cylinder pressures and temperatures combined with insufficient fuel cooling can cause uncontrolled combustion."}],"8 Aviation Fuel Systems":[{"q":"What type of fuel do most light aircraft piston engines use?","a":"AVGAS 100LL (100 octane, Low Lead), dyed blue for identification."},{"q":"What does the octane rating of aviation fuel indicate?","a":"The fuel's resistance to detonation. Higher octane fuel can withstand greater compression without auto-igniting."},{"q":"What colour is AVGAS 100LL?","a":"Blue. Colour coding prevents misfuelling: 100LL is blue, Jet A1 is clear/straw, 80 octane is red, 100 (high lead) is green."},{"q":"What happens if Jet A1 is mistakenly put into a petrol engine aircraft?","a":"The engine will initially run rough then fail because Jet A1 will not vaporise properly in a carburettor and cannot sustain spark ignition combustion. This can be catastrophic."},{"q":"What is water contamination in aviation fuel and why is it dangerous?","a":"Water enters fuel tanks through condensation or contaminated supply. It can cause engine stoppage by blocking fuel flow, forming ice in fuel lines, or corroding tank components."},{"q":"How is water detected in aviation fuel during pre-flight?","a":"By draining fuel samples from the lowest points of the fuel system (sumps and drains) into a transparent container and checking for water droplets or a clear layer beneath the fuel."},{"q":"What is the purpose of fuel tank vents?","a":"To allow air to enter the tank as fuel is consumed, preventing a vacuum that would stop fuel flow. Blocked vents can cause fuel starvation."},{"q":"What is a fuel selector valve?","a":"A pilot-operated valve that selects which fuel tank(s) feed the engine: LEFT, RIGHT, BOTH, or OFF."},{"q":"Why should the fuel selector be set to BOTH tanks for take-off and landing?","a":"To ensure maximum fuel availability and to avoid the risk of selecting an empty tank during the critical phases of flight."},{"q":"What is the function of the engine-driven fuel pump?","a":"The primary mechanical pump that draws fuel from the tanks and delivers it at the correct pressure to the carburettor or fuel injection system."},{"q":"What is the function of the electric boost pump (auxiliary pump)?","a":"A backup pump used for engine starting, take-off, landing, and fuel system priming. It provides redundancy if the engine-driven pump fails."},{"q":"What is fuel strainer (gascolator)?","a":"A low-point filter/trap that removes water and sediment from the fuel before it reaches the engine. It must be drained during pre-flight."},{"q":"What is the function of the primer?","a":"The primer injects raw fuel directly into the cylinder intake ports to aid cold engine starting by providing an easily ignitable charge."},{"q":"Why must the primer be locked after use?","a":"An unlocked primer can siphon fuel into the cylinders during flight, causing an excessively rich mixture, rough running, or engine fire."},{"q":"What is fuel starvation?","a":"Engine fuel exhaustion caused by mismanagement of the fuel system (wrong tank selected, blocked vent, etc.) even though fuel remains in the aircraft."},{"q":"What is fuel exhaustion?","a":"Complete depletion of all usable fuel, resulting in engine failure. It is caused by inadequate flight planning or fuel management."},{"q":"What is unusable fuel?","a":"Fuel remaining in the tanks that cannot be delivered to the engine due to tank geometry, typically trapped in corners or below the fuel outlet. It must not be included in flight planning."},{"q":"What is vapour lock in the fuel system?","a":"Fuel vaporising in the fuel lines due to high temperature or low pressure, creating gas bubbles that block fuel flow and starve the engine."},{"q":"How does the fuel quantity indicator work?","a":"Typically an electrical resistance gauge using a float in each tank connected to a variable resistor. It indicates the approximate fuel level but is only guaranteed accurate at EMPTY."},{"q":"When is the fuel quantity gauge most accurate?","a":"Fuel quantity gauges are only required to be accurate at the empty indication. Pilots should rely on time and fuel flow calculations rather than gauges alone."},{"q":"What is the purpose of the fuel/air separator (fuel return line)?","a":"To separate vapour from liquid fuel and return excess fuel and vapour to the tank, preventing vapour lock in the fuel injection system."},{"q":"What should be checked about fuel caps during pre-flight?","a":"Fuel caps must be securely fastened and properly vented. Loose caps can allow fuel siphoning in flight, contamination, and fuel loss."},{"q":"What are the effects of using fuel with too low an octane rating?","a":"Increased susceptibility to detonation, which can cause piston damage, cylinder head cracking, and potential engine failure."},{"q":"What is the purpose of fuel tank baffles?","a":"Internal partitions that prevent fuel from sloshing excessively during manoeuvres, ensuring a steady supply to the fuel outlet."},{"q":"What is a header tank or collector tank?","a":"A small tank that collects fuel from the main tanks and provides a constant fuel supply to the engine, ensuring uninterrupted flow during all flight attitudes."},{"q":"What fuel system checks should be performed before each flight?","a":"Drain fuel sumps for water and contamination, check fuel quantity visually, verify correct fuel type and colour, ensure caps are secure and vents clear."},{"q":"What is cross-feeding in a multi-tank system?","a":"Using fuel from one tank to supply the engine while the other tank remains full, typically done to balance wing weight during cruise."},{"q":"How does temperature affect fuel volume?","a":"Fuel expands when heated and contracts when cooled. Fuel quantity should be measured by weight (not volume) for accurate flight planning."},{"q":"What is the fuel system's role during aerobatic or unusual attitude flight?","a":"The fuel system must maintain supply during inverted flight and high-G manoeuvres. Aerobatic aircraft use special fuel pickups, flop tubes, or header tanks."},{"q":"What are the components of a typical gravity-feed fuel system?","a":"Fuel tanks (above the engine), fuel selector valve, fuel strainer/gascolator, primer, carburettor, and fuel quantity gauges. Fuel flows by gravity without a pump."},{"q":"Why are high-wing aircraft often gravity-fed?","a":"The fuel tanks in the wings are above the engine, allowing gravity to provide sufficient fuel pressure. This eliminates the need for an engine-driven pump in simple designs."},{"q":"What additional components does a low-wing fuel system require?","a":"An engine-driven fuel pump and electric boost pump, since the tanks are at or below engine level and gravity alone cannot provide sufficient fuel flow."},{"q":"What is microbial growth in fuel tanks?","a":"Bacteria and fungi that grow at the fuel-water interface in tanks, producing sludge that blocks filters and lines. It is prevented by keeping tanks full and draining water regularly."},{"q":"What colour is Jet A1 fuel?","a":"Clear to straw coloured (pale yellow). This contrasts with the blue colour of AVGAS 100LL for identification."},{"q":"What precaution prevents misfuelling with the wrong fuel type?","a":"Different sized fuel nozzles and tank filler openings. AVGAS nozzles are smaller than Jet A1 nozzles. Placards on the filler cap specify the required fuel."},{"q":"What is the specific gravity of AVGAS compared to Jet A1?","a":"AVGAS has a specific gravity of approximately 0.72, while Jet A1 is approximately 0.80. Jet A1 is denser and heavier per litre."},{"q":"Why should fuel tanks ideally be filled after the last flight of the day?","a":"Full tanks minimise the air space where condensation can form, reducing water contamination in the fuel."},{"q":"What causes fuel staining on the aircraft during pre-flight?","a":"Fuel stains or streaks indicate a fuel leak from caps, vents, or tank seams. Any fuel leak must be investigated and resolved before flight."},{"q":"How does altitude affect fuel system operation?","a":"Lower atmospheric pressure at altitude increases the risk of vapour lock and reduces the effectiveness of gravity feed. Boost pump use becomes more important."},{"q":"What is the purpose of a fuel totaliser?","a":"An instrument that measures actual fuel flow and calculates total fuel consumed, fuel remaining, and endurance. It is more accurate than fuel quantity gauges."},{"q":"What is Reid Vapour Pressure (RVP)?","a":"A measure of fuel volatility indicating how easily it vaporises. AVGAS has a higher RVP than Jet A1, making it more prone to vapour lock but easier to vaporise for carburettor engines."},{"q":"Why is fuel system icing different from carburettor icing?","a":"Fuel system icing is water in the fuel freezing in fuel lines, filters, or strainers, blocking fuel flow. Carburettor icing is ambient moisture freezing from the cooling effect of fuel vaporisation."},{"q":"What is the required minimum fuel reserve for VFR day flights?","a":"Fuel sufficient to fly to the destination plus reserves as specified by regulations - typically 30-45 minutes of fuel at normal cruise consumption."},{"q":"What should a pilot do if a fuel imbalance is detected in flight?","a":"Switch the fuel selector to draw from the fuller tank to equalise the fuel load and prevent the aircraft from developing a wing-heavy tendency."},{"q":"How is static electricity managed during refuelling?","a":"The aircraft and fuel truck must be bonded (connected by a grounding cable) before refuelling to prevent static discharge that could ignite fuel vapours."},{"q":"What is the significance of checking fuel colour during pre-flight sampling?","a":"Correct colour confirms the right fuel type (blue for 100LL). Discolouration may indicate contamination, degradation, or misfuelling with the wrong fuel."},{"q":"What are finger screens in the fuel system?","a":"Fine mesh screens at the fuel tank outlet that provide initial filtration by catching large debris before fuel enters the fuel lines."},{"q":"What is the effect of fuel contamination by water on engine operation?","a":"Water does not combust like fuel. Water droplets reaching the carburettor cause misfiring, power loss, and potential engine stoppage. Water can also freeze in fuel lines at altitude."},{"q":"Why should fuel drains be checked in a specific sequence?","a":"Starting from the lowest point (gascolator) and then checking each tank sump ensures that any water or contaminants throughout the system are detected."},{"q":"What is the importance of noting the fuel grade placard on the fuel filler cap?","a":"The placard specifies the minimum acceptable fuel grade. Using a lower grade than specified increases the risk of detonation and engine damage."}],"9 Propeller Fundamentals":[{"q":"What is the primary function of an aircraft propeller?","a":"To convert the rotary power of the engine into thrust by accelerating a large mass of air rearward."},{"q":"How does a propeller blade generate thrust?","a":"Each blade is an aerofoil that produces a pressure difference between its faces as it rotates, generating a forward force (thrust) just as a wing generates lift."},{"q":"What is blade angle (pitch angle)?","a":"The angle between the chord line of the propeller blade and the plane of rotation. It determines how much air the blade 'bites' per revolution."},{"q":"What is geometric pitch?","a":"The theoretical distance the propeller would advance through the air in one revolution if there were no slippage, like a screw moving through a solid."},{"q":"What is effective pitch?","a":"The actual distance the propeller advances through the air in one revolution, which is always less than geometric pitch due to slippage."},{"q":"What is propeller slip?","a":"The difference between geometric pitch and effective pitch. It represents the energy lost to moving air rather than advancing the aircraft."},{"q":"What is the angle of attack of a propeller blade?","a":"The angle between the blade chord line and the relative airflow (helix angle). It changes along the blade span and varies with aircraft speed and RPM."},{"q":"Why are propeller blades twisted from root to tip?","a":"Because the tip moves faster than the root. The twist ensures a relatively constant angle of attack along the entire blade length for even thrust distribution."},{"q":"What is a fixed-pitch propeller?","a":"A propeller whose blade angle cannot be changed in flight. It is designed as a compromise between climb and cruise performance."},{"q":"What is a fine (low) pitch propeller setting?","a":"A low blade angle that allows the engine to develop high RPM with relatively low forward speed - ideal for take-off and climb. Analogous to a low gear in a car."},{"q":"What is a coarse (high) pitch propeller setting?","a":"A high blade angle that moves more air per revolution at lower RPM - ideal for cruise. Analogous to a high gear in a car."},{"q":"What is a constant-speed propeller?","a":"A propeller whose blade angle is automatically adjusted by a governor to maintain a pilot-selected RPM regardless of airspeed or power changes."},{"q":"How does a constant-speed propeller governor work?","a":"The governor uses engine-driven flyweights and a speeder spring to sense RPM changes. It directs oil pressure to a piston in the propeller hub to adjust blade angle and maintain the set RPM.

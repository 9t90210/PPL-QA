"},{"q":"What happens to a constant-speed prop when the pilot increases throttle?","a":"The engine tends to speed up. The governor senses the overspeed and increases blade angle (coarser pitch) to absorb the extra power and maintain the set RPM."},{"q":"What happens to a constant-speed prop when airspeed increases in a dive?","a":"The relative airflow changes reduce blade angle of attack. The governor senses the RPM increase and coarsens the pitch to maintain the set RPM."},{"q":"What is the prop lever (RPM lever) used for?","a":"It sets the desired RPM. Forward (high RPM/fine pitch) for take-off and climb. Back (low RPM/coarse pitch) for cruise. The governor then maintains that RPM."},{"q":"What is feathering a propeller?","a":"Turning the blades to approximately 90 degrees (edge-on to the airflow) to minimize drag from a stopped engine. Used in multi-engine aircraft after an engine failure."},{"q":"What is the windmilling effect?","a":"When a failed engine's propeller continues to rotate driven by airflow rather than engine power, creating significant drag and potentially causing further engine damage."},{"q":"What is propeller torque effect?","a":"The tendency of the aircraft to yaw and roll in the opposite direction to propeller rotation due to Newton's third law. In most single-engine aircraft, this means a left-turning tendency."},{"q":"What is P-factor (asymmetric blade effect)?","a":"At high angles of attack, the descending propeller blade (right side in clockwise rotation) has a greater angle of attack and produces more thrust than the ascending blade, causing a yaw to the left."},{"q":"When is P-factor most pronounced?","a":"At high power settings with high angles of attack, such as during take-off and slow flight."},{"q":"What is the slipstream effect?","a":"The rotating column of air from the propeller spirals around the fuselage and strikes the left side of the vertical stabiliser, causing a yaw to the left in clockwise-rotating propellers."},{"q":"What is gyroscopic precession in relation to the propeller?","a":"When a force is applied to a spinning propeller disc, the effect occurs 90 degrees later in the direction of rotation. Raising the tail on take-off causes a yaw to the left."},{"q":"What are the four left-turning tendencies of a single-engine aircraft?","a":"Torque effect, P-factor (asymmetric blade effect), slipstream effect, and gyroscopic precession."},{"q":"How is propeller efficiency defined?","a":"The ratio of thrust power output to shaft power input. Maximum efficiency is typically 80-88% and varies with airspeed."},{"q":"At what condition is a fixed-pitch propeller most efficient?","a":"At one specific airspeed where the blade angle of attack is optimal. It is less efficient at all other speeds."},{"q":"Why is a constant-speed propeller more efficient across a range of speeds?","a":"Because the governor continuously adjusts blade angle to maintain an optimal angle of attack at varying airspeeds, maintaining high efficiency across a wider speed range."},{"q":"What is the critical tip speed of a propeller?","a":"The speed at which the propeller tip approaches the speed of sound, causing shock waves, vibration, noise, and a dramatic loss of efficiency."},{"q":"What limits the diameter of a propeller?","a":"Ground clearance, structural stress on the blades, and tip speed limitations. Larger diameter allows more air to be accelerated but increases tip speed."},{"q":"What material are most light aircraft propellers made from?","a":"Aluminium alloy (metal) or wood. Some modern aircraft use composite materials. Metal props are more durable but require regular inspection for cracks."},{"q":"What pre-flight checks should be done on the propeller?","a":"Check for nicks, cracks, erosion, loose spinner, proper tracking, oil leaks at the hub, and security of the spinner and mounting bolts."},{"q":"Why are propeller nicks dangerous?","a":"Nicks act as stress concentrators that can propagate into cracks under the enormous centrifugal loads. Even small nicks must be properly filed and dressed by qualified personnel."},{"q":"What is propeller tracking?","a":"Verification that all blade tips follow the same plane of rotation. Poor tracking indicates a bent blade, causing vibration and stress on the engine mount."},{"q":"What is the constant-speed propeller's response to an engine failure?","a":"The governor will attempt to maintain RPM by driving the blades to fine pitch, which increases drag from windmilling. The pilot should feather the prop if possible."},{"q":"What is a ground-adjustable propeller?","a":"A propeller whose blade angle can be changed on the ground but is fixed during flight. It allows optimisation for different mission profiles between flights."},{"q":"Why must propeller RPM be set before adjusting manifold pressure?","a":"Setting a high manifold pressure with low RPM creates a condition of high cylinder pressures and temperatures per power stroke, increasing the risk of detonation and engine damage."},{"q":"What is the relationship between manifold pressure and RPM in a constant-speed prop system?","a":"Manifold pressure controls the amount of fuel-air charge (power), while RPM controls how fast the engine turns. Both must be managed to stay within limits and avoid overboosting."},{"q":"What is a propeller governor overspeed condition?","a":"When RPM exceeds the set limit despite the governor driving the blades to maximum coarse pitch. This can occur during steep dives and requires throttle reduction."},{"q":"What is reverse pitch?","a":"A blade angle past the flat setting that produces reverse thrust, used on some aircraft for ground deceleration and taxiing backward. Uncommon on light aircraft."},{"q":"What is the alpha range of a constant-speed propeller?","a":"The normal operating range where the governor is actively controlling blade angle to maintain the set RPM."},{"q":"Why are two-blade propellers common on training aircraft?","a":"They are simpler, lighter, less expensive, and adequate for lower-powered engines. More blades are needed when higher power must be absorbed without exceeding diameter limits."},{"q":"How does a wooden propeller differ from a metal propeller in terms of damage tolerance?","a":"Wooden propellers absorb minor impacts but cannot be repaired - they must be replaced if damaged. Metal propellers may sustain minor nicks that can be dressed, but cracks require replacement."},{"q":"What is the centrifugal twisting moment (CTM) on a propeller blade?","a":"The tendency of centrifugal force to move the blade toward fine pitch (flat). This force assists the governor in moving to fine pitch and must be overcome for coarse pitch."},{"q":"What is the aerodynamic twisting moment (ATM)?","a":"The tendency of aerodynamic forces to increase the blade angle toward coarse pitch. It opposes the centrifugal twisting moment."},{"q":"Why should the prop lever be set to full fine (high RPM) before landing?","a":"To ensure maximum RPM is available for a go-around. Fine pitch allows the engine to develop full power quickly if needed."},{"q":"What is a propeller overspeed?","a":"An RPM exceedance beyond the maximum limit, which can cause structural failure of the propeller blades. It requires immediate throttle reduction and possible engine shutdown."},{"q":"What is the beta range of propeller operation?","a":"The range of blade angles below the flight idle (alpha) gate, used for ground operations including reverse thrust. The pilot directly controls blade angle in this range."},{"q":"What is the effect of ice accumulation on propeller blades?","a":"Ice adds weight asymmetrically and disrupts the blade aerofoil shape, causing vibration, loss of thrust, and potential structural imbalance that can damage the engine."},{"q":"What is a controllable-pitch propeller?","a":"A propeller where the pilot can manually select discrete blade angle positions in flight, unlike a constant-speed prop which adjusts automatically via a governor."},{"q":"How does propeller diameter affect thrust and efficiency?","a":"A larger diameter propeller can accelerate a greater mass of air, producing more thrust at lower speeds. However, larger diameter increases tip speed concerns and requires more ground clearance."}],"10 Aircraft Engine Management":[{"q":"What is the primary goal of engine management?","a":"To operate the engine within its design limits for maximum performance, efficiency, and longevity while minimising the risk of damage."},{"q":"What are the critical engine parameters a pilot must monitor?","a":"RPM (tachometer), manifold pressure (if constant-speed prop), oil pressure, oil temperature, cylinder head temperature (CHT), exhaust gas temperature (EGT), and fuel flow."},{"q":"What does the tachometer indicate?","a":"Engine RPM - the rotational speed of the crankshaft. It is the primary power indicator for fixed-pitch propeller aircraft."},{"q":"What is manifold pressure and what does it indicate?","a":"The pressure of the air-fuel mixture in the intake manifold, measured in inches of mercury (inHg). It indicates the power being developed by a constant-speed propeller engine."},{"q":"Why does manifold pressure decrease as RPM increases on the ground?","a":"Higher RPM creates a greater vacuum in the intake manifold as the engine draws in more air, reducing manifold pressure."},{"q":"What is the correct power reduction sequence for a constant-speed propeller?","a":"Reduce manifold pressure first, then reduce RPM. This avoids the overboosting condition of high pressure with low RPM."},{"q":"What is the correct power increase sequence?","a":"Increase RPM first (prop lever forward), then increase manifold pressure (throttle forward). This ensures the engine can handle the increased charge."},{"q":"What is overboosting?","a":"A condition where manifold pressure exceeds the maximum for a given RPM, creating excessive cylinder pressures that can cause detonation and engine damage."},{"q":"How does altitude affect manifold pressure in a normally aspirated engine?","a":"Manifold pressure decreases with altitude due to lower atmospheric pressure. Full throttle manifold pressure drops approximately 1 inHg per 1000 ft of altitude gain."},{"q":"What is the purpose of leaning the mixture during cruise?","a":"To optimise fuel consumption by matching the fuel flow to the reduced air density at altitude, improving range and reducing spark plug fouling."},{"q":"When should the mixture be at full rich?","a":"During take-off, climb, go-around, and any time full power is required below approximately 3000-5000 ft density altitude."},{"q":"What is the proper leaning procedure using EGT?","a":"Slowly lean the mixture while monitoring EGT. For best economy, operate at or just lean of peak EGT. For best power, operate 100-150 degrees F rich of peak EGT."},{"q":"What happens if you lean too aggressively?","a":"Lean misfire causes rough running, loss of power, and the engine may quit. Extremely lean operation causes very high combustion temperatures leading to detonation and engine damage."},{"q":"What is the significance of percentage of rated power?","a":"Engine components are designed for specific maximum temperatures and pressures. Operating above 75% power for extended periods increases wear, heat stress, and detonation risk."},{"q":"What is shock cooling and how is it prevented?","a":"Rapid cooling of cylinders during descent causing cracking. Prevent by reducing power gradually, descending at moderate rates, and maintaining some power rather than idling."},{"q":"What is the recommended CHT limit descent rate?","a":"Cylinder head temperature should not decrease more than approximately 50 degrees F (28 degrees C) per minute to avoid thermal shock."},{"q":"How should power be managed during climb?","a":"Use full power (or climb power as specified) with full rich mixture, cowl flaps open, and monitor CHT and oil temperature to prevent overheating."},{"q":"What is the cruise power setting typically used?","a":"Usually 55-75% of rated power. Power charts in the POH specify the correct RPM, manifold pressure, and fuel flow for each altitude and temperature."},{"q":"What engine management actions address high CHT?","a":"Reduce power, increase airspeed (lower nose), open cowl flaps fully, enrich the mixture, and if necessary, plan to land."},{"q":"What engine management actions address high oil temperature?","a":"Reduce power, increase airspeed for better cooling, open cowl flaps, enrich the mixture, and monitor oil pressure. Land if temperature continues to rise."},{"q":"Why is ground running at high power settings for extended periods harmful?","a":"Low airspeed provides inadequate cooling, leading to overheating. Oil temperatures rise, and cylinders may exceed temperature limits without the benefit of flight airflow."},{"q":"What is the warm-up procedure for a cold engine?","a":"Run at approximately 1000-1200 RPM until oil temperature and pressure stabilise in the green range. Avoid high RPM until the engine is properly warmed."},{"q":"What is the proper shutdown procedure?","a":"Allow the engine to cool at idle for 1-2 minutes, pull mixture to idle cut-off, and after the engine stops, turn off magnetos, master switch, and avionics."},{"q":"Why should the engine be allowed to idle before shutdown?","a":"To allow internal temperatures to equalise and avoid thermal shock. Shutting down a hot engine immediately after landing can cause cracking."},{"q":"What is the red line on engine instruments?","a":"The maximum (or minimum) operating limit. Exceeding red line values can cause immediate engine damage and requires maintenance inspection."},{"q":"What does the yellow arc on engine instruments signify?","a":"A caution range where operation is permitted for limited periods only, such as during warm-up or in specific flight conditions."},{"q":"What does the green arc on engine instruments represent?","a":"The normal operating range where the engine may be operated continuously without limitation."},{"q":"How does high density altitude affect engine management?","a":"High density altitude (hot, high, humid) reduces engine power output. The mixture may need to be leaned for take-off, and climb performance will be significantly reduced."},{"q":"What is the effect of running the engine continuously at maximum rated power?","a":"Accelerated wear, higher operating temperatures, increased risk of detonation, reduced oil life, and shortened time between overhauls (TBO)."},{"q":"What does EGT tell the pilot about combustion?","a":"EGT indicates how efficiently the engine is burning fuel. Peak EGT is stoichiometric. Rich of peak runs cooler but wastes fuel. Lean of peak is more efficient but must be done carefully."},{"q":"What are the two main leaning techniques?","a":"Lean to best economy (peak EGT or slightly lean of peak for minimum fuel consumption) and lean to best power (100-150 degrees F rich of peak for maximum power output)."},{"q":"Why should the mixture be enriched before descending from cruise altitude?","a":"As the aircraft descends into denser air, a cruise-lean mixture becomes even leaner relative to the increasing air mass. Enriching prevents lean misfire and detonation."},{"q":"What is the relationship between power setting and TBO?","a":"Engines operated consistently at lower power settings (65% or below) often achieve or exceed TBO. Higher power settings accelerate wear and may require earlier overhaul."},{"q":"What is the purpose of a power chart in the POH?","a":"Power charts specify the correct RPM, manifold pressure, and fuel flow combinations for each altitude and temperature to achieve specific power percentages."},{"q":"When is it acceptable to lean the mixture at high power settings?","a":"Generally only above 75% power at high density altitudes where full rich would be excessively rich. The POH provides specific guidance for each aircraft."},{"q":"What is turbocharger management?","a":"Operating a turbocharged engine requires monitoring manifold pressure carefully, avoiding overboosting, allowing proper turbo warm-up and cool-down, and managing temperatures."},{"q":"Why must turbocharged engines be cooled down before shutdown?","a":"The turbocharger operates at extreme temperatures. Immediate shutdown traps hot oil in the bearings, causing coking (carbon buildup) and potential bearing failure."},{"q":"What is the significance of time between overhaul (TBO)?","a":"TBO is the manufacturer's recommended maximum operating hours before a mandatory overhaul. Exceeding TBO increases the risk of component failure."},{"q":"What engine management precaution applies to prolonged idle during taxi?","a":"Lean the mixture slightly to prevent spark plug fouling from the rich idle mixture. Return to full rich before applying take-off power."},{"q":"How should a go-around be managed with a constant-speed propeller?","a":"Apply full power smoothly, propeller to full fine (high RPM), mixture full rich, cowl flaps open, retract flaps as per procedure, and establish positive rate of climb."},{"q":"What is the correct response to an unexpected engine roughness?","a":"Apply carburettor heat (if carburetted), check mixture setting, switch fuel tanks, check magnetos, check fuel pressure, and if the problem persists, prepare for a precautionary landing."},{"q":"Why is it important to note the time of engine start?","a":"To track engine operating hours for maintenance scheduling, oil change intervals, and TBO compliance. Hobbs meter or tach time records this automatically."},{"q":"What is the difference between Hobbs time and tach time?","a":"Hobbs time runs continuously when the master switch is on (or oil pressure present). Tach time only registers full hours at rated RPM - reduced RPM accumulates tach time more slowly."},{"q":"Why should the engine not be rapidly accelerated from idle to full power?","a":"Rapid throttle advancement can cause a lean stumble (accelerator pump lag), backfiring, and excessive stress on engine components and propeller."},{"q":"What is the recommended action if oil pressure is zero on start-up?","a":"Shut down the engine immediately. If oil pressure does not register within 30 seconds, continuing to run will cause severe bearing damage."},{"q":"What precautions should be taken when operating in very cold conditions?","a":"Preheat the engine before start, use winter-grade oil, exercise caution with brittle cold components, and monitor oil pressure carefully as cold oil has very high viscosity."},{"q":"Why is it important to follow the POH engine management procedures exactly?","a":"The manufacturer has tested and certified the engine for operation within specific limits. Deviating from POH procedures may cause damage, void warranty, and compromise safety."},{"q":"What is the significance of the engine primer being locked before flight?","a":"An unlocked primer can siphon fuel into cylinders causing rich mixtures, rough running, and potential engine fire. It must be verified locked during pre-flight and run-up."},{"q":"What is the proper procedure for applying carburettor heat during the run-up?","a":"Apply full carburettor heat at run-up RPM and verify an RPM drop (confirming the system works). Note the RPM drop, then return to cold. Any RPM rise indicates ice was present."},{"q":"Why is fuel management critical when flying with multiple fuel tanks?","a":"To prevent fuel imbalance causing wing heaviness, to ensure the selected tank has fuel, and to use fuel from all tanks systematically to maximize range and maintain CG limits."}],"11 Aircraft Electrical Systems":[{"q":"What are the two sources of electrical power in a light aircraft?","a":"The battery (for starting and backup) and the engine-driven alternator or generator (primary power source in flight)."},{"q":"What is the typical voltage of a light aircraft electrical system?","a":"Most light aircraft use a 14-volt or 28-volt DC system. 14V systems use a 12V battery; 28V systems use a 24V battery."},{"q":"What is the difference between an alternator and a generator?","a":"An alternator produces AC that is rectified to DC and generates adequate power at lower RPM. A generator produces DC directly but requires higher RPM and is heavier."},{"q":"What is the function of the voltage regulator?","a":"To maintain a constant system voltage output from the alternator regardless of engine RPM and electrical load changes."},{"q":"What is the bus bar?","a":"A central power distribution point that receives electrical power from the battery and alternator and distributes it to all aircraft electrical circuits."},{"q":"What is the purpose of the master switch?","a":"To connect (or disconnect) the battery and alternator to the bus bar, controlling all electrical power to the aircraft systems."},{"q":"What does a split master switch allow?","a":"Independent control of the battery and alternator. The battery side can be on while the alternator is off, or vice versa. This aids in troubleshooting electrical problems."},{"q":"What is the function of circuit breakers?","a":"To protect electrical wiring and components from overload by automatically opening the circuit if current exceeds the rated limit."},{"q":"Should a tripped circuit breaker be reset?","a":"A tripped circuit breaker may be reset once. If it trips again, it should not be reset as it indicates a persistent fault. Leave it open and troubleshoot on the ground."},{"q":"What is the ammeter and what does it indicate?","a":"An instrument showing the rate of electrical current flow. A positive reading means the battery is charging; negative means it is discharging faster than the alternator is charging."},{"q":"What does a loadmeter show?","a":"Total electrical load being drawn from the alternator. A zero reading means the alternator has failed and the battery is supplying all power."},{"q":"What happens when the alternator fails?","a":"The battery becomes the sole power source. The pilot should reduce electrical load to essentials and land as soon as practicable before the battery is depleted."},{"q":"What is the low-voltage warning light?","a":"An annunciator that illuminates when system voltage drops below a set threshold, typically indicating alternator failure or excessive electrical load."},{"q":"How long can a fully charged aircraft battery power essential systems?","a":"Typically 30-60 minutes depending on electrical load, battery condition, and temperature. Reducing load extends this time."},{"q":"What essential systems should be maintained if the alternator fails?","a":"Communications radio, transponder (if required), engine instruments, and minimum navigation equipment. Non-essential items like autopilot and lights should be turned off."},{"q":"What is the function of the avionics master switch?","a":"To protect sensitive avionics from power surges during engine start by isolating them from the bus bar until the engine is running."},{"q":"In what order should the electrical system be activated during start?","a":"Master switch ON, perform pre-start checks, start engine, then avionics master ON. This sequence protects avionics from voltage spikes during cranking."},{"q":"What causes an electrical fire in an aircraft?","a":"Short circuits, overloaded wiring, damaged insulation, loose connections, or failed components that generate excessive heat."},{"q":"What is the immediate response to an electrical fire or smoke?","a":"Turn off the master switch to de-energize all circuits. If the source is identified, pull that circuit breaker. Ventilate the cockpit. Use a Halon/BCF extinguisher if needed."},{"q":"What type of fire extinguisher is recommended for electrical fires in the cockpit?","a":"BCF (Halon) extinguisher, which is effective on electrical fires and safe in enclosed spaces provided the cockpit is subsequently ventilated."},{"q":"What is a fuse and how does it differ from a circuit breaker?","a":"A fuse is a one-time protection device that melts when overloaded and must be replaced. A circuit breaker can be reset and reused."},{"q":"What is static electricity and why is it a concern?","a":"The buildup of electrical charge on the aircraft skin from friction with air or precipitation. It causes radio interference and can create sparks during refuelling."},{"q":"What are static wicks (static dischargers)?","a":"Pointed conductors on wing tips and tail that allow static electricity to discharge gradually into the atmosphere, reducing radio interference."},{"q":"What is the purpose of bonding in an aircraft?","a":"Electrical bonding connects all metal components to a common ground, preventing static charge buildup and ensuring current flows safely in the event of a lightning strike."},{"q":"What does a negative (discharge) reading on the ammeter indicate?","a":"The electrical load exceeds alternator output, and the battery is being drained. The pilot should reduce electrical load or troubleshoot the alternator."},{"q":"What is the purpose of the starter motor?","a":"An electric motor powered by the battery that cranks the engine to starting speed, allowing the ignition system to fire and start the engine."},{"q":"Why should the starter motor not be engaged for extended periods?","a":"Prolonged cranking overheats the starter motor and drains the battery. Typical limits are 10 seconds of cranking followed by a cooling period."},{"q":"What is a relay (solenoid) in the electrical system?","a":"An electromagnetically operated switch that allows a small control current (from the starter switch) to activate a high-current circuit (starter motor)."},{"q":"What is the function of the diode in the alternator circuit?","a":"Diodes convert the AC output of the alternator into DC and prevent reverse current flow from the battery back into the alternator."},{"q":"What is the overvoltage protection relay?","a":"A device that disconnects the alternator from the bus if voltage exceeds safe limits, protecting avionics and other sensitive equipment from voltage spikes."},{"q":"What is an essential bus?","a":"A separate electrical bus that powers only critical instruments and systems, fed directly from the battery. It ensures essential services during alternator failure."},{"q":"What should a pilot check regarding the electrical system during pre-flight?","a":"Verify battery condition, check for loose wires or damage, ensure all switches are in the correct position, test warning lights, and check that spare fuses are available."},{"q":"What is the function of landing lights?","a":"High-intensity lights used during take-off, landing, and operations below 10,000 ft for enhanced visibility and collision avoidance."},{"q":"What are navigation (position) lights?","a":"Red light on the left wingtip, green light on the right wingtip, and white light on the tail. Required from sunset to sunrise and in reduced visibility."},{"q":"What is the anti-collision beacon?","a":"A red rotating or flashing light (usually on the fuselage top and bottom) that indicates the aircraft is operating or about to operate. Required during all operations."},{"q":"What is the strobe light?","a":"High-intensity white flashing lights on wingtips and/or tail used for enhanced visibility during flight, especially at night."},{"q":"What is an annunciator panel?","a":"A centralized warning light panel that displays caution and warning conditions for various aircraft systems including alternator failure, low voltage, and low oil pressure."},{"q":"What is the purpose of the pitot heater?","a":"An electrical heating element that prevents ice from blocking the pitot tube, which supplies ram air pressure to the airspeed indicator."},{"q":"What is electrical load shedding?","a":"The systematic process of turning off non-essential electrical equipment to reduce the load on the alternator or battery, typically done during alternator failure."},{"q":"How does temperature affect battery performance?","a":"Cold temperatures reduce battery capacity and output. A battery that performs well at 20 degrees C may provide only 60-70% capacity at -20 degrees C."},{"q":"What is the purpose of the external power receptacle?","a":"To connect an external ground power unit for engine starting, preserving the aircraft battery and providing additional cranking power in cold weather."},{"q":"What is a standby battery?","a":"An independent backup battery that powers essential flight instruments (attitude indicator, basic nav/comm) if the main electrical system fails completely."},{"q":"Why must the alternator be functioning before turning on high-draw equipment?","a":"High-draw equipment (landing lights, pitot heat) can rapidly deplete the battery if the alternator is not charging. The alternator must be online to handle the additional load."},{"q":"What is the typical maximum current capacity of a light aircraft alternator?","a":"Typically 60-100 amps, depending on the aircraft. The pilot must manage loads to stay within this capacity."},{"q":"What precaution should be taken when jump-starting an aircraft battery?","a":"Use correct polarity, ensure the ground power unit voltage matches the aircraft system, and follow the POH procedure to prevent damage to avionics and electrical components."},{"q":"What is the function of the current limiter?","a":"A slow-blow fuse in the alternator circuit that protects the main bus wiring from overcurrent in the event of a short circuit downstream."},{"q":"How does the magneto ignition system relate to the electrical system?","a":"Magnetos are mechanically driven and independent of the electrical system. The engine will continue to run even with total electrical failure, but radio and instruments will be lost."},{"q":"What indicates a successful alternator engagement after engine start?","a":"The ammeter shows a positive (charging) reading, the low-voltage light extinguishes, and the loadmeter shows the alternator carrying the electrical load."},{"q":"What is the function of the voltage regulator field circuit breaker?","a":"It provides a way to disconnect the alternator from the bus if the voltage regulator fails, preventing overvoltage damage to electrical components and avionics."},{"q":"Why should the battery be disconnected during long-term aircraft storage?","a":"To prevent slow discharge, corrosion of terminals, and potential electrical faults. A disconnected battery should be stored in a charged state and periodically checked."}],"12 Aircraft Vacuum Systems":[{"q":"What is the purpose of the vacuum system in a light aircraft?","a":"To provide the suction (negative pressure) needed to spin the gyroscopic rotors in the attitude indicator and heading indicator."},{"q":"What generates the vacuum in most light aircraft?","a":"An engine-driven vacuum pump, typically a dry air pump mounted on the engine accessory case and driven by the accessory gearbox."},{"q":"What is the typical operating vacuum pressure?","a":"Approximately 4.5 to 5.4 inches of mercury (inHg), regulated by a suction relief valve."},{"q":"What is the suction relief valve?","a":"A spring-loaded valve that allows filtered air to enter the system, maintaining the correct vacuum level by preventing excessive suction."},{"q":"What is the function of the central air filter in the vacuum system?","a":"To filter the air drawn through the gyro instruments, preventing dust and contaminants from entering the gyro housings and causing wear."},{"q":"What happens if the vacuum pump fails?","a":"The gyroscopic instruments (attitude indicator and heading indicator) will gradually slow down and give unreliable readings. The suction gauge will read zero."},{"q":"What instrument indicates vacuum system status?","a":"The suction gauge, which shows the vacuum pressure in inches of mercury. A reading outside the normal range indicates system malfunction."},{"q":"What are the symptoms of a gradual vacuum pump failure?","a":"Slow decrease in suction gauge reading, gradual precession errors in the heading indicator, and unreliable attitude indicator readings. These may be subtle and insidious."},{"q":"Why is a vacuum pump failure particularly dangerous in IMC?","a":"The attitude indicator is the primary reference for instrument flight. Its failure in cloud or poor visibility can lead to spatial disorientation and loss of control."},{"q":"What instruments are not affected by vacuum pump failure?","a":"The turn coordinator (electrically driven), magnetic compass, airspeed indicator, altimeter, and vertical speed indicator all operate independently of the vacuum system."},{"q":"What is a dry vacuum pump?","a":"A pump using carbon vanes that require no lubrication. It is lighter and simpler but wears faster than wet pumps and can fail without warning."},{"q":"What is a wet vacuum pump?","a":"A pump lubricated by engine oil. It is more durable but heavier and requires an air-oil separator to prevent oil contamination of the gyro instruments."},{"q":"What is the air-oil separator used for in a wet vacuum pump system?","a":"To remove oil mist from the discharge air before it is vented overboard, preventing oil contamination of the engine compartment."},{"q":"How does air flow through the vacuum system?","a":"Filtered air enters through the central filter, flows through the gyro instruments (spinning the rotors), continues to the vacuum pump, and is discharged overboard."},{"q":"What backup systems exist for vacuum-driven instruments?","a":"An electrically driven standby attitude indicator, a venturi tube (standby vacuum source), or a dual vacuum pump system."},{"q":"What is a venturi tube vacuum source?","a":"An external venturi mounted on the fuselage that generates suction by the Venturi effect as air flows through it. It is simple but only works at sufficient airspeed."},{"q":"What is the limitation of a venturi tube vacuum source?","a":"It only generates adequate suction at cruise airspeed. It does not work on the ground or at low speeds, so gyros are not operational until sufficient airspeed is achieved."},{"q":"What pre-flight checks relate to the vacuum system?","a":"Check the central air filter condition, verify suction gauge operation during run-up, and ensure vacuum gauge reads within normal limits."},{"q":"How quickly do gyro instruments become unreliable after vacuum failure?","a":"The attitude indicator typically remains useful for 3-5 minutes as the gyro spins down. The heading indicator degrades more quickly."},{"q":"What cross-check should pilots use to detect vacuum system failure?","a":"Regularly compare the attitude indicator with the turn coordinator, and the heading indicator with the magnetic compass. Disagreement suggests a gyro or vacuum failure."},{"q":"What is the function of the vacuum regulator?","a":"To maintain a constant vacuum level by allowing ambient air to bleed into the system when suction exceeds the desired level."},{"q":"What causes premature wear of dry vacuum pump vanes?","a":"Contamination from unfiltered air, excessive heat, and high operating hours. Regular filter replacement and pump inspection extend pump life."},{"q":"What is the typical TBO for a dry vacuum pump?","a":"Approximately 500-1000 hours depending on the manufacturer. Many pilots replace them preventively before reaching TBO due to the critical nature of the instruments they power."},{"q":"Can the vacuum system be tested on the ground?","a":"Yes, during engine run-up the suction gauge should indicate within the normal range (typically 4.5-5.4 inHg), confirming the pump and regulator are functioning."},{"q":"What is a pressure-driven gyro system?","a":"An alternative to vacuum where filtered, pressurized air from the pump is directed at the gyro rotors. Some aircraft use pressure instead of suction."},{"q":"What happens to vacuum system performance at high altitude?","a":"The reduced air density at high altitude decreases the mass of air flowing through the system, potentially reducing gyro rotor speed and instrument accuracy."},{"q":"What is the standby vacuum system?","a":"A backup source (typically an electrically driven pump or venturi) that activates manually or automatically if the primary vacuum pump fails."},{"q":"Why are carbon vanes used in dry vacuum pumps?","a":"Carbon is self-lubricating, lightweight, and creates a good seal against the pump housing. However, it is brittle and produces fine dust that must be filtered out."},{"q":"What indicates a clogged central air filter?","a":"Lower than normal suction gauge reading because the restricted airflow reduces the mass of air the pump can draw through the system."},{"q":"How does the vacuum system differ from the pitot-static system?","a":"The vacuum system powers gyroscopic instruments using suction. The pitot-static system provides air pressure measurements for the altimeter, airspeed indicator, and VSI."},{"q":"What gyroscopic instruments are vacuum-driven?","a":"The attitude indicator (AI) and heading indicator (HI/DG) are typically vacuum-driven. The turn coordinator is typically electrically driven for redundancy."},{"q":"Why is the turn coordinator deliberately powered by a different source?","a":"For redundancy - if the vacuum system fails, the electrically powered turn coordinator remains functional, providing the pilot with essential bank and rate of turn information."},{"q":"What is the check for vacuum system integrity during the magneto dead-cut?","a":"When switching magnetos, a slight change in suction gauge reading is normal due to RPM variation. A significant drop suggests vacuum pump or system issues."},{"q":"What happens if the suction relief valve sticks closed?","a":"Excessive vacuum will be generated, potentially overspeeding the gyro rotors and causing premature wear or damage to the gyroscopic instruments."},{"q":"What happens if the suction relief valve sticks open?","a":"Insufficient vacuum to spin the gyro rotors at proper speed, resulting in unreliable attitude and heading indications."},{"q":"How is the vacuum pump driven?","a":"The vacuum pump is mechanically driven by the engine's accessory gearbox, typically through a shear coupling that breaks if the pump seizes to protect the gearbox."},{"q":"What is a shear coupling in the vacuum pump drive?","a":"A deliberately weak link designed to break if the pump seizes, preventing damage to the engine accessory gearbox while disabling only the vacuum system."},{"q":"What should a pilot do if the suction gauge reads zero in flight?","a":"Recognize vacuum failure, activate the standby vacuum source if available, switch to partial panel procedures using the turn coordinator and magnetic compass, and consider diverting."},{"q":"Why should the vacuum system filter be replaced at regular intervals?","a":"A dirty filter restricts airflow, reducing gyro rotor speed and accuracy. It also forces the pump to work harder, accelerating vane wear and shortening pump life."},{"q":"What is the relationship between engine RPM and vacuum pressure?","a":"As engine RPM increases, the pump output increases. The suction regulator maintains constant vacuum by venting excess suction. At idle RPM, vacuum may be below minimum."},{"q":"Can vacuum system failure occur without the suction gauge indicating a problem?","a":"In rare cases, a partially failed pump may produce suction within the normal range but with insufficient airflow to spin the rotors at correct speed, causing subtle errors."},{"q":"What is the function of the vacuum system discharge line?","a":"To vent the air from the pump overboard. In wet pump systems, it passes through an air-oil separator first. The discharge outlet should be checked for obstructions during pre-flight."},{"q":"How does a dual vacuum pump system enhance safety?","a":"Two independent pumps provide redundancy. If one fails, the other maintains vacuum to the gyro instruments. Some systems switch automatically; others require pilot selection."},{"q":"What effect does a blocked vacuum system filter have on instrument accuracy?","a":"Reduced airflow causes the gyro rotors to slow below their design speed, leading to increased precession errors and unreliable attitude and heading indications."},{"q":"What maintenance checks are done on the vacuum system?","a":"Regular replacement of the central air filter, inspection of pump vanes, suction gauge calibration check, relief valve operation test, and inspection of system hoses and connections."},{"q":"How does humidity affect the vacuum system?","a":"High humidity can introduce moisture into the system, potentially causing corrosion of gyro components. The central filter helps remove some moisture from the incoming air."},{"q":"What is the standby attitude indicator power source?","a":"The standby attitude indicator is typically powered by the aircraft electrical system (battery/alternator), independent of the vacuum system, providing backup during vacuum failure."},{"q":"Why is the heading indicator less reliable than the magnetic compass?","a":"The heading indicator drifts due to gyroscopic precession and earth rotation and must be periodically reset to the magnetic compass. It does not sense magnetic north."},{"q":"How often should the heading indicator be reset to the magnetic compass?","a":"Every 15 minutes during flight, or whenever level wings and a stable condition allow an accurate magnetic compass reading."},{"q":"What is the typical gyro rotor speed in vacuum-driven instruments?","a":"Approximately 10,000-15,000 RPM for the attitude indicator and heading indicator. Proper vacuum is essential to maintain these speeds for accurate indications."}],"13 Engine Instruments":[{"q":"What are the primary engine instruments in a light aircraft?","a":"Tachometer (RPM), oil pressure gauge, oil temperature gauge, and cylinder head temperature (CHT) gauge. Constant-speed prop aircraft also have a manifold pressure gauge."},{"q":"What does the tachometer measure?","a":"Engine RPM - the rotational speed of the crankshaft. It is the primary power indicator for fixed-pitch propeller aircraft."},{"q":"How does a mechanical tachometer work?","a":"A flexible cable from the engine drives a magnet inside the instrument. The rotating magnetic field drags an aluminium cup against a restraining spring, deflecting the needle proportionally to RPM."},{"q":"What does the manifold pressure gauge indicate?","a":"The absolute pressure of the air-fuel mixture in the intake manifold, measured in inches of mercury (inHg). With the engine off, it reads atmospheric pressure."},{"q":"Why does the manifold pressure gauge read atmospheric pressure when the engine is stopped?","a":"With the throttle open and engine off, the manifold is open to ambient atmosphere. There is no vacuum being created by the engine to reduce the pressure."},{"q":"What does a rising manifold pressure indicate with a constant RPM?","a":"Increasing power delivery to the cylinders. If unexpected, it may indicate a throttle linkage problem or turbocharger overboost."},{"q":"What does the oil pressure gauge measure?","a":"The pressure of oil being delivered by the pressure pump to the engine's bearings and moving parts, typically measured in PSI."},{"q":"What is the normal oil pressure range?","a":"Typically 25-90 PSI depending on the engine type, indicated by the green arc on the gauge. Minimum and maximum are marked with red lines."},{"q":"What does a Bourdon tube measure?","a":"A C-shaped tube that straightens under pressure, used in oil pressure and manifold pressure gauges. The tube's movement drives the gauge needle through a mechanical linkage."},{"q":"How does the oil temperature gauge work?","a":"Typically uses an electrical resistance sensor (thermistor or thermocouple) in the oil system. As oil temperature changes, electrical resistance changes, deflecting the gauge needle."},{"q":"What does the cylinder head temperature (CHT) gauge measure?","a":"The temperature of the hottest cylinder head using a thermocouple probe. It indicates the effectiveness of engine cooling."},{"q":"What is a thermocouple and how is it used in CHT measurement?","a":"Two dissimilar metal wires joined at the sensing point. Temperature difference generates a small voltage proportional to temperature, which drives the gauge directly without aircraft electrical power."},{"q":"What does the exhaust gas temperature (EGT) gauge measure?","a":"The temperature of exhaust gases leaving the cylinder, used primarily for mixture management. It uses a thermocouple probe in the exhaust stack."},{"q":"How is EGT used for mixture leaning?","a":"Peak EGT indicates stoichiometric mixture. Best power is typically 100-150 degrees F rich of peak. Best economy is at or slightly lean of peak."},{"q":"What does the fuel flow gauge indicate?","a":"The rate of fuel consumption, typically in gallons per hour or litres per hour. It helps the pilot manage fuel consumption and verify mixture settings."},{"q":"What are the coloured arcs on engine instruments?","a":"Green arc = normal operating range. Yellow arc = caution range (limited operation). Red line = maximum or minimum limits not to be exceeded."},{"q":"What does a rising EGT combined with rough running indicate?","a":"A lean mixture condition. The pilot should immediately enrich the mixture to smooth the engine and reduce EGT."},{"q":"What does a fuel pressure gauge indicate?","a":"The pressure of fuel being delivered to the carburettor or fuel injection system. Low pressure indicates pump failure, blockage, or fuel starvation."},{"q":"What does the suction gauge measure?","a":"The vacuum pressure generated by the vacuum pump, typically in inches of mercury. It indicates whether the vacuum system is providing adequate suction for gyro instruments."},{"q":"What is an engine monitor (multi-function display)?","a":"A modern digital instrument that combines multiple engine parameters (EGT, CHT, oil pressure/temp, fuel flow, voltage) on a single display with digital readouts and trend monitoring."},{"q":"What is the carburetor air temperature (CAT) gauge?","a":"An instrument measuring the temperature of air entering the carburettor. It helps the pilot detect conditions favourable for carburettor icing and monitor carburettor heat effectiveness."},{"q":"What does a yellow arc on the CAT gauge indicate?","a":"The temperature range most conducive to carburettor icing formation, typically around -15 to +5 degrees C. The pilot should apply carburettor heat if operating in this range."},{"q":"What is the hobbs meter?","a":"A time-recording device that runs whenever the master switch is on (or oil pressure is present), recording total engine operating time for maintenance scheduling."},{"q":"How does an electronic tachometer work?","a":"It counts electrical pulses from the magneto or a sensor on the crankshaft and converts the pulse rate to an RPM display on a digital or analogue gauge."},{"q":"What should the pilot do if the oil pressure gauge reads zero after engine start?","a":"Shut down the engine immediately. If oil pressure does not register within 30 seconds, continuing to run risks catastrophic bearing damage."},{"q":"What is the torque meter used for?","a":"An instrument that measures the torque being delivered by the engine to the propeller shaft, primarily used in turboprop aircraft to indicate power output."},{"q":"What is the voltmeter's role among engine instruments?","a":"The voltmeter monitors the electrical system voltage, indicating alternator output and battery condition. Normal is typically 13.5-14.5V (for a 14V system)."},{"q":"What does a MAP gauge reading higher than atmospheric pressure indicate?","a":"On a turbocharged engine, MAP above atmospheric pressure indicates turbocharger boost. On a normally aspirated engine, MAP should never exceed atmospheric."},{"q":"What is the fuel quantity gauge and its reliability?","a":"A gauge indicating approximate fuel level in each tank. It is only required to be accurate at the EMPTY indication. Pilots should use time-based fuel calculations."},{"q":"Why do some aircraft have separate EGT probes for each cylinder?","a":"To allow monitoring of individual cylinder mixture distribution and combustion health. Differences between cylinders can indicate injector problems, ignition faults, or induction leaks."},{"q":"What does a fluctuating oil pressure gauge indicate?","a":"Small fluctuations may indicate a sticking pressure relief valve. Large fluctuations suggest low oil level with the pump intermittently sucking air - a serious condition."},{"q":"What does a Hobbs meter reading vs tach time reading difference indicate?","a":"Hobbs time exceeds tach time because Hobbs runs at a constant rate while tach time only accumulates fully at rated RPM. The ratio indicates the percentage of time at full RPM."},{"q":"What is the cylinder barrel temperature gauge?","a":"An instrument measuring the temperature of the cylinder barrel rather than the head. It is used on some engines to provide additional temperature monitoring data."},{"q":"What is the relationship between MAP and fuel flow in a fuel-injected engine?","a":"Fuel flow increases approximately proportionally with MAP. The fuel injection system meters more fuel as more air (higher MAP) enters the cylinders."},{"q":"What does an abnormally high CHT on one cylinder indicate?","a":"Possible causes include a broken or missing baffle, a fouled spark plug on that cylinder, a lean injector, or a cooling system obstruction near that cylinder."},{"q":"What is the function of the total air temperature (TAT) probe?","a":"To measure the outside air temperature, accounting for ram rise at speed. This information is used for engine performance calculations and carburettor icing assessment."},{"q":"What does maximum continuous power mean?","a":"The highest power setting that the engine is certified to operate at continuously without time limitation. It is typically less than maximum take-off power."},{"q":"What is the red radial line on the tachometer?","a":"The maximum permissible RPM. Exceeding this limit risks propeller damage, engine structural failure, and excessive internal stresses."},{"q":"What is the green arc on the tachometer?","a":"The normal continuous operating RPM range. The engine can run at any RPM within this range without time limitation."},{"q":"What is the yellow arc on the tachometer?","a":"A cautionary range where operation should be transient only (e.g., during take-off acceleration) and not sustained."},{"q":"What engine instrument indications suggest detonation?","a":"Rising CHT, rough running, rising EGT followed by sudden EGT drop, and possible fluctuating manifold pressure. Immediate action: reduce power and enrich mixture."},{"q":"What does a sudden drop in oil pressure with stable oil temperature indicate?","a":"Possible oil pump failure, a broken oil line, or a failed pressure sensor. This is an emergency requiring immediate power reduction and preparation for landing."},{"q":"What does a slow rise in oil temperature with slowly falling oil pressure indicate?","a":"Gradual oil loss or oil degradation. The pilot should reduce power, monitor closely, and plan a precautionary landing."},{"q":"What is a fuel flow totaliser?","a":"A device that integrates fuel flow rate over time to calculate total fuel consumed, fuel remaining, and estimated endurance. More accurate than fuel quantity gauges."},{"q":"What engine instruments are required for VFR flight?","a":"As specified by regulations, typically: tachometer, oil pressure gauge, oil temperature gauge, fuel quantity gauge, and for constant-speed prop aircraft, a manifold pressure gauge."},{"q":"Why is trend monitoring important for engine instruments?","a":"Observing gradual changes in instrument readings over time reveals developing problems before they become critical. A gradual CHT increase over several flights may indicate deteriorating baffles."},{"q":"What is the purpose of instrument range markings?","a":"Green, yellow, and red markings provide at-a-glance reference for normal, caution, and limit values, allowing the pilot to quickly assess engine health without memorizing numbers."},{"q":"What does an electrical engine instrument failure look like compared to an actual engine problem?","a":"An instrument failure typically shows a sudden jump to zero or full scale, or a stuck needle. An actual engine problem shows a gradual change that correlates with other instrument readings."},{"q":"What is the importance of the engine instrument scan?","a":"Regular systematic scanning of all engine instruments ensures early detection of abnormalities. Any reading outside normal should be investigated immediately."},{"q":"What is the difference between indicated and true values on engine instruments?","a":"Indicated values are raw gauge readings. True values are corrected for instrument error, installation error, and environmental factors. Pilots should know the corrections for their aircraft."}],"14 Pressure Instruments":[{"q":"What are the three main pressure instruments?","a":"The altimeter, the airspeed indicator (ASI), and the vertical speed indicator (VSI)."},{"q":"What is the pitot-static system?","a":"A system of pressure-sensing ports that provides ram air pressure (pitot) and static (ambient) pressure to the pressure instruments."},{"q":"What does the pitot tube sense?","a":"Total pressure (ram air pressure), which is the sum of static pressure and dynamic pressure caused by the aircraft's forward motion through the air."},{"q":"What does the static port sense?","a":"Static (ambient) atmospheric pressure, unaffected by aircraft movement. It represents the pressure of the undisturbed air at the aircraft's altitude."},{"q":"Which instruments use both pitot and static pressure?","a":"Only the airspeed indicator uses both pitot and static pressure. The altimeter and VSI use static pressure only."},{"q":"How does the altimeter work?","a":"An aneroid capsule inside the instrument expands as static pressure decreases with altitude and contracts as pressure increases. This movement drives the altimeter needles."},{"q":"What is the subscale setting (Kollsman window) on an altimeter?","a":"An adjustable pressure setting that allows the pilot to set a reference pressure (QNH, QFE, or standard 1013.25 hPa) to display the correct altitude."},{"q":"What is QNH?","a":"A pressure setting that, when set on the altimeter subscale, causes the altimeter to read altitude above mean sea level (AMSL)."},{"q":"What is QFE?","a":"A pressure setting that, when set on the altimeter subscale, causes the altimeter to read height above the aerodrome reference point (zero on the ground at that airfield)."},{"q":"What is the standard pressure setting (1013.25 hPa)?","a":"The ISA sea-level pressure used for flight levels above the transition altitude. All aircraft use this setting to ensure vertical separation in the upper airspace."},{"q":"What is the transition altitude?","a":"The altitude at which pilots change from QNH to standard pressure setting (1013.25 hPa) and begin using flight levels instead of altitude."},{"q":"What errors affect the altimeter?","a":"Instrument error, position error, time lag, barometric error (flying from high to low pressure without adjustment), and temperature error."},{"q":"What is the effect of flying from high pressure to low pressure without resetting the altimeter?","a":"The altimeter will over-read (indicate higher than actual altitude). The mnemonic is: 'High to Low, Look Out Below.'"},{"q":"What is the effect of flying from warm air to cold air on the altimeter?","a":"Cold air is denser and the pressure levels are compressed. The altimeter will over-read, meaning the aircraft is lower than indicated."},{"q":"How does the airspeed indicator (ASI) work?","a":"It measures the difference between pitot (total) pressure and static pressure. A diaphragm connected to the pitot source expands against the static reference inside the case, moving the ASI needle."},{"q":"What are the coloured arcs on the ASI?","a":"White arc = flap operating range (Vso to Vfe). Green arc = normal operating range (Vs1 to Vno). Yellow arc = caution range (Vno to Vne). Red line = Vne (never exceed speed)."},{"q":"What does Vs0 represent on the ASI?","a":"The stall speed in the landing configuration (flaps and gear down). It marks the lower end of the white arc."},{"q":"What does Vs1 represent?","a":"The stall speed in the clean configuration (flaps and gear up). It marks the lower end of the green arc."},{"q":"What does Vno represent?","a":"Maximum structural cruising speed. Above this speed, the aircraft should only fly in smooth air. It marks the upper end of the green arc."},{"q":"What does Vne represent?","a":"Never exceed speed, marked by the red line. Flight above Vne risks structural failure."},{"q":"What does Vfe represent?","a":"Maximum flap extension speed, the upper end of the white arc. Extending flaps above this speed risks structural damage to the flap mechanism."},{"q":"What is Indicated Airspeed (IAS)?","a":"The uncorrected airspeed reading directly from the ASI, based on the dynamic pressure sensed by the pitot-static system."},{"q":"What is Calibrated Airspeed (CAS)?","a":"IAS corrected for instrument error and position (installation) error. Corrections are found in the POH."},{"q":"What is True Airspeed (TAS)?","a":"CAS corrected for non-standard temperature and pressure (density). TAS increases with altitude for a given IAS because the air is less dense."},{"q":"Why does TAS increase with altitude for a given IAS?","a":"At higher altitude, air density is lower. The aircraft must move faster through the thin air to create the same dynamic pressure, so TAS exceeds IAS."},{"q":"How does the vertical speed indicator (VSI) work?","a":"A diaphragm senses static pressure changes. A calibrated leak allows pressure inside the case to equalise slowly, so the instrument shows the rate of pressure change as a climb or descent rate."},{"q":"What is the inherent lag in the VSI?","a":"The VSI has a 6-9 second lag due to the calibrated leak that delays pressure equalisation. It is a trend instrument and shows the rate of climb/descent after a brief delay."},{"q":"What is an Instantaneous VSI (IVSI)?","a":"A VSI with accelerometer-driven dashpots that eliminate initial lag, providing an immediate indication of climb or descent initiation."},{"q":"What happens if the pitot tube is blocked but the drain hole is open?","a":"The ASI will read zero as no dynamic pressure reaches the diaphragm. The altimeter and VSI are unaffected as they use static pressure only."},{"q":"What happens if the pitot tube and drain hole are both blocked?","a":"The ASI will act like an altimeter - the trapped pressure will cause the ASI to increase in a climb and decrease in a descent regardless of actual airspeed changes."},{"q":"What happens if the static port is blocked?","a":"The altimeter freezes at the last altitude, the VSI reads zero, and the ASI will have errors because it is comparing pitot pressure to a fixed static pressure."},{"q":"What is the alternate static source?","a":"A backup static port, usually inside the cockpit, used if the external static port is blocked. It typically reads slightly lower pressure, causing slight over-reading of altitude and airspeed."},{"q":"Why does the alternate static source cause slight over-reading?","a":"Cockpit pressure is slightly lower than ambient due to aerodynamic suction around the fuselage. This lower reference pressure causes the altimeter and ASI to read slightly high."},{"q":"What is the purpose of pitot heat?","a":"An electrical heating element that prevents ice from blocking the pitot tube, ensuring the ASI receives accurate dynamic pressure readings."},{"q":"When should pitot heat be used?","a":"Whenever flying in conditions where icing is possible - visible moisture (cloud, rain, fog) combined with temperatures near or below freezing."},{"q":"What is the density altitude?","a":"Pressure altitude corrected for non-standard temperature. It represents the altitude at which the aircraft 'thinks' it is flying based on air density."},{"q":"Why is density altitude important for performance?","a":"Engine power, lift generation, and propeller efficiency all depend on air density. High density altitude (hot, high, humid) degrades all performance parameters."},{"q":"What is pressure altitude?","a":"The altitude indicated when the altimeter subscale is set to 1013.25 hPa (standard pressure). It is the basis for flight level assignments and performance calculations."},{"q":"What are the main sources of error in the pitot-static system?","a":"Instrument error, position (installation) error, blockage of pitot or static ports, compressibility error at high speeds, and density error at altitude."},{"q":"What is compressibility error?","a":"At speeds above approximately 200 knots and altitudes above 10,000 ft, the compression of air at the pitot tube causes the ASI to over-read. A correction factor is needed."},{"q":"What is position error?","a":"Error caused by the location of the pitot tube and static ports on the aircraft, where local airflow distortion affects the accuracy of pressure measurements at certain speeds and attitudes."},{"q":"How does rain affect the pitot tube?","a":"Heavy rain can partially block the pitot tube or create water inside, leading to erroneous ASI readings. Pitot heat helps but may not completely eliminate the issue."},{"q":"What is the ISA (International Standard Atmosphere)?","a":"A model atmosphere with defined conditions: sea level pressure 1013.25 hPa, temperature 15 degrees C, lapse rate of 1.98 degrees C per 1000 ft (approximately 2 degrees C)."},{"q":"What is a Mach meter and when is it used?","a":"An instrument showing airspeed as a fraction of the speed of sound. It is used at high altitude where Mach number limitations apply rather than IAS."},{"q":"What causes the altimeter to under-read (show lower than actual)?","a":"Flying from low pressure to high pressure without adjusting the subscale, or flying into warmer than standard air temperatures."},{"q":"What is the subscale correction rate for altimeter errors?","a":"Approximately 30 ft of altitude error for every 1 hPa of pressure difference from the correct setting. This is critical for terrain clearance."},{"q":"What is the primary instrument for maintaining altitude in level flight?","a":"The altimeter, which shows altitude deviation from the desired level. However, the attitude indicator provides the primary reference for pitch control."},{"q":"What should a pilot do if both the pitot and static sources fail simultaneously?","a":"This is extremely unlikely as they are separate systems. If it occurs, use GPS altitude (if available), maintain known attitude and power, and declare an emergency for ATC assistance."},{"q":"What is the maximum allowable altimeter error during pre-flight check?","a":"Typically +/- 75 feet of the known field elevation when QNH is set. If the error exceeds this, the altimeter requires calibration."},{"q":"What is the relationship between dynamic pressure and airspeed?","a":"Dynamic pressure equals total (pitot) pressure minus static pressure. The ASI measures this difference, and airspeed is proportional to the square root of dynamic pressure."}],"15 Gyros and Compasses":[{"q":"What is the principle of gyroscopic rigidity?","a":"A spinning rotor tends to remain fixed in space (maintain its orientation) regardless of how the aircraft moves around it. This provides a stable reference for flight instruments."},{"q":"What is gyroscopic precession?","a":"When a force is applied to a spinning gyro, the effect occurs 90 degrees later in the direction of rotation, not at the point of application."},{"q":"What are the three gyroscopic instruments in a typical light aircraft?","a":"The attitude indicator (AI), the heading indicator (HI/directional gyro), and the turn coordinator (or turn and slip indicator)."},{"q":"How does the attitude indicator work?","a":"A gyro with its spin axis vertical provides a stable reference. As the aircraft pitches and rolls around the gyro, the instrument displays the aircraft's attitude relative to the horizon."},{"q":"What powers the attitude indicator?","a":"Typically the vacuum system (suction), which spins the gyro rotor via directed airflow. Some aircraft use electrically powered attitude indicators."},{"q":"What are the limitations of the attitude indicator?","a":"Tumbling or caging limits (typically +/- 60-70 degrees pitch and 100-110 degrees bank), erection errors during acceleration and turns, and reliance on vacuum system."},{"q":"What is the heading indicator (directional gyro)?","a":"A gyro instrument with a horizontal spin axis that provides a stable directional reference. It does not sense magnetic north and must be regularly set to the magnetic compass."},{"q":"Why must the heading indicator be reset periodically?","a":"Due to gyroscopic drift (real drift from Earth rotation and apparent drift from transport wander) and mechanical friction, the heading indicator drifts from the correct heading."},{"q":"How often should the heading indicator be reset?","a":"Every 15 minutes during flight, or whenever conditions allow an accurate magnetic compass reading (wings level, constant speed, no turbulence)."},{"q":"What powers the heading indicator?","a":"Typically the vacuum system, same as the attitude indicator."},{"q":"How does the turn coordinator work?","a":"A gyro with its spin axis canted approximately 30 degrees from the horizontal senses both rate of turn and roll rate. The miniature aircraft symbol indicates the direction and rate of turn."},{"q":"What powers the turn coordinator?","a":"Typically the aircraft electrical system (battery/alternator), providing independence from the vacuum system for redundancy."},{"q":"What is a standard rate turn?","a":"A turn rate of 3 degrees per second, completing a 360-degree turn in 2 minutes. On the turn coordinator, the miniature aircraft wing tip aligns with the rate index mark."},{"q":"What is the inclinometer (slip/skid ball)?","a":"A ball in a curved glass tube filled with fluid that indicates the quality of the turn. Centred ball = coordinated. Ball inside turn = slip. Ball outside turn = skid."},{"q":"What does a slipping turn indicate?","a":"Insufficient rudder for the bank angle (too much bank, not enough rudder). The ball is displaced toward the inside of the turn."},{"q":"What does a skidding turn indicate?","a":"Too much rudder for the bank angle (excessive rudder, insufficient bank). The ball is displaced toward the outside of the turn."},{"q":"How do you correct a slip or skid?","a":"Step on the ball - apply rudder pressure on the side the ball is displaced to. This coordinates the turn by aligning the aircraft's vertical axis with the total force vector."},{"q":"What is the magnetic compass?","a":"A direct-reading instrument containing a magnetized card that aligns with the Earth's magnetic field to indicate magnetic heading."},{"q":"Why is the magnetic compass considered unreliable during turns?","a":"The compass card experiences turning errors caused by the vertical component of the Earth's magnetic field acting on the tilted compass card during banked flight."},{"q":"What are the compass turning errors in the Northern Hemisphere?","a":"When turning through North, the compass lags behind. When turning through South, the compass leads ahead. Mnemonic: UNOS (Undershoot North, Overshoot South)."},{"q":"What are acceleration/deceleration errors of the magnetic compass?","a":"On easterly or westerly headings, acceleration causes a northerly turn indication, deceleration causes a southerly indication. Mnemonic: ANDS (Accelerate North, Decelerate South)."},{"q":"Why do acceleration errors not occur on north or south headings?","a":"On north and south headings, the compass magnets are aligned with the magnetic field. Acceleration forces act perpendicular to the magnets and do not cause dip-related displacement."},{"q":"What is magnetic variation (declination)?","a":"The angular difference between true north and magnetic north at a given location. It varies by geographic position and changes slowly over time."},{"q":"What is magnetic deviation?","a":"The error in the magnetic compass caused by the aircraft's own magnetic fields from engines, electrical systems, and metal structure. It varies with heading."},{"q":"What is the deviation card?","a":"A card near the compass showing the deviation error for each 30-degree heading, allowing the pilot to correct the compass reading for the aircraft's magnetic influence."},{"q":"How is compass deviation minimized?","a":"Through a process called compass swinging, where compensating magnets in the compass housing are adjusted to minimize the error caused by aircraft magnetic fields."},{"q":"What is the relationship between true heading, magnetic heading, and compass heading?","a":"True heading +/- variation = magnetic heading. Magnetic heading +/- deviation = compass heading."},{"q":"What is the dip error of a magnetic compass?","a":"Near the magnetic poles, the Earth's magnetic field has a significant vertical component that causes the compass card to dip, creating turning and acceleration errors."},{"q":"What is an isogonal line?","a":"A line on a chart connecting points of equal magnetic variation. The agonic line connects points of zero variation where true north and magnetic north coincide."},{"q":"What happens to the attitude indicator during a prolonged coordinated turn?","a":"The gyro slowly erects to the apparent vertical (tilted by centripetal acceleration), causing a slight bank error when wings are levelled. This is called erection error."},{"q":"What is the caging mechanism on a gyro instrument?","a":"A mechanical device that locks the gyro in its neutral position to prevent damage from excessive manoeuvres and allows re-erection of the gyro."},{"q":"What is real drift of a gyro?","a":"The apparent rotation of the gyro due to the Earth's rotation. A gyro fixed in space appears to drift as the Earth rotates beneath it - 15 degrees per hour at the poles."},{"q":"What is transport wander?","a":"The apparent heading change of a directional gyro caused by the aircraft changing position on the curved surface of the Earth."},{"q":"What is a flux gate compass?","a":"An electronic compass using a sensor that detects the horizontal component of the Earth's magnetic field and sends heading information to a remote indicator, eliminating many mechanical compass errors."},{"q":"What is the advantage of a flux gate compass over a magnetic compass?","a":"No moving parts at the display, remote sensing eliminates much deviation error, and it can slave the heading indicator automatically, eliminating the need for manual resetting."},{"q":"What are the two main types of gyro mounting?","a":"Space gyros (spin axis fixed in space, like the attitude indicator) and tied gyros (spin axis maintained in a specific orientation by an erection mechanism)."},{"q":"What is precession error in the heading indicator?","a":"Apparent drift of the heading indication caused by internal friction, bearing wear, and external vibration that apply small forces to the gyro rotor."},{"q":"What is the function of the gyro erection mechanism?","a":"A system of pendulous vanes or mechanical devices that slowly returns the gyro spin axis to the correct orientation, compensating for precession and other disturbing forces."},{"q":"Why does the attitude indicator show a slight climb during acceleration?","a":"The pendulous erection mechanism is displaced aft by acceleration, applying a force that precesses the gyro to indicate a slight nose-up attitude."},{"q":"What is AHRS (Attitude Heading Reference System)?","a":"A modern electronic system using solid-state sensors (accelerometers and rate gyros) instead of mechanical gyros to provide attitude and heading information."},{"q":"What advantages does AHRS have over mechanical gyros?","a":"No moving parts (higher reliability), no vacuum system required, faster start-up, no tumble limits, and integration with glass cockpit displays."},{"q":"What is the function of the compass liquid?","a":"The liquid (typically white spirit or kerosene) dampens oscillations of the compass card, provides flotation to reduce pivot friction, and lubricates the pivot."},{"q":"What happens if the compass liquid level is low?","a":"The compass card becomes sluggish, oscillates excessively, or sticks. A visible air bubble in the compass indicates low liquid level requiring maintenance."},{"q":"What is aperiodicity in a compass?","a":"The ability of the compass card to settle on a heading quickly without oscillating back and forth. Compass liquid and short card magnets help achieve aperiodicity."},{"q":"What is the horizontality requirement of a compass?","a":"The compass card must remain horizontal to accurately sense the horizontal component of the Earth's magnetic field. Pivot design and CG placement achieve this."},{"q":"What errors affect the magnetic compass in turbulence?","a":"Turbulence causes the aircraft and compass to oscillate, making accurate heading reading difficult. The compass is most reliable in smooth, straight, and level flight."},{"q":"How does the standby compass differ from the primary compass in glass cockpit aircraft?","a":"Glass cockpit aircraft use electronic AHRS for primary heading. The standby compass is a traditional magnetic compass providing a backup that requires no electrical power."},{"q":"What is a compass rose used for?","a":"A marked area on the airport tarmac used during compass swinging to align the aircraft on known magnetic headings for calibrating and adjusting the magnetic compass."},{"q":"What is the typical gyro spin-up time for vacuum-driven instruments?","a":"Approximately 5 minutes for the gyros to reach full operating speed and stabilise after engine start. Instrument readings during spin-up are unreliable."},{"q":"What heading errors occur when reading the magnetic compass during a climb or descent?","a":"Pitch changes cause the compass card to tilt, introducing errors similar to acceleration/deceleration errors. For accurate readings, the aircraft should be in level flight."}]},"03 POF":{"1 Aviation Physics Fundamentals":[{"q":"What is the ISA standard sea-level pressure in hPa and inches of mercury?","a":"1013.25 hPa (or 29.92 inches of mercury)."},{"q":"What is the ISA standard sea-level temperature?","a":"15 degrees Celsius (59 degrees Fahrenheit)."},{"q":"At what rate does temperature decrease with altitude in the ISA model?","a":"Approximately 2 degrees Celsius per 1,000 feet."},{"q":"What is the relationship between static pressure and altitude?","a":"Static pressure decreases as altitude increases because there is less air above to exert weight."},{"q":"What does Bernoulli's principle state about air velocity and pressure?","a":"As airflow velocity increases, static pressure decreases. Total pressure remains constant in a streamline flow."},{"q":"What is dynamic pressure and how is it calculated?","a":"Kinetic energy of moving air per unit volume: q = 1/2 rho V squared."},{"q":"What is the difference between laminar and turbulent airflow?","a":"Laminar has smooth parallel streamlines with less friction. Turbulent has chaotic movement with more drag."},{"q":"What is the continuity equation?","a":"Mass flow rate is constant in a streamtube: A1 x V1 = A2 x V2. Smaller area means higher velocity."},{"q":"How does air density change with increasing temperature?","a":"Density decreases because warmer molecules spread apart, reducing mass per unit volume."},{"q":"Define the chord line of an aerofoil.","a":"A straight line from leading edge to trailing edge, used as the reference for angle of attack."},{"q":"What is the angle of attack?","a":"The angle between the chord line and the relative airflow direction."},{"q":"How does humidity affect air density?","a":"Humidity decreases density because water vapor molecules are lighter than nitrogen and oxygen."},{"q":"How does Newton's Third Law relate to lift?","a":"The wing deflects air downward; the equal and opposite reaction pushes the wing upward, generating lift."},{"q":"What happens to airflow over the curved upper wing surface?","a":"Air accelerates, decreasing static pressure above the wing per Bernoulli's principle, contributing to lift."},{"q":"What is density altitude?","a":"Pressure altitude corrected for non-standard temperature, representing the equivalent altitude in the ISA model."},{"q":"How does a hot, high-elevation airport affect performance?","a":"Air density is greatly reduced, meaning less engine power, less thrust, less lift at a given TAS, and longer take-off distances."},{"q":"What is total pressure in Bernoulli's equation?","a":"The sum of static and dynamic pressure. It remains constant along a streamline in ideal incompressible flow."},{"q":"What is the difference between absolute and gauge pressure?","a":"Absolute is measured from a perfect vacuum. Gauge is measured relative to atmospheric pressure."},{"q":"How does air density change with altitude in the ISA?","a":"It decreases as atmospheric pressure drops and molecules spread apart."},{"q":"Up to what altitude does the ISA lapse rate apply?","a":"Up to about 36,090 feet (the tropopause), after which temperature remains constant."},{"q":"What is a streamline in aerodynamics?","a":"An imaginary line where fluid velocity is tangent at every point. In steady flow it represents the particle path."},{"q":"What are the two main theories explaining lift?","a":"Bernoulli's principle (pressure difference) and Newton's Third Law (reaction to deflected air)."},{"q":"If pressure is below ISA standard, how does density altitude change?","a":"Density altitude increases, meaning the air behaves as if at a higher altitude with reduced performance."},{"q":"What is relative airflow?","a":"Airflow due to the object's motion through air, equal and opposite to the flight path direction."},{"q":"What is a streamtube?","a":"An imaginary tube of streamlines where mass flow through any cross-section is constant."},{"q":"Why is air density crucial for pilots?","a":"It directly affects lift, drag, engine power, propeller efficiency, and instrument readings."},{"q":"What is the approximate pressure at 18,000 feet in ISA?","a":"About half of sea-level standard: approximately 506 hPa."},{"q":"What is the significance of the tropopause?","a":"The boundary where the temperature lapse rate stops. Above it, temperature stays constant at about minus 56.5 degrees C."},{"q":"How does a venturi tube demonstrate Bernoulli's principle?","a":"Air accelerates through the throat, reducing static pressure. As the tube widens, air slows and pressure increases."},{"q":"What are standard ISA sea-level conditions?","a":"1013.25 hPa, 15 degrees C, and 1.225 kg per cubic metre air density."},{"q":"How does the continuity equation explain upper-surface airflow acceleration?","a":"The curved surface acts as a convergent streamtube, forcing air to speed up through the narrower area."},{"q":"What is the difference between IAS and TAS?","a":"IAS is based on dynamic pressure from the ASI. TAS is actual speed through air. TAS exceeds IAS at altitude."},{"q":"Why does TAS exceed IAS at higher altitudes?","a":"Lower density requires faster movement to create the same dynamic pressure."},{"q":"What is viscosity in aerodynamics?","a":"Internal friction of a fluid resisting flow. Air's viscosity creates skin friction drag on moving surfaces."},{"q":"What is the boundary layer?","a":"The thin air layer adjacent to a surface where velocity transitions from zero at the surface to free-stream velocity."},{"q":"How does the boundary layer transition from laminar to turbulent?","a":"It grows

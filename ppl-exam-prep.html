until a transition point where roughness, adverse pressure gradients, or speed cause turbulent flow."},{"q":"What is pressure altitude?","a":"Altitude indicated when the altimeter is set to 1013.25 hPa standard."},{"q":"What is an aerofoil?","a":"A shape designed to produce lift when moving through air, typically with a curved upper and flatter lower surface."},{"q":"What is camber?","a":"The curvature of an aerofoil. Greater camber produces more lift at a given angle of attack."},{"q":"What is a symmetrical aerofoil?","a":"One with identical upper and lower surfaces producing zero lift at zero AoA. Used for tail surfaces and aerobatic aircraft."},{"q":"What is the thickness-to-chord ratio?","a":"Maximum thickness as a percentage of chord length. Affects drag, strength, and stall characteristics."},{"q":"How does altitude affect normally aspirated engine power?","a":"Power decreases about 3% per 1,000 feet as less oxygen is available for combustion."},{"q":"What is the stagnation point?","a":"Where relative airflow meets the leading edge and velocity drops to zero. Total pressure equals static pressure there."},{"q":"Why is upper-surface static pressure lower than lower-surface?","a":"Air accelerates over the curved top, reducing pressure per Bernoulli's principle. The pressure difference creates lift."},{"q":"How are density, temperature, and pressure related by the ideal gas law?","a":"Density is proportional to pressure and inversely proportional to temperature."},{"q":"If OAT exceeds ISA standard, how does density altitude compare to pressure altitude?","a":"Density altitude is higher because warmer air is less dense."},{"q":"What effect does increased air density have on aerodynamic forces?","a":"Both lift and drag increase because aerodynamic forces are directly proportional to air density."},{"q":"What instrument measures dynamic pressure?","a":"The airspeed indicator, comparing pitot (total) pressure with static pressure."},{"q":"What is the mean camber line?","a":"An imaginary line equidistant between upper and lower surfaces. On a symmetrical aerofoil it lies on the chord line."},{"q":"What force does atmospheric pressure exert on surfaces?","a":"It acts equally in all directions on any exposed surface, approximately 1013 hPa at ISA sea level."}],"2 Lift and Drag":[{"q":"Write the lift equation.","a":"Lift = CL x 1/2 x rho x V squared x S, where CL is coefficient of lift, rho is air density, V is TAS, S is wing area."},{"q":"Which variable in the lift equation has the greatest effect and why?","a":"Velocity because it is squared. Doubling speed quadruples lift."},{"q":"What is CL and what primarily changes it?","a":"A dimensionless lifting effectiveness number. Changes primarily with angle of attack and wing configuration."},{"q":"What happens to CL as AoA increases toward the critical angle?","a":"CL increases approximately linearly until CL max. Beyond the critical angle, airflow separates and CL drops sharply."},{"q":"What are the two main drag categories?","a":"Parasite drag (form, skin friction, interference) and induced drag (from lift production via wingtip vortices)."},{"q":"How does parasite drag change with airspeed?","a":"Increases with velocity squared. Doubling speed quadruples parasite drag."},{"q":"How does induced drag change with airspeed?","a":"Decreases as speed increases because the required AoA for level flight decreases."},{"q":"What causes induced drag?","a":"Wingtip vortices create downwash, tilting the lift vector rearward. The rearward component is induced drag."},{"q":"What is the significance of VMD?","a":"Speed for best L/D ratio, maximum range for propeller aircraft, and best glide speed power-off."},{"q":"What is aspect ratio and how does it affect induced drag?","a":"Wingspan squared divided by wing area. Higher aspect ratio reduces induced drag."},{"q":"What is form drag?","a":"Pressure drag from the difference between front and rear pressures on a body. Depends on shape and frontal area."},{"q":"What is interference drag?","a":"Extra drag where aerodynamic surfaces meet, from turbulent mixing of airflows at the junction."},{"q":"What is the Centre of Pressure?","a":"The point on the chord where the total aerodynamic force is considered to act."},{"q":"How does CP move with AoA changes?","a":"Forward as AoA increases, rearward as it decreases. This creates a destabilizing pitching tendency."},{"q":"What is skin friction drag and how is it reduced?","a":"Drag from air viscosity along the surface. Reduced by smooth surfaces, flush rivets, and polished finishes."},{"q":"What happens if a pilot slows below VMD?","a":"Total drag increases (reverse command region). Induced drag rises faster than parasite drag decreases."},{"q":"Write the drag equation.","a":"Drag = CD x 1/2 x rho x V squared x S."},{"q":"What is the L/D ratio and why is it important?","a":"Lift divided by drag. Maximum L/D is the most efficient point for glide and range performance."},{"q":"At what point on the drag curve does VMD occur?","a":"At the bottom where parasite drag equals induced drag - minimum total drag and maximum L/D."},{"q":"How do wingtip vortices form?","a":"High-pressure air below the wing flows around the tip to the low-pressure upper surface, creating trailing vortices."},{"q":"What design features reduce induced drag?","a":"High aspect ratio, winglets, elliptical planforms, and washout."},{"q":"What is a winglet?","a":"A near-vertical wingtip surface that blocks spanwise airflow, reducing vortex strength and induced drag."},{"q":"How does increased weight affect the total drag curve?","a":"Shifts it upward and to the right - more drag at every speed and higher VMD."},{"q":"What is the region of reverse command?","a":"Below VMD where total drag increases as speed decreases. More thrust needed to fly slower."},{"q":"What happens to induced drag in ground effect?","a":"Significantly reduced because ground proximity restricts vortex formation and reduces downwash."},{"q":"At what height is ground effect most significant?","a":"Within one half-wingspan of the ground."},{"q":"How does wing contamination affect drag?","a":"Promotes early transition to turbulent flow, increasing skin friction and form drag."},{"q":"What is the difference between profile drag and induced drag?","a":"Profile drag is from shape/friction (increases with speed). Induced drag is from lift (decreases with speed)."},{"q":"If speed doubles, by what factor does parasite drag change?","a":"Factor of four (proportional to velocity squared)."},{"q":"What is washout?","a":"Wing twist where the tip has lower incidence than root. Root stalls first, maintaining aileron control."},{"q":"What is the critical angle of attack for most light aircraft?","a":"Approximately 16 degrees. Beyond this, the wing stalls."},{"q":"What is CL max?","a":"Maximum coefficient of lift at the critical AoA, representing the most lift the wing can generate."},{"q":"How do flaps affect the CL vs AoA curve?","a":"Shift it upward and left - higher CL max but at a lower critical AoA."},{"q":"What is the aerodynamic centre?","a":"A fixed point at about 25% chord where the pitching moment coefficient does not change with AoA."},{"q":"What is zero-lift drag versus lift-dependent drag?","a":"Zero-lift drag exists without lift (shape/speed dependent). Lift-dependent drag exists only when producing lift."},{"q":"How does weight affect induced drag at a given speed?","a":"Higher weight needs higher CL, increasing induced drag."},{"q":"How does altitude affect the drag curve plotted against TAS?","a":"Shifts right because higher TAS is needed for the same dynamic pressure."},{"q":"What is the best L/D for a typical light aircraft?","a":"Approximately 8:1 to 10:1."},{"q":"How does aspect ratio differ between gliders and fighters?","a":"Gliders: very high (20:1+). Fighters: low, for high-speed maneuverability."},{"q":"What is the downwash angle?","a":"Airflow deflection downward behind the wing from vortices. It tilts lift rearward; the rearward component is induced drag."},{"q":"What must happen to thrust to fly slower than VMD at constant altitude?","a":"Thrust must increase because total drag increases on the back side of the drag curve."},{"q":"What is profile drag?","a":"Form drag plus skin friction drag of a wing section, existing regardless of lift production."},{"q":"How do vortex generators reduce drag?","a":"Small tabs energize the boundary layer, delaying flow separation at high AoA."},{"q":"What is the effect of ice on wing lift and drag?","a":"Reduces CL max, increases drag, and causes stall at lower AoA and higher speed."},{"q":"Why does CP movement with AoA create instability?","a":"Forward CP with increasing AoA creates positive feedback (more nose-up), requiring the tailplane for stability."},{"q":"Compare drag of a flat plate, sphere, and streamlined body.","a":"Flat plate: highest. Sphere: moderate. Streamlined: lowest due to minimal flow separation."},{"q":"What is wake turbulence from wingtip vortices?","a":"Powerful rotating air from heavy aircraft that persists for minutes and can cause violent rolling in lighter aircraft."},{"q":"What happens to minimum drag if parasite drag increases?","a":"VMD shifts to a lower speed and total minimum drag increases."},{"q":"How does the CL/CD ratio determine the most efficient AoA?","a":"The most efficient AoA is where CL/CD (L/D ratio) is maximum. Beyond it, CD rises faster than CL."},{"q":"What is the relationship between CL and CD at increasing AoA?","a":"Both increase, but CD rises more steeply at higher angles, reducing L/D beyond the optimum."}],"3 Aircraft Weight and Thrust":[{"q":"What are the four forces acting on an aircraft in flight?","a":"Lift, Weight, Thrust, and Drag."},{"q":"In straight and level flight, what is the relationship between the four forces?","a":"Lift equals Weight and Thrust equals Drag. The aircraft is in equilibrium."},{"q":"Through which point does Weight act?","a":"Vertically downward through the Centre of Gravity (CG)."},{"q":"What is the difference between mass and weight?","a":"Mass is quantity of matter (kg). Weight is the gravitational force on that mass (W = mg), in Newtons."},{"q":"How is thrust generated by a propeller aircraft?","a":"The propeller accelerates air rearward. By Newton's Third Law, this produces a forward thrust force."},{"q":"What is the thrust line?","a":"The line along which thrust acts, passing through the propeller hub along the shaft axis."},{"q":"What is a pitching moment?","a":"A torque rotating the aircraft nose-up or nose-down about the lateral axis, from thrust/drag couples or CG/CP offsets."},{"q":"If thrust acts above the drag line, what pitching tendency results?","a":"A nose-down pitching moment."},{"q":"What propeller effects cause yaw?","a":"Slipstream effect, P-factor, torque reaction, and gyroscopic precession."},{"q":"What is slipstream effect on a clockwise-rotating propeller?","a":"Slipstream strikes the left side of the fin, yawing left. Right rudder is needed."},{"q":"What is P-factor?","a":"At high AoA, the descending blade has higher effective AoA than the ascending blade, causing asymmetric thrust and yaw."},{"q":"When is P-factor most pronounced?","a":"At high AoA and high power: take-off, slow flight, climbing."},{"q":"What is torque reaction?","a":"The aircraft tends to roll opposite to propeller rotation, per Newton's Third Law."},{"q":"How is pitch balanced when CG is forward of CP?","a":"The tailplane produces a downward force to balance the nose-down moment."},{"q":"What happens if weight increases but thrust stays constant?","a":"Higher AoA or speed needed for lift. Climb, ceiling, range, endurance degrade. Stall speed increases."},{"q":"What is gyroscopic precession?","a":"A force on the spinning propeller produces its effect 90 degrees later in rotation, causing unexpected yaw or pitch."},{"q":"How does fixed-pitch propeller thrust change with airspeed?","a":"Decreases as airspeed increases because blade effective AoA decreases."},{"q":"What is the difference between tractor and pusher configurations?","a":"Tractor pulls from the front. Pusher pushes from behind."},{"q":"How does a constant-speed propeller maintain efficiency?","a":"Automatically adjusts blade pitch to maintain set RPM. Fine pitch at low speed, coarse at high speed."},{"q":"What is the propeller governor?","a":"A device that automatically adjusts blade pitch to maintain pilot-selected RPM."},{"q":"Why does climbing require more thrust than level flight?","a":"Thrust must overcome drag plus the rearward weight component along the climb path."},{"q":"What is thrust-to-weight ratio?","a":"Maximum thrust divided by weight. Higher ratio means better acceleration, climb, and maneuverability."},{"q":"In a descent, how does thrust required change?","a":"Less thrust needed because a weight component acts forward along the flight path."},{"q":"What is the effect of excessively forward CG?","a":"Increases stability but heavies controls, increases trim drag, raises stall speed, reduces range."},{"q":"What is the effect of excessively aft CG?","a":"Reduces stability, lightens controls dangerously, risks uncontrollable pitch-up and difficult spin recovery."},{"q":"What couple do lift and weight form when CP is not above CG?","a":"A pitching couple: nose-up if CP behind CG, nose-down if CP ahead of CG."},{"q":"Why does the tailplane typically produce downward force?","a":"CG is usually forward of CP, requiring tail downforce to balance the nose-down couple."},{"q":"What is trim drag?","a":"Extra drag from trim surface deflection or tail downforce needed for balanced flight."},{"q":"How does fuel burn affect CG?","a":"CG shifts as fuel is consumed, depending on tank location. Often moves forward as wing tank fuel burns."},{"q":"What determines maximum aircraft weight?","a":"Structural certification (MTOW) based on loads, performance, and stall speed requirements."},{"q":"How does thrust required relate to airspeed in level flight?","a":"Equals drag: high at low speeds (induced), minimum at VMD, increasing at high speeds (parasite)."},{"q":"How do external stores affect forces?","a":"Increase parasite drag, may shift CG, change pitching moments, increase weight, degrade performance."},{"q":"What is the difference between power required and thrust required?","a":"Thrust required is drag. Power required is drag times TAS. They have different minimum speeds."},{"q":"If thrust line is below CG, what happens at high power?","a":"A nose-up pitching moment requiring forward pressure or retrimming."},{"q":"How does propeller efficiency vary with airspeed?","a":"Zero at zero speed, peaks at design cruise, then decreases at high speeds."},{"q":"What happens to forces in a steady unaccelerated descent?","a":"Lift is less than weight; thrust plus weight's forward component equals drag."},{"q":"How does CG position affect control forces?","a":"Forward CG increases control forces; aft CG decreases them."},{"q":"Why is the CG envelope published in the POH?","a":"Defines safe CG limits. Operating outside risks loss of control or inability to recover."},{"q":"In a glide, what provides force to overcome drag?","a":"The forward component of weight (weight x sine of glide angle)."},{"q":"How does weight affect the speed for best L/D?","a":"The speed increases with weight, but the L/D ratio itself stays the same."},{"q":"How does altitude affect thrust from a normally aspirated engine?","a":"Thrust decreases due to less air density for engine and propeller."},{"q":"At maximum level speed, what is the thrust relationship?","a":"Thrust available equals thrust required. No excess thrust for acceleration."},{"q":"How does heavy rear cargo affect flight?","a":"Shifts CG aft, reducing stability and potentially causing dangerous pitch-up and difficult recovery."},{"q":"What advantage does high thrust-to-weight ratio give for take-off?","a":"Rapid acceleration, shorter distance, steeper initial climb."},{"q":"Why must thrust equal drag in cruise?","a":"Equal forces mean constant speed. Imbalance causes acceleration or deceleration."},{"q":"How does propeller slipstream affect the tail?","a":"Increases airflow over tail surfaces, improving their effectiveness. Power changes require retrimming."},{"q":"How does weight affect service ceiling?","a":"More weight means more power needed for level flight, less excess for climbing, so ceiling decreases."},{"q":"How does thrust line position relative to drag line affect pitch?","a":"Thrust above drag creates nose-down moment. Below creates nose-up. Balanced by tail forces."},{"q":"What would happen if CG were exactly at CP?","a":"No pitching couple but no stability margin. Any disturbance would not self-correct - dangerous."},{"q":"What is the zero-lift angle of a cambered aerofoil?","a":"A slightly negative AoA where the aerofoil produces no net lift. For symmetrical aerofoils, it is zero degrees."}],"4 Flight Forces and Turns":[{"q":"In a steady coordinated turn, why must lift be greater than weight?","a":"The lift vector must be tilted to provide a horizontal component (centripetal force) for the turn, so total lift must increase to keep the vertical component equal to weight."},{"q":"What is load factor?","a":"Load factor (n) is the ratio of total lift produced to the aircraft's weight. In straight and level flight, load factor is 1g."},{"q":"What is the load factor in a 60-degree banked level turn?","a":"2g. The load factor equals 1 divided by the cosine of the bank angle; cos(60) = 0.5, so n = 2."},{"q":"How does bank angle affect stall speed?","a":"Stall speed increases with bank angle. The stall speed in a turn equals the straight-and-level stall speed multiplied by the square root of the load factor."},{"q":"By how much does stall speed increase in a 60-degree bank turn?","a":"Approximately 41%. The square root of 2 (the load factor) is about 1.41."},{"q":"What is the correct way to enter a coordinated turn?","a":"Apply aileron to establish the desired bank angle, use rudder to coordinate (prevent adverse yaw), and apply back pressure on the elevator to maintain altitude and increase the load factor."},{"q":"What is adverse yaw?","a":"When ailerons are applied, the down-going aileron creates more induced drag than the up-going aileron, causing the nose to yaw opposite to the direction of the turn."},{"q":"How is adverse yaw counteracted?","a":"By applying rudder in the direction of the turn (same direction as the aileron input) to coordinate the turn. Differential ailerons also help reduce adverse yaw."},{"q":"What does the slip ball indicate in a turn?","a":"A centered ball indicates coordinated flight. Ball displaced inward (toward the turn) indicates a slip; ball displaced outward indicates a skid."},{"q":"What is a slip in a turn?","a":"A slip occurs when there is insufficient rate of turn for the bank angle (too little rudder or too much bank). The aircraft sideslips toward the inside of the turn."},{"q":"What is a skid in a turn?","a":"A skid occurs when there is too much rate of turn for the bank angle (too much rudder). The aircraft slides outward from the turn."},{"q":"What is rate 1 turn and what bank angle approximation is used?","a":"A rate 1 turn is 3 degrees per second (360 degrees in 2 minutes). The approximate bank angle is TAS/10 + 7 degrees."},{"q":"Why does an aircraft tend to overbank in a steep turn?","a":"The outer wing travels faster and generates more lift than the inner wing, creating a rolling moment that increases the bank. The pilot must apply a slight opposite aileron to prevent overbanking."},{"q":"What is the radius of turn affected by?","a":"Radius of turn depends on TAS and bank angle. Higher speed increases radius; steeper bank decreases radius."},{"q":"During a level turn, what happens if the pilot fails to increase back pressure?","a":"The vertical component of lift will be less than weight, so the aircraft will descend (lose altitude) during the turn."},{"q":"Can an aircraft exceed its structural load limits in a steep turn? Explain.","a":"Yes. In very steep bank angles (above about 75 degrees for Normal category), the load factor exceeds the structural limit of +3.8g, risking structural damage."},{"q":"What is centripetal force in a turn?","a":"The horizontal component of lift that pulls the aircraft toward the center of the turn, providing the force needed to change direction."},{"q":"What happens to drag in a level turn compared to straight and level flight?","a":"Drag increases because the higher angle of attack needed to produce more lift also increases induced drag."},{"q":"What is the load factor in a 30-degree banked level turn?","a":"Approximately 1.15g. Load factor equals 1/cos(30) = 1/0.866 = 1.15."},{"q":"What is the load factor in a 45-degree banked level turn?","a":"Approximately 1.41g. Load factor equals 1/cos(45) = 1/0.707 = 1.41."},{"q":"Why does the pilot need more power in a level turn?","a":"Because the increased angle of attack produces more induced drag, and power must increase to maintain airspeed and altitude."},{"q":"What is the relationship between turn radius, speed, and bank angle?","a":"Turn radius = V squared / (g x tan(bank angle)). Higher speed increases radius; steeper bank decreases radius."},{"q":"What is the rate of turn formula?","a":"Rate of turn = (g x tan(bank angle)) / V. Steeper bank and lower speed give a higher rate of turn."},{"q":"In a slipping turn, which way does the ball move?","a":"The ball moves toward the inside (lower side) of the turn, indicating insufficient rudder or too much bank for the rate of turn."},{"q":"In a skidding turn, which way does the ball move?","a":"The ball moves toward the outside (higher side) of the turn, indicating too much rudder for the bank angle."},{"q":"What is the 'step on the ball' rule?","a":"To coordinate a turn, apply rudder pressure on the same side as the displaced ball to center it."},{"q":"Why is a steep turn at low altitude dangerous?","a":"The high load factor increases stall speed significantly, and recovery from a stall or loss of control near the ground may be impossible due to insufficient altitude."},{"q":"What is the maximum bank angle recommended for a standard rate turn at typical training speeds?","a":"Approximately 25-30 degrees for most light training aircraft at normal cruise speeds."},{"q":"How does altitude affect the TAS needed for a rate 1 turn?","a":"At higher altitudes, TAS is higher for the same IAS, so a steeper bank angle is needed to maintain a rate 1 turn."},{"q":"What structural limit prevents bank angles beyond about 75 degrees in Normal category aircraft?","a":"The load factor at 75 degrees bank is approximately 3.86g, which exceeds the Normal category limit of +3.8g."},{"q":"What forces act on an aircraft in a coordinated level turn?","a":"Lift (tilted inward), weight (acting vertically downward), thrust (along flight path), and drag (opposing thrust). The horizontal component of lift provides centripetal force."},{"q":"How do you calculate the stall speed in a 45-degree bank turn if VS is 50 knots?","a":"Stall speed = 50 x sqrt(1.41) = 50 x 1.19 = approximately 59 knots."},{"q":"What is the effect of turbulence on an aircraft in a steep turn?","a":"Turbulence can cause sudden changes in angle of attack, and since the aircraft is already at a higher AoA in a steep turn, it is closer to the stall and more vulnerable to upsets."},{"q":"Why must the pilot avoid abrupt control inputs in a steep turn?","a":"Abrupt pitch-up inputs increase the load factor further, potentially exceeding structural limits or causing an accelerated stall."},{"q":"What is the difference between a climbing turn and a level turn in terms of forces?","a":"In a climbing turn, thrust must overcome drag plus a component of weight along the flight path, and lift is less than weight. The climb rate is reduced compared to a wings-level climb."},{"q":"How does a descending turn differ from a level turn?","a":"In a descending turn, a component of weight acts along the flight path assisting thrust, so less power is needed. The pilot must guard against excessive speed."},{"q":"What is the effect of a turn on the aircraft's flight path?","a":"The aircraft follows a curved path in the horizontal plane. In a level turn, the flight path describes an arc of a circle at constant altitude."},{"q":"Why is it important to roll out of a turn before reaching the desired heading?","a":"The aircraft continues to turn during the roll-out. The lead angle (typically half the bank angle) ensures the aircraft stops turning exactly on the desired heading."},{"q":"What is the overbanking tendency and at what bank angle does it become significant?","a":"The outer wing travels faster and produces more lift, tending to increase bank. It becomes significant above approximately 30 degrees of bank."},{"q":"How does wing loading affect turn performance?","a":"Higher wing loading (weight/wing area) means higher stall speeds, requiring higher turn entry speeds and resulting in larger turn radii at the same bank angle."},{"q":"What is the relationship between load factor and apparent weight felt by the pilot?","a":"The pilot feels apparent weight equal to actual weight multiplied by the load factor. At 2g, a 70 kg pilot feels 140 kg."},{"q":"Why should turns be limited to 30 degrees of bank in the circuit pattern?","a":"To keep load factor manageable (about 1.15g), maintain a safe margin above stall speed at low altitude, and allow adequate time to monitor the approach."},{"q":"What happens to the vertical component of lift if bank angle increases but back pressure is not increased?","a":"The vertical component of lift decreases below the value needed to support the aircraft's weight, causing the aircraft to descend."},{"q":"Can an aircraft be in a banked attitude without turning?","a":"Yes, in a sideslip the aircraft is banked but the flight path remains approximately straight because the aerodynamic sideforce from the fuselage opposes the horizontal lift component."},{"q":"What is the relationship between rate of turn and radius of turn?","a":"Rate of turn = V / radius. For a given speed, a tighter radius gives a higher rate of turn."},{"q":"How does the pilot maintain altitude in a steep turn?","a":"By increasing back pressure on the elevator to increase the angle of attack, ensuring the vertical component of the increased lift equals the aircraft's weight."},{"q":"What visual cues help maintain a level steep turn?","a":"The nose position relative to the horizon, maintaining a constant bank angle reference on the attitude indicator, and monitoring the altimeter and VSI."},{"q":"What is the effect of propeller torque on turns?","a":"Propeller torque tends to roll the aircraft in one direction, making turns in that direction easier and turns in the opposite direction requiring more aileron input."},{"q":"At what bank angle does the load factor reach 1.5g?","a":"Approximately 48 degrees of bank. cos(48) ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ 0.669, so n = 1/0.669 ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ 1.5g."},{"q":"Why is the inner wing in a turn producing less lift than the outer wing?","a":"The inner wing moves slower than the outer wing because it describes a smaller arc, generating less lift due to lower velocity over the surface."}],"5 Lift Augmentation":[{"q":"What is the primary purpose of flaps?","a":"To increase the wing's coefficient of lift (CL MAX), allowing the aircraft to fly at slower speeds for take-off and landing without stalling."},{"q":"How do flaps increase lift?","a":"Flaps increase the camber and, depending on type, the effective wing area. This increases CL MAX, allowing more lift at a given airspeed."},{"q":"What are the four main types of trailing edge flaps?","a":"Plain flap, split flap, slotted flap, and Fowler flap."},{"q":"Which flap type is most aerodynamically efficient and why?","a":"The Fowler flap, because it increases both camber and wing area, and the slot between the flap and wing re-energises the boundary layer, giving the highest CL MAX increase with less drag penalty."},{"q":"How do flaps affect the stall speed?","a":"Flaps decrease the stall speed because they increase CL MAX, meaning less airspeed is needed to produce the required lift."},{"q":"How do flaps affect the critical angle of attack?","a":"Flaps decrease the critical angle of attack. The wing stalls at a lower AoA with flaps extended compared to the clean configuration."},{"q":"What is the effect of flaps on drag?","a":"Flaps significantly increase drag, especially at large deflection angles. Initial flap settings produce more lift than drag, but full flap settings produce proportionally more drag."},{"q":"Why are only partial flaps typically recommended for take-off?","a":"Partial flaps provide a useful lift increase to shorten the ground roll, but without the excessive drag penalty that full flaps would create, which would degrade the climb angle."},{"q":"What is the purpose of leading edge devices such as slats?","a":"Slats re-energise the boundary layer over the wing's upper surface by directing high-energy air through a slot, delaying flow separation and increasing the critical angle of attack and CL MAX."},{"q":"How does a slat differ from a slot?","a":"A slot is a fixed gap in the wing leading edge. A slat is a movable leading edge surface that, when deployed, creates a slot. Slats can be retracted for clean cruise flight."},{"q":"What happens to approach speed when flaps are deployed for landing?","a":"Approach speed decreases because flaps lower the stall speed. The reference speed (VREF) is based on 1.3 x VSO (stall speed in landing configuration with flaps)."},{"q":"Why do flaps allow a steeper approach angle?","a":"The high drag produced by full flaps allows the aircraft to descend at a steeper angle without accelerating, improving obstacle clearance on approach."},{"q":"What is VFE?","a":"VFE is the maximum speed at which flaps may be extended (the top of the white arc on the airspeed indicator). Exceeding VFE with flaps deployed risks structural damage."},{"q":"What effect do flaps have on the pitching moment?","a":"Flap deployment generally causes a nose-down pitching moment because the increased lift acts behind the CG, and the increased drag acts below the thrust line. The pilot must re-trim."},{"q":"A pilot is on short final and retracts the flaps suddenly. What is the immediate danger?","a":"Sudden flap retraction causes an immediate loss of CL MAX and a rise in stall speed. The aircraft may stall or sink rapidly if airspeed is insufficient for the clean configuration."},{"q":"What is a split flap and what is its distinguishing characteristic?","a":"A split flap is hinged at the lower surface of the trailing edge only; the upper surface remains fixed. It produces good lift increase but very high drag, making it less efficient than slotted or Fowler flaps."},{"q":"What is a plain flap?","a":"A simple hinged portion of the trailing edge that deflects downward, increasing camber. It provides moderate lift increase but high drag at large deflections."},{"q":"How does a slotted flap differ from a plain flap?","a":"A slotted flap has a gap between the flap and the wing when deployed, allowing high-energy air from below to re-energise the boundary layer on top of the flap, delaying separation and producing more lift."},{"q":"What is a Krueger flap?","a":"A leading-edge device that hinges down and forward from the lower surface of the wing's leading edge, increasing camber and delaying the stall to a higher angle of attack."},{"q":"What is a leading edge droop?","a":"The entire leading edge of the wing is mechanically drooped downward, increasing camber. It increases CL MAX and the critical angle of attack."},{"q":"What is boundary layer control and why is it important for lift augmentation?","a":"Boundary layer control prevents airflow separation by re-energising the slow-moving air near the wing surface, allowing higher angles of attack and greater CL MAX before stalling."},{"q":"How do vortex generators augment lift?","a":"Small fins on the wing surface that create vortices, mixing high-energy freestream air into the boundary layer, delaying separation and allowing the wing to operate at higher angles of attack."},{"q":"What is the typical CL MAX increase provided by plain flaps?","a":"Plain flaps increase CL MAX by approximately 0.5 to 0.9, depending on flap deflection angle and chord ratio."},{"q":"What is the typical CL MAX increase provided by Fowler flaps?","a":"Fowler flaps can increase CL MAX by approximately 1.0 to 1.3 due to the combined effect of increased camber and wing area."},{"q":"At what flap deflection angle does drag start to increase more than lift?","a":"Generally beyond about 20-25 degrees of deflection, the drag increase becomes proportionally greater than the lift increase."},{"q":"Why are the first 10-15 degrees of flap deflection considered most efficient?","a":"The initial deflection produces the largest lift increase relative to drag increase, giving the best lift-to-drag ratio improvement."},{"q":"What is the effect of flaps on the lift curve?","a":"Flaps shift the lift curve upward and to the left, increasing CL at every angle of attack but reducing the critical (stalling) angle of attack."},{"q":"How do flaps affect the centre of pressure?","a":"Flaps move the centre of pressure rearward because the additional lift is generated primarily on the rear portion of the wing."},{"q":"What is the recommended procedure for retracting flaps after a go-around?","a":"Retract flaps incrementally (one stage at a time) while climbing, ensuring adequate airspeed and positive rate of climb before each reduction, to avoid sudden lift loss."},{"q":"Why should flaps not be retracted below a safe speed?","a":"Retracting flaps reduces CL MAX and increases the stall speed. If the current airspeed is below the clean configuration stall speed, the aircraft will stall."},{"q":"How does asymmetric flap deployment affect the aircraft?","a":"It creates a significant rolling moment toward the side with less flap, because one wing produces more lift than the other. This is a serious emergency requiring immediate corrective action."},{"q":"What is the white arc on the airspeed indicator?","a":"The flap operating range, from VSO (stall speed in landing configuration, bottom) to VFE (maximum flap extension speed, top)."},{"q":"How do slats affect the stall speed?","a":"Slats reduce the stall speed by increasing the critical angle of attack and CL MAX, allowing the wing to generate sufficient lift at lower airspeeds."},{"q":"What is an automatic slat?","a":"A slat that deploys automatically at high angles of attack due to aerodynamic suction on the leading edge, without requiring pilot input or mechanical actuation."},{"q":"How do double-slotted flaps work?","a":"They have two separate flap segments, each with its own slot, providing multiple layers of boundary layer re-energisation for very high CL MAX values, commonly used on larger aircraft."},{"q":"What is the effect of flaps on the approach glide path?","a":"Full flaps steepen the approach path because the high drag allows a steeper descent angle without the aircraft accelerating, improving obstacle clearance."},{"q":"Why are flaps more effective at low speeds than at high speeds?","a":"At low speeds the aircraft operates at higher angles of attack where the increased camber from flaps provides proportionally more lift benefit. At high speeds, the lift coefficient needed is already low."},{"q":"What is the purpose of a flaperon?","a":"A flaperon combines the functions of a flap and an aileron in a single control surface, providing both lift augmentation and roll control."},{"q":"How does deploying flaps affect the pitching moment in most light aircraft?","a":"It typically causes a nose-down pitch change because the increased lift behind the CG creates a nose-down moment, requiring the pilot to apply back pressure or re-trim."},{"q":"What is the maximum flap extension speed (VFE) consequence if exceeded?","a":"Exceeding VFE can cause structural damage to the flap mechanism, flap tracks, or the wing structure due to excessive aerodynamic loads on the extended flaps."},{"q":"How do leading edge devices complement trailing edge flaps?","a":"Leading edge devices increase the critical angle of attack while trailing edge flaps increase camber and CL MAX. Together they provide a greater overall CL MAX than either alone."},{"q":"What happens to induced drag when flaps are deployed?","a":"Induced drag increases because the higher CL at a given speed produces stronger wingtip vortices and greater downwash."},{"q":"What is the effect of flap deployment on the zero-lift angle of attack?","a":"Flaps make the zero-lift angle more negative, meaning the wing produces lift at a more nose-down attitude than in the clean configuration."},{"q":"Why are full flaps typically used for landing but not for take-off?","a":"Full flaps produce excessive drag that severely degrades climb performance after take-off. For landing, the high drag is beneficial as it allows a steeper descent and shorter stopping distance."},{"q":"How does flap deflection affect the wing's aspect ratio effectively?","a":"Fowler flaps increase the effective wing area, which increases the effective aspect ratio. Other flap types do not significantly change the wing area."},{"q":"What precaution should a pilot take when flying at speeds near VFE?","a":"The pilot should avoid extending flaps and reduce speed to well below VFE before deploying flaps to prevent structural overload."},{"q":"How do spoilers interact with flaps during landing?","a":"Spoilers (speed brakes or lift dumpers) destroy lift on the wing after touchdown, increasing weight on wheels for better braking, complementing the high-drag landing configuration with flaps."},{"q":"What is a blown flap system?","a":"A system that directs engine bleed air or propeller wash over the flap surface to energise the boundary layer, dramatically increasing CL MAX. Used mainly on STOL aircraft."},{"q":"Why do some aircraft have flap position indicators in the cockpit?","a":"To confirm actual flap position matches the selected position, verify symmetric deployment, and help the pilot select the correct flap setting for the phase of flight."},{"q":"What is the typical flap setting recommended for a short-field take-off?","a":"Usually 10-15 degrees (first notch), which provides meaningful lift increase to reduce ground roll without excessive drag that would compromise the climb gradient."},{"q":"Flaps down cause L/D Max to?","a":"Reduce cause drag increases"},{"q":"tyt","a":"tyt"}],"6 Aircraft Stability and Control":[{"q":"What are the three axes of an aircraft and the movement associated with each?","a":"Longitudinal axis (roll), lateral axis (pitch), and normal/vertical axis (yaw). All three axes intersect at the Centre of Gravity."},{"q":"What are the three primary flight controls and which axis does each control?","a":"Ailerons control roll (longitudinal axis), elevator controls pitch (lateral axis), and rudder controls yaw (normal axis)."},{"q":"What is the difference between stability and control?","a":"Stability is the aircraft's natural tendency to return to its original state after a disturbance. Control is the pilot's ability to intentionally manoeuvre the aircraft."},{"q":"Define positive static stability.","a":"The initial tendency of an aircraft to return toward its original attitude after being disturbed."},{"q":"What is positive dynamic stability?","a":"After a disturbance, the aircraft oscillates with decreasing amplitude over time, eventually returning to the original state. It requires positive static stability first."},{"q":"What provides longitudinal (pitch) stability?","a":"Primarily the horizontal tailplane (stabiliser), which provides a correcting balancing moment about the lateral axis when the aircraft is disturbed in pitch."},{"q":"How does a forward CG affect longitudinal stability?","a":"A forward CG increases longitudinal stability, making the aircraft very stable but requiring heavier control forces. It also increases stall speed due to the larger downward tail force needed."},{"q":"How does an aft CG affect stability and safety?","a":"An aft CG decreases longitudinal stability, making the aircraft less stable and more manoeuvrable but creating dangerous stall/spin characteristics and potentially making recovery impossible."},{"q":"What provides lateral (roll) stability?","a":"Primarily wing dihedral (wings angled upward from root to tip). A swept wing planform and high wing mounting also contribute."},{"q":"Explain how dihedral provides lateral stability.","a":"When a wing drops, the aircraft sideslips toward the lower wing. Due to dihedral, the lower wing meets the relative airflow at a higher AoA, generating more lift and rolling the aircraft back to level."},{"q":"What provides directional (yaw) stability?","a":"The vertical fin (keel surface), which acts like a weathervane. When the aircraft yaws, the fin generates a correcting aerodynamic force to realign the aircraft with the airflow."},{"q":"What is a spiral dive and what stability imbalance causes it?","a":"A spiral dive is an increasing descending turn caused by strong directional stability combined with weak lateral stability. A wing drop causes yaw, which reinforces the roll, tightening the spiral."},{"q":"What is the secondary effect of rudder input?","a":"Roll. Applying rudder yaws the aircraft, causing the outer wing to speed up and produce more lift, inducing a roll in the direction of the yaw."},{"q":"What is the secondary effect of aileron input?","a":"Yaw (adverse yaw initially, then a sideslip-induced yaw). Rolling the aircraft causes a sideslip, which produces a secondary yaw due to the keel effect of the fin."},{"q":"What is the purpose of a trim tab?","a":"To relieve the pilot from holding constant control pressure by using a small hinged surface on the trailing edge of a control surface to aerodynamically hold it in the desired position."},{"q":"How does a balance tab differ from an anti-balance tab?","a":"A balance tab moves opposite to the control surface to assist the pilot (lightens stick forces). An anti-balance tab moves in the same direction as the control surface to increase stick forces and provide better control feel."},{"q":"What is aerodynamic balancing of a control surface?","a":"Placing part of the control surface area ahead of the hinge line (using horns, inset hinges, or internal balances) so that aerodynamic forces assist the pilot, reducing the stick force required to deflect the surface."},{"q":"What does the elevator primarily control in steady flight?","a":"Airspeed. By changing the pitch attitude, the elevator adjusts the angle of attack, which determines the equilibrium airspeed."},{"q":"What is neutral static stability?","a":"The aircraft has no tendency to return to or diverge from its original attitude after a disturbance. It remains at whatever new attitude the disturbance caused."},{"q":"What is negative static stability?","a":"The aircraft tends to diverge further from its original attitude after a disturbance, requiring constant pilot correction."},{"q":"What is the neutral point?","a":"The aft CG position at which the aircraft has neutral longitudinal static stability. If the CG is behind the neutral point, the aircraft is statically unstable in pitch."},{"q":"What is the static margin?","a":"The distance between the CG and the neutral point, expressed as a percentage of the mean aerodynamic chord. A larger static margin means greater longitudinal stability."},{"q":"What is Dutch roll?","a":"A coupled lateral-directional oscillation where the aircraft alternately yaws and rolls, caused by strong lateral stability (dihedral effect) combined with weak directional stability."},{"q":"How is Dutch roll corrected or prevented?","a":"By increasing directional stability (larger fin) or using a yaw damper. The pilot can also apply coordinated rudder inputs to dampen the oscillation."},{"q":"What is the phugoid oscillation?","a":"A long-period longitudinal oscillation where the aircraft exchanges speed for altitude and vice versa at roughly constant angle of attack. It is usually lightly damped and easily controlled by the pilot."},{"q":"What is the short-period oscillation?","a":"A rapid longitudinal oscillation in pitch (angle of attack changes) that is normally well-damped in a stable aircraft. If poorly damped, it can be dangerous as the pilot cannot react fast enough."},{"q":"How does wing sweep contribute to lateral stability?","a":"In a sideslip, the into-wind wing presents a more perpendicular leading edge to the airflow, generating more lift, which rolls the aircraft back toward level."},{"q":"How does a high-wing configuration contribute to lateral stability?","a":"The CG is below the wing, creating a pendulum effect. In a sideslip, the relative airflow creates a restoring rolling moment due to the geometric relationship between the wing and fuselage."},{"q":"What is the purpose of the dorsal fin?","a":"A dorsal fin extends the effective keel area forward along the top of the fuselage, improving directional stability particularly at high angles of sideslip where the main fin may stall."},{"q":"What is a spring tab and how does it work?","a":"A spring tab is connected to the control surface through a spring. At low speeds the spring deflects the tab to assist the pilot; at high speeds the spring is compressed and the tab provides less assistance."},{"q":"How does the elevator trim tab work mechanically?","a":"The pilot adjusts the trim tab angle via a trim wheel. The tab creates an aerodynamic force that holds the elevator at the desired deflection, relieving the pilot of sustained control pressure."},{"q":"What is a servo tab?","a":"A tab where the pilot's control input moves the tab directly, and the aerodynamic force on the tab then deflects the main control surface. Used on large aircraft to reduce control forces."},{"q":"Why is too much lateral stability undesirable?","a":"Excessive lateral stability can cause Dutch roll and make it difficult for the pilot to maintain a banked attitude in turns, requiring constant aileron input."},{"q":"Why is too much directional stability undesirable?","a":"Excessive directional stability relative to lateral stability can cause spiral instability, where a small bank angle leads to an ever-tightening descending spiral."},{"q":"What is aileron reversal?","a":"At very high speeds, aileron deflection can twist the wing in the opposite direction, causing roll in the direction opposite to the pilot's input. This is mainly a concern on swept-wing or flexible-wing aircraft."},{"q":"How do differential ailerons reduce adverse yaw?","a":"The up-going aileron deflects more than the down-going aileron, equalising the drag on both wings and reducing the yaw moment opposite to the turn."},{"q":"What is a Frise aileron?","a":"An aileron designed so that when deflected upward, its leading edge protrudes below the wing into the airflow, increasing drag on that wing to counteract adverse yaw."},{"q":"What is mass balancing of a control surface?","a":"Adding weight ahead of the hinge line to move the control surface's CG to or ahead of the hinge, preventing flutter caused by aerodynamic and inertial coupling."},{"q":"What is flutter and when does it occur?","a":"Flutter is a self-excited structural oscillation caused by the interaction of aerodynamic, elastic, and inertial forces. It typically occurs at high speeds and can lead to rapid structural failure."},{"q":"How does CG position affect elevator effectiveness?","a":"With a forward CG, the elevator must generate more force to pitch the aircraft, reducing effectiveness and increasing control forces. With an aft CG, less elevator force is needed."},{"q":"What is the function of the rudder in normal flight?","a":"To control yaw about the normal axis, coordinate turns by counteracting adverse yaw, maintain directional control during crosswind operations, and assist in spin recovery."},{"q":"What happens if the CG moves forward of the forward limit?","a":"The aircraft becomes excessively stable with very heavy control forces. The elevator may lack sufficient authority to flare for landing or to rotate for take-off."},{"q":"What happens if the CG moves aft of the aft limit?","a":"The aircraft becomes unstable in pitch, with light or oversensitive controls. It may become uncontrollable, particularly in a stall or spin, and recovery may be impossible."},{"q":"How does power application affect longitudinal stability?","a":"Increasing power tends to create a nose-up pitching moment due to the thrust line being below the CG and the propeller slipstream increasing lift on the wing and downwash on the tail."},{"q":"What is a stabilator?","a":"An all-moving horizontal tail surface that replaces the conventional horizontal stabiliser and elevator combination. It provides pitch control by changing the angle of the entire surface."},{"q":"Why does a stabilator typically include an anti-balance tab?","a":"To increase stick forces and prevent the pilot from over-controlling, since the all-moving surface is very powerful and could easily overstress the aircraft without the tab adding resistance."},{"q":"How does propeller gyroscopic effect affect control?","a":"When the aircraft pitches or yaws, the spinning propeller acts as a gyroscope and precesses the force 90 degrees in the direction of rotation, causing unexpected yaw or pitch moments."},{"q":"What is P-factor and when is it most significant?","a":"Asymmetric propeller thrust caused by the descending blade having a higher angle of attack than the ascending blade at high pitch attitudes. It causes yaw toward the engine and is most significant at low speed and high power."},{"q":"How does the slipstream effect influence directional control?","a":"The rotating propeller slipstream spirals around the fuselage and strikes the vertical fin from one side, creating a yawing moment that the pilot must counteract with rudder."},{"q":"What is the stick-free stability versus stick-fixed stability?","a":"Stick-fixed stability assumes the control surface is held in position. Stick-free stability accounts for the control surface floating freely, which generally reduces stability because the surface tends to trail with the airflow."}],"7 Stalls Spins and Flight Limits":[{"q":"At what angle of attack does a typical training aircraft stall?","a":"Approximately 16 degrees, which is the critical angle of attack where CL MAX is exceeded."},{"q":"Does a stall depend on airspeed or angle of attack?","a":"A stall occurs at a specific critical angle of attack, not a specific airspeed. However, the airspeed at which this angle is reached varies with weight, load factor, and configuration."},{"q":"What are the warning signs of an approaching stall?","a":"Abnormally high nose attitude with decreasing airspeed, sloppy and ineffective flight controls, stall warning horn sounding, and eventually physical airframe buffeting."},{"q":"What is the standard stall recovery procedure?","a":"1) Move the control column centrally forward to reduce angle of attack. 2) Apply smooth full power. 3) Once unstalled and airspeed builds, smoothly recover to level flight."},{"q":"How does increased weight affect stall speed?","a":"Increased weight increases stall speed. The heavier aircraft must fly at a higher AoA for a given speed, reaching the critical AoA at a higher airspeed."},{"q":"How does deploying flaps affect the critical angle of attack and stall speed?","a":"Flaps decrease both the critical angle of attack and the stall speed. They change the wing shape, increasing CL MAX."},{"q":"How does ice contamination on the wing affect stalling?","a":"Ice decreases the critical angle of attack and increases stall speed. It disrupts smooth airflow over the wing, causing earlier flow separation."},{"q":"What is the formula for stall speed in a turn?","a":"Turn stall speed = Straight stall speed x square root of load factor."},{"q":"What is an accelerated stall?","a":"A stall that occurs at a speed higher than the normal 1g stall speed, caused by a load factor greater than 1 (e.g., during a steep turn or abrupt pull-up). The aircraft can stall at any attitude."},{"q":"If a wing drops during a stall, should the pilot use ailerons to level the wings?","a":"No. Using ailerons increases the AoA on the dropping wing, deepening the stall. The correct action is to apply opposite rudder to arrest the yaw while pitching forward to unstall."},{"q":"What is a spin?","a":"A spin is an aggravated, uncoordinated stall resulting in autorotation: one wing is more deeply stalled than the other, creating a self-sustaining yaw/roll descent."},{"q":"What is the golden rule for spin avoidance?","a":"An aircraft cannot spin if it is not stalled. Maintain safe airspeeds and coordinated flight (ball centered) to prevent spins."},{"q":"What is the standard spin recovery procedure?","a":"Throttle idle, ailerons neutral, apply full opposite rudder (against the direction shown by the turn needle), then move the control column progressively forward to reduce AoA. Once rotation stops, centralize rudder and ease out of the dive."},{"q":"How can you identify spin direction using instruments?","a":"The turn needle on the turn and slip indicator is the most reliable instrument; it will be fully deflected in the direction of the spin. Airspeed is low and fluctuating, unlike a spiral dive."},{"q":"What is the V-n diagram (manoeuvre envelope)?","a":"A graph plotting load factor (g) against airspeed (V) that shows the aircraft's aerodynamic and structural limits, including the stall boundary, maximum positive/negative load factors, and critical V-speeds."},{"q":"What are the positive and negative load factor limits for a Normal category aircraft?","a":"+3.8g positive and -1.52g negative."},{"q":"What is VA (manoeuvring speed)?","a":"The maximum speed at which full control deflection can be applied without exceeding the structural load limits. At or below VA, the aircraft will stall before the structure breaks."},{"q":"Why must an aircraft be slowed to VA or below in turbulence?","a":"At VA, a sudden gust will cause the wing to stall before generating enough force to exceed the structural limit. Above VA, gusts can produce loads that exceed the structural limit and damage the airframe."},{"q":"What is the structural safety factor built into certified aircraft?","a":"1.5 times the limit load. The ultimate load is 1.5 times the published limit load, beyond which structural failure may occur."},{"q":"What is VNE?","a":"VNE (Never Exceed speed) is the absolute maximum speed, marked by the red line on the airspeed indicator. Exceeding it risks flutter, structural failure, or loss of control."},{"q":"What is the critical angle of attack?","a":"The angle of attack at which the airflow separates from the upper wing surface to such an extent that CL MAX is reached. Beyond this angle, lift decreases sharply and the wing stalls."},{"q":"Can an aircraft stall at any airspeed?","a":"Yes. The critical angle of attack can be exceeded at any airspeed if a sufficient load factor is applied, such as in a steep pull-up or aggressive manoeuvre."},{"q":"Can an aircraft stall in any attitude?","a":"Yes. Stall depends on angle of attack, not pitch attitude. An aircraft can stall while in a nose-down attitude if the angle of attack exceeds the critical value."},{"q":"What is the difference between a power-on stall and a power-off stall?","a":"A power-on stall simulates a departure/climb stall with engine power set, typically at a lower IAS due to the vertical thrust component. A power-off stall simulates an approach/landing stall with idle power."},{"q":"Why does a power-on stall occur at a lower indicated airspeed than a power-off stall?","a":"Because the vertical component of thrust supports some of the aircraft's weight, reducing the lift required from the wings and therefore the speed at which the critical AoA is reached."},{"q":"What causes a wing drop during a stall?","a":"Asymmetric airflow separation, where one wing stalls slightly before the other due to rigging differences, yaw, or turbulence, producing unequal lift and a rolling moment."},{"q":"How do washout and wing twist help stall characteristics?","a":"Washout reduces the angle of incidence toward the wingtip, ensuring the root stalls first. This preserves aileron effectiveness and gives gentler stall characteristics."},{"q":"What is the purpose of a stall strip on the wing?","a":"A small triangular strip on the leading edge near the wing root that triggers flow separation at the root before the tip, ensuring the stall progresses from root to tip for safer handling."},{"q":"How does CG position affect stall speed?","a":"A forward CG increases stall speed because the tail must produce more downforce, effectively increasing the total weight that the wing must support."},{"q":"What is the difference between VS0 and VS1?","a":"VS0 is the stall speed in landing configuration (full flaps, gear down). VS1 is the stall speed in a specified configuration, typically clean (flaps up, gear up). VS0 is always lower than VS1."},{"q":"What colour markings on the ASI relate to stall speeds?","a":"The bottom of the green arc is VS1 (clean stall speed) and the bottom of the white arc is VS0 (landing configuration stall speed)."},{"q":"What is the load factor limit for Utility category aircraft?","a":"+4.4g positive and -1.76g negative."},{"q":"What is the load factor limit for Aerobatic category aircraft?","a":"+6.0g positive and -3.0g negative."},{"q":"How does VA change with weight?","a":"VA decreases as weight decreases. A lighter aircraft reaches its structural load limit at a lower speed because less lift (and therefore less speed) is needed to generate the limiting g-force."},{"q":"What is VNO?","a":"Maximum structural cruising speed, the top of the green arc on the ASI. Flight above VNO should only occur in smooth air, and the aircraft must not exceed VNE."},{"q":"What is the yellow arc on the ASI?","a":"The caution range between VNO and VNE. Flight in this range is permitted only in smooth air because turbulence could cause structural loads exceeding limits."},{"q":"What is the recovery procedure from a spiral dive?","a":"Reduce power, level the wings with aileron, then gently pull out of the dive. Do NOT pull back first, as this tightens the spiral and increases the load factor."},{"q":"How do you distinguish a spin from a spiral dive on instruments?","a":"In a spin: airspeed is low and steady, turn needle fully deflected. In a spiral dive: airspeed is high and increasing, turn needle deflected but not fully."},{"q":"What is the incipient spin phase?","a":"The initial phase of a spin (first 1-2 turns) where the spin is developing and rotation rate is increasing. Recovery is easiest during this phase."},{"q":"What is a fully developed spin?","a":"The phase where the spin rotation rate, airspeed, and rate of descent have stabilised. The aircraft follows a helical descending path with a steep nose-down attitude."},{"q":"Why must the throttle be closed during spin recovery?","a":"Power can flatten the spin attitude, increase the rate of rotation, and make recovery more difficult. The propeller slipstream and gyroscopic effects can oppose the recovery inputs."},{"q":"What altitude is typically lost during a spin recovery?","a":"A general rule is approximately 500 feet per turn in the spin, though this varies by aircraft type. Recovery from a fully developed spin may require 1,000 feet or more."},{"q":"What is a flat spin and why is it dangerous?","a":"A spin with a nearly level pitch attitude and very high rotation rate. Flat spins are extremely difficult to recover from because the elevator is blanketed by the fuselage and the centrifugal forces resist nose-down pitch."},{"q":"How does aft CG affect spin recovery?","a":"Aft CG makes spin recovery more difficult or impossible because it reduces the elevator's nose-down pitching authority and may cause the spin to flatten."},{"q":"What is the recommended minimum altitude for practising stalls?","a":"Stall practice should be completed with recovery no lower than 3,000 feet AGL (or as specified by the authority/instructor) to allow adequate recovery margin."},{"q":"What is the effect of rain or frost on the wing surface regarding stalls?","a":"Surface contamination disrupts the boundary layer, reduces CL MAX, and causes the wing to stall at a lower angle of attack and higher airspeed."},{"q":"What is a cross-controlled stall?","a":"A stall occurring when the aircraft is in uncoordinated flight, such as in a skidding turn with opposite aileron. It often leads to a rapid wing drop and can develop into a spin."},{"q":"Why is the base-to-final turn a critical phase for stall/spin accidents?","a":"Pilots may steepen the bank and apply excess rudder to avoid overshooting the runway centreline, creating a cross-controlled, low-speed situation prone to a stall/spin at low altitude."},{"q":"What is the margin above stall speed that should be maintained in the circuit?","a":"At least 1.3 times the stall speed in the current configuration, providing adequate buffer against gusts and manoeuvring loads."},{"q":"What effect does turbulence have on stall speed?","a":"Turbulence can cause sudden increases in angle of attack, effectively reducing the margin above stall speed and potentially triggering a stall at a higher indicated airspeed than calm-air VS."}],"8 Take-Off Performance":[{"q":"What is the standard screen height for take-off distance for light single-engine aircraft?","a":"50 feet."},{"q":"What is the formula for Take-Off Distance Required (TODR)?","a":"TODR = Ground Roll + Initial Climb (airborne distance from lift-off to 50 ft screen height)."},{"q":"What is the minimum take-off safety speed relative to stall speed?","a":"Take-off safety speed must be at least 1.2 times the stalling speed (VS)."},{"q":"What is TORA?","a":"Take-Off Run Available: the physical length of runway declared available and suitable for the ground run, measured from threshold to threshold."},{"q":"What is TODA?","a":"Take-Off Distance Available = TORA + Clearway. The clearway is an obstacle-free zone beyond the runway that does not need to support the aircraft's weight."},{"q":"What is ASDA?","a":"Accelerate-Stop Distance Available = TORA + Stopway. The stopway is a designated extension capable of supporting the aircraft's weight for an aborted take-off."},{"q":"What is the golden rule of take-off planning?","a":"The calculated TODR must NEVER exceed the TODA. If TODR exceeds TODA, the departure is not legal or safe."},{"q":"How does a 10% increase in aircraft mass affect TODR?","a":"A 10% increase in mass results in approximately a 20% increase in TODR."},{"q":"How does high density altitude (hot and high) affect take-off performance?","a":"It reduces engine power, propeller thrust, and aerodynamic lift (requiring higher TAS for lift-off), resulting in a massive increase in TODR."},{"q":"How does a headwind affect take-off distance?","a":"A headwind reduces TODR by providing free airspeed before the aircraft moves, reducing the required groundspeed for lift-off."},{"q":"How does a tailwind affect take-off distance?","a":"A tailwind drastically increases TODR because the aircraft must accelerate to a much higher groundspeed to achieve the required airspeed for lift-off."},{"q":"What is the rule of thumb for runway slope effect on take-off?","a":"1% upslope increases TODR by approximately 5%. Downslope benefit should not be factored into calculations; treat it as an uncalculated safety margin."},{"q":"What are the TODR penalties for non-paved surfaces?","a":"Dry grass adds approximately 20% to TODR. Wet grass/soft ground adds 30-40%. Snow/slush can make take-off impossible."},{"q":"What safety factor should be applied to the calculated TODR for general aviation?","a":"Multiply the final calculated TODR by 1.33 to obtain the safe take-off distance."},{"q":"What is the difference between gross and net performance?","a":"Gross performance is the POH data assuming a new aircraft and professional test pilot. Net performance accounts for wear and tear, average pilot skills, and real-world weather, and is always worse than gross."},{"q":"Using the clock rule, what is the effective headwind component if the wind is 60 degrees off the nose?","a":"Exactly 50% of the total wind speed."},{"q":"How do take-off flaps affect ground roll versus climb angle?","a":"Take-off flaps shorten the ground roll by increasing CL MAX and lowering lift-off speed, but they degrade the initial climb angle due to increased drag."},{"q":"A pilot calculates a TODR of 400m on a paved surface. The runway is wet grass with a 2% upslope. What is the factored TODR?","a":"Apply wet grass (+35%): 400 x 1.35 = 540m. Apply 2% upslope (+10%): 540 x 1.10 = 594m. Apply safety factor: 594 x 1.33 = 790m (approximately)."},{"q":"What is the effect of a contaminated runway (standing water or slush) on take-off?","a":"Standing water or slush creates significant drag on the wheels, greatly increasing the ground roll and potentially preventing the aircraft from accelerating to lift-off speed."},{"q":"What are the three segments of take-off distance?","a":"Ground roll (acceleration from standstill to lift-off speed), rotation (transition from ground to airborne), and initial climb (from lift-off to clearing the 50 ft screen height)."},{"q":"How does propeller RPM affect take-off performance?","a":"Higher RPM produces more thrust. Using maximum RPM (full throttle) provides the shortest ground roll. Reduced RPM increases take-off distance."},{"q":"Why should the pilot hold the brakes before releasing for take-off on short fields?","a":"Holding brakes allows the engine to develop full power before the aircraft begins to move, ensuring maximum thrust is available from the start of the ground roll."},{"q":"What is the effect of using carburettor heat during take-off?","a":"Carburettor heat reduces engine power (typically 10-15%) because heated air is less dense, significantly increasing the take-off distance. It should normally be OFF for take-off."},{"q":"How does a soft or rough surface affect take-off performance beyond just increased rolling friction?","a":"Soft surfaces increase wheel drag, can cause the nosewheel to dig in, and prevent smooth acceleration. The aircraft may not be able to reach rotation speed on a very soft surface."},{"q":"What is the crosswind component limit for take-off?","a":"It is specified in the POH for each aircraft type, typically 15-17 knots for light training aircraft. Exceeding it risks loss of directional control during the ground roll."},{"q":"What is the effect of runway contamination (snow, ice) on directional control during take-off?","a":"Reduced friction makes it difficult to maintain directional control with wheel braking or nosewheel steering. Rudder authority is limited at low groundspeeds."},{"q":"How does flap setting affect the climb gradient after take-off?","a":"More flap reduces the climb gradient because of increased drag. The best climb gradient is usually achieved with take-off flap (first notch) or clean configuration."},{"q":"What is the relationship between take-off distance and groundspeed at lift-off?","a":"Take-off distance is proportional to the square of the groundspeed at lift-off. Doubling the groundspeed quadruples the ground roll required."},{"q":"How does the pilot determine the take-off distance from the POH?","a":"By entering the performance chart with pressure altitude, temperature, weight, wind component, and surface condition to read off the ground roll and total distance over 50 ft."},{"q":"What is the effect of using an incorrect altimeter setting on take-off performance calculations?","a":"An incorrect altimeter setting leads to wrong pressure altitude, which affects density altitude calculations. If actual density altitude is higher than assumed, performance will be worse than expected."},{"q":"Why is it important to lean the mixture for take-off at high-altitude airports?","a":"At high elevation, the air is less dense. Leaning the mixture optimises the fuel-air ratio for the available air, restoring some engine power that would otherwise be lost from a rich mixture."},{"q":"What is a clearway?","a":"An area beyond the end of TORA that is free of obstacles and over which an aircraft can make a portion of its initial climb. It contributes to TODA but not to TORA or ASDA."},{"q":"What is a stopway?","a":"A defined area beyond the end of TORA prepared as a surface capable of supporting the aircraft during an aborted take-off. It contributes to ASDA."},{"q":"What is the significance of the abort point during take-off?","a":"The point during the take-off roll beyond which the aircraft cannot stop within the remaining runway. Before this point, the take-off can be safely abandoned."},{"q":"How does a displaced threshold affect take-off?","a":"A displaced threshold reduces the available runway for landing but does NOT reduce TORA. Aircraft taking off may use the full physical runway length from the beginning."},{"q":"What is the effect of engine failure immediately after lift-off?","a":"The aircraft must pitch down to maintain flying speed, and the pilot should land straight ahead (or with minor heading changes) as altitude is insufficient for a return to the runway."},{"q":"What is the recommended action if take-off performance is marginal?","a":"Reduce weight, wait for more favourable conditions (cooler temperature, headwind), use a longer runway, or delay departure. Never attempt a take-off if performance is in doubt."},{"q":"What information must be available before every take-off?","a":"TODR versus TODA, wind component, density altitude, surface condition, aircraft weight, flap setting, and abort point. The pilot must confirm adequate performance margins exist."},{"q":"How does humidity affect take-off performance?","a":"High humidity reduces air density and engine power output (especially in carburetted engines), increasing take-off distance. The effect is modest compared to temperature and altitude."},{"q":"What is the effect of an uphill runway gradient on lift-off speed?","a":"The uphill gradient does not change the required lift-off IAS, but it increases the ground roll distance because a component of gravity opposes the acceleration."},{"q":"Why is rotation speed (VR) important?","a":"VR is the speed at which the pilot raises the nose for lift-off. Rotating too early increases drag (high AoA on the ground) and extends the take-off distance. Rotating too late wastes runway."},{"q":"How does wind shear on take-off affect performance?","a":"A decreasing headwind or increasing tailwind after lift-off causes a sudden loss of airspeed, potentially dropping the aircraft below climb speed or stall speed, which is extremely dangerous at low altitude."},{"q":"What is the effect of a long taxi in hot weather on take-off performance?","a":"Prolonged taxiing in heat can raise engine temperatures, potentially reducing available power, and may also heat the tyres and brakes, reducing their effectiveness."},{"q":"Why should the pilot not rush the after-start and pre-take-off checks?","a":"Incomplete checks could result in attempting take-off with incorrect trim, unlocked controls, wrong flap setting, or instruments not set, all of which can degrade performance or cause an accident."},{"q":"How does altitude affect propeller efficiency during take-off?","a":"At higher altitudes the air is less dense, reducing the mass of air the propeller can accelerate. This decreases thrust and increases the take-off distance."},{"q":"What is the typical effect of a 10-knot headwind on take-off ground roll?","a":"A 10-knot headwind can reduce ground roll by approximately 15-20%, depending on the aircraft's lift-off speed."},{"q":"What is the pilot's decision point if the aircraft is not airborne by a predetermined runway marker?","a":"The pilot should abort the take-off, apply maximum braking, and stop the aircraft. This requires pre-planning the abort point before starting the take-off roll."},{"q":"How does tyre pressure affect take-off performance?","a":"Under-inflated tyres increase rolling friction and drag, increasing the ground roll distance. Over-inflated tyres may reduce ground contact but can affect directional control."},{"q":"What effect does a wet runway have on the take-off ground roll?","a":"A wet paved runway has minimal effect on ground roll (slightly reduced friction), but it significantly increases the stopping distance if an abort is required."},{"q":"How does the pilot account for terrain and obstacles after take-off?","a":"By ensuring the calculated climb gradient exceeds the obstacle clearance requirements, considering the aircraft's weight, density altitude, and any performance-reducing factors."}],"9 Climb and Cruise Performance":[{"q":"What is the difference between best angle of climb speed (VX) and best rate of climb speed (VY)?","a":"VX gives the steepest climb angle (most height per ground distance) for obstacle clearance. VY gives the highest rate of climb (most height per unit time) for reaching cruise altitude quickly."},{"q":"What aerodynamic condition defines VX?","a":"VX occurs at the speed of maximum excess thrust (greatest difference between thrust available and thrust required/drag)."},{"q":"What aerodynamic condition defines VY?","a":"VY occurs at the speed of maximum excess power (greatest difference between power available and power required)."},{"q":"Is VX faster or slower than VY?","a":"VX is always slower than VY."},{"q":"In a steady climb, is lift greater than, equal to, or less than weight?","a":"Lift is less than weight. A rearward component of weight acts along the flight path (apparent drag), and thrust must overcome both aerodynamic drag and this weight component."},{"q":"How does increased weight affect the angle of climb?","a":"Increased weight increases induced drag and thrust required, reducing maximum excess thrust and resulting in a shallower climb angle. VX speed also increases."},{"q":"How does wind affect rate of climb (FPM)?","a":"Wind does NOT affect the aerodynamic rate of climb (FPM). It only affects the climb angle relative to the ground: headwind steepens the ground path, tailwind flattens it."},{"q":"What is the service ceiling?","a":"The altitude at which the maximum achievable rate of climb drops to exactly 100 feet per minute."},{"q":"What is the absolute ceiling?","a":"The altitude where power available equals power required (the curves touch). Excess power is zero, rate of climb is 0 FPM, and level flight is possible at only one speed."},{"q":"What is a cruise climb and why is it used?","a":"A cruise climb is flown at a speed faster than VY with a lower pitch attitude. It sacrifices maximum FPM for better forward visibility, improved engine cooling, and more ground distance covered en-route."},{"q":"What speed gives maximum endurance and what is its aerodynamic basis?","a":"VMP (minimum power speed) gives maximum endurance. It corresponds to the lowest point on the power required curve, meaning the least fuel burn per unit time."},{"q":"What speed gives maximum range and what is its aerodynamic basis?","a":"VMD (minimum drag speed) gives maximum range. It is the speed with the best lift-to-drag ratio, meaning the most distance per unit of fuel."},{"q":"Is VMD faster or slower than VMP?","a":"VMD is always faster than VMP."},{"q":"Does wind affect endurance?","a":"No. Wind has no effect on endurance because endurance depends on time airborne and fuel flow rate, not ground distance covered."},{"q":"How does a headwind affect maximum range, and what should the pilot do?","a":"A headwind reduces maximum range because groundspeed decreases. The pilot should fly slightly faster than VMD to minimize time spent fighting the wind."},{"q":"What happens to VY (IAS) as altitude increases?","a":"VY indicated airspeed decreases with altitude (though VY TAS increases). The power gap shrinks and the point of maximum excess power shifts."},{"q":"In a power-off glide, what speed gives maximum glide distance?","a":"VMD (best L/D speed). Weight has no effect on the maximum glide angle, but a heavier aircraft glides at a faster speed along the same glide path."},{"q":"Does weight affect the maximum glide angle?","a":"No. A heavier aircraft glides at the same angle as a lighter one, but at a higher speed. The glide ratio (L/D) is independent of

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PPL Exam PREP</title>
<style>
:root{--bg:#fff;--fg:#111;--border:#ddd;--accent:#0066cc;--card:#f8f8f8;--muted:#666;--green:#2d7d2d;--red:#cc0000}
@media(prefers-color-scheme:dark){:root{--bg:#111;--fg:#eee;--border:#333;--accent:#4da3ff;--card:#1a1a1a;--muted:#999;--green:#5cb85c;--red:#ff4444}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--fg);font-size:16px;line-height:1.5;-webkit-text-size-adjust:100%;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0}
.app{max-width:100vw;min-height:100vh;padding:12px 16px 80px}
h1{font-size:22px;font-weight:700;padding:16px 0 8px;border-bottom:2px solid var(--fg)}
h2{font-size:18px;font-weight:600;padding:12px 0 6px}
.subtitle{font-size:12px;color:var(--muted);padding:4px 0 12px}
.back{display:inline-block;padding:8px 0;color:var(--accent);font-size:15px;text-decoration:none;cursor:pointer}
.back::before{content:"\2190 "}
.list{list-style:none}
.list li{border-bottom:1px solid var(--border)}
.list li a,.list li .item{display:block;padding:14px 8px;color:var(--fg);text-decoration:none;font-size:15px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.list li a:active,.list li .item:active{background:var(--card)}
.list li .count{float:right;color:var(--muted);font-size:13px}
.list li .badge{float:right;background:var(--accent);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px}
.qa-card{background:var(--card);border-radius:8px;padding:12px;margin:8px 0}
.qa-card .q{font-weight:600;font-size:15px;color:var(--fg)}
.qa-card .a{font-size:14px;color:var(--muted);margin-top:6px;display:none}
.qa-card .a.show{display:block}
.qa-card .toggle{font-size:13px;color:var(--accent);cursor:pointer;margin-top:4px;display:inline-block}
.qa-num{color:var(--accent);font-weight:700;margin-right:4px}
.add-section{margin-top:20px;padding-top:16px;border-top:2px solid var(--border)}
.add-section textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--fg);resize:vertical;min-height:44px}
.add-section textarea+textarea{margin-top:8px}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;-webkit-tap-highlight-color:transparent}
.btn-primary{background:var(--accent);color:#fff}
.btn-refresh{background:var(--card);color:var(--accent);border:1px solid var(--accent)}
.btn:active{opacity:0.7}
.stats{display:flex;gap:8px;padding:12px 0;flex-wrap:wrap}
.stat{background:var(--card);border-radius:6px;padding:8px 12px;font-size:13px;flex:1;min-width:80px;text-align:center}
.stat .num{font-size:20px;font-weight:700;color:var(--accent)}
.score{text-align:center;padding:8px 0;font-size:13px;color:var(--muted)}
.hidden{display:none}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:100;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
// PPL EXAM PREP DATA
var DATA = {"01 AIL": {"1 Air Law Essentials": [{"q": "What organisation sets international aviation standards?", "a": "ICAO (International Civil Aviation Organization), a UN specialised agency established by the Chicago Convention 1944."}, {"q": "What is the Chicago Convention?", "a": "The 1944 treaty that established ICAO, defined sovereign rights of airspace, and created the framework for international civil aviation standards (Annexes)."}, {"q": "What is the difference between a Standard and a Recommended Practice (SARP)?", "a": "Standards are mandatory specifications that member states MUST comply with. Recommended Practices are desirable but not mandatory."}, {"q": "What is EASA?", "a": "European Union Aviation Safety Agency, responsible for aviation safety regulation across EU member states."}, {"q": "What is CAAT?", "a": "Civil Aviation Authority of Thailand, the regulatory body responsible for aviation safety and oversight in Thailand."}, {"q": "What medical certificate class is required for a PPL holder?", "a": "A Class 2 medical certificate (Class 1 is required for CPL/ATPL)."}, {"q": "What is the validity period of a Class 2 medical for a PPL holder under 40?", "a": "60 months (5 years). For holders 40 and over, 24 months."}, {"q": "What documents must be carried on board during flight?", "a": "Certificate of Registration, Certificate of Airworthiness, pilot licence and medical, insurance, technical log, and radio licence."}, {"q": "What is a NOTAM?", "a": "Notice to Airmen  -  containing information about hazards, changes to procedures, or facilities essential to flight safety."}, {"q": "What does AIP stand for?", "a": "Aeronautical Information Publication  -  the official document containing all permanent aeronautical information for a country."}, {"q": "What authority does a pilot-in-command (PIC) have?", "a": "The PIC has final authority and responsibility for the operation and safety of the aircraft during flight."}, {"q": "What is the minimum age to hold a PPL?", "a": "17 years old (under both EASA and CAAT regulations)."}, {"q": "What is the minimum flight training required for a PPL?", "a": "A minimum of 45 hours (EASA) including at least 25 hours dual instruction and 10 hours supervised solo."}, {"q": "How many Annexes does the Chicago Convention have?", "a": "19 Annexes covering topics from personnel licensing (Annex 1) to safety management (Annex 19)."}, {"q": "What document must a pilot hold to act as pilot-in-command?", "a": "A valid pilot licence with appropriate ratings, and a valid Class 2 medical certificate."}], "2 Rules of the Air": [{"q": "What is the right-of-way priority order for aircraft?", "a": "Balloons > gliders > airships > powered aircraft towing > powered aircraft. An aircraft in distress has absolute priority."}, {"q": "When two aircraft converge at the same altitude, who gives way?", "a": "The aircraft that has the other on its RIGHT gives way."}, {"q": "How should two aircraft approaching head-on alter course?", "a": "Both aircraft must alter heading to the RIGHT."}, {"q": "What is the overtaking rule?", "a": "An overtaking aircraft must pass to the RIGHT of the aircraft being overtaken."}, {"q": "What is the minimum safe altitude over a congested area?", "a": "1,000 ft above the highest obstacle within 600 m of the aircraft."}, {"q": "What is the minimum safe altitude over non-congested areas?", "a": "500 ft above ground or water, except for takeoff and landing."}, {"q": "What are VFR weather minima below FL100 outside controlled airspace?", "a": "5 km flight visibility, clear of cloud, surface in sight (at/below 3,000 ft AMSL)."}, {"q": "What are VMC minima at or above FL100?", "a": "8 km visibility, 1,500 m horizontal from cloud, 1,000 ft vertical from cloud."}, {"q": "What are the semicircular cruising levels for VFR?", "a": "Track 000-179: odd thousands +500 ft. Track 180-359: even thousands +500 ft."}, {"q": "What colour are aircraft navigation lights?", "a": "Red on left (port), green on right (starboard), white on tail."}, {"q": "When must navigation lights be displayed?", "a": "From sunset to sunrise, or at any time when visibility is reduced."}, {"q": "If you see red on the left and green on the right of another aircraft at night, what does it mean?", "a": "The aircraft is heading toward you (head-on). Both must alter to the RIGHT."}, {"q": "What is a Special VFR (SVFR) clearance?", "a": "A clearance to fly in a CTR below VMC but with at least 1,500 m visibility, clear of cloud, surface in sight."}, {"q": "What speed restriction applies below FL100?", "a": "Maximum IAS of 250 knots."}, {"q": "What does SERA stand for?", "a": "Standardised European Rules of the Air."}], "3 Airspace and ATS": [{"q": "What are the ICAO airspace classifications?", "a": "Class A through G. A-E are controlled; F and G are uncontrolled."}, {"q": "Is VFR flight permitted in Class A airspace?", "a": "No. Class A is IFR only."}, {"q": "What service is provided in Class G airspace?", "a": "Flight Information Service (FIS) only. No ATC clearance required."}, {"q": "What is a CTR (Control Zone)?", "a": "Controlled airspace extending from the surface upward, protecting the vicinity of an aerodrome."}, {"q": "What is a TMA?", "a": "Terminal Manoeuvring Area  -  controlled airspace above a CTR at the confluence of ATS routes."}, {"q": "What is an ATZ?", "a": "Aerodrome Traffic Zone  -  typically 2 NM radius from the runway centre, surface to 2,000 ft AAL."}, {"q": "What is a Danger Area?", "a": "Airspace where dangerous activities may occur. Entry not prohibited but not recommended."}, {"q": "What is a Restricted Area?", "a": "Airspace where flight requires special permission from the controlling authority."}, {"q": "What is a Prohibited Area?", "a": "Airspace in which flight is absolutely forbidden."}, {"q": "What transponder code indicates an emergency?", "a": "Squawk 7700."}, {"q": "What transponder code indicates radio failure?", "a": "Squawk 7600."}, {"q": "What transponder code indicates hijack?", "a": "Squawk 7500."}, {"q": "What is the difference between FIS and AFIS?", "a": "FIS provides traffic/weather info. AFIS is aerodrome-specific information at aerodromes without ATC."}, {"q": "What is a MATZ?", "a": "Military Aerodrome Traffic Zone extending to 3,000 ft with a stub along the approach."}, {"q": "What is a squawk code?", "a": "A four-digit transponder code to identify the aircraft on ATC radar."}], "4 Aeronautical Information Services": [{"q": "What are the three parts of the AIP?", "a": "GEN (General), ENR (En Route), and AD (Aerodromes)."}, {"q": "What is an AIP Supplement?", "a": "Temporary changes to AIP information, with defined start and end dates."}, {"q": "What is the AIRAC system?", "a": "Aeronautical Information Regulation and Control  -  publishing changes on fixed 28-day cycles."}, {"q": "What is a NOTAM?", "a": "A notice distributed by telecommunications containing time-critical aeronautical information."}, {"q": "What is a Trigger NOTAM?", "a": "A NOTAM alerting pilots to significant changes via AIP Amendment or Supplement."}, {"q": "What does PIB stand for?", "a": "Pre-flight Information Bulletin  -  a summary of current NOTAMs for a route or area."}, {"q": "What is a SNOWTAM?", "a": "A special NOTAM about snow, slush, ice, or standing water on runways."}, {"q": "How often are AIP Amendments published?", "a": "Every 28 days (13 cycles per year) under AIRAC."}, {"q": "What is an AIC?", "a": "Aeronautical Information Circular  -  administrative or advisory information not qualifying for NOTAM."}, {"q": "What information is in the AIP AD section?", "a": "Aerodrome-specific data including charts, frequencies, runway details, and local procedures."}, {"q": "What information is in the AIP ENR section?", "a": "En-route information including airways, restricted areas, radio navigation aids, and procedures."}, {"q": "Where should a pilot obtain met and NOTAM information before flight?", "a": "From the AIS briefing service, online briefing systems, or the aerodrome briefing office."}, {"q": "What is an AIP Amendment?", "a": "A permanent change to the AIP, published under the AIRAC cycle."}, {"q": "What is a BIRDTAM?", "a": "A notice warning of bird activity that may be hazardous to aircraft operations."}, {"q": "What is the purpose of the AIP?", "a": "To provide the permanent reference document containing all essential aeronautical information for a country."}], "5 Aviation Compliance and Flight Planning": [{"q": "What is a Certificate of Airworthiness?", "a": "A document certifying the aircraft meets airworthiness requirements and is safe to fly."}, {"q": "What is the minimum fuel requirement for VFR flight?", "a": "Sufficient fuel to reach destination plus at least 45 minutes reserve at normal cruise consumption."}, {"q": "What happens if the CG is too far forward?", "a": "Aircraft is nose-heavy, needs more elevator force, increased stall speed, potentially insufficient elevator authority."}, {"q": "What happens if the CG is too far aft?", "a": "Dangerously unstable in pitch with reduced stall recovery capability and potential loss of control."}, {"q": "What is MTOW?", "a": "Maximum Take-Off Weight  -  the maximum permitted weight for takeoff per the flight manual."}, {"q": "What is a mass and balance calculation?", "a": "A calculation ensuring aircraft weight does not exceed limits and CG is within the permitted envelope."}, {"q": "When is a flight plan mandatory?", "a": "For flights crossing international boundaries, in certain controlled airspace, and IFR flights."}, {"q": "What is a SARTIME?", "a": "Search and Rescue Time  -  the time after which SAR services will be alerted if the flight plan is not closed."}, {"q": "What is the pilot's responsibility after landing regarding a flight plan?", "a": "Close the flight plan to prevent unnecessary SAR activation."}, {"q": "What does the POH/AFM specify?", "a": "The operating limitations, performance data, and procedures for the aircraft."}, {"q": "What is the purpose of the Aircraft Technical Log?", "a": "Records aircraft hours, defects, maintenance actions, and confirms serviceability."}, {"q": "What is the passenger briefing requirement?", "a": "Brief passengers on seatbelts, emergency exits, no-smoking, and emergency procedures before departure."}, {"q": "What is the difference between MEL and CDL?", "a": "MEL lists equipment that may be inoperative for dispatch. CDL covers missing external items like fairings."}, {"q": "What is the pilot's responsibility for pre-flight planning?", "a": "The PIC must verify the aircraft is fit, fuel sufficient, weight/balance within limits, and weather suitable."}, {"q": "What flight plan info must be filed for cross-country VFR?", "a": "Aircraft ID, flight rules, departure/destination, route, level, times, fuel endurance, persons on board, emergency equipment."}], "6 Aerodrome Declared Distances": [{"q": "What is TORA?", "a": "Take-Off Run Available  -  length of runway for the ground run of a takeoff."}, {"q": "What is TODA?", "a": "Take-Off Distance Available  -  TORA plus any clearway."}, {"q": "What is ASDA?", "a": "Accelerate-Stop Distance Available  -  TORA plus any stopway."}, {"q": "What is LDA?", "a": "Landing Distance Available  -  runway length declared available for landing."}, {"q": "What is a clearway?", "a": "An obstacle-free area beyond the runway for initial climb. Does not support aircraft weight."}, {"q": "What is a stopway?", "a": "A defined area beyond the runway capable of supporting an aircraft during an aborted takeoff."}, {"q": "What is a displaced threshold?", "a": "A threshold not at the start of the runway. Area before it can be used for takeoff but NOT landing."}, {"q": "How does a displaced threshold affect LDA?", "a": "LDA is reduced because landing aircraft must touch down at or beyond the displaced threshold."}, {"q": "Can the area before a displaced threshold be used for takeoff?", "a": "Yes, it is available for takeoff run (TORA) and landing rollout, but not touchdown."}, {"q": "Where can declared distances be found?", "a": "In the AIP AD section for the specific aerodrome."}, {"q": "If a runway is 1,800m with a 200m displaced threshold, what is the LDA?", "a": "1,600m (1,800 minus 200)."}, {"q": "What is the difference between TORA and TODA?", "a": "TODA = TORA + Clearway. If no clearway exists, TODA = TORA."}, {"q": "What markings indicate a displaced threshold?", "a": "White arrows pointing toward the threshold, with a solid white bar marking its position."}, {"q": "What does a closed runway marking look like?", "a": "A large white X painted on the runway surface."}, {"q": "What is a starter extension?", "a": "Additional paved area at the beginning increasing TORA and ASDA."}], "7 Aerodrome Visuals and Safety": [{"q": "What does a steady green light from the tower signal to an aircraft in flight?", "a": "Cleared to land."}, {"q": "What does a steady red light from the tower signal to an aircraft in flight?", "a": "Give way to other aircraft and continue circling."}, {"q": "What does a flashing green light signal to an aircraft on the ground?", "a": "Cleared to taxi."}, {"q": "What does a flashing red light signal to an aircraft on the ground?", "a": "Taxi clear of the landing area/runway in use."}, {"q": "What does a red flare mean?", "a": "Do not land; the aerodrome is not available."}, {"q": "What is the standard circuit direction?", "a": "Left-hand circuits unless notified otherwise."}, {"q": "What is the standard circuit height?", "a": "Typically 1,000 ft above aerodrome elevation (AAL)."}, {"q": "What does a white T on the signals area indicate?", "a": "Land and take off on hard runways only."}, {"q": "What does a white dumbbell mean?", "a": "Movement confined to hard surfaces only."}, {"q": "What is the purpose of the windsock?", "a": "Shows surface wind direction and approximate strength. Fully extended = approximately 15+ knots."}, {"q": "What is PAPI?", "a": "Precision Approach Path Indicator  -  2 red + 2 white = on slope. More red = too low. More white = too high."}, {"q": "What does a red and yellow striped board indicate?", "a": "Caution  -  special care needed when taxiing or landing due to poor surface condition."}, {"q": "What does a white flashing light signal to aircraft on the ground?", "a": "Return to starting point."}, {"q": "What does the signal area contain?", "a": "Ground signals including landing T, circuit indicator, runway condition markers for pilots without radio."}, {"q": "What does a red and green flare together mean?", "a": "General warning  -  exercise extreme caution."}]}, "02 AGK": {"1 Airframe and Flight Controls": [{"q": "What is the standard configuration of a light aircraft piston engine?", "a": "Four-stroke, horizontally opposed, gasoline (petrol), spark-ignition engine."}, {"q": "What is the primary function of a piston engine?", "a": "Expanding a working fluid in a cylinder against a reciprocating piston to convert chemical energy into mechanical energy."}, {"q": "What are the three energy conversion stages in a piston engine?", "a": "1) Chemical (air-fuel mixture enters cylinder), 2) Heat (spark ignites compressed mixture), 3) Mechanical (expanding gases push piston down, rotating propeller)."}, {"q": "What are the two functions of piston rings?", "a": "1) Prevent high-pressure combustion gas escaping into the crankcase (blow-by). 2) Prevent lubricating oil entering the combustion chamber."}, {"q": "What does the crankshaft do?", "a": "Converts the linear (reciprocating) up-and-down movement of the pistons into smooth rotary motion to drive the propeller."}, {"q": "What is the camshaft and at what speed does it rotate?", "a": "The camshaft opens intake and exhaust valves using egg-shaped lobes. It rotates at exactly half the crankshaft speed."}, {"q": "What are the four strokes of the Otto Cycle in order?", "a": "Induction (Suck), Compression (Squeeze), Power (Bang), Exhaust (Blow)."}, {"q": "How many crankshaft revolutions make one complete Otto Cycle?", "a": "Two revolutions of the crankshaft produce 4 strokes and 1 power event."}, {"q": "What is TDC and BDC?", "a": "TDC (Top Dead Centre) is the uppermost limit of piston travel. BDC (Bottom Dead Centre) is the lowest limit. The stroke is the distance between them."}, {"q": "During the Induction stroke, what are the valve positions?", "a": "Inlet valve OPEN, exhaust valve CLOSED. The piston moves down from TDC to BDC, creating a vacuum that draws in the air-fuel charge."}, {"q": "During the Compression stroke, what are the valve positions?", "a": "Both inlet and exhaust valves are CLOSED. The piston moves up from BDC to TDC, compressing the mixture."}, {"q": "What happens during the Power stroke?", "a": "Spark plug fires just before TDC. Both valves remain CLOSED. The expanding gases force the piston down. This is the ONLY stroke that generates mechanical energy."}, {"q": "What is the compression ratio formula?", "a": "Compression Ratio = Total Volume / Clearance Volume. Typical for petrol aviation engines: 7:1 to 8.5:1."}, {"q": "How does altitude affect a normally aspirated engine?", "a": "Engine power decreases as altitude increases because air density decreases, reducing the mass of oxygen available for combustion."}, {"q": "What is the difference between pre-ignition and detonation?", "a": "Pre-ignition: mixture ignites BEFORE the spark plug fires (hot spot). Detonation: uncontrolled explosive secondary blast AFTER normal ignition. Both cause severe engine damage."}], "2 Aircraft Landing Gear": [{"q": "What are the two main landing gear configurations?", "a": "Tricycle (nosewheel) and tailwheel (conventional). Tricycle is standard on most modern training aircraft."}, {"q": "What is the advantage of tricycle gear over tailwheel?", "a": "Better forward visibility on the ground, more stable during ground operations, and less prone to ground looping."}, {"q": "What is a ground loop?", "a": "An uncontrollable yaw that causes the aircraft to spin on the ground, common with tailwheel aircraft if directional control is lost."}, {"q": "What is the purpose of shock absorbers in landing gear?", "a": "To absorb and dissipate the energy of landing impact, protecting the airframe and reducing bounce."}, {"q": "What types of shock absorbers are used in light aircraft?", "a": "Oleo-pneumatic (oil and air), rubber bungee cords, spring steel legs, and composite leaf springs."}, {"q": "How does an oleo strut work?", "a": "Oil is forced through a small orifice as the strut compresses, converting kinetic energy into heat. Compressed air/nitrogen acts as a spring to return the strut."}, {"q": "What is the purpose of the shimmy damper on a nosewheel?", "a": "Prevents rapid side-to-side oscillation of the nosewheel during taxi, which can cause structural damage."}, {"q": "What is the difference between differential and non-differential brakes?", "a": "Differential brakes allow each main wheel to be braked independently for directional control. Non-differential brakes apply equally to both wheels."}, {"q": "What type of brakes are commonly used on light aircraft?", "a": "Disc brakes (similar to automotive), operated hydraulically via toe pedals on the rudder pedals."}, {"q": "What is the purpose of the parking brake?", "a": "Locks the brakes in the applied position for parking. Usually a lever that traps hydraulic pressure in the brake lines."}, {"q": "What causes brake fade?", "a": "Excessive or prolonged braking generates heat that reduces brake pad friction effectiveness."}, {"q": "What is hydroplaning?", "a": "Loss of braking action when the tyre rides on a film of water instead of contacting the runway surface."}, {"q": "What are the three types of hydroplaning?", "a": "Dynamic (speed), viscous (thin film on smooth surface), and reverted rubber (locked wheel generates steam)."}, {"q": "What is the formula for dynamic hydroplaning speed?", "a": "Hydroplaning speed (knots) = 9 x square root of tyre pressure (PSI)."}, {"q": "Why is correct tyre pressure important?", "a": "Under-inflation causes excessive wear on outer edges and increases rolling resistance. Over-inflation causes centre wear and reduced grip."}], "3 Aviation Piston Engines": [{"q": "What is the standard configuration of a light aircraft piston engine?", "a": "Four-stroke, horizontally opposed, gasoline (petrol), spark-ignition engine."}, {"q": "What are the four strokes of the Otto Cycle?", "a": "Induction, Compression, Power, Exhaust. Mnemonic: Suck, Squeeze, Bang, Blow."}, {"q": "How many crankshaft revolutions per Otto Cycle?", "a": "Two revolutions for four strokes and one power event."}, {"q": "What is the compression ratio of a typical aviation piston engine?", "a": "7:1 to 8.5:1 for petrol engines. Higher ratios risk detonation."}, {"q": "Why are horizontally opposed engines preferred in aviation?", "a": "Low frontal area for streamlining, good balance, short crankshaft, and even weight distribution."}, {"q": "What is swept volume?", "a": "The volume displaced by the piston traveling from BDC to TDC. It defines the engine size (displacement)."}, {"q": "What is clearance volume?", "a": "The small space remaining at the top of the cylinder when the piston is at TDC."}, {"q": "What is Total Volume?", "a": "Swept Volume + Clearance Volume."}, {"q": "Why does engine power decrease with altitude?", "a": "Reduced air density means less oxygen mass enters each cylinder, reducing combustion efficiency and power output."}, {"q": "What are the two reasons for dual ignition systems?", "a": "1) Redundancy/safety: engine runs on either magneto alone. 2) Performance: two spark plugs give faster, more complete combustion."}, {"q": "How does power output relate to RPM?", "a": "Power output increases with RPM because more power strokes occur per minute."}, {"q": "What is valve timing overlap?", "a": "A brief period when both inlet and exhaust valves are open simultaneously near TDC to improve gas flow efficiency."}, {"q": "What are valve clearances and why are they important?", "a": "Calibrated gaps in the valve mechanism when cold. Metal expansion at operating temperature closes them to correct tolerance."}, {"q": "At what speed does the camshaft rotate relative to the crankshaft?", "a": "Half the crankshaft speed, because each valve opens once per Otto Cycle (2 revolutions)."}, {"q": "What percentage of fuel energy becomes useful power?", "a": "Only about 30%. The remaining 70% is waste heat (40% exhaust gases, 30% engine heat/oil)."}], "3A Aviation Diesel Resurgence": [{"q": "How does a diesel engine ignite fuel?", "a": "By compression ignition  -  the piston compresses pure air until it is superheated, then fuel is injected and ignites spontaneously. No spark plugs required."}, {"q": "What fuel do aviation diesel engines use?", "a": "Jet A1 (AVTUR), a kerosene-based fuel that is cheaper, more globally available, and safer than AVGAS."}, {"q": "What is the compression ratio of an aviation diesel engine?", "a": "Up to 25:1 (modern aero diesels typically around 18:1), much higher than petrol engines (7-8.5:1)."}, {"q": "What is FADEC in a diesel aircraft?", "a": "Full Authority Digital Engine Control  -  a computer that manages fuel injection and propeller pitch. The pilot operates only a single power lever."}, {"q": "Why is Jet A1 safer than AVGAS in a crash?", "a": "Jet A1 has a flash point of +38C vs AVGAS -40C. Jet A1 is extremely difficult to ignite by accident."}, {"q": "What are glow plugs used for?", "a": "Electrical heating elements that pre-heat cylinder air to aid compression ignition during cold starts."}, {"q": "Why do diesel engines have no throttle valve?", "a": "Air intake is always fully open; power is controlled solely by the amount of fuel injected."}, {"q": "What is the typical cruise fuel consumption of a diesel aircraft?", "a": "15-20 litres per hour vs 30-40 litres for a comparable petrol engine."}, {"q": "What is common-rail fuel injection?", "a": "A system where a high-pressure pump pressurizes a common tube and electronic injectors spray atomized fuel for precise millisecond timing."}, {"q": "Why can turbocharged diesels maintain power at altitude?", "a": "They are built to withstand high compression, so they easily handle turbocharger boost pressure, maintaining sea-level power up to 10,000+ ft."}, {"q": "What is the Centurion 1.7?", "a": "Based on a Mercedes automotive block, the first modern diesel certified for aircraft (Diamond DA40). Liquid-cooled, turbocharged, 4-cylinder, 135 HP."}, {"q": "Why is Jet A1 a poor lubricant for fuel pumps?", "a": "It has low lubricity; aviation diesel fuel pumps must be specially hardened and coated to withstand this."}, {"q": "What is fuel gelling and when does it occur?", "a": "At extremely low temperatures, diesel fuel can gel or wax, clogging filters. Anti-icing additives like PRIST may be required."}, {"q": "What advantage does liquid cooling give diesel aircraft?", "a": "Prevents shock cooling during rapid descents and provides very stable operating temperatures, but adds weight and complexity."}, {"q": "Why are diesel engines considered future-proof for aviation?", "a": "AVGAS 100LL contains lead and is being phased out globally. Jet A1 is available everywhere and environmentally cleaner."}], "4 Aircraft Engine Cooling": [{"q": "What percentage of fuel energy becomes waste heat?", "a": "Approximately 70%. Only 30% becomes useful power. 40% exits via exhaust gases, 30% remains in engine components."}, {"q": "What are the two methods of engine cooling?", "a": "External (air cooling via cylinder fins and ram air) and Internal (oil circulation absorbing and dissipating heat)."}, {"q": "What is the purpose of cylinder fins?", "a": "To increase the surface area exposed to cooling airflow, allowing ram air to carry heat away from the cylinders."}, {"q": "What is the engine cowling and what does it do?", "a": "Streamlines the engine, reduces drag, and creates a pressurized environment to force air through the cooling fins."}, {"q": "What are baffles?", "a": "Close-fitting directional guides that force cooling air strictly over the cylinder fins. Damaged baffles cause hot spots."}, {"q": "What are cowl flaps (gills)?", "a": "Manually controlled vents that open to increase cooling airflow or close to retain heat. Open for takeoff/climb, closed for descent."}, {"q": "What are the dangers of overheating?", "a": "Metal expansion, oil breakdown, loss of lubrication, detonation, pre-ignition, and eventual engine seizure."}, {"q": "What are the dangers of overcooling?", "a": "Reduced brake horse power (BHP), uneven thermal contraction, increased oil viscosity, and poor fuel vaporization."}, {"q": "What is shock cooling?", "a": "Rapid cooling from sudden power reduction at high airspeed, causing uneven thermal contraction that can crack cylinder heads."}, {"q": "What cowl flap position should be used during takeoff and climb?", "a": "Open  -  high power + low airspeed = rapid heating, so maximum cooling airflow is needed."}, {"q": "What cowl flap position should be used during descent?", "a": "Closed  -  low power + high airspeed = overcooling risk. Periodically increase RPM to maintain temperature."}, {"q": "What should a pilot do if engine temperature is rising in flight?", "a": "Open cowl flaps, enrich the mixture (excess fuel cools combustion), reduce power, lower nose for more airspeed."}, {"q": "What is the oil cooler and how does it work?", "a": "A heat exchanger that cools engine oil using ram air, similar to a car radiator but for oil."}, {"q": "What pre-flight checks relate to cooling?", "a": "Check air inlets/outlets unobstructed, baffles intact, cowling secure, cowl flap operation, and oil level."}, {"q": "During ground running, what is the cowl flap procedure?", "a": "Close initially to warm engine quickly, then open to prevent overheating while stationary with limited airflow."}], "6 Aircraft Ignition": [{"q": "What is a magneto?", "a": "A self-contained, engine-driven electrical generator that produces high-voltage sparks independently of the aircraft battery."}, {"q": "Why do aircraft use dual ignition?", "a": "1) Redundancy: engine runs on either magneto alone. 2) Efficiency: two spark plugs give faster, more uniform combustion. 3) Safety: reduces detonation risk."}, {"q": "How does a magneto generate electricity?", "a": "A rotating permanent magnet creates a changing magnetic field in a primary coil. When the contact breaker opens, the field collapse induces a high-voltage spike in the secondary coil."}, {"q": "What is the P-lead?", "a": "A grounding wire from the magneto to the ignition switch. OFF = closed (grounds the circuit, no spark). ON = open (allows spark)."}, {"q": "What is the danger of a broken P-lead?", "a": "The magneto becomes permanently LIVE. The engine can run even with the key removed, and moving the propeller by hand can start the engine unexpectedly."}, {"q": "What is the dead cut check?", "a": "At idle RPM, briefly turn ignition to OFF then back to BOTH. The engine should cut out momentarily, confirming both magnetos can be grounded."}, {"q": "What is an impulse coupling?", "a": "A mechanical spring device that boosts magneto rotational speed at low cranking RPM, producing a hot spark for starting. It also retards the spark timing during start."}, {"q": "Why must the spark be retarded during starting?", "a": "At slow cranking speeds, an early spark would push the piston backward, potentially destroying the starter motor."}, {"q": "What is the normal RPM drop during a magneto check?", "a": "50-150 RPM. Running on one magneto is slightly less efficient (slower single-flame-front combustion)."}, {"q": "What does ZERO RPM drop during a magneto check indicate?", "a": "A faulty P-lead or grounding wire. Both magnetos may be firing simultaneously regardless of switch position."}, {"q": "What causes spark plug fouling?", "a": "Rich mixtures or prolonged idle cause carbon and lead deposits to bridge the spark gap, preventing proper spark."}, {"q": "How do you fix fouled spark plugs?", "a": "Run the engine at high RPM with a lean mixture to burn off the deposits."}, {"q": "What is the function of the capacitor (condenser)?", "a": "1) Prevents arcing at the contact breaker points. 2) Accelerates magnetic field collapse for a stronger spark."}, {"q": "At what speed does the distributor rotate?", "a": "Half engine speed, to match the 4-stroke firing cycle."}, {"q": "If the battery and alternator fail, will the engine keep running?", "a": "Yes. Magnetos are completely independent of the aircraft electrical system. No battery power is needed."}], "7 Aircraft Carburation": [{"q": "What is the chemically correct (stoichiometric) air-fuel ratio?", "a": "15:1 by weight (15 parts air to 1 part fuel)."}, {"q": "What is the best power mixture ratio?", "a": "Approximately 12:1 (slightly rich), providing maximum power output with cooling from excess fuel."}, {"q": "What is the Venturi effect in a carburettor?", "a": "As air accelerates through the narrow venturi, static pressure drops (Bernoulli's principle), sucking fuel from the float chamber through the main jet."}, {"q": "What is the float chamber?", "a": "A reservoir that maintains a constant fuel level. A float valve controls fuel supply, similar to a toilet cistern mechanism."}, {"q": "What is carburettor icing and when can it occur?", "a": "Ice forming in the venturi and throttle valve area. Can occur at OAT from -10C to +30C with humidity above 50%."}, {"q": "What are the three types of engine icing?", "a": "Impact icing (snow/freezing rain), fuel icing (water in fuel freezing), and refrigeration icing (carburettor icing from venturi and fuel evaporation cooling)."}, {"q": "What is the first sign of carburettor icing with a fixed-pitch prop?", "a": "Gradual drop in RPM without any change in throttle position."}, {"q": "How does carburettor heat work?", "a": "Directs unfiltered exhaust-heated air into the carburettor to melt ice and raise the air temperature above freezing."}, {"q": "Why does RPM initially drop when carburettor heat is applied?", "a": "Heated air is less dense, enriching the mixture and reducing power. If ice was present, RPM will subsequently rise as ice melts."}, {"q": "Why should carburettor heat NOT be used during takeoff?", "a": "It reduces power by ~15% and bypasses the air filter, allowing unfiltered air (and potential debris) into the engine."}, {"q": "What is an accelerator pump?", "a": "A mechanical pump that squirts extra fuel into the intake when the throttle is opened rapidly, preventing a flat spot (hesitation)."}, {"q": "What is detonation in the context of carburation?", "a": "Spontaneous explosive burning of the mixture caused by high cylinder temps, weak mixtures, or low-octane fuel."}, {"q": "What is pre-ignition?", "a": "Mixture ignites before the spark plug fires due to an incandescent hot spot (carbon deposit or overheated plug)."}, {"q": "Why must the mixture be leaned at altitude?", "a": "At altitude, lower air density means the carburettor delivers relatively more fuel, making the mixture too rich. Leaning restores the correct ratio."}, {"q": "What are the advantages of fuel injection over carburation?", "a": "No carburettor icing, better fuel distribution, no float chamber issues, and more precise mixture control."}], "5 Aircraft Engine Lubrication": [{"q": "When should you check oil level on a WET sump system?", "a": "Wait 15-20 minutes after shutdown to allow oil to drain fully back to the pan."}, {"q": "When should you check oil level on a DRY sump system?", "a": "Check immediately after shutdown. Waiting causes oil to migrate by gravity, giving a false reading."}, {"q": "High oil temperature comes with high or low pressure?", "a": "Low pressure  -  hot oil thins (loses viscosity), reducing pressure."}, {"q": "What is the surge valve (relief valve) used for?", "a": "Relieves excessive oil pressure to maintain constant pressure regardless of RPM."}, {"q": "If there is an oil leak, does it cause low or high pressure?", "a": "Low pressure  -  oil is lost from the system."}, {"q": "What is the PRIMARY function of engine oil?", "a": "Reduce friction between moving metal parts (lubrication)."}, {"q": "What are the SECONDARY functions of oil?", "a": "Cooling (removes 30% of engine heat), Cleaning (carries by-products to filter), Sealing (gas-tight seal between pistons and cylinders)."}, {"q": "What does SAE 15W-50 mean?", "a": "Multi-grade oil showing range of viscosity: behaves like SAE 15 when cold and SAE 50 when hot."}, {"q": "Straight oil vs Compound oil  -  color and use?", "a": "Straight (blue)  -  no additives, for NEW engines. Compound (red)  -  with additives, for OLD engines."}, {"q": "Oil pressure must register within how many seconds of a cold start?", "a": "30 seconds. If not, shut down immediately."}, {"q": "High oil pressure is associated with hot or cold oil?", "a": "Cold oil  -  high viscosity causes high pressure. Can also indicate a faulty relief valve."}, {"q": "What causes LOW oil pressure?", "a": "Low oil level, high temperature. Actions: cool down, reduce power, nose down, enrich. If minimum pressure cannot be maintained: LAND IMMEDIATELY."}, {"q": "What does a FLUCTUATING oil pressure needle mean?", "a": "Low oil supply. Small fluctuations = sticking relief valve. Large = sump running dry / pump sucking air."}, {"q": "What does ZERO oil pressure indicate?", "a": "Pump failure or severed line. Engine seizure imminent. Emergency forced landing immediately."}, {"q": "What happens if the oil cooler is blocked?", "a": "The bypass valve opens, allowing hot unfiltered oil to bypass the cooler. Better hot oil than no oil."}, {"q": "Where is the oil temperature sensor located?", "a": "After the oil cooler, before the hot engine sections."}, {"q": "What are the two types of lubrication?", "a": "Pressure lubrication (forced into bearings) and Splash lubrication (rotating parts throw oil around crankcase)."}, {"q": "What is a wet-sump system?", "a": "Oil stored in the crankcase at the bottom of the engine. Simple and lightweight. Used in most light aircraft."}, {"q": "What are the disadvantages of wet-sump?", "a": "Poor for inverted flight, hot oil, crankshaft stirs oil, limited capacity."}, {"q": "What is a dry-sump system?", "a": "Oil stored in a separate external tank. Scavenge pump returns oil from engine. Used in aerobatic aircraft."}, {"q": "What is hydraulicing (hydraulic lock)?", "a": "Oil drains into lower cylinders. Being incompressible, cranking bends connecting rods. Pull prop through by hand with mags OFF."}, {"q": "What does oil act as besides a lubricant?", "a": "A hydraulic fluid for variable-pitch propellers and hydraulic tappets."}, {"q": "What is viscosity?", "a": "A fluid's resistance to flow. High number = thicker oil."}, {"q": "What action for low oil pressure with high temperature in flight?", "a": "Open cowl flaps, reduce power, lower nose, enrich mixture. If minimum pressure cannot be maintained: LAND IMMEDIATELY."}, {"q": "What happens during a high oil pressure malfunction?", "a": "If temp low: cold thick oil, wait for warm-up. If temp normal/rising with high pressure: stuck relief valve, SHUT DOWN."}], "8 Aviation Fuel Systems": [{"q": "What are the two main grades of AVGAS used in piston-engine aircraft, and how are they colour-coded?", "a": "AVGAS 100LL (low lead) is dyed blue, and AVGAS 100 is dyed green. 100LL is the most common grade for light piston aircraft."}, {"q": "What is the specific gravity of AVGAS compared to Jet A-1?", "a": "AVGAS has a specific gravity of approximately 0.72, while Jet A-1 (kerosene) has a specific gravity of approximately 0.80. AVGAS is lighter than Jet fuel."}, {"q": "Why must a pilot perform a fuel drain check during pre-flight?", "a": "To check for water contamination and sediment in the fuel. Water is denser than AVGAS and settles to the bottom of tanks, where it can be drained from the fuel sump drains."}, {"q": "What happens if Jet A-1 fuel is accidentally put into a piston engine designed for AVGAS?", "a": "Jet fuel has a much lower octane rating than AVGAS, which will cause severe detonation, rapid engine damage, and likely engine failure. This is a critical misfuelling hazard."}, {"q": "What is the purpose of a fuel selector valve in a light aircraft?", "a": "It allows the pilot to select which tank feeds the engine (left, right, both, or off), enabling fuel management for weight balance and ensuring all available fuel can be used."}, {"q": "What is the difference between fuel starvation and fuel exhaustion?", "a": "Fuel exhaustion means all fuel on board is used up. Fuel starvation means fuel is still on board but cannot reach the engine, typically due to incorrect tank selection, blocked lines, or failed pumps."}, {"q": "What is vapour lock and when is it most likely to occur?", "a": "Vapour lock occurs when fuel vaporises in the fuel lines before reaching the carburettor or fuel injection system, creating a gas bubble that blocks fuel flow. It is most likely during hot weather and high altitude operations."}, {"q": "What is the function of the engine-driven mechanical fuel pump?", "a": "It is the primary fuel pump that draws fuel from the selected tank and delivers it under pressure to the carburettor or fuel injection system. It is mechanically driven by the engine accessory gearbox."}, {"q": "When should the electric auxiliary (boost) fuel pump be used?", "a": "During engine start, takeoff, landing, and at high altitudes as a backup. It is also used if the engine-driven pump fails or to prevent vapour lock during hot weather operations."}, {"q": "Why are fuel tanks in light aircraft typically located in the wings?", "a": "Wing tanks place fuel close to the centre of lift, minimising changes in the aircraft's centre of gravity as fuel is consumed. They also use wing structural space efficiently."}, {"q": "What is the purpose of fuel tank venting?", "a": "Vents allow air to enter the tank as fuel is consumed, preventing a vacuum from forming that would stop fuel flow. A blocked vent can cause fuel starvation even with full tanks."}, {"q": "How does a pilot verify fuel quantity before flight, and why can fuel gauges not be fully trusted?", "a": "The pilot should physically check fuel levels using a dipstick or visual inspection. Float-type fuel gauges are only required by regulation to be accurate when reading empty."}, {"q": "What is unusable fuel?", "a": "Unusable fuel is the quantity of fuel remaining in the tank that cannot be drawn to the engine due to the pickup point location. It must be subtracted from total fuel capacity for flight planning."}, {"q": "What is the purpose of a fuel strainer/gascolator in the fuel system?", "a": "It filters contaminants and traps water before fuel reaches the engine. It is located at the lowest point of the fuel system between the tank and the engine for effective water separation."}, {"q": "A pilot notices water droplets during a fuel drain sample. What should the pilot do?", "a": "Continue draining fuel from the sump until the sample is completely clear of water. Do not fly until all water contamination has been removed from the fuel system."}, {"q": "What is the relationship between altitude and the risk of vapour lock?", "a": "As altitude increases, atmospheric pressure decreases, lowering the boiling point of fuel. This makes vapour lock more likely at high altitude, especially with warm fuel temperatures."}, {"q": "Why must fuel filler caps seal properly?", "a": "Improperly sealed caps can allow water ingress from rain or humidity and can also siphon fuel overboard in flight due to aerodynamic low pressure over the wing surface."}, {"q": "What colour contamination in a fuel sample indicates a dangerous misfuelling with Jet A-1?", "a": "A clear or straw-coloured sample instead of the expected blue colour (for 100LL) may indicate Jet A-1 contamination. Jet fuel also has a distinct kerosene smell different from AVGAS."}], "9 Propeller Fundamentals": [{"q": "What is the blade angle (pitch) of a propeller?", "a": "The blade angle is the angle between the chord line of the propeller blade and the plane of rotation. It determines how much 'bite' the propeller takes into the air."}, {"q": "What is the difference between geometric pitch and effective pitch?", "a": "Geometric pitch is the theoretical distance a propeller would advance in one revolution if there were no slip. Effective pitch is the actual distance advanced, which is less due to aerodynamic slip."}, {"q": "What is propeller slip?", "a": "Slip is the difference between geometric pitch and effective pitch. It represents the inefficiency of the propeller, as some energy is lost to aerodynamic factors rather than producing forward thrust."}, {"q": "Why does blade angle vary along the length of a propeller blade (twist)?", "a": "The tip moves faster than the root during rotation. The blade is twisted to maintain a relatively constant angle of attack along its entire length, ensuring efficient thrust production from root to tip."}, {"q": "What is the angle of attack of a propeller blade, and how does it differ from blade angle?", "a": "The angle of attack is the angle between the blade chord line and the relative airflow (resultant of rotational and forward speed). Blade angle is fixed relative to the hub; angle of attack changes with airspeed and RPM."}, {"q": "What happens to propeller efficiency at very high and very low blade angles of attack?", "a": "At very high angles of attack, the blade stalls and thrust decreases dramatically. At very low or negative angles, the propeller produces little or no useful thrust and may even create drag."}, {"q": "What is the advantage of a fixed-pitch propeller?", "a": "It is simple, lightweight, inexpensive, and requires no pilot management. It is suitable for training and lower-performance aircraft where optimisation across the speed range is less critical."}, {"q": "What is the main disadvantage of a fixed-pitch propeller?", "a": "It can only be optimised for one phase of flight. A climb-pitch prop sacrifices cruise speed, while a cruise-pitch prop has poor takeoff and climb performance. It is a design compromise."}, {"q": "How does a constant-speed propeller maintain a selected RPM?", "a": "A governor automatically adjusts the blade pitch angle to maintain the RPM set by the pilot. If RPM rises (e.g., in a dive), blade pitch increases; if RPM drops (e.g., in a climb), blade pitch decreases."}, {"q": "What controls does the pilot use to manage a constant-speed propeller?", "a": "The throttle controls manifold pressure (power), and the propeller lever (blue lever) controls the RPM setting via the governor. The pilot sets desired RPM and the governor maintains it."}, {"q": "What is the purpose of the propeller governor?", "a": "The governor senses engine RPM and uses oil pressure from a gear pump to adjust blade pitch, automatically maintaining the RPM selected by the pilot regardless of airspeed or power changes."}, {"q": "What is the feathering position of a propeller blade?", "a": "Feathering turns the blade edge-on to the airflow (approximately 90 degrees blade angle), minimising drag. This is used on multi-engine aircraft when an engine fails to reduce asymmetric drag."}, {"q": "In a single-engine aircraft with a constant-speed prop, what is the fine pitch (low pitch) stop?", "a": "It is a mechanical stop that prevents the blade from going to too fine a pitch, which would allow the engine to overspeed. It ensures the blade angle never goes below the minimum safe setting."}, {"q": "Why should the propeller lever be set to full fine (high RPM) before the throttle during a go-around?", "a": "Full fine pitch allows maximum RPM and therefore maximum power for the go-around. Applying full throttle with coarse pitch risks exceeding manifold pressure limits before RPM increases."}, {"q": "What is the effect of propeller torque on a single-engine aircraft?", "a": "The engine turning the propeller clockwise (viewed from the pilot's seat) creates an equal and opposite reaction that tends to roll the aircraft to the left, requiring right rudder and aileron to counteract."}, {"q": "What is the gyroscopic effect of a propeller?", "a": "Due to precession, when the nose of the aircraft is pitched up or down, the spinning propeller produces a yawing moment 90 degrees ahead in the direction of rotation. This is most noticeable during attitude changes at high power."}, {"q": "What is asymmetric blade effect (P-factor)?", "a": "At high angles of attack, the descending blade (right side on a clockwise-rotating prop) has a greater angle of attack and produces more thrust than the ascending blade, causing a yaw to the left."}, {"q": "What causes propeller slipstream effect?", "a": "The rotating propeller imparts a helical rotation to the slipstream, which strikes the vertical stabiliser from one side (typically the left), creating a yawing moment. This is most pronounced at high power and low airspeed."}], "10 Aircraft Engine Management": [{"q": "What is detonation in a piston engine and why is it dangerous?", "a": "Detonation is the uncontrolled explosive ignition of the fuel-air mixture instead of smooth burning. It creates extreme pressure spikes and temperatures that can destroy pistons, valves, and cylinder heads in seconds."}, {"q": "What are the primary causes of detonation?", "a": "Using fuel with too low an octane rating, excessively lean mixture, high manifold pressure with low RPM, high engine temperatures, and advanced ignition timing."}, {"q": "What is pre-ignition and how does it differ from detonation?", "a": "Pre-ignition is ignition of the fuel-air mixture before the spark plug fires, caused by a hot spot in the combustion chamber. Detonation occurs after normal ignition when the remaining mixture explodes. Both are destructive but have different causes."}, {"q": "Why must the mixture be leaned at higher altitudes?", "a": "As altitude increases, air density decreases but the carburettor continues to deliver the same volume of fuel, making the mixture too rich. Leaning restores the correct fuel-to-air ratio for efficient combustion."}, {"q": "What is the chemically correct (stoichiometric) air-to-fuel ratio for AVGAS?", "a": "Approximately 15:1 by weight (15 parts air to 1 part fuel). This ratio produces the highest combustion temperature (peak EGT) but is not used operationally because it causes detonation risk."}, {"q": "What is the 'best power' mixture setting?", "a": "Best power mixture is slightly richer than stoichiometric (approximately 12:1), producing maximum power output. The excess fuel helps cool the combustion process while maintaining near-peak power."}, {"q": "What is the 'best economy' mixture setting?", "a": "Best economy is slightly leaner than stoichiometric (approximately 16:1), producing the lowest specific fuel consumption. It is used during cruise to maximise range but requires careful monitoring of engine temperatures."}, {"q": "Why is the mixture set to full rich for takeoff and landing?", "a": "Full rich provides maximum cooling of the engine via excess fuel and ensures maximum power is available. It also provides a safety margin against detonation during high-power operations."}, {"q": "What is the correct procedure for leaning the mixture using the EGT gauge?", "a": "Slowly lean the mixture while watching EGT rise. When EGT peaks, enrich the mixture slightly (25-50 degrees rich of peak) to operate in the safe 'rich of peak' zone for engine protection."}, {"q": "What are the symptoms of carburettor icing?", "a": "Gradual loss of RPM (fixed-pitch prop) or drop in manifold pressure (constant-speed prop) with no change in power setting. The engine may run rough and eventually quit if ice is not addressed."}, {"q": "How does carburettor heat prevent and remedy carburettor icing?", "a": "It directs heated air (from the exhaust manifold shroud) into the carburettor, raising the air temperature to melt existing ice and prevent further ice formation in the venturi and throttle valve areas."}, {"q": "Why does engine RPM initially drop when carburettor heat is applied?", "a": "Heated air is less dense, creating a richer mixture and reducing engine power slightly. This initial RPM drop is normal. If ice was present, RPM will subsequently rise as the ice melts and airflow is restored."}, {"q": "Under what atmospheric conditions is carburettor icing most likely?", "a": "Temperatures between -10 degrees C and +30 degrees C with high humidity. It can even occur on warm, moist days because the venturi effect and fuel vaporisation can drop the temperature by up to 30 degrees C."}, {"q": "Why should a pilot avoid using carburettor heat at full power for takeoff?", "a": "Carburettor heat bypasses the air filter, allowing unfiltered air into the engine, and reduces power due to decreased air density. Full power should use cold, filtered air for maximum performance and engine protection."}, {"q": "What is the purpose of the magneto check during the engine run-up?", "a": "It verifies both magneto ignition systems are functioning. Switching to each magneto individually should show a small, acceptable RPM drop. No drop suggests a grounding wire fault; excessive drop indicates a magneto problem."}, {"q": "What is the maximum acceptable RPM drop during a magneto check, and what does an excessive drop indicate?", "a": "Typically 75-125 RPM drop per magneto (check POH for specific limits). An excessive drop may indicate fouled spark plugs, faulty ignition leads, or a failing magneto."}, {"q": "Why is 'shock cooling' harmful to an aircraft engine?", "a": "Rapid cooling (e.g., from a sudden power reduction and high-speed descent) causes uneven thermal contraction of engine components, potentially cracking cylinder heads and barrels. Power reductions should be gradual."}, {"q": "What is the proper engine management procedure during descent?", "a": "Reduce power gradually, enrich the mixture as altitude decreases, avoid rapid temperature changes (shock cooling), and maintain some power rather than idle to keep the engine warm and responsive."}], "11 Aircraft Electrical Systems": [{"q": "What type of electrical current do most light aircraft use?", "a": "Direct Current (DC). Light aircraft typically operate on 12V or 24V DC electrical systems, with the battery and alternator providing power to all electrical services."}, {"q": "What is the difference between conventional current flow and actual electron flow?", "a": "Conventional flow runs from positive to negative (used by engineers). Actual electron flow runs from negative to positive. Aviation uses the conventional flow model."}, {"q": "What is the difference between a single-pole (earth-return) and double-pole electrical system?", "a": "Single-pole uses the metal airframe as the return path for current, requiring only one wire per circuit. Double-pole uses a dedicated return wire and is necessary for composite (non-conductive) airframes."}, {"q": "What is the difference between a primary cell and a secondary cell battery?", "a": "A primary cell is non-rechargeable (single use, e.g., flashlight battery, ~1.5V). A secondary cell is rechargeable with a reversible chemical reaction (e.g., lead-acid aircraft battery, 2.2V per cell)."}, {"q": "How many cells make up a standard 12V lead-acid aircraft battery?", "a": "Six cells connected in series. Each cell produces approximately 2V, and in series the voltages add: 6 x 2V = 12V total."}, {"q": "What is the key advantage of an alternator over a generator?", "a": "An alternator produces near full power output even at low engine RPM (including idle), while a generator requires high RPM for full output. Alternators are also lighter and more reliable."}, {"q": "How does an alternator produce DC power if it internally generates AC?", "a": "The alternator uses a diode rectifier to convert the internally generated alternating current (AC) into direct current (DC) suitable for the aircraft's electrical system."}, {"q": "What is the function of the voltage regulator in the alternator circuit?", "a": "It controls the alternator field current to maintain a constant output voltage of approximately 14V (for a 12V system), regardless of engine RPM or electrical load changes."}, {"q": "At what voltage does the over-voltage relay trip, and what does it do?", "a": "It trips at approximately 16.5V. It opens the field circuit, instantly taking the alternator offline to protect sensitive avionics and radios from damaging voltage spikes caused by a failed voltage regulator."}, {"q": "What is the function of the busbar in an aircraft electrical system?", "a": "The busbar is a solid copper power distribution hub that connects the battery and alternator to all individual electrical services through circuit breakers or fuses, organizing power routing efficiently."}, {"q": "Why does the starter motor circuit use a starter relay (contactor)?", "a": "The starter motor draws enormous current that would be dangerous to route through cockpit switches. The relay allows a safe, low-current cockpit switch to magnetically close a high-current heavy-duty switch near the engine."}, {"q": "What is the one-reset rule for circuit breakers and fuses in flight?", "a": "A blown fuse or popped circuit breaker may be replaced or reset ONCE only. If it trips a second time, it confirms a hard electrical short circuit, and resetting it again risks an in-flight fire."}, {"q": "On a centre-zero ammeter, what do positive, zero, and negative readings indicate?", "a": "Positive (right) means the alternator is charging the battery. Zero/centre means the battery is fully charged with no current flow. Negative (left) means the battery is discharging, indicating alternator failure."}, {"q": "What does a loadmeter reading of zero during flight indicate?", "a": "Total alternator failure. The loadmeter measures alternator output, and a zero reading confirms the alternator is producing no power. The aircraft is running solely on battery."}, {"q": "In a 12V system, what voltage should the voltmeter show with the engine running?", "a": "Approximately 14 volts. This higher-than-battery voltage proves the alternator is working and actively charging the battery. A drop to 12V confirms alternator failure."}, {"q": "What is the correct alternator failure drill?", "a": "Step 1: Shed all non-essential electrical loads. Step 2: Check and reset the field circuit breaker once. Step 3: Cycle the alternator master switch OFF for 2 seconds, then ON. If not restored, land as soon as practicable."}, {"q": "Why should a pilot never intentionally fly with a known flat battery?", "a": "A flat battery provides zero backup power. If the alternator fails in flight, there is no emergency electrical power for radios, lights, or critical instruments. The alternator may also not fully recharge it in flight."}, {"q": "What causes electrical fires in aircraft and why are they so dangerous?", "a": "Chafed wire insulation from airframe vibrations causes short circuits to the metal airframe, drawing massive unregulated current. This produces toxic smoke from melting plastic, sparks, and can ignite surrounding fluids."}, {"q": "What is the effect of connecting cells in series versus in parallel?", "a": "Series connection adds voltages (capacity stays constant). Parallel connection adds capacities in amp-hours (voltage stays constant). A 12V battery uses 6 x 2V cells in series."}], "12 Aircraft Vacuum Systems": [{"q": "Which two flight instruments are powered by the vacuum system in a light aircraft?", "a": "The Attitude Indicator (AI) and the Direction Indicator (DI/Heading Indicator). These are the two primary gyroscopic instruments that rely on vacuum-driven airflow to spin the gyro rotors."}, {"q": "How does the vacuum system spin the gyro rotors?", "a": "The vacuum pump draws air through the instruments. This airflow is directed over small buckets formed in the rim of the gyro rotor, causing it to spin at high speed, providing rigidity in space."}, {"q": "What is the normal operating range for the suction gauge?", "a": "4.5 to 5.5 inches of mercury (inHg). This is the green arc range on the suction gauge, indicating proper vacuum pressure for reliable gyro operation."}, {"q": "What are the three sources of vacuum/suction in aircraft?", "a": "1) Engine-driven vacuum pump (standard on modern aircraft). 2) Venturi tube (uses external airflow via Bernoulli's principle). 3) Inlet manifold connection (taps into engine induction vacuum)."}, {"q": "What is the difference between a dry vacuum pump and a wet vacuum pump?", "a": "Dry pumps use self-lubricating graphite/carbon vanes and require no oil but fail suddenly and catastrophically. Wet pumps use metal vanes with engine oil lubrication and tend to fail gradually."}, {"q": "What is the purpose of the shear coupling on the engine-driven vacuum pump?", "a": "It is a deliberate weak link that protects the engine accessory drive. If the vacuum pump seizes, the shear coupling breaks, preventing damage to the engine while sacrificing only the vacuum pump."}, {"q": "What is the function of the suction filter in the vacuum system?", "a": "It cleans ambient cabin air before it enters the gyroscopic instruments, preventing dust and debris from destroying the high-speed gyro bearings. A clogged filter can cause pump overheating and premature failure."}, {"q": "What does the pressure regulator (relief valve) do in the vacuum system?", "a": "It acts as a relief valve that opens to admit cabin air when suction is too high (at high engine RPM), venting excess suction to maintain a constant 4.5-5.5 inHg at the instruments."}, {"q": "Why is the low vacuum warning light critical even though gyros do not stop instantly?", "a": "Because gyros spin down slowly after vacuum failure, they give subtly inaccurate readings before completely tumbling. The warning light alerts the pilot before the instruments become dangerously misleading."}, {"q": "How can you differentiate between a faulty suction gauge and a real vacuum system failure?", "a": "If the suction gauge reads zero but the warning light is off and gyros function normally, the gauge itself is faulty. If gauge reads zero, warning light is on, and gyros tumble, it is a genuine system failure."}, {"q": "Why is the Turn Coordinator powered by the electrical system rather than the vacuum system?", "a": "For cross-system redundancy. If the vacuum system fails, the AI and DI are lost, but the electrically powered Turn Coordinator still provides attitude reference. This prevents total loss of attitude information."}, {"q": "What is an auxiliary vacuum pump and how is it activated?", "a": "It is an electrically driven backup vacuum pump that the pilot manually selects ON if the primary engine-driven pump fails. It restores vacuum suction to the gyroscopic instruments."}, {"q": "What are two operational concerns when using an auxiliary electric vacuum pump?", "a": "1) It draws substantial electrical current, requiring load shedding of non-essential equipment. 2) Its strong electric motor can cause magnetic compass errors due to electromagnetic interference."}, {"q": "What happens to the vacuum system if the suction filter becomes clogged?", "a": "The pump must work harder to generate suction, leading to overheating and premature pump failure. System suction may drop below the normal operating range, degrading gyro instrument accuracy."}, {"q": "What pre-flight checks should be performed on the vacuum system?", "a": "1) Check vacuum lines and pump security during walkaround. 2) Verify suction gauge reads zero with engine off. 3) After engine start, confirm suction rises into green arc (4.5-5.5 inHg). 4) Verify low vacuum warning light extinguishes."}, {"q": "Why must carbon fragments be cleaned from the system after a dry pump failure?", "a": "Shattered graphite/carbon vanes from a failed dry pump leave fragments throughout the vacuum lines. If not meticulously cleaned, these fragments will destroy the replacement pump shortly after installation."}, {"q": "What is the limitation of a venturi tube as a vacuum source?", "a": "Its suction is proportional to aircraft airspeed (Bernoulli's principle), so it is ineffective at low speeds, on the ground, or at high altitudes. It also creates aerodynamic drag. Engine-driven pumps are more reliable."}, {"q": "With inlet manifold suction, when is vacuum greatest and when is it least?", "a": "Vacuum is greatest at engine idle (throttle closed) and least at full power (throttle wide open). This is because manifold suction is inversely proportional to throttle opening."}], "13 Engine Instruments": [{"q": "What are the two categories of engine instruments?", "a": "Condition Indicators (showing engine health: oil temp, oil pressure, CHT, EGT) and Performance Indicators (showing power output: RPM tachometer, manifold pressure gauge)."}, {"q": "Where is the oil temperature probe located in a wet-sump engine and why?", "a": "After the oil cooler but before the hot engine block. This location measures the temperature of oil entering the engine bearings, not the superheated oil draining out, giving the most useful reading."}, {"q": "What happens if oil temperature is too high?", "a": "The oil breaks down chemically, losing its lubricating properties, leading to metal-on-metal contact and rapid engine failure. The oil also serves as a cooling medium for internal engine components."}, {"q": "What is the primary function of the EGT gauge?", "a": "It is a fuel management instrument. It measures exhaust gas temperature to indicate whether the air-fuel mixture is too lean or too rich, allowing the pilot to precisely adjust the mixture control."}, {"q": "How does a thermocouple work, and what is its key advantage?", "a": "A thermocouple consists of two dissimilar metals joined at a junction. When heated, the junction generates a small voltage proportional to temperature. Its key advantage is that it is entirely self-powered, requiring no aircraft electrical power."}, {"q": "At what air-fuel ratio does peak EGT occur, and why should pilots avoid operating exactly at peak?", "a": "Peak EGT occurs at the stoichiometric ratio of 15:1. Operating at peak risks detonation due to maximum combustion temperatures. Pilots should operate slightly rich of peak for engine protection."}, {"q": "What is the safe leaning procedure using EGT?", "a": "Lean the mixture slowly until EGT reaches its peak value, then enrich slightly (push mixture in) to operate 'rich of peak.' This provides efficient operation with a safety margin against detonation."}, {"q": "What are the critical CHT temperature limits?", "a": "Minimum in-flight: 65 degrees C. Optimum engine life range: 175-225 degrees C. Maximum limit: 260 degrees C. Exceeding the maximum risks severe engine damage."}, {"q": "Where is the CHT probe installed?", "a": "Directly on the hottest single cylinder, as determined by the manufacturer during flight testing. On a four-cylinder engine, rear cylinders typically run hottest because cooling air is pre-warmed by the front cylinders."}, {"q": "What should a pilot do if CHT is rising into the red arc during a climb?", "a": "Lower the nose to increase cooling airflow over the cylinders, enrich the mixture for additional fuel cooling, or reduce power. Continued high CHT will cause detonation and engine damage."}, {"q": "What is the difference between direct reading and remote indicating oil pressure gauges?", "a": "Direct reading pipes actual oil to the back of the cockpit gauge via a pipeline. Remote indicating uses a transducer/sensor in the engine bay that sends an electrical signal to the gauge, which is safer as it avoids routing hot, high-pressure oil into the cockpit."}, {"q": "How does a Bourdon tube pressure gauge work?", "a": "A flattened, curved metal tube straightens proportionally as high-pressure fluid enters it. This straightening motion is mechanically linked via gears to move the indicator needle. It is used for high-pressure measurements like oil pressure."}, {"q": "How does an aneroid capsule pressure gauge work?", "a": "A corrugated metal disc (aneroid capsule) expands or contracts based on pressure fed into it. The movement is linked to the indicator needle. It is used for lower-pressure measurements like manifold absolute pressure (MAP)."}, {"q": "How does the fuel contents gauge (float system) work?", "a": "A float sits on the fuel surface and operates a variable electrical resistor as the level changes. This changes the current flowing to the cockpit gauge. It is notoriously inaccurate during manoeuvres due to fuel sloshing."}, {"q": "At what positions is a float-type fuel gauge legally required to be accurate?", "a": "Only at the low and empty positions. At all other readings the gauge may be inaccurate due to tank shape and fuel sloshing. Pilots must calculate fuel remaining based on time and fuel burn rate."}, {"q": "How does a mechanical (drag-cup) tachometer work?", "a": "A flexible drive shaft from the crankshaft spins a magnet inside a non-magnetic drag cup, inducing eddy currents that create drag. A hairspring resists this drag, moving the pointer proportionally to engine RPM."}, {"q": "Within how many seconds must oil pressure rise after a cold engine start?", "a": "Within 30 seconds. If oil pressure does not register within 30 seconds, the engine must be shut down immediately to prevent bearing damage from running without adequate oil pressure."}, {"q": "What does fluctuating oil pressure in flight most likely indicate?", "a": "A critically low oil supply. As the oil level drops, the pump alternately picks up oil and air, causing the pressure reading to fluctuate. This requires an immediate landing."}, {"q": "What is the primary power indicator for an aircraft with a fixed-pitch propeller versus one with a constant-speed propeller?", "a": "For fixed-pitch: the tachometer (RPM) is the primary power indicator. For constant-speed: the manifold pressure gauge (MAP) is the primary power indicator, as RPM is held constant by the governor."}], "14 Pressure Instruments": [{"q": "What is the formula relating static, dynamic, and total (pitot) pressure?", "a": "Total Pressure = Static Pressure + Dynamic Pressure. The ASI measures dynamic pressure by subtracting static pressure from total pressure inside the instrument."}, {"q": "Which instruments use pitot (total) pressure and which use static pressure?", "a": "Only the ASI uses pitot pressure (and also static pressure). The altimeter and VSI use static pressure only. All three instruments are connected to the static source."}, {"q": "How does the Airspeed Indicator (ASI) work internally?", "a": "Pitot (total) pressure feeds into an expandable capsule inside a sealed case filled with static pressure. The capsule expands proportionally to dynamic pressure (total minus static), and this movement drives the airspeed needle."}, {"q": "What is the difference between IAS, CAS, and TAS?", "a": "IAS is the raw gauge reading. CAS is IAS corrected for instrument and position errors. TAS is CAS corrected for air density (altitude and temperature). TAS is always greater than IAS at altitude."}, {"q": "What happens to the ASI if the pitot tube is blocked but the drain hole is open?", "a": "The ASI will gradually read zero as the trapped pressure leaks through the drain hole. Only the ASI is affected; the altimeter and VSI continue to work normally since they use only static pressure."}, {"q": "What happens to the ASI if both the pitot tube and its drain hole are blocked?", "a": "The ASI acts like an altimeter. It over-reads in a climb (as static pressure drops, the trapped pitot pressure becomes relatively higher) and under-reads in a descent. At constant altitude it freezes at the blocked value."}, {"q": "What happens to the altimeter, VSI, and ASI if the static vent is blocked?", "a": "The altimeter freezes at the altitude where the blockage occurred. The VSI reads zero. The ASI under-reads in a climb and over-reads in a descent because the trapped static pressure does not update."}, {"q": "What does the alternate static source provide, and what error does it introduce?", "a": "It provides cabin air as a backup static source if the external static vent blocks. Cabin pressure is slightly lower than outside static due to aerodynamic suction, causing the altimeter and ASI to slightly over-read."}, {"q": "How does the altimeter work?", "a": "It contains a partially evacuated aneroid capsule connected to the static pressure source. As altitude increases, static pressure decreases, allowing the capsule to expand. This expansion drives the altitude indication through mechanical linkages."}, {"q": "What are the ISA sea-level conditions that the altimeter is calibrated to?", "a": "1013.25 hPa (mb) pressure and +15 degrees C temperature, with a lapse rate of approximately 1.98 degrees C per 1,000 feet."}, {"q": "What is the difference between QFE, QNH, and Standard Pressure Setting (SPS)?", "a": "QFE reads zero on touchdown (indicates height above airfield). QNH reads airfield elevation on touchdown (indicates altitude AMSL). SPS is 1013.25 hPa, used above the transition altitude for flight levels."}, {"q": "What does the rule 'High to Low, Look out below' mean for altimeter errors?", "a": "When flying from high pressure to low pressure (or warm to cold air) without updating the altimeter subscale, the altimeter over-reads, meaning the aircraft is actually lower than indicated, creating a terrain collision risk."}, {"q": "How does the VSI work?", "a": "It compares static pressure inside a capsule (fed directly) with static pressure in the instrument case (fed through a metered choke/capillary). During altitude changes, the capsule pressure changes faster than the case, creating a pressure differential that indicates rate of climb or descent."}, {"q": "What is the main limitation of the VSI?", "a": "Inherent lag. Due to the metered choke, the VSI takes several seconds to stabilize after a change in vertical speed. It should be used as a trend instrument, not for precise instantaneous readings."}, {"q": "What are the three types of ASI errors?", "a": "1) Instrument error: manufacturing imperfections. 2) Position error: inaccurate static sensing due to airframe-induced turbulence. 3) Density error: changes in air density at altitude cause IAS to differ from TAS."}, {"q": "What effect does a pitot line leak have on the ASI?", "a": "A pitot leak causes the ASI to under-read because total pressure is lost through the leak, reducing the pressure differential sensed by the capsule."}, {"q": "What effect does a static line leak (in an unpressurised aircraft) have on the ASI?", "a": "In flight, aerodynamic suction around the leak lowers the static pressure in the line. This increases the pressure differential in the ASI, causing it to over-read (show higher airspeed than actual)."}, {"q": "Why is pitot heat important and when should it be used?", "a": "Pitot heat prevents ice from blocking the pitot tube, which would cause dangerous ASI errors. It should be checked during pre-flight and activated whenever flying in visible moisture or near-freezing conditions."}, {"q": "In the blockage diagnostic table, what combination confirms a blocked static vent during a climb?", "a": "ASI under-reads, altimeter is frozen at the blocked altitude, and VSI reads zero. This pattern distinguishes a static blockage from a pitot blockage, where only the ASI is affected."}], "15 Gyros and Compasses": [{"q": "What are the two fundamental properties of a gyroscope?", "a": "Rigidity in space (the spin axis maintains its orientation in space) and precession (an applied force manifests 90 degrees ahead in the direction of rotation)."}, {"q": "What type of gyro does the Attitude Indicator (AI) use, and how is it oriented?", "a": "The AI uses an Earth gyro with a vertical spin axis. The rotor spins in the horizontal plane, providing a stable reference for pitch and roll attitude relative to the Earth's horizon."}, {"q": "What type of gyro does the Direction Indicator (DI) use?", "a": "The DI uses a tied gyro with a horizontal spin axis. It provides a stable directional reference in azimuth (heading) that is free from the magnetic compass errors seen during turns and acceleration."}, {"q": "How often must the DI be aligned with the magnetic compass, and under what conditions?", "a": "Every 15 minutes. It must only be aligned during straight and level, unaccelerated flight when the magnetic compass is giving reliable readings, free from turning and acceleration errors."}, {"q": "Why does the DI drift over time?", "a": "Due to apparent wander caused by the Earth's rotation and real wander caused by mechanical friction in the gimbal bearings. The gyro maintains its orientation in space while the Earth rotates beneath it."}, {"q": "What does the Turn Indicator use, and how many degrees of freedom does it have?", "a": "It uses a rate gyro with one degree of freedom. It indicates rate of turn only, relying on gyroscopic precession against a restraining spring to show how fast the aircraft is turning."}, {"q": "What is a Rate One turn?", "a": "A turn rate of 3 degrees per second, completing a 360-degree turn in 2 minutes. When the turn indicator needle aligns with the Rate One marker, the aircraft is performing a standard rate turn."}, {"q": "If the turn indicator gyro RPM is low, how is the indicated turn rate affected?", "a": "The actual rate of turn will be greater than indicated. Low RPM means less gyroscopic rigidity, so the precession force moves the needle less than it should for a given turn rate, causing under-indication."}, {"q": "What does the T

 weight."},{"q":"What determines the angle of climb?","a":"Excess thrust (thrust available minus drag). The greater the excess thrust, the steeper the climb angle."},{"q":"What determines the rate of climb?","a":"Excess power (power available minus power required). The greater the excess power, the higher the rate of climb in feet per minute."},{"q":"How does altitude affect the rate of climb?","a":"Rate of climb decreases with altitude because engine power decreases (less dense air), reducing excess power. Eventually rate of climb reaches zero at the absolute ceiling."},{"q":"How does altitude affect VX and VY IAS?","a":"Both VX and VY IAS converge as altitude increases. They meet at the absolute ceiling, where only one speed allows level flight and climb rate is zero."},{"q":"What is the effect of a headwind on the angle of climb relative to the ground?","a":"A headwind steepens the climb path over the ground because the aircraft covers less ground distance for the same altitude gain. The aerodynamic rate of climb is unchanged."},{"q":"When should VX be used instead of VY?","a":"VX should be used when obstacle clearance after take-off is critical, as it provides the steepest flight path. VY is used for normal climbs to gain altitude most efficiently in time."},{"q":"What is specific range?","a":"The distance flown per unit of fuel consumed (nautical miles per gallon or per kilogram). Maximum specific range gives the best fuel economy for distance covered."},{"q":"How does weight affect the power required curve?","a":"Increased weight shifts the entire power required curve upward and to the right, meaning more power is needed at every speed and the minimum drag speed increases."},{"q":"What is the best glide speed and how is it related to L/D ratio?","a":"The best glide speed is the speed that gives the maximum lift-to-drag ratio (best L/D), also known as VMD. It provides the greatest distance per unit of altitude lost."},{"q":"How does a tailwind affect maximum range?","a":"A tailwind increases maximum range because the aircraft covers more ground distance for the same air distance. The pilot should fly slightly slower than VMD to optimise fuel burn per ground mile."},{"q":"What is the effect of altitude on true airspeed at a constant IAS?","a":"TAS increases with altitude for a given IAS because the air is less dense. The ratio of TAS to IAS increases by approximately 2% per 1,000 feet."},{"q":"Why do jet aircraft benefit more from high-altitude cruise than piston aircraft?","a":"Jet engines maintain better efficiency at altitude due to lower air temperatures and the aircraft's higher TAS. Piston engines lose power with altitude as they are not pressure-compensated."},{"q":"What is the relationship between fuel flow and altitude for a normally aspirated engine?","a":"Fuel flow decreases with altitude because the engine produces less power in thinner air. This reduced fuel flow, combined with higher TAS, can improve specific range up to a point."},{"q":"What is the optimum cruise altitude for a piston aircraft?","a":"The altitude where the combination of reduced fuel flow and increased TAS gives the best specific range. For most light piston aircraft, this is typically between 6,000 and 10,000 feet."},{"q":"How does leaning the mixture affect cruise performance?","a":"Proper leaning at cruise reduces fuel consumption to the minimum required for the power setting, maximising range and endurance. Over-leaning can cause engine damage."},{"q":"What is the difference between best economy and best power mixture settings?","a":"Best economy (peak EGT or slightly lean of peak) gives minimum fuel flow for maximum range. Best power (slightly rich of peak EGT) gives maximum power output for a given fuel flow."},{"q":"What is the speed for maximum endurance in a piston aircraft?","a":"The speed for minimum power required (VMP), which is slower than VMD. At this speed, fuel consumption per hour is minimised."},{"q":"How does carrying external stores or a rough paint finish affect cruise performance?","a":"Both increase parasite drag, requiring more power to maintain the same speed, which reduces range and endurance."},{"q":"What is the cruise climb technique?","a":"Climbing at a speed higher than VY with reduced pitch attitude. It provides less climb rate but better visibility, engine cooling, and passenger comfort while still gaining altitude en route."},{"q":"Why does the best glide ratio not change with weight?","a":"The best L/D ratio is a function of the aircraft's aerodynamic design, not weight. A heavier aircraft achieves the same L/D ratio but at a higher speed."},{"q":"What is the effect of extending the landing gear on glide performance?","a":"Extending the gear significantly increases parasite drag, reducing the L/D ratio and steepening the glide angle, which shortens the glide distance."},{"q":"In a power-off glide, what happens if the pilot flies faster than best glide speed?","a":"The glide angle steepens and glide distance decreases because excess speed increases drag more than any marginal lift benefit, wasting altitude."},{"q":"In a power-off glide, what happens if the pilot flies slower than best glide speed?","a":"The glide angle also steepens because induced drag increases at lower speeds (higher AoA), and the aircraft is on the back side of the drag curve."},{"q":"What is the effect of propeller windmilling on glide performance?","a":"A windmilling propeller creates significant drag, reducing glide distance. If possible, feathering the propeller (in aircraft so equipped) improves glide performance."},{"q":"How does density altitude affect climb performance?","a":"Higher density altitude reduces engine power output and propeller efficiency, decreasing both excess thrust and excess power, which reduces climb angle and rate of climb."},{"q":"What is the SAR (Specific Air Range)?","a":"The distance in nautical miles the aircraft can fly per unit of fuel (e.g., NM per kg). It is used to determine the most fuel-efficient cruise speed and altitude."},{"q":"How does turning flight affect the rate of climb?","a":"Turning during a climb increases the load factor and induced drag, requiring more power to maintain the same speed. This reduces excess power and rate of climb."},{"q":"What is the effect of configuration (flaps/gear) on climb performance?","a":"Extended flaps and gear increase drag significantly, reducing excess thrust and power. Climb angle and rate of climb are both degraded. Clean configuration gives best climb performance."},{"q":"Why is VY IAS typically published for sea level?","a":"Because VY IAS decreases slightly with altitude. The POH provides the sea-level value, and pilots should be aware that the optimum IAS reduces as they climb higher."},{"q":"How does the pilot determine if the aircraft can out-climb terrain ahead?","a":"By comparing the required climb gradient (based on terrain height and distance) with the aircraft's actual climb gradient at the current weight, altitude, temperature, and configuration."},{"q":"What is the relationship between climb gradient and excess thrust?","a":"Climb gradient (in percent) equals (excess thrust / weight) x 100. Greater excess thrust relative to weight gives a steeper climb gradient."},{"q":"What is the Carson speed?","a":"A cruise speed approximately 1.32 times VMD that provides the best compromise between speed and fuel efficiency, giving the most speed per unit of drag increase."}],"10 Landing Performance":[{"q":"How is landing distance measured?","a":"From 50 feet above the threshold (screen height) to a full stop, including the airborne approach phase, flare, touchdown, and ground braking roll."},{"q":"What is VREF and how is it calculated?","a":"VREF is the reference landing speed at the 50 ft screen height. It must be at least 1.3 times VSO (stall speed in landing configuration with flaps and gear down)."},{"q":"What is LDA?","a":"Landing Distance Available: the length of runway declared suitable for landing, which may be shorter than the physical runway due to displaced thresholds or obstacles."},{"q":"What is the golden rule for landing distance planning?","a":"The calculated Landing Distance Required (LDR) must NEVER exceed the LDA. If it does, the pilot must divert or reduce landing weight."},{"q":"How does a 10% increase in weight affect landing distance?","a":"Approximately a 10% increase in landing distance, due to higher VSO, higher VREF, higher touchdown speed, and greater momentum to dissipate."},{"q":"Why does high density altitude increase landing distance?","a":"In low-density air, TAS is higher than IAS for the same indicated approach speed. Higher TAS means higher groundspeed at touchdown, requiring more distance to stop."},{"q":"What are the environmental penalty rules for altitude and temperature on landing distance?","a":"Each 1,000 ft increase in altitude adds approximately 5% to landing distance. Each 10 degrees C above standard temperature adds approximately 5% to landing distance."},{"q":"How does a headwind affect landing distance?","a":"A headwind shortens landing distance by reducing groundspeed at touchdown. For calculations, use only 50% of the reported headwind component."},{"q":"How does a tailwind affect landing distance?","a":"A tailwind dangerously extends landing distance by increasing groundspeed. For calculations, use 150% of the reported tailwind component."},{"q":"What is the landing distance penalty for a wet grass runway?","a":"+35% (factor 1.35). This is the highest common surface penalty for landing."},{"q":"What is the landing distance penalty for a wet paved runway?","a":"+15% (factor 1.15), due to reduced braking friction."},{"q":"What landing distance penalty does short dry grass add?","a":"+15% (factor 1.15)."},{"q":"What is the effect of a downslope runway on landing distance?","a":"Gravity counteracts braking, increasing landing distance. Every 1% of downslope adds approximately 5% to landing distance required."},{"q":"What safety factor should be applied to the calculated landing distance?","a":"Multiply the corrected landing distance by 1.43 to obtain the safe operational landing distance."},{"q":"What role do flaps play in landing performance?","a":"Full flaps increase CL MAX (lowering VSO and VREF for a slower approach), create massive profile drag (allowing a steeper descent angle for obstacle clearance), and result in a shorter landing distance."},{"q":"How do landing performance graphs assume the aircraft is configured?","a":"Power off (idle) from the 50 ft screen height, full landing flaps deployed, paved level dry runway, and maximum braking applied immediately upon touchdown."},{"q":"Are landing correction factors added or multiplied together?","a":"They are multiplied (chained) together, not added. For example, wet grass (x1.35) and 2% downslope (x1.10) gives a total factor of 1.35 x 1.10 = 1.485."},{"q":"A pilot calculates a gross landing distance of 500m from the POH. The runway is wet grass with 1% downslope. What is the safe operational LDR?","a":"Apply wet grass (x1.35): 675m. Apply 1% downslope (x1.05): 709m. Apply 1.43 safety factor: 709 x 1.43 = approximately 1,014m."},{"q":"What is the effect of a steep approach on landing distance?","a":"A steep approach may result in a longer landing distance if the pilot floats in the flare due to excess energy, but it improves obstacle clearance over the threshold."},{"q":"What is hydroplaning and how does it affect landing?","a":"Hydroplaning occurs when a layer of water separates the tyres from the runway surface, drastically reducing braking effectiveness and directional control. The speed depends on tyre pressure."},{"q":"What is the formula for dynamic hydroplaning speed?","a":"VP = 9 x square root of tyre pressure (in PSI). Below this speed, the tyres can penetrate the water layer and regain contact with the surface."},{"q":"How does an approach speed higher than VREF affect landing distance?","a":"Every knot above VREF increases the landing distance because the aircraft floats further in the flare and touches down at a higher speed, requiring more distance to stop."},{"q":"What is the approximate landing distance increase for each 10% excess approach speed?","a":"Approximately 20% increase in landing distance, because distance is proportional to the square of the speed."},{"q":"What is the go-around procedure?","a":"Apply full power, adopt a climb attitude, retract flaps incrementally, establish a positive rate of climb, and fly the published missed approach or circuit pattern."},{"q":"When should a pilot initiate a go-around?","a":"Whenever the approach is unstable, the runway is not clearly visible, the aircraft is too high or too fast, or any condition makes a safe landing doubtful. The decision should be made early."},{"q":"What is a stabilised approach?","a":"An approach where the aircraft is on the correct glidepath, at the correct speed (VREF), in the correct configuration, with a constant rate of descent, by at least 500 feet AGL (VFR)."},{"q":"How does landing uphill affect landing distance?","a":"An uphill slope assists deceleration after touchdown, reducing the landing ground roll. Each 1% of upslope reduces landing distance by approximately 5%."},{"q":"Why is landing with a tailwind strongly discouraged?","a":"A tailwind increases the groundspeed at touchdown, dramatically increasing the ground roll. Every knot of tailwind has a greater percentage effect than a knot of headwind."},{"q":"What is the effect of using only partial flaps for landing?","a":"Partial flaps result in a higher approach speed, flatter approach angle, and longer landing distance compared to full flaps because of less drag and higher stall speed."},{"q":"How does braking technique affect landing distance?","a":"Maximum braking (without skidding) gives the shortest stopping distance. Anti-skid systems or proper technique (firm but not locked brakes) maintains optimal deceleration."},{"q":"What is the effect of a late or high flare on landing distance?","a":"A high flare causes the aircraft to float, consuming runway distance while airborne. It may also lead to a hard landing or a ballooned approach requiring a go-around."},{"q":"What happens if the pilot lands with excessive speed?","a":"The aircraft floats beyond the intended touchdown point, using more runway. The higher touchdown speed also means more kinetic energy to dissipate during braking, extending the ground roll."},{"q":"What is the landing distance penalty for long or wet grass compared to short dry grass?","a":"Long wet grass can add 35-60% to landing distance versus approximately 15% for short dry grass, due to greatly reduced braking friction."},{"q":"How does the pilot correct for crosswind during the landing flare?","a":"Using the wing-low (sideslip) method: lower the into-wind wing with aileron and apply opposite rudder to keep the aircraft aligned with the runway centreline. Touch down on the upwind wheel first."},{"q":"What factors determine the maximum crosswind component for landing?","a":"Aircraft type certification limits, pilot experience, runway width, surface condition, and gust factor. The demonstrated crosswind value in the POH is a guideline, not a limitation for Part 91."},{"q":"What is the crab method of crosswind landing?","a":"The pilot maintains a crab angle into wind on approach to track the centreline, then kicks the rudder to align with the runway just before touchdown. It requires precise timing."},{"q":"How does weight affect VREF?","a":"Lower weight reduces VSO, which reduces VREF (1.3 x VSO). This lower approach speed results in less kinetic energy at touchdown and shorter landing distance."},{"q":"What is the danger of landing on a wet runway with worn tyres?","a":"Worn tyres have reduced tread depth, which decreases their ability to channel water away. This lowers the hydroplaning speed and greatly reduces braking effectiveness."},{"q":"How does the pilot use the PAPI or VASI on approach?","a":"Two red and two white lights indicate the correct glidepath (typically 3 degrees). More red means too low; more white means too high. The pilot adjusts pitch and power to maintain the correct indication."},{"q":"What is the effect of reduced visibility on landing performance?","a":"Reduced visibility does not directly change the aircraft's landing distance but increases the risk of a late or improper approach, which can result in a longer actual landing distance or missed approach."},{"q":"Why should the pilot avoid landing with the parking brake set?","a":"Landing with the parking brake set locks the wheels on touchdown, causing immediate tyre blowout and loss of directional control due to skidding."},{"q":"What is the recommended touchdown point for a normal landing?","a":"Within the first third of the runway, at or near the touchdown zone markers (if present), to ensure adequate remaining runway for the ground roll."},{"q":"How does wake turbulence from a preceding aircraft affect landing?","a":"Wake vortices from a heavier preceding aircraft can cause severe roll and loss of control. The pilot should stay above the preceding aircraft's glidepath and land beyond its touchdown point."},{"q":"What is the effect of using reverse thrust or propeller reverse on landing distance?","a":"Reverse thrust significantly reduces the ground roll by providing a decelerating force in addition to wheel braking. Not all light aircraft have this capability."},{"q":"Why is a firm touchdown preferred over a greased landing in short-field conditions?","a":"A firm touchdown places the weight on the wheels immediately, enabling prompt and effective braking. A greased landing may cause floating and delayed brake application, wasting runway."},{"q":"What is the effect of runway elevation on landing distance?","a":"Higher elevation means lower air density, so TAS is higher than IAS at the same indicated approach speed, resulting in a higher groundspeed at touchdown and longer landing distance."},{"q":"How does temperature affect landing distance?","a":"Higher temperature reduces air density, increasing TAS for the same IAS. This means higher groundspeed at touchdown and approximately 5% increase in landing distance per 10 degrees C above ISA."},{"q":"What is the effect of not using flaps on landing distance?","a":"Landing without flaps significantly increases the approach speed, flattens the approach angle, and extends the ground roll, typically increasing total landing distance by 40-50% or more."},{"q":"What is the rejected landing procedure?","a":"If the aircraft has touched down but the landing is unsafe (e.g., bounced landing, obstacle on runway), apply full power immediately, adopt climb attitude, and execute a go-around if sufficient runway and altitude remain."},{"q":"How does a bounced landing increase risk?","a":"After a bounce the aircraft is airborne with decreasing speed and possibly a nose-high attitude, risking a secondary hard landing or stall. The safest response is often to go around."}]},"04 HPL":{"1 Aviation Human Factors":[{"q":"What percentage of aviation accidents are attributed to human factors?","a":"Approximately 75% of aviation accidents are caused by human factors."},{"q":"What does the SHELL model stand for in aviation human factors?","a":"Software, Hardware, Environment, Liveware (self), and Liveware (others). It models how the human (central Liveware) interacts with each element."},{"q":"Who is at the centre of the SHELL model?","a":"The human operator (Liveware) is at the centre, interacting with all other components."},{"q":"What is the 'Swiss Cheese' model of accident causation?","a":"James Reason's model showing that accidents occur when holes (failures) in multiple layers of defences align, allowing a hazard to pass through all barriers."},{"q":"What is the difference between an active failure and a latent failure?","a":"Active failures are immediate unsafe acts by the operator (e.g., pilot error). Latent failures are pre-existing system weaknesses such as poor design or inadequate training that remain dormant until triggered."},{"q":"In the SHELL model, what does the Liveware-Hardware interface refer to?","a":"The interaction between the human and the physical aircraft systems, controls, and instruments, including ergonomic design considerations."},{"q":"What is the Liveware-Software interface in the SHELL model?","a":"The interaction between the human and non-physical aspects such as procedures, checklists, manuals, and regulations."},{"q":"A pilot misreads a checklist due to poor font size. Which SHELL interface does this represent?","a":"The Liveware-Software (L-S) interface, as it involves the interaction between the pilot and procedural/documentation design."},{"q":"What is the purpose of Crew Resource Management (CRM)?","a":"CRM aims to improve flight safety by optimising the use of all available resources including crew communication, teamwork, decision-making, and workload management."},{"q":"What does the 'Environment' component in the SHELL model include?","a":"Both the physical environment (temperature, noise, vibration, altitude) and the organisational environment (company culture, regulations, economic pressures)."},{"q":"What is a 'dirty dozen' in human factors?","a":"Twelve common human factors that contribute to maintenance and aviation errors, including complacency, lack of knowledge, distraction, lack of teamwork, fatigue, lack of resources, pressure, lack of assertiveness, stress, lack of awareness, norms, and lack of communication."},{"q":"How does the Swiss Cheese model help prevent accidents?","a":"By ensuring multiple independent layers of defence exist so that a failure in one layer is caught by subsequent layers, preventing the holes from aligning."},{"q":"A co-pilot is too intimidated to speak up about a captain's error. Which SHELL interface is compromised?","a":"The Liveware-Liveware (L-L) interface, which covers interpersonal communication and crew dynamics."},{"q":"What is 'situational awareness' in aviation human factors?","a":"The pilot's perception and understanding of the current flight environment and the ability to project what will happen next. Loss of situational awareness is a major cause of accidents."},{"q":"Why is human factors training important for pilots?","a":"Because human error cannot be entirely eliminated, training helps pilots recognise limitations, manage errors, and use defensive strategies to maintain safety."},{"q":"What is an 'error chain' in aviation?","a":"A sequence of events or errors that, individually minor, combine and escalate toward an accident. Breaking any link in the chain can prevent the accident."},{"q":"What percentage of aviation accidents are caused by human error rather than mechanical failure?","a":"Approximately 75-80% of aviation accidents are attributed to human factors rather than mechanical failure."},{"q":"What is the Swiss Cheese model of accident causation?","a":"Developed by James Reason, it shows that accidents occur when holes (failures) in multiple defensive layers align, allowing a hazard to pass through all barriers."},{"q":"What does the Environment component in the SHELL model include?","a":"It includes both the physical environment (weather, temperature, noise, vibration) and the organisational environment (company culture, regulations, schedules)."},{"q":"What is the Dirty Dozen in human factors?","a":"The Dirty Dozen is a list of 12 common human error preconditions in aviation maintenance, including complacency, lack of communication, distraction, fatigue, and stress."},{"q":"A co-pilot is too intimidated to speak up about a captain's error. Which SHELL interface does this represent?","a":"This is a Liveware-Liveware interface issue, involving poor interpersonal communication between crew members."},{"q":"What is situational awareness in aviation human factors?","a":"Situational awareness is a pilot's accurate perception of the current flight environment, understanding of its meaning, and projection of its future state."},{"q":"What is an error chain in aviation?","a":"An error chain is a sequence of small errors or failures that, when combined, lead to an accident. Breaking any single link can prevent the accident."},{"q":"What is the Liveware-Environment interface in the SHELL model?","a":"It covers how external conditions such as weather, noise, temperature, lighting, and turbulence affect the pilot's ability to perform safely."},{"q":"How does complacency relate to the SHELL model?","a":"Complacency is a Liveware (self) issue where the pilot becomes overconfident or inattentive, often during routine operations, weakening their role as the central element."},{"q":"What role does organisational culture play in aviation human factors?","a":"A safety-oriented organisational culture encourages reporting of errors, open communication, and continuous improvement, reducing the likelihood of latent failures."},{"q":"How does poor cockpit ergonomics illustrate a SHELL model failure?","a":"Poor ergonomics represents a Liveware-Hardware mismatch where the physical design of controls or displays does not match the pilot's physical or cognitive capabilities."},{"q":"What is the difference between an error and a violation in human factors?","a":"An error is an unintentional deviation from correct action, while a violation is a deliberate departure from rules or procedures."},{"q":"Why are standard operating procedures (SOPs) important in managing human factors?","a":"SOPs provide consistent, proven methods that reduce variability in performance and serve as a defensive layer against human error."},{"q":"What is threat and error management (TEM)?","a":"TEM is a framework where pilots actively identify threats, recognize errors before they become consequential, and manage undesired aircraft states to maintain safety."},{"q":"How does fatigue represent a human factors concern?","a":"Fatigue degrades attention, reaction time, decision-making, and memory, significantly increasing the probability of human error during flight operations."},{"q":"What is the role of feedback in the SHELL model?","a":"Feedback ensures that each interface in the SHELL model provides the pilot with adequate information to monitor, evaluate, and correct their actions during flight."},{"q":"What is a latent condition in the Swiss Cheese model?","a":"A latent condition is a pre-existing systemic weakness such as inadequate training, poor design, or understaffing that may remain hidden until it combines with active failures to cause an accident."},{"q":"How does automation affect human factors in modern cockpits?","a":"Automation can reduce workload but may also lead to complacency, skill degradation, and loss of situational awareness if the pilot becomes a passive monitor rather than an active operator."},{"q":"What is the relationship between stress and human error in aviation?","a":"Excessive stress narrows attention, impairs judgement, and increases reaction time, making pilots more prone to errors during high-demand situations."},{"q":"Why is the SHELL model considered a dynamic model?","a":"Because the interfaces between the components are constantly changing as the flight progresses, and a mismatch at any interface can create a hazard."},{"q":"What is normalization of deviance in aviation human factors?","a":"It occurs when repeated minor deviations from standard procedures become accepted as normal, gradually eroding safety margins until an accident occurs."},{"q":"How does the Swiss Cheese model apply to a VFR-into-IMC accident?","a":"Multiple layers failed: inadequate weather briefing, poor go/no-go decision, lack of instrument rating, failure to turn back, and no ATC intervention - all holes aligned to allow the accident."},{"q":"What is the primary goal of human factors study in aviation?","a":"To optimize the relationship between people and systems by understanding human capabilities and limitations, thereby improving safety and reducing accidents."},{"q":"How does distraction contribute to aviation accidents?","a":"Distraction diverts attention from critical tasks, leading to missed checklist items, incorrect configurations, or failure to monitor instruments at crucial moments."},{"q":"What is the Reason model also known as?","a":"The Reason model is also known as the Swiss Cheese model, named after Professor James Reason who developed it to explain how multiple system failures lead to accidents."},{"q":"What is the Hawkins SHELL model used for in aviation?","a":"The Hawkins SHELL model is used to analyze the interfaces between the human operator and other system components (Software, Hardware, Environment, Liveware) to identify sources of human error."},{"q":"How does cockpit resource management relate to CRM?","a":"Cockpit resource management was the original term for CRM. It was later broadened to Crew Resource Management to include all crew members and resources in the safety chain."},{"q":"What is a precondition for unsafe acts in accident analysis?","a":"Preconditions include adverse mental states (fatigue, complacency), adverse physiological states (illness, hypoxia), and physical or mental limitations that set the stage for pilot errors."},{"q":"How does confirmation bias affect aviation human factors?","a":"Confirmation bias causes pilots to seek or favor information that confirms their existing belief about a situation while ignoring contradictory evidence, leading to poor decisions."},{"q":"What is the role of standard call-outs in human factors management?","a":"Standard call-outs ensure that critical information is communicated consistently between crew members, reducing the chance of miscommunication and missed items."},{"q":"What is human reliability in aviation?","a":"Human reliability measures the probability that a person will complete a task without error. In aviation, humans make approximately 1 error per 100 simple actions."},{"q":"How does the Liveware-Liveware interface relate to CRM?","a":"The Liveware-Liveware interface covers interpersonal communication, teamwork, authority gradients, and crew coordination - all core elements addressed by CRM training."},{"q":"What are defensive barriers in the Swiss Cheese model?","a":"Defensive barriers include training, procedures, checklists, regulations, equipment design, and supervision - each layer designed to catch errors before they become accidents."},{"q":"Why is a just culture important in aviation safety?","a":"A just culture encourages honest reporting of errors and near-misses without fear of punishment, while maintaining accountability for reckless or intentional violations."}],"2 Atmospheric Human Performance":[{"q":"What is the composition of the atmosphere by volume?","a":"Approximately 78% nitrogen, 21% oxygen, and 1% other gases (argon, CO2, etc.). This ratio remains constant up to about 100,000 ft."},{"q":"What is the standard sea-level atmospheric pressure in hPa (mb)?","a":"1013.25 hPa (millibars)."},{"q":"How does atmospheric pressure change with altitude?","a":"Pressure decreases with increasing altitude. It halves approximately every 18,000 ft."},{"q":"What is partial pressure and why is it important for pilots?","a":"Partial pressure is the pressure exerted by each individual gas in a mixture (Dalton's Law). The partial pressure of oxygen decreases with altitude, reducing oxygen availability for breathing."},{"q":"At what altitude does the partial pressure of oxygen begin to significantly affect an unacclimatised pilot?","a":"Above approximately 10,000 ft, the reduced partial pressure of oxygen can cause noticeable performance degradation without supplemental oxygen."},{"q":"What is Dalton's Law of Partial Pressures?","a":"The total pressure of a gas mixture equals the sum of the partial pressures of each individual gas. Each gas exerts pressure proportional to its percentage in the mixture."},{"q":"What is Boyle's Law and how does it affect the body at altitude?","a":"Boyle's Law states that gas volume is inversely proportional to pressure (at constant temperature). As altitude increases and pressure decreases, trapped gases in the body expand, causing ear pain, sinus pain, and gastrointestinal discomfort."},{"q":"What is Henry's Law and its relevance to aviation?","a":"Henry's Law states that the amount of gas dissolved in a liquid is proportional to the partial pressure of that gas. At altitude, reduced pressure causes dissolved nitrogen to form bubbles in blood/tissues, potentially causing decompression sickness."},{"q":"What are the four layers of the atmosphere from lowest to highest?","a":"Troposphere, stratosphere, mesosphere, and thermosphere. Most aviation occurs in the troposphere and lower stratosphere."},{"q":"What is the tropopause?","a":"The boundary between the troposphere and stratosphere, at approximately 36,000 ft at mid-latitudes. Temperature stops decreasing and remains roughly constant above this level."},{"q":"What is the standard temperature lapse rate in the troposphere?","a":"Approximately 2 degrees Celsius per 1,000 ft (or 1.98 degrees C per 1,000 ft in the ISA)."},{"q":"What is the ISA standard temperature at sea level?","a":"15 degrees Celsius (59 degrees Fahrenheit)."},{"q":"Why is humidity a concern for pilots regarding human performance?","a":"Low humidity at altitude causes dehydration, which impairs cognitive function and increases fatigue. Pilots should drink water regularly during flight."},{"q":"What happens to the boiling point of water at high altitude?","a":"The boiling point decreases as atmospheric pressure drops. At around 63,000 ft (Armstrong Line), body fluids can boil at body temperature."},{"q":"A pilot ascends rapidly from sea level to 18,000 ft. What approximate fraction of sea-level pressure remains?","a":"Approximately half (about 500 hPa), since atmospheric pressure halves roughly every 18,000 ft."},{"q":"How does temperature typically change in the stratosphere?","a":"Temperature remains approximately constant or increases slightly in the stratosphere due to ozone absorbing UV radiation."},{"q":"What is the standard sea-level atmospheric pressure in hPa?","a":"Standard sea-level atmospheric pressure is 1013.25 hPa (millibars)."},{"q":"At what altitude does the partial pressure of oxygen begin to significantly affect human performance?","a":"Above approximately 10,000 ft, the reduced partial pressure of oxygen begins to noticeably impair human performance."},{"q":"What is the physiological division of the atmosphere?","a":"The atmosphere is divided into the physiological zone (0-10,000 ft), the deficient zone (10,000-50,000 ft), and the space-equivalent zone (above 50,000 ft)."},{"q":"Why does nitrogen remain at 78% concentration regardless of altitude?","a":"Because the composition of the atmosphere remains constant with altitude - only the total pressure and therefore the partial pressures of each gas decrease."},{"q":"What is the significance of 10,000 ft in atmospheric human performance?","a":"Above 10,000 ft, the partial pressure of oxygen drops enough to cause measurable impairment of night vision, judgement, and cognitive performance in most people."},{"q":"At approximately what altitude would body fluids begin to boil?","a":"At approximately 63,000 ft (the Armstrong Line), the atmospheric pressure is so low that body fluids would boil at normal body temperature of 37 degrees C."},{"q":"How does Boyle's Law explain ear pain during descent?","a":"During descent, increasing pressure compresses air in the middle ear. If the Eustachian tube does not equalize quickly enough, the pressure differential causes pain."},{"q":"What is the relationship between altitude and gas expansion in the body?","a":"As altitude increases and pressure decreases, gases trapped in body cavities (sinuses, middle ear, intestines) expand according to Boyle's Law, causing discomfort or pain."},{"q":"Why is the troposphere the most important atmospheric layer for aviation?","a":"Because most weather occurs in the troposphere, and the majority of general aviation flight operations take place within this layer (surface to about 36,000 ft)."},{"q":"What is the effect of reduced atmospheric pressure on oxygen delivery to tissues?","a":"Reduced atmospheric pressure lowers the partial pressure of oxygen in inhaled air, reducing the pressure gradient for oxygen transfer from lungs to blood, leading to hypoxia."},{"q":"How does altitude affect the gas volume in a sealed container like a crisp packet?","a":"The gas inside expands as the aircraft climbs because external pressure decreases while the gas pressure inside remains initially the same, following Boyle's Law."},{"q":"What percentage of sea-level oxygen partial pressure is available at 10,000 ft?","a":"At 10,000 ft, approximately 69% of sea-level oxygen partial pressure is available, which begins to affect night vision and subtle cognitive functions."},{"q":"Why is pressurization important for aircraft flying above 10,000 ft?","a":"Pressurization maintains a cabin altitude below 10,000 ft (typically around 6,000-8,000 ft), ensuring adequate oxygen partial pressure for passengers and crew without supplemental oxygen."},{"q":"What is the physiological efficient zone of the atmosphere?","a":"The zone from sea level to approximately 10,000 ft where the human body can function adequately without supplemental oxygen or pressurization."},{"q":"According to Dalton's Law, if total pressure at 18,000 ft is half of sea level, what is the partial pressure of oxygen?","a":"The partial pressure of oxygen is also halved, dropping from about 213 hPa at sea level to about 106 hPa at 18,000 ft."},{"q":"What happens to dissolved nitrogen in the blood during rapid ascent?","a":"According to Henry's Law, as pressure decreases, dissolved nitrogen comes out of solution and can form bubbles in tissues and joints, causing decompression sickness."},{"q":"How does the standard atmosphere model help pilots?","a":"It provides a standardized reference for pressure, temperature, and density at various altitudes, allowing consistent calibration of instruments and performance calculations."},{"q":"What are the two main gases that make up 99% of the atmosphere?","a":"Nitrogen (78%) and oxygen (21%) together make up approximately 99% of the atmosphere by volume."},{"q":"Why does the rate of pressure decrease slow down with altitude?","a":"Because the atmosphere is compressible - the lower layers are compressed by the weight of the air above, so pressure changes are greatest near the surface and diminish with altitude."},{"q":"What is the effect of high altitude on the volume of intestinal gases?","a":"Intestinal gases expand with altitude according to Boyle's Law, causing abdominal discomfort and bloating, which can be distracting and impair pilot performance."},{"q":"What happens to the air density as altitude increases?","a":"Air density decreases with altitude because there are fewer gas molecules per unit volume, which affects both engine performance and the amount of oxygen available for breathing."},{"q":"What is the significance of the tropopause for aviation?","a":"The tropopause marks where temperature stops decreasing with altitude. Jet streams occur near it, and most weather is confined below it in the troposphere."},{"q":"How does altitude affect the relative humidity of cabin air?","a":"At high altitudes, outside air has very low moisture content. When compressed and heated for cabin use, the resulting air is extremely dry, often below 10% relative humidity."},{"q":"What is the standard pressure at 18,000 ft in ISA conditions?","a":"At 18,000 ft, the standard pressure is approximately 506 hPa, which is roughly half of the sea-level standard of 1013.25 hPa."},{"q":"How does Boyle's Law apply to sinus cavities during climb?","a":"During climb, air trapped in the sinuses expands as ambient pressure decreases. If sinus passages are blocked, this expansion causes severe sinus pain (barosinusitis)."},{"q":"What is the pressure lapse rate in the lower atmosphere?","a":"Pressure decreases by approximately 1 hPa per 30 ft (or 1 inHg per 1,000 ft) near sea level, though this rate slows with increasing altitude."},{"q":"Why does the atmosphere composition remain constant with altitude?","a":"Turbulent mixing in the lower atmosphere keeps the proportions of gases uniform. Only above about 80 km (the turbopause) do gases begin to separate by molecular weight."},{"q":"What is the effect of high altitude on engine performance?","a":"Reduced air density at high altitude decreases engine power output for normally aspirated engines, as less oxygen is available for combustion per unit volume of air."},{"q":"At what altitude is atmospheric pressure approximately one-quarter of sea-level pressure?","a":"At approximately 34,000-36,000 ft, atmospheric pressure is about one-quarter of sea-level pressure (approximately 253 hPa)."},{"q":"How does temperature affect the density of air at a given altitude?","a":"Higher temperatures cause air to expand and become less dense, while lower temperatures make air denser. This affects both aircraft performance and physiological oxygen availability."},{"q":"What is the physiological deficient zone of the atmosphere?","a":"The physiological deficient zone extends from approximately 10,000 ft to 50,000 ft, where supplemental oxygen or pressurization is required for adequate human function."},{"q":"Why is the partial pressure of oxygen the critical factor rather than the percentage of oxygen?","a":"Because the percentage of oxygen remains constant at 21% at all altitudes. It is the partial pressure that decreases, and this determines the driving force for oxygen transfer into the blood."},{"q":"What effect does low atmospheric pressure have on wound healing?","a":"Low atmospheric pressure reduces oxygen delivery to tissues, potentially slowing wound healing and increasing susceptibility to infection, which is relevant for pilots with recent injuries or surgery."},{"q":"How does the ISA model differ from actual atmospheric conditions?","a":"The ISA is a theoretical standard. Actual conditions vary daily with weather, location, and season. Pilots must account for deviations from ISA when assessing physiological altitude effects."}],"3 Pilot Physiology":[{"q":"What are the two divisions of the nervous system?","a":"The Central Nervous System (CNS), consisting of the brain and spinal cord, and the Peripheral Nervous System (PNS), connecting the CNS to the rest of the body."},{"q":"What are the two subdivisions of the autonomic nervous system?","a":"The sympathetic nervous system (fight or flight response) and the parasympathetic nervous system (rest and digest)."},{"q":"What is the function of haemoglobin in the blood?","a":"Haemoglobin in red blood cells binds with oxygen in the lungs and transports it to body tissues. It has a much higher affinity for carbon monoxide than oxygen."},{"q":"Why is carbon monoxide (CO) dangerous for pilots?","a":"CO binds to haemoglobin approximately 200-250 times more readily than oxygen, forming carboxyhaemoglobin and preventing oxygen transport. Even small amounts can cause significant impairment."},{"q":"What are the symptoms of carbon monoxide poisoning?","a":"Headache, dizziness, nausea, confusion, impaired judgement, cherry-red skin coloration, and eventually unconsciousness. Symptoms are insidious and may be mistaken for other conditions."},{"q":"What should a pilot do if carbon monoxide contamination is suspected in the cockpit?","a":"Immediately shut off the cabin heater, open air vents and windows, use supplemental oxygen if available, land as soon as possible, and seek medical attention."},{"q":"What is the process of respiration at the cellular level?","a":"Oxygen from inhaled air diffuses across the alveolar membrane into the blood, while carbon dioxide diffuses from the blood into the alveoli to be exhaled. This gas exchange is driven by partial pressure differences."},{"q":"What is hyperventilation?","a":"Excessive breathing rate that reduces blood CO2 levels, causing tingling, dizziness, muscle spasms, and potentially unconsciousness. It is often triggered by stress or anxiety."},{"q":"How should hyperventilation be treated in flight?","a":"Consciously slow the breathing rate, talk or sing to regulate breathing, and breathe into a bag if available to restore CO2 levels. Address the underlying cause of stress."},{"q":"How can a pilot distinguish between hyperventilation and hypoxia?","a":"Both share similar symptoms (dizziness, tingling). The key difference: hypoxia improves with supplemental oxygen, while hyperventilation improves by slowing breathing rate. If in doubt, use supplemental oxygen first."},{"q":"What percentage of the body's oxygen consumption does the brain use?","a":"The brain uses approximately 20-25% of the body's total oxygen supply despite being only about 2% of body weight."},{"q":"What is the function of the semicircular canals?","a":"Three fluid-filled canals in the inner ear that detect angular acceleration (rotational movement) in three planes, providing the brain with information about head and body rotation."},{"q":"What is the vestibular system?","a":"The balance system located in the inner ear, comprising the semicircular canals (detecting rotation) and the otolith organs (detecting linear acceleration and gravity)."},{"q":"What is the 'fight or flight' response?","a":"An automatic sympathetic nervous system response to perceived danger that increases heart rate, blood pressure, and blood sugar while redirecting blood to muscles, preparing the body for action."},{"q":"Why is smoking particularly harmful for pilots?","a":"Smoking introduces carbon monoxide into the blood (reducing oxygen-carrying capacity), effectively raising the pilot's physiological altitude by several thousand feet and worsening the effects of hypoxia."},{"q":"What is spatial disorientation?","a":"A condition where the pilot cannot correctly determine their position, attitude, or motion relative to the earth's surface due to conflicting or unreliable sensory inputs, especially in IMC."},{"q":"Why is carbon monoxide dangerous for pilots?","a":"Carbon monoxide binds to haemoglobin approximately 200-250 times more readily than oxygen, displacing oxygen and causing tissue hypoxia even at low concentrations."},{"q":"What is the fight or flight response?","a":"The sympathetic nervous system response to perceived danger that increases heart rate, blood pressure, and blood sugar while diverting blood to muscles, preparing the body for action."},{"q":"What is the function of the otolith organs?","a":"The otolith organs (utricle and saccule) detect linear acceleration and gravity, helping the brain determine head tilt and translational movement."},{"q":"What is the primary role of the parasympathetic nervous system?","a":"The parasympathetic system promotes rest and digest functions - it slows heart rate, increases digestion, and conserves energy during calm conditions."},{"q":"How does the circulatory system deliver oxygen to tissues?","a":"Oxygen-rich blood is pumped by the heart through arteries to capillaries in tissues, where oxygen diffuses from haemoglobin into cells, and carbon dioxide returns via veins."},{"q":"What are the two types of blood cells relevant to pilot physiology?","a":"Red blood cells (erythrocytes) carry oxygen via haemoglobin, and white blood cells (leukocytes) fight infection and disease."},{"q":"What triggers the breathing reflex?","a":"The breathing reflex is primarily triggered by elevated carbon dioxide levels in the blood, detected by chemoreceptors in the brain stem and carotid bodies."},{"q":"Why is carbon dioxide important for regulating breathing?","a":"Carbon dioxide is the primary chemical trigger for the breathing reflex. Abnormally low CO2 from hyperventilation can suppress the breathing drive and cause lightheadedness."},{"q":"What happens to blood oxygen saturation above 10,000 ft without supplemental oxygen?","a":"Blood oxygen saturation drops progressively from about 97% at sea level to approximately 90% at 10,000 ft and continues to fall, impairing cognitive and physical performance."},{"q":"How does the body normally regulate blood pressure?","a":"Through baroreceptors in arteries that signal the brain to adjust heart rate and blood vessel diameter, and through kidney regulation of blood volume."},{"q":"What is the role of the spinal cord in reflexes?","a":"The spinal cord provides a direct neural pathway for reflex arcs, allowing rapid automatic responses to stimuli without involving the brain, reducing reaction time."},{"q":"Why do pilots need to understand the autonomic nervous system?","a":"Because the fight or flight response affects heart rate, blood pressure, vision, and cognitive function, all of which directly impact pilot performance during stressful situations."},{"q":"What is the effect of positive G-forces on the circulatory system?","a":"Positive G-forces push blood away from the brain toward the lower body, potentially causing grey-out, tunnel vision, and blackout if the heart cannot maintain adequate cerebral blood flow."},{"q":"What is the effect of negative G-forces on the body?","a":"Negative G-forces push blood toward the head, causing red-out (reddening of vision), headache, and potential damage to blood vessels in the eyes and brain."},{"q":"How does anaemia affect a pilot's performance?","a":"Anaemia reduces the number of red blood cells or haemoglobin, decreasing the blood's oxygen-carrying capacity and effectively creating a state similar to mild hypoxia."},{"q":"What are the main components of the respiratory system?","a":"The nose, pharynx, larynx, trachea, bronchi, and lungs (containing alveoli where gas exchange occurs)."},{"q":"How does gas exchange occur in the lungs?","a":"Oxygen diffuses from air in the alveoli across the alveolar membrane into blood capillaries, while carbon dioxide diffuses from blood into the alveoli to be exhaled."},{"q":"What is the significance of oxygen partial pressure for gas exchange?","a":"Gas exchange depends on the partial pressure gradient between alveolar air and blood. At altitude, reduced oxygen partial pressure means less oxygen diffuses into the blood."},{"q":"What sensory inputs does the brain use for spatial orientation?","a":"The brain integrates visual input (eyes), vestibular input (inner ear), and proprioceptive input (muscles and joints) to determine spatial orientation."},{"q":"Why is the brain the most oxygen-sensitive organ?","a":"Brain cells begin to die within 4-6 minutes without oxygen, and even mild hypoxia impairs higher cognitive functions like judgement and decision-making before physical symptoms appear."},{"q":"What is the somatic nervous system?","a":"The somatic nervous system controls voluntary muscle movements and relays sensory information from the skin, muscles, and joints to the central nervous system."},{"q":"How does dehydration affect blood viscosity?","a":"Dehydration increases blood viscosity, making it thicker and harder for the heart to pump, reducing circulation efficiency and potentially contributing to stagnant hypoxia."},{"q":"What is the role of proprioception in pilot performance?","a":"Proprioception provides the brain with information about body position and movement through sensors in muscles and joints. It is the third sensory input for spatial orientation alongside vision and the vestibular system."},{"q":"How does the body regulate temperature in the cockpit environment?","a":"Through sweating (cooling), shivering (warming), vasodilation (releasing heat), and vasoconstriction (conserving heat). Extreme temperatures impair cognitive and motor performance."},{"q":"What is the significance of blood pressure for pilots?","a":"Adequate blood pressure ensures sufficient blood flow to the brain. Low blood pressure can cause dizziness and reduced cognitive function, while high blood pressure increases cardiovascular risk."},{"q":"How does the body respond to reduced oxygen at altitude?","a":"The body compensates by increasing heart rate and breathing rate to deliver more oxygen per minute, but these mechanisms become insufficient above approximately 10,000 ft without supplemental oxygen."},{"q":"What is the effect of G-forces on the vestibular system?","a":"G-forces stimulate the otolith organs, which cannot distinguish between acceleration and gravity. This leads to false orientation cues and potential spatial disorientation illusions."},{"q":"Why is the brain particularly vulnerable to oxygen deprivation?","a":"Brain cells have virtually no oxygen reserve, require a constant high oxygen supply (20% of total body consumption), and begin to die within 4-6 minutes without oxygen."},{"q":"What is the difference between voluntary and involuntary muscle control?","a":"Voluntary muscles (skeletal) are consciously controlled by the somatic nervous system, while involuntary muscles (cardiac and smooth) are controlled automatically by the autonomic nervous system."},{"q":"How does the body detect changes in blood oxygen levels?","a":"Peripheral chemoreceptors in the carotid bodies and aortic bodies detect changes in blood oxygen levels and signal the brain to adjust breathing rate and depth accordingly."},{"q":"What neurological symptoms might indicate carbon monoxide poisoning in flight?","a":"Headache, confusion, impaired coordination, visual disturbances, and difficulty concentrating are early neurological symptoms. Severe cases cause convulsions and loss of consciousness."},{"q":"How does the diving reflex relate to aviation?","a":"Cold water on the face triggers the diving reflex, slowing heart rate. This is relevant for ditching survival scenarios where sudden immersion in cold water can cause cardiac arrhythmias."},{"q":"What is the significance of hemoglobin saturation for pilot performance?","a":"Hemoglobin saturation indicates the percentage of hemoglobin carrying oxygen. Normal sea-level saturation is 95-100%. Below 90% (equivalent to about 10,000 ft), performance degradation begins."},{"q":"Why is the sympathetic nervous system response problematic during emergencies?","a":"While it prepares the body for action, it also narrows attention, increases muscle tension (possibly affecting fine motor control), and can cause tunnel vision and auditory exclusion."}],"4 Altitude Physiology":[{"q":"What is hypoxia?","a":"A condition where body tissues, especially the brain, do not receive sufficient oxygen to function properly. It is the most significant physiological threat at altitude."},{"q":"What are the four types of hypoxia?","a":"Hypoxic (reduced oxygen in inhaled air, e.g., altitude), anaemic (reduced oxygen-carrying capacity, e.g., CO poisoning), stagnant (reduced blood flow, e.g., G-forces), and histotoxic (cells unable to use oxygen, e.g., alcohol)."},{"q":"What is the Time of Useful Consciousness (TUC) at 25,000 ft?","a":"Approximately 3-5 minutes. TUC decreases rapidly with altitude; at 40,000 ft it is only 15-20 seconds."},{"q":"What is the Time of Useful Consciousness (TUC) at 40,000 ft?","a":"Approximately 15-20 seconds. This is barely enough time to don an oxygen mask."},{"q":"What are the early symptoms of hypoxia?","a":"Euphoria, impaired judgement, reduced self-criticism, personality changes, drowsiness, and a false sense of well-being. These are insidious because the pilot often feels fine."},{"q":"At what cabin altitude is supplemental oxygen required for the crew in unpressurised aircraft?","a":"Above 10,000 ft cabin altitude for prolonged exposure. Regulations typically require crew oxygen above 10,000 ft after 30 minutes and at all times above 12,000-13,000 ft (varies by regulation)."},{"q":"What is decompression sickness (DCS) and when does it occur?","a":"DCS occurs when dissolved nitrogen forms bubbles in the body due to rapid pressure reduction. Symptoms include joint pain (the bends), skin irritation (the creeps), chest pain (the chokes), and neurological symptoms."},{"q":"Why should a pilot avoid scuba diving before flying?","a":"Scuba diving saturates body tissues with nitrogen under pressure. Flying too soon after diving causes nitrogen to form bubbles as cabin pressure decreases, leading to decompression sickness. Wait at least 12-24 hours depending on dive profile."},{"q":"What is the recommended minimum wait time before flying after a non-decompression dive?","a":"A minimum of 12 hours after a single no-decompression dive, and 24 hours or more after repetitive dives or dives requiring decompression stops."},{"q":"What causes 'the bends' in altitude physiology?","a":"Nitrogen gas bubbles forming in joints and tissues due to a rapid reduction in ambient pressure, typically above 25,000-30,000 ft or after recent scuba diving at lower altitudes."},{"q":"How does alcohol affect susceptibility to hypoxia?","a":"Alcohol causes histotoxic hypoxia by impairing cells' ability to use oxygen. It also impairs judgement independently, and the effects of both combine to severely degrade performance at altitude."},{"q":"What effect do trapped gases have during ascent?","a":"Gases trapped in body cavities (sinuses, middle ear, gastrointestinal tract) expand according to Boyle's Law as altitude increases, causing pain in blocked sinuses or ears, and abdominal discomfort."},{"q":"What is barotrauma?","a":"Physical damage to body tissues caused by pressure differences, typically in the middle ear or sinuses during climb or descent when the Eustachian tube or sinus ostia are blocked."},{"q":"A pilot who smokes 20 cigarettes a day effectively raises their physiological altitude by how much?","a":"Approximately 3,000-5,000 ft due to carbon monoxide binding to haemoglobin and reducing oxygen-carrying capacity."},{"q":"What is the cabin altitude above which all occupants must use supplemental oxygen?","a":"Above approximately 13,000-14,000 ft cabin altitude (exact limit varies by jurisdiction), supplemental oxygen is required for all occupants."},{"q":"What is the most dangerous characteristic of hypoxia for pilots?","a":"Its insidious onset. The pilot often feels euphoric and confident while their judgement and motor skills are deteriorating, making self-diagnosis extremely difficult."},{"q":"At what cabin altitude is supplemental oxygen required for the crew in unpressurized aircraft?","a":"Supplemental oxygen is required for the flight crew above 10,000 ft cabin altitude for flights exceeding 30 minutes."},{"q":"What is decompression sickness and when does it occur?","a":"Decompression sickness occurs when dissolved nitrogen forms bubbles in body tissues and blood due to rapid decrease in ambient pressure, typically above 18,000 ft."},{"q":"What causes the bends in altitude physiology?","a":"The bends are caused by nitrogen bubbles forming in joints and muscles due to reduced atmospheric pressure, causing severe pain, particularly in large joints like knees and shoulders."},{"q":"What is hypoxic hypoxia and what causes it?","a":"Hypoxic hypoxia is caused by insufficient oxygen in the inspired air, typically due to high altitude where the partial pressure of oxygen is reduced. It is the most common type in aviation."},{"q":"What is anaemic hypoxia?","a":"Anaemic hypoxia occurs when the blood cannot carry sufficient oxygen due to reduced haemoglobin, caused by conditions like anaemia, blood loss, or carbon monoxide poisoning."},{"q":"What is stagnant hypoxia?","a":"Stagnant hypoxia occurs when blood flow is inadequate to deliver sufficient oxygen to tissues, caused by heart failure, shock, positive G-forces, or extreme cold."},{"q":"What is histotoxic hypoxia?","a":"Histotoxic hypoxia occurs when cells cannot use oxygen even though it is available, typically caused by alcohol, drugs, or certain poisons like cyanide."},{"q":"At what altitude does night vision begin to deteriorate due to hypoxia?","a":"Night vision can begin to deteriorate at altitudes as low as 5,000 ft due to the rod cells in the retina being highly sensitive to oxygen deprivation."},{"q":"What are the stages of hypoxia as altitude increases?","a":"Indifferent stage (0-10,000 ft), compensatory stage (10,000-15,000 ft), disturbance stage (15,000-20,000 ft), and critical stage (above 20,000 ft)."},{"q":"How does physical exercise affect the onset of hypoxia?","a":"Physical exercise increases oxygen demand, accelerating the onset and severity of hypoxia symptoms at any given altitude."},{"q":"What is the immediate treatment for hypoxia in flight?","a":"Descend to a lower altitude immediately and use supplemental oxygen if available. Ensure the oxygen system is functioning and properly connected."},{"q":"What factors increase susceptibility to hypoxia?","a":"Smoking, alcohol, fatigue, illness, poor physical fitness, cold temperatures, and sedentary lifestyle all increase susceptibility to hypoxia."},{"q":"What is the difference between rapid and explosive decompression?","a":"Rapid decompression occurs in 1-10 seconds, while explosive decompression occurs in less than 1 second. Explosive decompression is more dangerous as the body cannot equalize quickly enough."},{"q":"What are the symptoms of decompression sickness (DCS)?","a":"Joint pain (the bends), skin itching and rashes (the creeps), chest pain and breathing difficulty (the chokes), and neurological symptoms including vision disturbances."},{"q":"How does supplemental oxygen prevent hypoxia?","a":"Supplemental oxygen increases the partial pressure of oxygen in inhaled air, maintaining adequate oxygen delivery to tissues despite the reduced total atmospheric pressure at altitude."},{"q":"Why is the TUC shorter during exercise at altitude?","a":"Exercise increases the body's oxygen consumption rate, so the available oxygen is depleted faster, reducing the time before incapacitation from hypoxia."},{"q":"What is the significance of 18,000 ft in altitude physiology?","a":"At 18,000 ft, atmospheric pressure is approximately half of sea level, oxygen partial pressure is critically low without supplemental oxygen, and decompression sickness becomes a significant concern."},{"q":"How does cold temperature at altitude compound the effects of hypoxia?","a":"Cold causes vasoconstriction, reducing peripheral blood flow (stagnant hypoxia), and increases the body's metabolic demand for oxygen, worsening the effects of reduced oxygen availability."},{"q":"What is oxygen paradox?","a":"Oxygen paradox is a temporary worsening of symptoms that can occur when a hypoxic person first receives supplemental oxygen, due to sudden changes in blood chemistry. It passes quickly."},{"q":"What happens to TUC if the pilot is exercising at 25,000 ft?","a":"The TUC is significantly reduced during exercise, potentially dropping from 3-5 minutes at rest to as little as 1-2 minutes due to increased oxygen consumption."},{"q":"Why should pilots avoid gas-producing foods before flying at altitude?","a":"Gas-producing foods create intestinal gas that expands with altitude according to Boyle's Law, causing abdominal pain and distraction that can impair pilot performance."},{"q":"What cabin altitude do most pressurized aircraft maintain?","a":"Most pressurized aircraft maintain a cabin altitude of 6,000-8,000 ft, which keeps oxygen levels adequate for normal function without supplemental oxygen."},{"q":"What is the effect of smoking on the hypoxia threshold?","a":"Smoking raises the effective physiological altitude by 2,000-5,000 ft due to carbon monoxide binding to hemoglobin, so a smoking pilot at 8,000 ft may experience effects equivalent to 10,000-13,000 ft."},{"q":"How does fatigue compound the effects of altitude hypoxia?","a":"Fatigue increases the body's oxygen demand while reducing the brain's ability to compensate, effectively lowering the altitude threshold at which hypoxia symptoms appear."},{"q":"What is the treatment for decompression sickness in a pilot?","a":"Descend immediately, administer 100% oxygen, keep the affected person warm and hydrated, avoid pressurized cabin increases, and seek treatment in a hyperbaric chamber as soon as possible."},{"q":"Why does oxygen supplementation become increasingly important above 10,000 ft?","a":"Above 10,000 ft, the partial pressure of oxygen drops below the level needed for normal cognitive function. Each additional 1,000 ft further reduces oxygen availability exponentially."},{"q":"What is the creeps in decompression sickness?","a":"The creeps is a form of decompression sickness affecting the skin, causing itching, tingling, and a crawling sensation due to nitrogen bubbles forming under the skin."},{"q":"What is the chokes in decompression sickness?","a":"The chokes affect the lungs, causing chest pain, shortness of breath, and a dry cough due to nitrogen bubbles in the pulmonary blood vessels."},{"q":"How does cabin pressurization failure affect occupants?","a":"A pressurization failure exposes occupants to reduced oxygen at actual flight altitude, causing rapid-onset hypoxia. Emergency oxygen masks must be deployed and an immediate descent initiated."},{"q":"What is the TUC at 35,000 ft?","a":"The Time of Useful Consciousness at 35,000 ft is approximately 30 seconds to 1 minute."},{"q":"Why is oxygen supplementation alone insufficient above 40,000 ft?","a":"Above 40,000 ft, even 100% oxygen at ambient pressure may not provide sufficient oxygen partial pressure for consciousness. Pressure breathing or pressurized cabins become necessary."},{"q":"How does hypoxia affect a pilot's ability to self-diagnose?","a":"Hypoxia impairs the brain's higher functions first, including self-awareness and critical thinking, meaning a pilot becomes unable to recognize their own impairment."},{"q":"What is the indifferent stage of hypoxia?","a":"The indifferent stage (0-10,000 ft) shows minimal effects except possible reduced night vision above 5,000 ft. Most people function normally in this range."},{"q":"What is the disturbance stage of hypoxia?","a":"The disturbance stage (15,000-20,000 ft) produces significant impairment including drowsiness, poor judgement, impaired coordination, tunnel vision, and cyanosis (blue discoloration)."}],"5 Aviation Visual Performance":[{"q":"What are the two types of photoreceptor cells in the eye?","a":"Rods (for dim/peripheral/night vision, no colour detection) and cones (for bright/central/colour vision, concentrated in the fovea)."},{"q":"What is the fovea and why is it important for pilots?","a":"The fovea is a small area in the centre of the retina packed with cones, providing the sharpest visual acuity. Pilots use foveal vision for reading instruments and identifying distant objects."},{"q":"What is the blind spot in the eye?","a":"The point where the optic nerve exits the retina, which contains no photoreceptors. Objects in this area cannot be seen, making systematic scanning essential for collision avoidance."},{"q":"How long does full dark adaptation take?","a":"Approximately 30-45 minutes for the rods to fully adapt to darkness. Cones adapt within about 5-7 minutes but are not sensitive enough for true night vision."},{"q":"Why should pilots use red cockpit lighting at night?","a":"Red light stimulates cones for instrument reading but does not significantly affect rod adaptation, helping preserve night vision."},{"q":"What is the 'empty field myopia' phenomenon?","a":"In featureless conditions (haze, fog, over water), the eyes relax to a default focus distance of about 1-2 metres, making it impossible to spot distant traffic. Pilots should focus on distant objects or infinity to counteract this."},{"q":"What scanning technique should pilots use for collision avoidance?","a":"A systematic scan moving in small segments (10-15 degrees), pausing briefly at each segment to allow the fovea to detect objects. Continuous sweeping is ineffective because the eye cannot detect stationary objects during movement."},{"q":"What are the main visual illusions during approach and landing?","a":"Runway width illusion (wider runway = illusion of being too low; narrower = too high), slope illusion (upslope = too high, fly low; downslope = too low, fly high), and the black hole effect (no visual references = fly too low)."},{"q":"What illusion does a wider-than-normal runway create on approach?","a":"The illusion of being lower than actual altitude, causing the pilot to fly a higher approach and risk overshooting."},{"q":"What illusion does a narrower-than-normal runway create?","a":"The illusion of being higher than actual altitude, causing the pilot to fly a lower approach and risk undershooting."},{"q":"What is the black hole approach illusion?","a":"When approaching over featureless terrain (water/dark area) at night with only runway lights visible, the pilot perceives being too high and flies dangerously low, risking controlled flight into terrain."},{"q":"An upward sloping runway creates what illusion and what danger?","a":"The illusion of being too high on approach, causing the pilot to fly a shallower/lower path than intended, with the danger of undershooting the runway."},{"q":"What is autokinesis?","a":"A visual illusion at night where a stationary light appears to move when stared at against a dark background. It can cause a pilot to mistake a fixed light for another aircraft."},{"q":"What is presbyopia?","a":"Age-related loss of the eye's ability to focus on near objects due to hardening of the lens. It typically begins around age 40 and may require reading glasses for cockpit instruments."},{"q":"How does hypoxia affect vision?","a":"Vision is one of the first functions affected by hypoxia. Night vision can deteriorate as low as 5,000 ft due to reduced oxygen supply to the retina, and colour perception and acuity degrade with increasing altitude."},{"q":"Why is a 10-15 degree off-centre scan technique recommended at night?","a":"At night, the fovea (central vision) has poor sensitivity because it contains only cones. Looking 10-15 degrees off-centre uses the rod-rich peripheral retina, which is far more sensitive in low light."},{"q":"What is empty field myopia?","a":"Empty field myopia occurs when the eyes have no distant objects to focus on (e.g., flying above a uniform cloud layer), causing them to relax to a near focus of about 1-2 metres."},{"q":"What is a downward sloping runway illusion?","a":"A downward sloping runway gives the illusion of being too low, causing the pilot to fly a higher, steeper approach with the risk of overshooting and landing long."},{"q":"What is the accommodation reflex?","a":"The accommodation reflex is the eye's automatic adjustment of lens shape to focus on objects at different distances, controlled by the ciliary muscles."},{"q":"How does rain on the windscreen affect visual perception during approach?","a":"Rain on the windscreen refracts light and makes the runway appear farther away and lower, potentially causing the pilot to fly a higher approach than intended."},{"q":"What is the visual scanning problem with constant-bearing, decreasing-range targets?","a":"An aircraft on a collision course appears as a stationary dot that does not move across the windscreen, making it extremely difficult to detect until dangerously close."},{"q":"How does fog or haze affect distance perception?","a":"Fog or haze makes objects appear farther away than they actually are, potentially causing a pilot to fly too close to terrain or underestimate distance to the runway."},{"q":"What is the significance of peripheral vision for pilots?","a":"Peripheral vision is primarily served by rod cells and is important for detecting motion and other aircraft, especially at night. It covers approximately 180 degrees horizontally."},{"q":"What causes false horizon illusions?","a":"Sloping cloud banks, city lights on hilly terrain, or aurora can create the illusion of a false horizon, leading a pilot to bank or pitch the aircraft incorrectly."},{"q":"What is the sector scan technique?","a":"The sector scan divides the sky into segments of about 10-15 degrees, and the pilot pauses at each segment for 1-2 seconds to allow the eyes to focus before moving to the next section."},{"q":"Why is bright light exposure before night flight problematic?","a":"Bright light bleaches the photosensitive pigment (rhodopsin) in rod cells, requiring up to 30 minutes of dark adaptation before rod cells regain maximum night sensitivity."},{"q":"What is somatogravic illusion related to visual performance?","a":"During rapid acceleration (e.g., takeoff), the pilot may perceive a nose-up pitch illusion and push the nose down, or during deceleration perceive nose-down and pull up - a vestibular illusion that conflicts with visual cues."},{"q":"How does age affect a pilot's visual performance?","a":"With age, the lens becomes less flexible (presbyopia), dark adaptation slows, sensitivity to glare increases, and colour discrimination may decline."},{"q":"What is the minimum visual acuity standard for a Class 2 medical certificate?","a":"A Class 2 medical requires a minimum visual acuity of 6/12 (20/40) in each eye separately, correctable to 6/6 (20/20) with glasses or contact lenses."},{"q":"Why do bright lights in the cockpit degrade night vision?","a":"Bright white light causes the rod cells to lose their dark-adapted sensitivity. Even brief exposure can require 20-30 minutes to regain full dark adaptation."},{"q":"What is the purpose of wearing sunglasses while flying?","a":"Sunglasses protect against UV radiation, reduce glare that can cause eye fatigue, and help prevent temporary flash blindness. They should not be worn at night."},{"q":"How does a high approach speed affect visual perception during landing?","a":"Higher speed reduces the time available for visual assessment, and ground rush appears more intense, potentially causing the pilot to flare too early."},{"q":"What visual cues help a pilot maintain correct approach path?","a":"VASI or PAPI lights, runway aspect ratio, touchdown zone markings, and the perspective shape of the runway all provide visual approach guidance."},{"q":"Why is smoking harmful to night vision?","a":"Smoking reduces oxygen delivery to the retina through carbon monoxide binding to haemoglobin, and the effect on rod cells can degrade night vision to the equivalent of being at 5,000-8,000 ft."},{"q":"What is flicker vertigo?","a":"Flicker vertigo is caused by light flickering at certain frequencies (4-20 Hz), such as sunlight through a propeller, which can cause nausea, disorientation, or even seizures in susceptible individuals."},{"q":"What is the minimum time needed for cone adaptation to bright light?","a":"Cone cells adapt to bright conditions within about 5-7 minutes, much faster than the 30 minutes required for full rod (dark) adaptation."},{"q":"What visual problems can occur at night due to a dirty windscreen?","a":"A dirty windscreen scatters light from external sources, creating glare and halos that reduce visibility and can mask other aircraft lights or terrain features."},{"q":"How does myopia affect pilot visual performance?","a":"Myopia (near-sightedness) impairs distance vision, making it harder to spot traffic, identify landmarks, and judge distances. It must be corrected to meet medical standards."},{"q":"What is the visual effect of flying over snow-covered terrain?","a":"Snow creates a featureless white surface that can cause depth perception problems, white-out conditions, and empty field myopia due to lack of contrast and reference points."},{"q":"Why is it important to keep the cockpit dark-adapted before a night flight?","a":"Pre-adapting to darkness ensures maximum rod cell sensitivity from the start of the flight, providing the best possible night vision for takeoff and departure."},{"q":"How does the time of day affect a pilot's visual detection capability?","a":"During twilight, neither rods nor cones work optimally, creating the most difficult conditions for visual detection of other aircraft. Dawn and dusk are the most challenging visual periods."},{"q":"What is central scotoma?","a":"Central scotoma is a blind area in the central visual field. For pilots, a form of functional central scotoma occurs at night because the fovea has no rod cells and cannot see in low light."},{"q":"How does a featureless terrain approach differ from a normal approach visually?","a":"Without ground texture or reference points, the pilot has fewer depth cues, making it harder to judge height and descent rate accurately, increasing the risk of CFIT."},{"q":"What is the visual effect of approaching a runway with an upsloping terrain before the threshold?","a":"Upsloping terrain before the threshold creates an illusion of being higher than actual, potentially causing the pilot to descend below the correct glide path."},{"q":"Why should a pilot avoid staring at a single point when scanning for traffic?","a":"Staring causes the image to fade on the retina (Troxler effect). Moving the eyes in a systematic scan pattern keeps images fresh and improves the chance of detecting small targets."},{"q":"How do corrective lenses affect a pilot's visual scanning?","a":"Bifocal or varifocal lenses may cause blind spots at certain gaze angles. Pilots should ensure their prescription allows clear vision at instrument distance, arm's length, and infinity."},{"q":"What is the visual detection difficulty with head-on traffic?","a":"Head-on traffic has the smallest visual profile, presents no relative motion across the field of view, and closure rates are doubled, making detection extremely challenging."},{"q":"How does instrument panel glare affect night flying?","a":"Instrument panel glare reflects off the windscreen, creating phantom images and reducing the pilot's ability to see outside. Dimming instruments and using anti-glare shields helps."},{"q":"What is the Mandelbaum effect?","a":"The Mandelbaum effect occurs when the eyes focus on nearby objects (like rain drops or scratches on the windscreen) instead of distant objects, reducing the ability to detect distant traffic."},{"q":"Why is binocular vision important for landing?","a":"Binocular vision provides depth perception through stereopsis (slightly different images from each eye) which helps judge distance and height during the flare and touchdown phase."}],"6 The Aviators Ear":[{"q":"What are the three main parts of the ear?","a":"The outer ear (pinna and ear canal), the middle ear (tympanic membrane and ossicles), and the inner ear (cochlea for hearing and vestibular apparatus for balance)."},{"q":"What is the function of the Eustachian tube?","a":"To equalise pressure between the middle ear and the ambient atmosphere. It opens during swallowing, yawning, or jaw movement."},{"q":"Why do pilots experience ear pain during descent?","a":"During descent, ambient pressure increases faster than the Eustachian tube can equalise middle ear pressure. The pressure differential pushes the eardrum inward, causing pain (barotrauma)."},{"q":"What is the Valsalva manoeuvre?","a":"A technique to equalise middle ear pressure by pinching the nose, closing the mouth, and gently blowing to force air through the Eustachian tubes. Used primarily during descent."},{"q":"Why should a pilot not fly with a head cold or sinus congestion?","a":"Congestion blocks the Eustachian tubes and sinus ostia, preventing pressure equalisation during altitude changes. This causes severe ear/sinus pain (barotrauma) and potential hearing damage."},{"q":"What is the somatogravic illusion?","a":"A vestibular illusion where rapid acceleration (e.g., during a go-around) creates a false sensation of pitching up, tempting the pilot to push the nose down dangerously."},{"q":"What is the leans?","a":"A vestibula

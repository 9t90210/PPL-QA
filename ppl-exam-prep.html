es density altitude (air is less dense), which degrades aircraft performance - longer takeoff runs, reduced climb rates, and lower service ceilings."},{"q":"How do you calculate density altitude?","a":"Density Altitude = Pressure Altitude + (120 x ISA deviation). If ISA deviation is +10 degrees C and pressure altitude is 2,000 ft, density altitude = 2,000 + 1,200 = 3,200 ft."},{"q":"What causes the altimeter to under-read?","a":"Flying from low pressure to high pressure without resetting QNH, or flying into warmer than standard air. In both cases, true altitude is higher than indicated."},{"q":"Why must pilots check the QNH regularly during cross-country flight?","a":"Atmospheric pressure varies with location and time. If QNH changes and the altimeter is not updated, altitude errors accumulate, potentially compromising terrain clearance."},{"q":"What is the significance of the 'Transition Layer'?","a":"The Transition Layer is a buffer zone between the Transition Altitude and Transition Level. Aircraft should pass through it quickly because neither QNH-based altitudes nor standard-based FLs provide assured separation within it."},{"q":"What happens to true altitude when flying into a high-pressure area without resetting QNH?","a":"True altitude is higher than indicated because the altimeter under-reads. This is safer for terrain clearance but may compromise separation from other traffic."},{"q":"How is QNH obtained during flight?","a":"QNH can be obtained from ATIS broadcasts, ATC, or FIS units. It is also published in METARs and can be requested on the appropriate radio frequency."},{"q":"What is the ICAO standard Transition Altitude in the UK?","a":"In the UK, the Transition Altitude is typically 3,000 ft in uncontrolled airspace (Class G), though it varies at different aerodromes within controlled airspace. It is always published."},{"q":"What is the significance of mean sea level (MSL) as an altimetric datum?","a":"MSL provides a common reference for altitude that is consistent across different locations. Chart elevations, QNH altitudes, and terrain clearance are all referenced to MSL."},{"q":"How does a subscale-setting error of 1 hPa affect indicated altitude?","a":"An error of 1 hPa causes approximately 27 ft of altitude error. Setting QNH 10 hPa too low would cause the altimeter to read approximately 270 ft too high."},{"q":"What instrument measures atmospheric pressure for altimetry?","a":"An aneroid barometer (or capsule stack) inside the altimeter expands and contracts with pressure changes, driving the altitude indication."},{"q":"Why is pressure altitude used for flight levels rather than true altitude?","a":"Because all aircraft using the same pressure datum (1013.25 hPa) will indicate the same flight level at the same pressure surface, ensuring vertical separation regardless of local weather conditions."},{"q":"What is the approximate ISA temperature at sea level?","a":"15 degrees C (59 degrees F)."},{"q":"At what altitude does the ISA temperature reach 0 degrees C?","a":"At approximately 7,500 ft. Using the lapse rate of 2 degrees C per 1,000 ft from 15 degrees C at sea level: 15 / 2 = 7,500 ft."},{"q":"What is the effect of very low QNH on the safety of VFR flight at low altitude?","a":"Very low QNH means the actual altitude is lower than the standard setting indicates. If using flight levels at low altitude without QNH correction, terrain clearance is reduced, creating a collision hazard with ground."},{"q":"What is the ISA temperature lapse rate in the troposphere?","a":"Approximately 2 degrees C per 1,000 ft (or 1.98 degrees C per 1,000 ft to be precise), up to the tropopause at approximately 36,000 ft."},{"q":"What is true altitude?","a":"True altitude is the actual vertical distance above mean sea level. It differs from indicated altitude when temperature or pressure differs from ISA standard conditions."},{"q":"How is pressure altitude different from indicated altitude?","a":"Pressure altitude is read with 1013.25 hPa set on the subscale. Indicated altitude is read with QNH set. The difference depends on how far the actual QNH deviates from 1013.25 hPa."},{"q":"What is the relationship between Flight Level and pressure altitude?","a":"Flight Levels ARE pressure altitude in hundreds of feet when the altimeter is set to 1013.25 hPa. FL55 = 5,500 ft pressure altitude."},{"q":"Why is the 'High to Low' mnemonic important for VFR pilots?","a":"It reminds pilots that flying from a high-pressure area to a low-pressure area without updating QNH causes the altimeter to over-read. The aircraft is actually lower than indicated, risking terrain collision."},{"q":"What is absolute altitude?","a":"Absolute altitude is the height of the aircraft above the terrain directly below it. It is relevant for terrain clearance but is not directly shown on a standard altimeter."},{"q":"How does a very cold day affect aircraft performance and altimetry simultaneously?","a":"Cold air is denser, so TAS is closer to IAS (lower TAS correction). But the altimeter over-reads - true altitude is lower than indicated. Both effects must be considered for safe flight."},{"q":"What altimeter setting would a pilot use for circuits at an uncontrolled aerodrome?","a":"Typically QFE so the altimeter reads height above the aerodrome (zero on the ground), making circuit height easy to maintain. Some pilots prefer QNH and add the aerodrome elevation."},{"q":"What is the standard pressure at sea level in the ISA?","a":"1013.25 hPa (or 29.92 inches of mercury)."},{"q":"How do you convert between QNH and QFE?","a":"QFE = QNH minus (aerodrome elevation in feet / 27). For an aerodrome at 540 ft: pressure difference = 540 / 27 = 20 hPa. If QNH is 1013, QFE = 993 hPa (approximately)."},{"q":"Why is it dangerous to fly at a Flight Level in low-pressure conditions at low altitude?","a":"With low QNH, the standard setting puts the aircraft lower than the Flight Level number suggests. Near the ground, this could mean insufficient terrain clearance and risk of controlled flight into terrain."}],"11 Dalton Navigation Computer":[{"q":"What are the two faces of the Dalton navigation computer?","a":"The circular slide rule face (for time, speed, distance, fuel, and conversions) and the wind face (for solving the triangle of velocities to find heading and groundspeed)."},{"q":"On the circular slide rule, which scale is fixed and which rotates?","a":"The outer scale is fixed and the inner scale rotates."},{"q":"What is the '60 index' used for on the Dalton computer?","a":"The 60 index (marked with a triangle or arrow) on the inner scale is used for time and speed calculations. Align it with groundspeed on the outer scale for time-distance problems."},{"q":"What is the '10 index' used for?","a":"The 10 index is used for general multiplication and division. Place one value at the 10 index and read the result opposite the other value."},{"q":"How do you calculate TAS on the navigation computer?","a":"In the Airspeed window, align pressure altitude with outside air temperature. Then read TAS on the outer scale opposite CAS/IAS on the inner scale."},{"q":"What is the 'Wind-Up' method?","a":"The Wind-Up method involves setting the wind direction at the top index, marking the wind speed UP from the center hole along the centerline, then rotating to the True Track to find drift and groundspeed."},{"q":"After plotting the wind, how do you find heading and groundspeed?","a":"Rotate the compass rose to set your True Track at the top index, slide the card until TAS arc is under the wind mark. The mark's lateral displacement gives drift, and the center hole gives groundspeed."},{"q":"On the wind face, if the wind mark is LEFT of center, what does this mean for heading?","a":"Wind mark left means the wind is blowing you left, so steer left (subtract drift from track) to maintain the desired track."},{"q":"On the wind face, if the wind mark is RIGHT of center, what does this mean for heading?","a":"Wind mark right means the wind is blowing you right, so steer right (add drift to track) to maintain the desired track."},{"q":"How do you calculate fuel consumption on the Dalton computer?","a":"Align the 60 index with the hourly fuel burn rate on the outer scale. Find the flight time on the inner scale and read fuel required on the outer scale."},{"q":"How do you find endurance on the Dalton computer?","a":"With the 60 index set to the fuel burn rate, locate total usable fuel on the outer scale and read the endurance time on the inner scale."},{"q":"Why must you use TAS (not IAS) when solving the wind triangle on the Dalton?","a":"TAS represents the aircraft's true speed through the air mass and is needed for accurate wind triangle solutions. IAS does not account for air density changes with altitude."},{"q":"How do you convert fuel volume to weight on the Dalton computer?","a":"Use the specific gravity scales on the outer rim. Align the fuel volume with the fuel's specific gravity value to read the weight directly."},{"q":"What standard conversions can be performed on the Dalton computer?","a":"Nautical miles to statute miles to kilometers, litres to US gallons to Imperial gallons, pounds to kilograms, and other unit conversions using the fixed conversion marks."},{"q":"How do you find actual groundspeed in flight using the Dalton computer?","a":"Align the distance flown (outer scale) with the actual time taken (inner scale). Read the groundspeed at the 60 index on the outer scale."},{"q":"What is the specific gravity of AVGAS 100LL?","a":"Approximately 0.72. This is used for converting between fuel volume and weight."},{"q":"What type of navigation computer is the only one permitted in EASA/CAAT theoretical exams?","a":"The Dalton-type analogue (mechanical) navigation computer, also known as a 'whiz wheel'. Electronic flight computers are not permitted."},{"q":"What are the two components of the wind face on the Dalton computer?","a":"A transparent rotating compass rose window and a sliding card with speed arcs and drift lines."},{"q":"How do you set the wind direction on the Dalton computer?","a":"Rotate the inner compass rose until the wind direction aligns with the top index mark."},{"q":"After setting wind direction, how do you mark the wind speed?","a":"Count UP from the center hole along the centerline by the number of knots equal to the wind speed, and make a pencil mark at that point."},{"q":"What does the center hole on the wind face represent?","a":"The center hole represents the aircraft's ground position. The distance from the center hole to the wind mark represents the wind vector."},{"q":"How do you read drift angle on the wind face?","a":"After setting True Track and sliding the card so TAS is under the wind mark, the wind mark sits on a drift line. Read the number of degrees of drift from the drift lines."},{"q":"How do you read groundspeed on the wind face?","a":"After the wind mark is positioned on the TAS arc, read the speed arc that passes through the center hole. That is the groundspeed."},{"q":"What is the formula relating fuel weight and volume?","a":"Weight = Volume x Specific Gravity. For AVGAS 100LL with SG of 0.72, 10 US gallons weighs approximately 7.2 kg per gallon equivalent."},{"q":"How do you calculate distance flown using the Dalton computer?","a":"Keep the 60 index at your known groundspeed. Find the elapsed time on the inner scale and read the distance covered on the outer scale."},{"q":"What is the purpose of the conversion arrows on the Dalton computer?","a":"Fixed conversion arrows (red and yellow indicators) allow instant conversion between litres, US gallons, and Imperial gallons by aligning a known value under the appropriate indicator."},{"q":"How do you use the Dalton to convert between NM and km?","a":"Use the fixed distance conversion marks. Locate the value in one unit on the outer scale and read the equivalent in the other unit at the corresponding fixed indicator."},{"q":"What happens if you accidentally use IAS instead of TAS on the wind face?","a":"The heading and groundspeed solutions will be incorrect. At altitude, IAS is significantly lower than TAS, so drift will be overestimated and groundspeed underestimated."},{"q":"Can the Dalton computer calculate density altitude?","a":"Yes. The airspeed window showing pressure altitude and temperature effectively gives density altitude information, as TAS correction reflects the actual air density."},{"q":"What is the relationship between the outer and inner scale for multiplication?","a":"The Dalton slide rule multiplies by setting one factor on the inner scale against the 10 index, and reading the product on the outer scale opposite the second factor on the inner scale."},{"q":"How do you divide on the Dalton computer?","a":"Place the dividend on the outer scale opposite the divisor on the inner scale, and read the quotient at the 10 index on the outer scale."},{"q":"Why should the wind mark be made with a pencil, not a pen?","a":"A pencil mark can be erased and redrawn for different routes or updated winds. Pen marks are permanent and would clutter the wind face."},{"q":"How do you find the heading to steer from TAS, track, and drift?","a":"True Heading = True Track +/- Drift. If the wind mark is left of center, subtract drift. If right of center, add drift."},{"q":"What is the practical accuracy of the Dalton computer?","a":"The Dalton provides results accurate to approximately 1-2% for slide rule calculations and within 1-2 degrees for wind triangle solutions, which is sufficient for VFR navigation."},{"q":"How do you check your Dalton wind solution for reasonableness?","a":"The heading should be upwind of the track (into the wind). A headwind component should reduce groundspeed below TAS, and a tailwind should increase it. Drift direction should match the wind direction."},{"q":"What is the maximum wind speed that can typically be plotted on a Dalton computer?","a":"Most Dalton computers have speed arcs and drift lines that accommodate winds up to about 80-100 kt, sufficient for most PPL-level flight planning."},{"q":"How would you handle a wind speed that exceeds the wind face range?","a":"You could halve the wind speed and TAS for the calculation, then double the resulting drift. However, such strong winds would likely make VFR flight inadvisable."},{"q":"Why is the Dalton computer considered a 'analogue' device?","a":"It uses physical scales and mechanical alignment rather than electronic circuits. It performs calculations through proportional relationships between rotated circular scales and sliding grids."},{"q":"What should you check before using a Dalton computer in an exam?","a":"Ensure the scales are clean and readable, the compass rose rotates freely, the slide card moves smoothly, and no previous pencil marks remain on the wind face."},{"q":"How do you convert hours and minutes to decimal hours on the Dalton?","a":"The inner scale shows both minutes and hours:minutes markings. Alternatively, divide minutes by 60 mentally. For example, 45 minutes = 0.75 hours."},{"q":"How do you use the Dalton computer to convert nautical miles to statute miles?","a":"Use the fixed distance conversion marks on the outer scale. Align the NM value with the NM indicator and read the statute miles at the statute mile indicator."},{"q":"What happens if the wind mark falls below the center hole on the wind face?","a":"This cannot happen with the wind-up method. If it does, you have plotted incorrectly. The wind mark should always be above (toward the top index) from the center hole."},{"q":"How does the Dalton computer account for the effect of altitude on TAS?","a":"The airspeed window in the center of the slide rule aligns pressure altitude with temperature. This automatically applies the density correction, and TAS is then read opposite IAS/CAS."},{"q":"What is a common exam mistake when using the wind face of the Dalton?","a":"Forgetting to use True directions throughout. Both wind direction and track must be True. Also, confusing left-subtract and right-add for drift application."},{"q":"How do you find the wind from known heading, TAS, track, and groundspeed on the Dalton?","a":"Set the True Track at the index, slide the card to place groundspeed at the center hole, and mark where TAS arc intersects the heading value. Rotate the compass rose to put this mark on the centerline above the center - read wind direction at the index and wind speed from center to mark."},{"q":"Can the Dalton computer solve problems involving climb and descent?","a":"The Dalton can calculate time, distance, and fuel for climb/descent segments if you know the average TAS and average groundspeed during those phases. It handles these the same as cruise calculations."},{"q":"What is the 'density altitude' window on some Dalton computers?","a":"Some Dalton models have a secondary window that directly displays density altitude after aligning pressure altitude and temperature, in addition to the airspeed correction function."},{"q":"How do you calculate rate of fuel consumption per minute on the Dalton?","a":"Align the hourly rate on the outer scale with 60 on the inner scale. Read any number of minutes on the inner scale and the corresponding fuel volume on the outer scale."},{"q":"Why is the Dalton computer still relevant in the age of electronic calculators?","a":"It requires no batteries, is permitted in exams, provides quick approximate answers for multiple types of calculations, and builds understanding of the relationships between speed, distance, time, and fuel."},{"q":"How accurate is the TAS correction on the Dalton computer?","a":"The Dalton TAS correction is accurate to within approximately 1-2 knots for normal operating conditions. This is more than adequate for VFR navigation planning."}],"12 Flight Planning Essentials":[{"q":"What is the correct sequence of steps in VFR flight planning?","a":"Check weather, select route, measure tracks and distances, obtain winds, calculate headings/groundspeeds/times using the Dalton, plan fuel, complete the flight log, and prepare the chart."},{"q":"What weather products must be checked before a VFR flight?","a":"METARs and TAFs for departure, destination, and alternate aerodromes, plus area forecasts, spot wind charts (Form 214), low-level forecasts (Form 215), and SIGMETs/AIRMETs."},{"q":"What is the difference between Form 214 and Form 215 (UK)?","a":"Form 214 (Spot Wind Chart) provides wind velocity and temperature at altitude. Form 215 (Low-Level Forecast) provides expected weather, cloud base, and visibility but does NOT include wind data."},{"q":"How is Safety Altitude calculated?","a":"Safety Altitude = Highest Maximum Elevation Figure (MEF) along the route + 1,000 ft. This provides terrain clearance in case of deteriorating visibility."},{"q":"What components make up a fuel plan?","a":"Trip fuel, fuel to alternate, 10% contingency, 45 minutes holding fuel, and minimum reserve. All components must be summed to determine total fuel required."},{"q":"When is a formal VFR flight plan mandatory?","a":"When crossing FIR boundaries (international flights) or when operating in certain controlled airspace (Class C/D). It may also be required by local regulations."},{"q":"What is a 'track box' and what does it contain?","a":"A track box is drawn on the chart alongside each track line containing Magnetic Heading, Track, Cruise Altitude, and Safety Altitude. It reduces head-down time in the cockpit."},{"q":"Why should track lines be broken at checkpoints?","a":"Breaking the line at checkpoints prevents the track line from obscuring important chart detail (airspace boundaries, features) at the exact locations where the pilot needs to see them."},{"q":"What are '10-degree drift lines'?","a":"Lines drawn from the start and end of each leg at 10 degrees either side of the track. They allow quick visual estimation of track error in flight without mental arithmetic."},{"q":"How often should timing checkpoints be selected along a route?","a":"Every 5-10 minutes of flying time, ensuring regular position updates and early detection of navigation errors."},{"q":"What is a reciprocal track and how is it calculated?","a":"A reciprocal track is the return track, calculated by adding or subtracting 180 degrees from the outbound track."},{"q":"What information should be pre-written on the flight log?","a":"From/To waypoints, altitude/FL, safety altitude, wind velocity, TAS, True Track, True Heading, variation, Magnetic Heading, groundspeed, distance, time, and ETA for each leg."},{"q":"What equipment must a pilot carry for VFR navigation?","a":"Current charts, Dalton navigation computer, protractor, stopwatch, flight log, and checklists. Pens and pencils should also be carried."},{"q":"What heading sequence appears on the flight log?","a":"True Track to True Heading (apply drift from Dalton), then apply variation to get Magnetic Heading, then apply deviation to get Compass Heading."},{"q":"What should a pilot note about Restricted/Danger areas during planning?","a":"Note their location relative to the planned route, vertical and lateral limits, activity status (check NOTAMs), and plan to avoid active areas."},{"q":"Why is it important to select a viable alternate aerodrome?","a":"An alternate provides a safe landing option if the destination becomes unavailable due to weather, runway closure, or other issues. Its weather, facilities, and fuel must be adequate."},{"q":"What frequencies should be pre-written as part of the communications plan?","a":"Departure aerodrome (tower/ground), en-route FIS/LARS, destination aerodrome (approach/tower), alternate aerodrome, and emergency (121.5 MHz)."},{"q":"What is the purpose of the pre-flight weather briefing?","a":"To determine whether the flight can be conducted safely under VFR conditions, identify potential hazards (turbulence, icing, low cloud), obtain winds aloft, and verify aerodrome availability."},{"q":"How should a pilot plan for fuel on a dog-leg route?","a":"Calculate fuel for each leg separately based on that leg's distance and groundspeed, sum all leg fuels for trip fuel, then add alternate fuel, contingency, and reserve."},{"q":"What is the significance of NOTAMs in flight planning?","a":"NOTAMs alert pilots to temporary hazards, airspace changes, facility closures, or navigation aid outages that may affect the planned route. They must always be checked."},{"q":"Why might a direct route not be the best choice for VFR flight planning?","a":"A direct route may pass through controlled or restricted airspace, over high terrain, or through poor weather. A dog-leg route avoiding these hazards may be safer and more practical."},{"q":"What is the role of the AIP in flight planning?","a":"The AIP (Aeronautical Information Publication) contains permanent information about aerodromes, airspace, procedures, and regulations. It should be consulted for up-to-date details not shown on charts."},{"q":"How is the wind from Form 214 expressed?","a":"Wind on Form 214 is given as True direction and speed in knots, at specific pressure altitudes, along with temperature. Interpolation is required for intermediate altitudes."},{"q":"What is the minimum fuel reserve for VFR flight?","a":"A common requirement is 45 minutes of fuel at normal cruise consumption as a final reserve, in addition to trip fuel, alternate fuel, and contingency."},{"q":"Why should the flight log be completed before departure rather than in the air?","a":"Pre-calculating all headings, times, and fuel requirements on the ground reduces cockpit workload and allows the pilot to focus on flying, navigating, and communicating in flight."},{"q":"What is meant by 'track measuring' on a Lambert chart during planning?","a":"Using a protractor to measure the True Track at the mid-meridian of each leg. This gives the most accurate average track direction for the entire leg."},{"q":"How do you calculate total flight time for fuel planning purposes?","a":"Sum the time for each leg (distance / groundspeed), add time for taxi, climb, and approach phases, and include any expected holds or delays."},{"q":"What should be checked regarding the aircraft before committing to the planned route?","a":"Check the aircraft's fuel capacity and consumption rate, performance capabilities (ceiling, range), equipment serviceability, and mass and balance to ensure the planned flight is feasible."},{"q":"What is endurance and how does it differ from range?","a":"Endurance is the maximum time the aircraft can stay airborne with available fuel. Range is the maximum distance it can fly. Range depends on groundspeed while endurance depends on fuel flow rate and fuel quantity."},{"q":"How do you determine the cruising altitude for a VFR cross-country flight?","a":"Consider the semicircular rule (based on magnetic track), safety altitude, weather conditions, airspace restrictions, and aircraft performance. The chosen altitude must comply with all constraints."},{"q":"What is the standard contingency fuel percentage?","a":"10% of the trip fuel is the standard contingency allowance, to cover unforeseen variations in wind, routing, or consumption."},{"q":"What items should a pilot brief passengers about before a VFR cross-country?","a":"Seat belts, emergency exits, headset use (if applicable), not touching controls, expected flight time, route overview, and what to do in an emergency."},{"q":"Why is chart currency a legal requirement?","a":"Using an out-of-date chart may mean flying with incorrect airspace, frequency, or obstacle information, which is both dangerous and a violation of regulations requiring current information for flight."},{"q":"What is the standard sequence of columns on a VFR flight log?","a":"From/To, Altitude/FL, Safety Altitude, Wind/Velocity, TAS, True Track, True Heading, Variation, Magnetic Heading, Groundspeed, Distance, Time, and ETA."},{"q":"How do you calculate the Safety Altitude for a multi-leg route?","a":"For each leg, find the highest MEF in the grid squares the track passes through, add 1,000 ft. Use the highest value for the overall route, or calculate per-leg safety altitudes."},{"q":"What is the minimum weather requirement for VFR flight below FL100?","a":"In Class G airspace below FL100: flight visibility of at least 5 km (or 1,500 m in some conditions), clear of cloud, and in sight of the surface."},{"q":"Why should a pilot calculate the reciprocal track for each leg?","a":"The reciprocal track is needed for the return journey or in case a diversion back to the departure point is required due to weather or emergency."},{"q":"What is the purpose of marking timing points on the chart?","a":"Writing expected elapsed times at checkpoints on the chart allows quick comparison with actual time without consulting the flight log, reducing head-down time."},{"q":"How do you calculate groundspeed using the Dalton computer during flight planning?","a":"Use the wind face: set wind direction at the top, mark wind speed up from center, rotate to True Track, slide to TAS arc under the mark, read groundspeed at the center hole."},{"q":"What fuel contingency should be planned for a VFR flight?","a":"A 10% contingency on trip fuel, plus 45 minutes holding at normal cruise consumption, plus fuel to reach the alternate aerodrome if one is designated."},{"q":"What is a 'dog-leg' route and when would you plan one?","a":"A dog-leg is a multi-leg route that avoids obstacles such as controlled airspace, high terrain, or poor weather. It is used when a direct route is impractical or unsafe."},{"q":"How do you determine which wind to use from Form 214 for your flight?","a":"Select the spot wind nearest to your route and interpolate for your planned altitude. If cruising between published altitudes, interpolate both direction and speed."},{"q":"What is the purpose of identifying an alternate aerodrome during planning?","a":"An alternate provides a safe diversion option if the destination becomes unavailable. Its weather, facilities, fuel availability, and distance must be suitable."},{"q":"How do you check that the planned fuel uplift is sufficient?","a":"Sum trip fuel + alternate fuel + 10% contingency + 45-minute reserve. Compare total against available tank capacity and actual fuel loaded. The loaded fuel must exceed the required total."},{"q":"What should a pilot do if the planned route crosses a Danger Area?","a":"Check NOTAMs for the activity status of the Danger Area. If active, route around it. If inactive, transit may be possible but check for specific restrictions."},{"q":"Why is it important to note sunset time during VFR flight planning?","a":"VFR flight requires adequate visibility and daylight (unless night rated). The flight must be completed before sunset (or within night flying rules), so ETAs must be checked against sunset."},{"q":"What information should a pilot extract from a METAR for flight planning?","a":"Wind direction and speed, visibility, weather phenomena, cloud base and coverage, temperature, dewpoint (for fog/icing risk), and QNH."},{"q":"What information should a pilot extract from a TAF for flight planning?","a":"Forecast wind, visibility, weather, cloud base and coverage for the departure and destination periods, plus any TEMPO or BECMG groups indicating expected changes."},{"q":"How do you calculate the magnetic heading from true heading for the flight log?","a":"Magnetic Heading = True Heading +/- Variation. Apply West variation by adding ('variation West, magnetic best'). Apply East variation by subtracting ('variation East, magnetic least')."},{"q":"What is the last thing a pilot should verify before engine start for a cross-country flight?","a":"Verify that all flight planning is complete: chart marked and folded, flight log filled in, navigation computer available, stopwatch ready, frequencies written down, and fuel quantity confirmed."}],"13 Practical Navigation Masterclass":[{"q":"What is the golden rule of airborne priorities?","a":"Aviate, Navigate, Communicate - in that order. Flying the aircraft accurately is always the top priority."},{"q":"What is the HAT check performed when setting course?","a":"Heading (correct and DI synchronized), Airspeed/Altitude (stabilized as planned), Time (start the stopwatch)."},{"q":"What is the overhead departure method?","a":"Climb to cruise altitude within the circuit, then fly directly over the airfield center and set course on the planned heading from overhead. It is the most reliable departure method."},{"q":"What is the en-route departure method?","a":"After takeoff, intercept the outbound track at 30-45 degrees directly after departure. Start timing at a pre-planned point where the track is intercepted. It is faster but less precise."},{"q":"What is a 'lead-out feature'?","a":"A prominent ground feature on or near the outbound track used to visually confirm the heading shortly after departure. It verifies heading accuracy and wind forecast validity."},{"q":"What is the 2-minute rule for checkpoint identification?","a":"Consult the chart approximately 2 minutes before the expected arrival time at a checkpoint. Look at the chart first (map-to-ground), then look outside to confirm the feature."},{"q":"What is the FREDA check and when is it performed?","a":"Fuel (contents/selection), Radio (correct frequency), Engine (temps/pressures/mixture), DI (sync to compass every 15 minutes), Altimeter (correct QNH). Performed at each checkpoint or regularly en-route."},{"q":"What is the LAI cycle?","a":"Lookout (scan for traffic and weather), Attitude (check nose position and wings level), Instruments (verify heading, speed, altitude, and time). This is the continuous pilot work cycle."},{"q":"What should you do if you miss a checkpoint?","a":"Do NOT turn or circle. Maintain planned heading, airspeed, and altitude. Note the time the next checkpoint is due, and trust your flying. Look for the next feature instead."},{"q":"What is the 1-in-60 rule formula?","a":"Track Error (degrees) = (Distance Off Track x 60) / Distance Along Track. It relates off-track displacement to the angular track error."},{"q":"What is the double track error correction method?","a":"Apply twice the track error as a heading correction toward the planned track. Fly this for the same time already elapsed, then revert to original heading plus single track error for the remainder."},{"q":"When is the closing angle method preferred over double track error?","a":"The closing angle method is preferred when past the halfway point of a leg, as there is insufficient distance to regain and then follow the original track."},{"q":"How do ETA errors compound?","a":"If you are 2 minutes late at the halfway point, you will be approximately 4 minutes late at the destination, because the groundspeed error affects the entire remaining leg proportionally."},{"q":"What is the correct map reading technique: map-to-ground or ground-to-map?","a":"Map-to-ground. Identify what feature to expect from the chart first, then look outside to confirm it. This prevents 'wishful identification' of wrong features."},{"q":"What should you do for a gross error check at the start of a leg?","a":"Look for big-picture features (coastlines, major rivers, mountain ranges, large cities) to confirm you are heading in approximately the right direction and have not set a reciprocal heading."},{"q":"How do you convert True Heading to Compass Heading for the aircraft?","a":"True Heading +/- Variation = Magnetic Heading +/- Deviation (from the compass card) = Compass Heading. This is the heading to steer on the compass."},{"q":"What four items should you carry for pre-flight VFR navigation?","a":"A marked ICAO 1:500,000 chart, a prepared VFR flight log, a reliable stopwatch, and a Dalton-type navigation computer."},{"q":"What is the difference between overhead and en-route departures in terms of timing?","a":"For overhead departure, timing starts when directly over the airfield at cruise altitude. For en-route departure, timing starts at a pre-planned point where the track is intercepted."},{"q":"Why should the DI be synchronized with the compass during the FREDA check?","a":"The gyroscopic DI precesses over time and drifts from the correct heading. Synchronizing it every 15 minutes ensures heading accuracy is maintained."},{"q":"What is the advantage of using 10-degree drift lines in practical navigation?","a":"They allow instant visual estimation of track error without mental math. If the aircraft position is between the track and the first drift line, the error is less than 10 degrees."},{"q":"How should you handle correcting minor track errors at a checkpoint?","a":"If slightly off track, adjust heading to fly directly to the checkpoint. Once overhead, note the elapsed time, apply a small permanent drift correction for subsequent legs."},{"q":"What is the 'big picture' versus 'little picture' concept in visual fixing?","a":"Big picture features (coastlines, mountain ranges, major cities) confirm gross position and prevent reciprocal heading errors. Little picture features (small towns, road junctions) provide precise fixes."},{"q":"What should you do if you become temporarily uncertain of position?","a":"Maintain heading and airspeed (do not turn), note the time, look for large features, consider climbing for better visibility, and use ATC assistance if needed. Temporarely uncertain is not lost."},{"q":"What is the intercept angle for an en-route departure?","a":"Ideally 30-45 degrees from the departure heading to the planned track, providing a positive intercept without excessive deviation from the route."},{"q":"How should the chart be folded in the cockpit?","a":"Fold the chart so only the relevant portion of the route is visible, with the track line easily accessible. A kneeboard can hold the chart in position."},{"q":"What information should be recorded at each checkpoint?","a":"Actual time overhead, any heading correction applied, revised ETA for the next waypoint, and any observed differences in wind effect."},{"q":"Why is the first 5 minutes after setting heading critical?","a":"This is when you perform the gross error check, confirm the lead-out feature appears correctly, and verify the heading and timing are sensible before errors can accumulate."},{"q":"What action should you take if weather deteriorates below VFR minima en route?","a":"Execute a 180-degree turn to return to the last area of good weather. Do not press on into IMC. Contact ATC for assistance and consider diverting to an alternate aerodrome."},{"q":"How do you determine the closing angle for direct-to-destination correction?","a":"Closing Angle = (Distance Off Track x 60) / Distance Remaining. The total heading change is Track Error + Closing Angle, applied toward the destination."},{"q":"What is the purpose of the communications plan during practical navigation?","a":"The communications plan ensures the pilot knows which frequencies to use at each stage of flight, reducing cockpit workload and ensuring timely contact with ATC or FIS."},{"q":"How do you prepare for arrival at the destination aerodrome?","a":"Review the destination's circuit height, direction, frequencies, and joining procedure from the flight guide. Obtain the latest weather (ATIS), set the correct QNH, and plan the approach."},{"q":"What is the key exam tip regarding track corrections?","a":"Double track error is for the first half of a leg (regain and maintain track). Closing angle is for the second half (fly directly to destination). Never apply double track error past halfway."},{"q":"What does 'trust your flying' mean in practical navigation?","a":"If you have accurately set and maintained the correct heading and airspeed, your position will be close to planned. Do not abandon a good heading just because a single checkpoint is not immediately visible."},{"q":"Why is the overhead departure considered the most reliable method?","a":"It provides a precisely known starting position (directly overhead the airfield at altitude), allows the DI to be synchronized, and gives a clean set-heading point for accurate timing."},{"q":"What should a pilot check during the HAT check if the DI does not match the compass?","a":"Synchronize the DI to the compass during straight and level flight. If the discrepancy is large, suspect a gyro fault and rely on the magnetic compass as the primary heading reference."},{"q":"How does the '2-minute rule' improve cockpit efficiency?","a":"By only consulting the chart 2 minutes before the expected ETA, the pilot minimizes head-down time, maintains better lookout, and uses timing to assist identification rather than continuous chart staring."},{"q":"What is the relationship between accurate flying and accurate navigation?","a":"Accurate navigation is impossible without accurate flying. If heading, altitude, and airspeed are not maintained consistently, DR calculations become meaningless."},{"q":"What should a pilot do if the first checkpoint is missed?","a":"Continue on the planned heading. The first checkpoint miss may indicate a wind error or timing issue. Look for subsequent features and assess whether the heading needs adjustment."},{"q":"How does the FREDA check contribute to navigation safety?","a":"FREDA ensures regular monitoring of fuel state, radio frequency, engine health, DI alignment, and altimeter setting. These all directly affect navigation accuracy and flight safety."},{"q":"What is the recommended sequence of actions at each checkpoint?","a":"Confirm position visually, record actual time, calculate actual groundspeed, determine any track error, apply heading corrections, revise ETA for next waypoint, and perform FREDA check."},{"q":"How do you handle a situation where you arrive at a checkpoint significantly early?","a":"An early arrival indicates a tailwind component stronger than forecast. Recalculate groundspeed using the Dalton, revise all remaining ETAs, and enjoy the time saving while monitoring fuel."},{"q":"What is the 'closing angle x inverse of leg fraction' formula?","a":"Closing Angle = Track Error x (Distance Flown / Distance Remaining). This ensures the correction is proportional to how far along the leg you are."},{"q":"Why should a pilot resist the temptation to immediately turn when slightly off track?","a":"A measured correction based on track error calculation is more effective than a random turn. Turning without calculation may overcorrect and waste time."},{"q":"What are the three key times during a leg when navigation accuracy is most critical?","a":"At the start (gross error check), at the midpoint (timing and track check, decision point for correction method), and approaching the destination (precise position needed for arrival)."},{"q":"What should a pilot do if GPS and visual navigation disagree?","a":"Trust visual navigation as primary for VFR flight. Cross-check timing, heading, and visual references. GPS may have incorrect waypoints, outdated database, or antenna issues."},{"q":"How does the pilot manage distractions during practical navigation?","a":"Use the LAI cycle to stay disciplined. Handle radio calls and cockpit tasks in quiet moments between navigation duties. Never let any single task dominate at the expense of flying the aircraft."},{"q":"What is the consequence of not synchronizing the DI during a long flight?","a":"The DI can drift by 3 degrees or more per 15 minutes. Over a long flight without correction, this heading error causes significant track deviation and makes all DR calculations inaccurate."},{"q":"How do you estimate track error without 10-degree drift lines?","a":"Use the 1-in-60 rule: estimate distance off track from the chart and distance flown. Track Error = (Off-track NM x 60) / Along-track NM."},{"q":"What should be included in a pilot's pre-landing brief for the destination?","a":"Circuit direction and height, joining procedure, runway in use, QFE/QNH, tower frequency, noise abatement procedures, and any special instructions from the flight guide."},{"q":"What is the importance of recording actual times versus estimated times in the flight log?","a":"Comparing actual versus estimated times reveals groundspeed errors, helping the pilot detect wind changes early and adjust headings and ETAs for the remainder of the flight."}],"14 Aviation Radar Systems":[{"q":"What does RADAR stand for?","a":"Radio Detection And Ranging."},{"q":"How does Primary Surveillance Radar (PSR) work?","a":"PSR transmits radio pulses that bounce off an aircraft's skin. The reflected signal (echo) returns to the antenna, and range is determined by the time delay. Bearing is determined by antenna direction."},{"q":"What are the main disadvantages of PSR?","a":"PSR cannot positively identify individual aircraft (no identity or altitude data), is susceptible to weather and terrain clutter, and requires the aircraft to reflect the signal passively."},{"q":"What is Secondary Surveillance Radar (SSR)?","a":"SSR uses a ground-based interrogator and an aircraft transponder. The ground station sends an interrogation signal; the transponder replies with coded information (identity and/or altitude)."},{"q":"What are the SSR interrogation and reply frequencies?","a":"The ground station interrogates on 1030 MHz and the aircraft transponder replies on 1090 MHz."},{"q":"What is Mode A on a transponder?","a":"Mode A transmits a 4-digit identity code (squawk code), allowing ATC to identify individual aircraft."},{"q":"What is Mode C on a transponder?","a":"Mode C transmits altitude information from the aircraft's encoding altimeter, based on the standard pressure setting (1013.25 hPa)."},{"q":"What squawk code indicates a general emergency?","a":"7700."},{"q":"What squawk code indicates a communications failure?","a":"7600."},{"q":"What squawk code indicates a hijack?","a":"7500."},{"q":"What is the standard UK conspicuity squawk code for VFR flights?","a":"7000."},{"q":"Why should you switch to Standby (SBY) before changing transponder codes?","a":"To avoid inadvertently transmitting emergency codes (7700, 7600, 7500) as the dials pass through those numbers during code selection."},{"q":"What is Mode S and how does it differ from Mode A/C?","a":"Mode S assigns each aircraft a unique 24-bit address, allowing selective interrogation and enhanced data transmission. It reduces clutter and interference compared to Mode A/C all-call interrogation."},{"q":"What is the formula for maximum PSR range?","a":"Max Range (NM) = 1.25 x (sqrt(h1) + sqrt(h2)), where h1 is radar antenna elevation (ft) and h2 is aircraft altitude (ft). Range is limited by the curvature of the Earth."},{"q":"What is an SRA (Surveillance Radar Approach)?","a":"An SRA is a non-precision approach where the controller provides azimuth guidance using radar. The pilot maintains a 3-degree glideslope, with minimum descent altitude typically 2 NM from the runway."},{"q":"What is a PAR (Precision Approach Radar)?","a":"PAR provides both azimuth and glideslope guidance to the pilot via radar, comparable to an ILS. It is primarily available at military airfields."},{"q":"What is 'ghosting' in radar?","a":"Ghosting occurs when radar signals reflect off high terrain or obstacles, creating false targets (phantom returns) on the controller's screen at incorrect positions."},{"q":"What is 'shielding' in SSR?","a":"Shielding occurs when the aircraft's attitude (e.g., steep bank) physically blocks the belly-mounted transponder antenna from the ground station, causing temporary loss of the SSR return."},{"q":"What does 'Squawk Ident' mean and what should the pilot do?","a":"When ATC requests 'Squawk Ident', the pilot presses the IDENT button on the transponder. This causes the aircraft's radar return to bloom/highlight on the controller's screen for positive identification."},{"q":"What is ASDE (Airport Surface Detection Equipment)?","a":"ASDE (also called Airfield Surface Movement Radar) is a high-resolution radar that monitors aircraft and vehicle movements on taxiways, runways, and aprons at major airports."},{"q":"How many possible squawk codes are there with Mode A?","a":"4,096 codes (each of the four digits can be 0-7, giving 8 x 8 x 8 x 8 = 4,096 combinations)."},{"q":"What does 'Squawk Charlie' mean?","a":"It means select Mode C (switch transponder to ALT position) to transmit altitude information."},{"q":"What does 'Recycle' mean in transponder phraseology?","a":"Recycle means reselect the assigned squawk code and mode - turn to standby, then back to the correct setting to refresh the transponder output."},{"q":"What is the typical range of an aerodrome surveillance approach radar?","a":"Approximately 25 NM, providing short-range positional control of approaching aircraft."},{"q":"What is the typical range of an en-route surveillance radar?","a":"200-300 NM, providing long-range coverage for en-route surveillance."},{"q":"What information does a radar controller's display show for an SSR-equipped aircraft?","a":"The aircraft's position, squawk code, Mode C altitude (displayed as Flight Level), groundspeed, and if Mode S - the aircraft's callsign."},{"q":"What is the rule of thumb for rate of descent on a 3-degree approach?","a":"Halve the groundspeed in knots and add a zero to get feet per minute. For example, 120 kt: 120/2 = 60, add zero = 600 fpm."},{"q":"How does heavy rain affect primary radar?","a":"Heavy rain produces significant radar returns (clutter) that can mask aircraft echoes, reducing the controller's ability to identify and track aircraft."},{"q":"What is the difference between PSR and SSR in terms of aircraft equipment?","a":"PSR requires no aircraft equipment - it bounces signals off the aircraft skin. SSR requires an active transponder in the aircraft to receive interrogations and transmit replies."},{"q":"What limitations affect radar at low altitude?","a":"At low altitude, the Earth's curvature limits radar line-of-sight, terrain can block signals, and ground clutter reduces detection ability."},{"q":"What does 'Squawk Standby' mean?","a":"Select Standby (SBY) on the transponder. The transponder stops transmitting but remains powered and ready."},{"q":"What is meant by 'radar clutter'?","a":"Radar clutter is unwanted returns on the radar display caused by terrain, weather, sea surface, buildings, or other non-aircraft reflections that obscure genuine aircraft targets."},{"q":"Why is Mode S increasingly mandated in European airspace?","a":"Mode S provides unique aircraft identification, reduces radio frequency congestion, supports Enhanced Surveillance data, and enables ACAS/TCAS operations for collision avoidance."},{"q":"What is the difference between ELS and EHS in Mode S?","a":"Elementary Surveillance (ELS) provides basic Mode S data (identity, altitude). Enhanced Surveillance (EHS) additionally provides heading, speed, and other flight parameters automatically."},{"q":"How does the Dalton SRA descent calculation work?","a":"For a 3-degree glideslope: required height at each distance is approximately distance (NM) x 300 ft. At 6 NM, be at 1,800 ft; at 3 NM, at 900 ft."},{"q":"What is the PSR antenna rotation rate for a typical aerodrome radar?","a":"Approximately 12-15 RPM for an aerodrome surveillance radar, providing an updated display every 4-5 seconds."},{"q":"Why might a radar controller request an identifying turn?","a":"If PSR-only (no SSR), the controller cannot positively identify an aircraft. Requesting a turn to a specific heading and observing the corresponding blip movement confirms identity."},{"q":"What does the term 'paint' mean in radar context?","a":"'Paint' refers to a radar return or echo from a target appearing on the radar display. If an aircraft 'paints well', it produces a strong, clear return."},{"q":"What atmospheric condition can cause anomalous radar propagation?","a":"Temperature inversions can cause super-refraction of radar waves, bending them downward and extending radar range beyond normal. Conversely, sub-refraction in some conditions reduces range."},{"q":"What is a transponder 'reply rate'?","a":"The reply rate is how frequently the transponder responds to interrogations. High interrogation rates in dense airspace can overload Mode A/C transponders, which is one reason Mode S was developed."},{"q":"How does SSR overcome the weather clutter problem of PSR?","a":"SSR does not rely on reflected signals. The transponder actively transmits a coded reply on 1090 MHz, which is different from weather echoes. This eliminates weather clutter from SSR returns."},{"q":"What is the difference between a 'trace' and a 'blip' on a radar screen?","a":"Both terms refer to the radar return displayed on screen. A trace is the line of returns showing the aircraft's movement over successive sweeps, while a blip is a single return on one sweep."},{"q":"What is 'garbling' in SSR?","a":"Garbling occurs when two or more aircraft are at similar ranges and azimuths, causing their transponder replies to overlap and become indistinguishable on the radar display."},{"q":"What does the ALT position on a transponder do?","a":"The ALT position enables Mode C (altitude reporting) in addition to Mode A (identity). The transponder transmits both the squawk code and pressure altitude from the encoding altimeter."},{"q":"What is the minimum equipment required for an aircraft to appear on SSR?","a":"A functioning transponder capable of receiving 1030 MHz interrogations and transmitting 1090 MHz replies. Mode A/C or Mode S capability depends on airspace requirements."},{"q":"How does terrain affect primary radar coverage?","a":"Terrain between the radar antenna and the aircraft can block signals, creating radar shadows where aircraft cannot be detected. This is why radar stations are placed on elevated sites."},{"q":"What is the difference between long-range and short-range PSR?","a":"Long-range en-route PSR covers 200-300 NM and rotates slowly. Short-range aerodrome PSR covers up to about 25 NM and rotates faster for more frequent updates."},{"q":"What does 'Squawk 7000' mean for a UK VFR pilot?","a":"Squawk 7000 is the standard conspicuity code for VFR flights in the UK. It alerts controllers that the aircraft is VFR and makes it visible on SSR without a specific assigned code."},{"q":"Why should a pilot never select 7500 accidentally?","a":"7500 is the hijack code. Selecting it triggers immediate security alerts and response procedures. Always use SBY before changing codes to avoid passing through 7500."},{"q":"What information does Mode S Enhanced Surveillance (EHS) provide that Mode A/C does not?","a":"EHS automatically provides selected altitude, indicated airspeed, magnetic heading, track angle, and roll angle, giving controllers much richer data for traffic management."}],"15 GPS and Flight Information Services":[{"q":"What is the difference between GNSS and GPS?","a":"GNSS (Global Navigation Satellite System) is the generic ICAO term for any satellite navigation system. GPS (Global Positioning System) is the specific US DoD system known as NAVSTAR."},{"q":"How many satellites are in the GPS NAVSTAR constellation and at what altitude?","a":"24-32 satellites orbiting at approximately 10,900 NM (20,200 km) altitude, arranged in 6 orbital planes with at least 4 satellites per plane."},{"q":"How many satellites are needed for a 3D GPS fix?","a":"A minimum of 4 satellites are needed for a 3D fix (latitude, longitude, and altitude). Three satellites give a 2D fix (lat/long only)."},{"q":"What are the limitations of GPS for VFR pilots?","a":"GPS can fail due to battery/power loss, signal shielding (steep banks, mountains), jamming, or system errors. It should supplement - not replace - visual navigation and DR skills."},{"q":"Should VFR pilots plan routes using GPS as the primary navigation method?","a":"No. VFR pilots should plan routes using conventional dead-reckoning methods first. GPS should be used as a supplementary backup to confirm position and assist with navigation."},{"q":"What is FIS (Flight Information Service)?","a":"FIS provides information useful for safe, orderly, and efficient flight. It is supplied by Air Traffic Service Units (ATSU) and FIR Centres, primarily used by VFR pilots in uncontrolled airspace."},{"q":"What are the four levels of UK ATSOCAS (Air Traffic Services Outside Controlled Airspace)?","a":"Basic Service, Traffic Service, Deconfliction Service, and Procedural Service."},{"q":"What does the Basic Service provide?","a":"General information (weather, facility serviceability, aerodrome conditions). No traffic information or deconfliction advice is passed. The pilot has maximum autonomy and full responsibility for collision avoidance."},{"q":"What does the Traffic Service provide?","a":"Surveillance-derived traffic information on conflicting aircraft anticipated to pass within 3 NM and 3,000 ft. No deconfliction advice is given; collision avoidance remains the pilot's responsibility."},{"q":"What does the Deconfliction Service provide?","a":"Traffic information plus deconfliction advice (radar vectors or height changes) to avoid conflicting traffic. Primarily for IFR flights. VFR pilots should only accept if compliance keeps them in VMC."},{"q":"What is the Procedural Service?","a":"A non-surveillance service providing vertical, lateral, longitudinal, and time instructions for deconfliction. It relies on pilot accuracy and is not suitable for VFR-only pilots."},{"q":"What is LARS (Lower Airspace Radar Service)?","a":"LARS provides radar services (Basic or Traffic) outside controlled airspace up to FL95, within approximately 30 NM of participating military and civil aerodromes."},{"q":"Who bears responsibility for collision avoidance and terrain clearance outside controlled airspace?","a":"The pilot bears sole responsibility for collision avoidance and terrain/obstacle clearance when operating outside controlled airspace, regardless of which FIS service is being received."},{"q":"What is the CARPARFE mnemonic for position reports?","a":"Callsign, Aircraft type, Route (from/to), Position, Altitude, altimeter (Regional QNH), Flight rules (VFR), Estimate (next point and time)."},{"q":"What should a VFR pilot do if ATC issues a vector that would take them into cloud?","a":"The pilot must refuse the instruction, immediately inform the controller, and maintain VMC. A VFR pilot must never enter cloud, even if instructed to do so."},{"q":"What should be included in the initial radio call to an FIS unit?","a":"The station callsign, your callsign, and the service requested (e.g., 'Stephenville Approach, G-ABCD, request Basic Service'). Wait for 'Pass your message' before giving full details."},{"q":"What is the critical rule about receiving FIS?","a":"Receiving FIS does not free the pilot from thorough flight planning, collision avoidance, or terrain clearance responsibilities. The pilot remains ultimately responsible at all times."},{"q":"How many orbital planes do GPS satellites operate in?","a":"6 orbital planes, with at least 4 satellites in each plane, ensuring global coverage at all times."},{"q":"How often do GPS satellites orbit the Earth?","a":"GPS satellites orbit the Earth approximately twice per day (every approximately 12 hours)."},{"q":"What does NAVSTAR stand for?","a":"Navigation Signal Timing and Ranging - the official name of the US GPS satellite constellation."},{"q":"How does GPS determine position?","a":"GPS measures the time for signals from multiple satellites to reach the receiver. Since the signals travel at the speed of light, the receiver calculates distance to each satellite and uses trilateration to determine position."},{"q":"What is Selective Availability (SA) in GPS?","a":"SA was an intentional degradation of GPS accuracy by the US military for civilian users. It was permanently switched off in May 2000, greatly improving civilian GPS accuracy."},{"q":"Can GPS provide altitude information for VFR terrain clearance?","a":"GPS provides geometric altitude (height above the WGS84 ellipsoid), not pressure altitude. It should NOT be relied upon for terrain clearance as it does not match altimeter-based altitudes used in aviation."},{"q":"What is RAIM in GPS?","a":"Receiver Autonomous Integrity Monitoring - a function that cross-checks GPS signals to detect faulty satellite information. It requires a minimum of 5 satellites to detect an error and 6 to exclude it."},{"q":"How can steep bank angles affect GPS reception?","a":"Steep bank angles can shield the aircraft's GPS antenna (typically mounted on top of the fuselage) from some satellites, potentially degrading or losing the position fix temporarily."},{"q":"What is SBAS (Satellite-Based Augmentation System)?","a":"SBAS uses additional geostationary satellites to provide differential corrections and integrity monitoring for GPS, improving accuracy and reliability. EGNOS is the European SBAS."},{"q":"What information can a VFR GPS typically display?","a":"Position (lat/long), groundspeed, track, distance to waypoint, bearing to waypoint, ETA, and a moving map display. Some units also show airspace boundaries and terrain."},{"q":"Should a pilot enter GPS waypoints during flight?","a":"No. GPS waypoints should be entered on the ground during pre-flight planning. Programming GPS in flight diverts attention from lookout and aircraft control."},{"q":"What is the accuracy of civilian GPS without augmentation?","a":"Civilian GPS provides position accuracy of approximately 5-15 meters (95% of the time). With SBAS augmentation (e.g., EGNOS), accuracy improves to approximately 1-3 meters."},{"q":"What is the Traffic Service target zone for traffic information?","a":"Traffic anticipated to pass within 3 NM laterally and 3,000 ft vertically of the receiving aircraft."},{"q":"Under what conditions can a VFR pilot accept a Deconfliction Service heading?","a":"Only if compliance with the heading keeps the pilot in Visual Meteorological Conditions (VMC). If the heading would take the pilot into cloud or IMC, it must be refused."},{"q":"What should a pilot do when leaving an FIS frequency?","a":"Always report leaving the frequency to avoid the controller having uncertainty about the aircraft's safety and status. Simply state callsign and that you are changing frequency."},{"q":"What is a Visual Reference Point (VRP) and how is it related to GPS?","a":"A VRP is a designated landmark used for position reporting to ATC. Pilots should report position relative to VRPs rather than GPS coordinates, as controllers work with geographic references."},{"q":"How does GPS complement dead-reckoning navigation?","a":"GPS confirms DR position, validates groundspeed and track, and helps detect navigation errors early. However, DR skills must be maintained as the primary method in case GPS fails."},{"q":"What is the primary use of each ATSOCAS service level?","a":"Basic: VFR autonomy. Traffic: VFR/IFR situational awareness. Deconfliction: IFR mainly (radar vectors). Procedural: non-radar environments with time/track instructions."},{"q":"Can a pilot request an upgrade from Basic to Traffic Service?","a":"Yes, if ATC workload permits. When approaching busy airspace, a pilot can request an upgrade to Traffic Service for better situational awareness."},{"q":"What is the difference between 'information' and 'instructions' in ATSOCAS?","a":"Under Basic and Traffic Services, controllers provide information only - the pilot decides action. Under Deconfliction and Procedural Services, controllers provide instructions that must be followed (unless maintaining VMC prevents compliance)."},{"q":"Why is receiving an air traffic service outside controlled airspace NOT mandatory?","a":"Because Class G airspace is uncontrolled. Controllers have no full oversight of all traffic in the area, so the service is advisory, not controlling. The pilot retains full decision-making authority."},{"q":"What does it mean that GPS gives 'geometric altitude' rather than 'pressure altitude'?","a":"Geometric altitude is the true height above the Earth's reference ellipsoid (WGS84). It differs from pressure altitude, which is what ATC and other aircraft use for separation. The two can differ by hundreds of feet."},{"q":"What are the three segments of the GPS system?","a":"The Space Segment (satellites), the Control Segment (ground stations that monitor and update satellites), and the User Segment (GPS receivers in aircraft and other devices)."},{"q":"How does multipath error affect GPS accuracy?","a":"Multipath error occurs when GPS signals bounce off buildings, terrain, or the aircraft structure before reaching the antenna, causing slightly incorrect distance calculations and position errors."},{"q":"What is GDOP (Geometric Dilution of Precision)?","a":"GDOP measures how satellite geometry affects position accuracy. Good GDOP (low number) occurs when satellites are widely spread across the sky. Poor GDOP occurs when satellites are clustered together."},{"q":"Why should VFR pilots not rely solely on GPS for terrain clearance?","a":"GPS altitude is geometric (above the WGS84 ellipsoid) and can differ significantly from pressure altitude or true altitude above terrain. The barometric altimeter remains the primary terrain clearance instrument."},{"q":"What is the role of the GPS ground control segment?","a":"The control segment consists of monitoring stations worldwide that track satellite orbits, update satellite clocks, and upload corrected ephemeris data to maintain system accuracy."},{"q":"What should a pilot do if GPS signal is lost during a VFR flight?","a":"Continue navigating using dead-reckoning and visual references. GPS loss should not be an emergency for a well-prepared VFR pilot. Revert to the prepared flight log and chart."},{"q":"How does jamming or spoofing affect GPS?","a":"Jamming blocks GPS signals, preventing the receiver from calculating position. Spoofing transmits false GPS signals, potentially giving an incorrect position. Both are reasons to maintain DR skills."},{"q":"What is the typical GPS accuracy for position?","a":"Standard civilian GPS provides approximately 5-15 meters horizontal accuracy (95% of the time). With SBAS augmentation like EGNOS, accuracy improves to approximately 1-3 meters."},{"q":"What does WAAS/EGNOS provide that basic GPS does not?","a":"WAAS (US) and EGNOS (Europe) provide differential correction signals, integrity monitoring, and improved accuracy from geostationary satellites, enabling more precise navigation and approach procedures."},{"q":"Under what circumstances should a VFR pilot request a Traffic Service upgrade?","a":"When approaching busy airspace, expecting to fly near controlled airspace boundaries, or in conditions of reduced visibility where additional traffic awareness would enhance safety."},{"q":"What is the correct format for the initial radio call when requesting FIS?","a":"Station name, your callsign, and service required. Example: 'London Information, G-ABCD, request Basic Service.' Wait for 'Pass your message' before giving full CARPARFE details."}]}};

// Load user-added Q&A from localStorage
// --- localStorage helpers ---
// User-added QA: { "subject::topic": [{q,a}, ...] }
var USER_QA_KEY = "ppl_user_qa";
function getUserQA() {
  try { return JSON.parse(localStorage.getItem(USER_QA_KEY) || "{}"); } catch(e) { return {}; }
}
function saveUserQA(data) {
  localStorage.setItem(USER_QA_KEY, JSON.stringify(data));
}

// Deleted QA: { "subject::topic": ["question text 1", "question text 2"] }
var DELETED_QA_KEY = "ppl_deleted_qa";
function getDeletedQA() {
  try { return JSON.parse(localStorage.getItem(DELETED_QA_KEY) || "{}"); } catch(e) { return {}; }
}
function saveDeletedQA(data) {
  localStorage.setItem(DELETED_QA_KEY, JSON.stringify(data));
}

// Get visible QA for a topic: base DATA minus deletions, plus user-added
function getQA(subject, topic) {
  var base = DATA[subject] && DATA[subject][topic] ? DATA[subject][topic] : [];
  var key = subject + "::" + topic;
  var delList = (getDeletedQA()[key] || []);
  var filtered = [];
  for (var i = 0; i < base.length; i++) {
    if (delList.indexOf(base[i].q) === -1) filtered.push(base[i]);
  }
  var added = getUserQA()[key] || [];
  return filtered.concat(added);
}

function addQA(subject, topic, q, a) {
  var user = getUserQA();
  var key = subject + "::" + topic;
  if (!user[key]) user[key] = [];
  user[key].push({q: q, a: a});
  saveUserQA(user);
}

function deleteQA(subject, topic, qText, isUserAdded) {
  var key = subject + "::" + topic;
  if (isUserAdded) {
    // Remove from user-added localStorage
    var user = getUserQA();
    var items = user[key] || [];
    user[key] = items.filter(function(item) { return item.q !== qText; });
    if (user[key].length === 0) delete user[key];
    saveUserQA(user);
  } else {
    // Mark base DATA question as deleted by storing its question text
    var deleted = getDeletedQA();
    if (!deleted[key]) deleted[key] = [];
    if (deleted[key].indexOf(qText) === -1) deleted[key].push(qText);
    saveDeletedQA(deleted);
  }
}

var GH_TOKEN_KEY = "ppl_gh_token";
var GH_REPO = "9t90210/PPL-QA";
var GH_FILE = "ppl-exam-prep.html";

function getGHToken() { return localStorage.getItem(GH_TOKEN_KEY) || ""; }
function setGHToken(t) { localStorage.setItem(GH_TOKEN_KEY, t); }

function pushToGitHub(btn) {
  var token = getGHToken();
  if (!token) {
    token = prompt("Enter your GitHub Personal Access Token (needs public_repo scope):");
    if (!token) return;
    setGHToken(token);
  }
  var userQA = getUserQA();
  var keys = Object.keys(userQA);
  var delQAData = getDeletedQA();
  var hasDeletes = Object.keys(delQAData).length > 0;
  if (keys.length === 0 && !hasDeletes) { toast("No changes to push"); return; }

  btn.textContent = "Pushing...";
  btn.disabled = true;

  // Step 1: Get current file from GitHub
  fetch("https://api.github.com/repos/" + GH_REPO + "/contents/" + GH_FILE, {
    headers: { "Authorization": "token " + token }
  }).then(function(r) {
    if (!r.ok) throw new Error("Failed to fetch file (check token)");
    return r.json();
  }).then(function(fileData) {
    var sha = fileData.sha;
    var content = atob(fileData.content.replace(/\n/g, ""));

    // Step 2: Parse DATA from the file, apply deletes, merge user QA
    var dataStart = content.indexOf("var DATA = {");
    if (dataStart === -1) throw new Error("Could not find DATA in file");
    var jsonStart = dataStart + 11;
    var braceDepth = 0; var jsonEnd = -1; var inStr = false; var esc = false;
    for (var ci = jsonStart; ci < content.length; ci++) {
      var ch = content[ci];
      if (esc) { esc = false; continue; }
      if (ch === "\\") { esc = true; continue; }
      if (ch === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (ch === "{") braceDepth++;
      else if (ch === "}") { braceDepth--; if (braceDepth === 0) { jsonEnd = ci + 1; break; } }
    }
    if (jsonEnd === -1) throw new Error("Could not parse DATA boundaries");
    var data = JSON.parse(content.substring(jsonStart, jsonEnd));

    var changes = 0;
    // Apply deletions first (match by question text)
    var deletedQA = getDeletedQA();
    var delKeys = Object.keys(deletedQA);
    for (var i = 0; i < delKeys.length; i++) {
      var parts = delKeys[i].split("::");
      var subj = parts[0];
      var topic = parts[1];
      if (data[subj] && data[subj][topic]) {
        var qTexts = deletedQA[delKeys[i]];
        data[subj][topic] = data[subj][topic].filter(function(item) {
          if (qTexts.indexOf(item.q) !== -1) { changes++; return false; }
          return true;
        });
      }
    }
    // Merge new QA
    for (var i = 0; i < keys.length; i++) {
      var parts = keys[i].split("::");
      var subj = parts[0];
      var topic = parts[1];
      if (data[subj] && data[subj][topic]) {
        var items = userQA[keys[i]];
        for (var j = 0; j < items.length; j++) {
          data[subj][topic].push(items[j]);
          changes++;
        }
      }
    }

    if (changes === 0) {
      saveUserQA({});
      saveDeletedQA({});
      toast("Already synced");
      btn.textContent = "Push to GitHub";
      btn.disabled = false;
      setTimeout(function() { location.reload(); }, 1000);
      return Promise.resolve("skip");
    }

    // Step 3: Replace DATA in content
    var replacements = {'\u2019': "'", '\u2018': "'", '\u201c': '"', '\u201d': '"', '\u2014': ' - ', '\u2013': ' - ', '\u00b0': ' degrees ', '\u2026': '...'};
    var newDataStr = JSON.stringify(data);
    for (var old in replacements) { newDataStr = newDataStr.split(old).join(replacements[old]); }
    var newContent = content.substring(0, dataStart) + "var DATA = " + newDataStr + ";" + content.substring(jsonEnd + 1);

    // Step 4: Push to GitHub
    return fetch("https://api.github.com/repos/" + GH_REPO + "/contents/" + GH_FILE, {
      method: "PUT",
      headers: {
        "Authorization": "token " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "Update " + changes + " Q&A from app",
        content: btoa(unescape(encodeURIComponent(newContent))),
        sha: sha
      })
    });
  }).then(function(r) {
    if (r === "skip") return;
    if (!r.ok) {
      if (r.status === 401) { setGHToken(""); throw new Error("Invalid token - cleared, try again"); }
      throw new Error("Push failed (HTTP " + r.status + ")");
    }
    return r.json();
  }).then(function(r) {
    if (r === undefined) return;
    // Clear localStorage QA and deletions after successful push
    saveUserQA({});
    saveDeletedQA({});
    toast("Pushed! Reloading...");
    setTimeout(function() { location.reload(); }, 1500);
  }).catch(function(e) {
    toast(e.message);
    btn.textContent = "Push to GitHub";
    btn.disabled = false;
  });
}

// Stats
function getTotalQA() {
  var total = 0;
  for (var s in DATA) for (var t in DATA[s]) {
    total += getQA(s, t).length;
  }
  return total;
}
function getSubjectCount(subject) {
  return Object.keys(DATA[subject] || {}).length;
}
function getSubjectQACount(subject) {
  var total = 0;
  for (var t in DATA[subject]) {
    total += getQA(subject, t).length;
  }
  return total;
}

// Toast
function toast(msg) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(function() { el.classList.remove("show"); }, 2000);
}

// Router
var currentView = "home";
var currentSubject = "";
var currentTopic = "";
var SUBJECTS = Object.keys(DATA);

function render() {
  var app = document.getElementById("app");
  if (currentView === "home") renderHome(app);
  else if (currentView === "subject") renderSubject(app);
  else if (currentView === "topic") renderTopic(app);
}

function renderHome(app) {
  var totalTopics = 0;
  for (var i = 0; i < SUBJECTS.length; i++) totalTopics += getSubjectCount(SUBJECTS[i]);
  var totalQA = getTotalQA();

  var html = "<h1>PPL Exam PREP \u2708\uFE0F</h1>";
  html += "<div class=\"subtitle\">EASA &amp; CAAT Thailand - Private Pilot License</div>";
  html += "<div class=\"stats\">";
  html += "<div class=\"stat\"><div class=\"num\">" + SUBJECTS.length + "</div>Subjects</div>";
  html += "<div class=\"stat\"><div class=\"num\">" + totalTopics + "</div>Topics</div>";
  html += "<div class=\"stat\"><div class=\"num\">" + totalQA + "</div>Q&amp;A</div>";
  html += "</div>";
  html += "<ul class=\"list\">";
  for (var i = 0; i < SUBJECTS.length; i++) {
    var s = SUBJECTS[i];
    var count = getSubjectCount(s);
    var qaCount = getSubjectQACount(s);
    html += "<li><a data-idx=" + i + ">" + s + "<span class=\"count\">" + count + " topics | " + qaCount + " Q&A</span></a></li>";
  }
  html += "</ul>";
  html += "<button class=\"btn btn-refresh\" id=\"refreshBtn\" style=\"margin-top:16px\">Refresh</button>";
  if (location.protocol === "file:") {
    html += "<button class=\"btn btn-primary\" id=\"syncBtn\" style=\"margin-top:10px\">Sync from GitHub</button>";
  }
  var userQA = getUserQA();
  var pendingAdd = 0;
  for (var k in userQA) { if (userQA.hasOwnProperty(k)) pendingAdd += userQA[k].length; }
  var delQA = getDeletedQA();
  var pendingDel = 0;
  for (var k in delQA) { if (delQA.hasOwnProperty(k)) pendingDel += delQA[k].length; }
  if (pendingAdd > 0 || pendingDel > 0) {
    var label = "Push";
    var parts = [];
    if (pendingAdd > 0) parts.push("+" + pendingAdd);
    if (pendingDel > 0) parts.push("-" + pendingDel);
    label += " " + parts.join(", ") + " Q&amp;A to GitHub";
    html += "<button class=\"btn btn-primary\" id=\"pushBtn\" style=\"margin-top:10px;background:var(--green)\">" + label + "</button>";
  }
  app.innerHTML = html;

  // Bind events
  document.getElementById("refreshBtn").onclick = function() { toast("Content is up to date"); };
  var syncBtn = document.getElementById("syncBtn");
  if (syncBtn) {
    syncBtn.onclick = function() {
      var btn = this;
      btn.textContent = "Syncing...";
      btn.disabled = true;
      fetch("http://127.0.0.1:18923/sync").then(function(r) { return r.json(); }).then(function(d) {
        if (d.success) {
          if (d.message.indexOf("Already up to date") >= 0) {
            toast("Already up to date");
          } else {
            toast("Synced! Reloading...");
            setTimeout(function() { location.reload(); }, 1500);
          }
        } else {
          toast("Sync failed: " + d.message);
        }
        btn.textContent = "Sync from GitHub";
        btn.disabled = false;
      }).catch(function() {
        toast("Sync server not running");
        btn.textContent = "Sync from GitHub";
        btn.disabled = false;
      });
    };
  }
  var pushBtn = document.getElementById("pushBtn");
  if (pushBtn) { pushBtn.onclick = function() { pushToGitHub(this); }; }
  var items = app.querySelectorAll("[data-idx]");
  for (var i = 0; i < items.length; i++) {
    items[i].onclick = function() {
      currentSubject = SUBJECTS[parseInt(this.getAttribute("data-idx"))];
      currentView = "subject";
      render();
      window.scrollTo(0, 0);
    };
  }
}

function renderSubject(app) {
  var TOPICS = Object.keys(DATA[currentSubject] || {});
  var html = "<a class=\"back\" id=\"backHome\">Home</a>";
  html += "<h1>" + currentSubject + "</h1>";
  html += "<div class=\"subtitle\">" + TOPICS.length + " topics | " + getSubjectQACount(currentSubject) + " Q&amp;A loaded</div>";
  html += "<ul class=\"list\">";
  for (var i = 0; i < TOPICS.length; i++) {
    var t = TOPICS[i];
    var qa = getQA(currentSubject, t);
    var badge = qa.length > 0 ? "<span class=\"badge\">" + qa.length + "</span>" : "<span class=\"count\">?</span>";
    html += "<li><a data-tidx=" + i + ">" + t + badge + "</a></li>";
  }
  html += "</ul>";
  app.innerHTML = html;

  document.getElementById("backHome").onclick = function() { currentView = "home"; render(); window.scrollTo(0, 0); };
  var items = app.querySelectorAll("[data-tidx]");
  for (var i = 0; i < items.length; i++) {
    items[i].onclick = function() {
      currentTopic = TOPICS[parseInt(this.getAttribute("data-tidx"))];
      currentView = "topic";
      render();
      window.scrollTo(0, 0);
    };
  }
}

function renderTopic(app) {
  var qa = getQA(currentSubject, currentTopic);
  // Figure out which items are user-added (they come after filtered base items)
  var base = DATA[currentSubject] && DATA[currentSubject][currentTopic] ? DATA[currentSubject][currentTopic] : [];
  var key = currentSubject + "::" + currentTopic;
  var delList = (getDeletedQA()[key] || []);
  var baseCount = 0;
  for (var i = 0; i < base.length; i++) {
    if (delList.indexOf(base[i].q) === -1) baseCount++;
  }
  var html = "<a class=\"back\" id=\"backSubject\">" + currentSubject + "</a>";
  html += "<h2>" + currentTopic + "</h2>";
  html += "<div class=\"subtitle\">" + qa.length + " questions</div>";

  if (qa.length === 0) {
    html += "<div style=\"padding:40px 0;text-align:center;color:var(--muted)\">No Q&amp;A yet.<br>Add below or run refresh to auto-generate.</div>";
  } else {
    html += "<div style=\"text-align:right;padding:4px 0\"><span class=\"toggle\" id=\"toggleAllBtn\">Show All Answers</span></div>";
    for (var i = 0; i < qa.length; i++) {
      var isUser = i >= baseCount;
      html += "<div class=\"qa-card\">";
      html += "<button class=\"del-btn\" data-delq=\"" + escAttr(qa[i].q) + "\" data-user=\"" + (isUser ? "1" : "0") + "\" title=\"Delete\">&times;</button>";
      html += "<div class=\"q\"><span class=\"qa-num\">Q" + (i + 1) + ".</span> " + escHtml(qa[i].q) + "</div>";
      html += "<span class=\"toggle\" data-tgl=\"1\">Show Answer</span>";
      html += "<div class=\"a\">" + escHtml(qa[i].a) + "</div>";
      html += "</div>";
    }
  }

  html += "<div class=\"add-section\">";
  html += "<h2>Add Q&amp;A</h2>";
  html += "<textarea id=\"newQ\" placeholder=\"Question...\" rows=\"2\"></textarea>";
  html += "<textarea id=\"newA\" placeholder=\"Answer...\" rows=\"2\"></textarea>";
  html += "<button class=\"btn btn-primary\" id=\"addBtn\">+ Add Q&amp;A</button>";
  html += "</div>";
  app.innerHTML = html;

  document.getElementById("backSubject").onclick = function() { currentView = "subject"; render(); window.scrollTo(0, 0); };

  // Toggle individual answers
  var toggles = app.querySelectorAll("[data-tgl]");
  for (var i = 0; i < toggles.length; i++) {
    toggles[i].onclick = function() {
      var a = this.nextElementSibling;
      if (a.classList.contains("show")) {
        a.classList.remove("show");
        this.textContent = "Show Answer";
      } else {
        a.classList.add("show");
        this.textContent = "Hide Answer";
      }
    };
  }

  // Toggle all
  var toggleAllBtn = document.getElementById("toggleAllBtn");
  if (toggleAllBtn) {
    toggleAllBtn.onclick = function() {
      var cards = app.querySelectorAll(".qa-card .a");
      var allShown = true;
      for (var j = 0; j < cards.length; j++) {
        if (!cards[j].classList.contains("show")) { allShown = false; break; }
      }
      for (var j = 0; j < cards.length; j++) {
        if (allShown) cards[j].classList.remove("show");
        else cards[j].classList.add("show");
      }
      var ts = app.querySelectorAll("[data-tgl]");
      for (var j = 0; j < ts.length; j++) ts[j].textContent = allShown ? "Show Answer" : "Hide Answer";
      toggleAllBtn.textContent = allShown ? "Show All Answers" : "Hide All Answers";
    };
  }

  // Add Q&A
  document.getElementById("addBtn").onclick = function() {
    var q = document.getElementById("newQ").value.trim();
    var a = document.getElementById("newA").value.trim();
    if (!q || !a) { toast("Enter both Q and A"); return; }
    addQA(currentSubject, currentTopic, q, a);
    toast("Q&A added!");
    render();
    setTimeout(function() { window.scrollTo(0, document.body.scrollHeight); }, 100);
  };

  // Delete Q&A
  var delBtns = app.querySelectorAll("[data-delq]");
  for (var i = 0; i < delBtns.length; i++) {
    delBtns[i].onclick = function() {
      var qText = this.getAttribute("data-delq");
      var isUser = this.getAttribute("data-user") === "1";
      if (confirm("Delete this Q&A?")) {
        deleteQA(currentSubject, currentTopic, qText, isUser);
        toast("Q&A deleted");
        render();
      }
    };
  }
}

// Helpers
function escHtml(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return escHtml(s).replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }

// Init
render();
</script>
</body>
</html>

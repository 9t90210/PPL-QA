<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PPL Exam PREP</title>
<style>
:root{--bg:#fff;--fg:#111;--border:#ddd;--accent:#0066cc;--card:#f8f8f8;--muted:#666;--green:#2d7d2d;--red:#cc0000}
@media(prefers-color-scheme:dark){:root{--bg:#111;--fg:#eee;--border:#333;--accent:#4da3ff;--card:#1a1a1a;--muted:#999;--green:#5cb85c;--red:#ff4444}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--fg);font-size:16px;line-height:1.5;-webkit-text-size-adjust:100%;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0}
.app{max-width:100vw;min-height:100vh;padding:12px 16px 80px}
h1{font-size:22px;font-weight:700;padding:16px 0 8px;border-bottom:2px solid var(--fg)}
h2{font-size:18px;font-weight:600;padding:12px 0 6px}
.subtitle{font-size:12px;color:var(--muted);padding:4px 0 12px}
.back{display:inline-block;padding:8px 0;color:var(--accent);font-size:15px;text-decoration:none;cursor:pointer}
.back::before{content:"\2190 "}
.list{list-style:none}
.list li{border-bottom:1px solid var(--border)}
.list li a,.list li .item{display:block;padding:14px 8px;color:var(--fg);text-decoration:none;font-size:15px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.list li a:active,.list li .item:active{background:var(--card)}
.list li .count{float:right;color:var(--muted);font-size:13px}
.list li .badge{float:right;background:var(--accent);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px}
.qa-card{background:var(--card);border-radius:8px;padding:12px;margin:8px 0}
.qa-card .q{font-weight:600;font-size:15px;color:var(--fg)}
.qa-card .a{font-size:14px;color:var(--muted);margin-top:6px;display:none}
.qa-card .a.show{display:block}
.qa-card .toggle{font-size:13px;color:var(--accent);cursor:pointer;margin-top:4px;display:inline-block}
.qa-num{color:var(--accent);font-weight:700;margin-right:4px}
.add-section{margin-top:20px;padding-top:16px;border-top:2px solid var(--border)}
.add-section textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--fg);resize:vertical;min-height:44px}
.add-section textarea+textarea{margin-top:8px}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;-webkit-tap-highlight-color:transparent}
.btn-primary{background:var(--accent);color:#fff}
.btn-refresh{background:var(--card);color:var(--accent);border:1px solid var(--accent)}
.btn:active{opacity:0.7}
.stats{display:flex;gap:8px;padding:12px 0;flex-wrap:wrap}
.stat{background:var(--card);border-radius:6px;padding:8px 12px;font-size:13px;flex:1;min-width:80px;text-align:center}
.stat .num{font-size:20px;font-weight:700;color:var(--accent)}
.score{text-align:center;padding:8px 0;font-size:13px;color:var(--muted)}
.hidden{display:none}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:100;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}
.del-btn{float:right;background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:0 4px;opacity:0.5}
.del-btn:active{opacity:1}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
// PPL EXAM PREP DATA
var DATA = {"01 AIL":{"1 Air Law Essentials":[{"q":"What organisation sets international aviation standards?","a":"The International Civil Aviation Organization (ICAO), a specialised agency of the United Nations established by the Chicago Convention of 1944."},{"q":"What is the Chicago Convention?","a":"The Convention on International Civil Aviation, signed in Chicago in 1944, which established ICAO and the framework for international air law."},{"q":"What is the difference between a Standard and a Recommended Practice (SARP)?","a":"A Standard is a mandatory specification that all Contracting States must comply with, while a Recommended Practice is desirable but not mandatory."},{"q":"What is EASA?","a":"The European Union Aviation Safety Agency, responsible for civil aviation safety regulation in Europe."},{"q":"What is CAAT?","a":"The Civil Aviation Authority of Thailand, responsible for regulating civil aviation in Thailand."},{"q":"What medical certificate class is required for a PPL holder?","a":"A Class 2 medical certificate is required for PPL holders."},{"q":"What is the validity period of a Class 2 medical for a PPL holder under 40?","a":"60 months (5 years) for pilots under age 40."},{"q":"What documents must be carried on board during flight?","a":"Certificate of Registration, Certificate of Airworthiness, the Aircraft Flight Manual or POH, and appropriate licences and medical certificates."},{"q":"What is a NOTAM?","a":"A Notice to Airmen - a notice distributed by telecommunication containing information on changes, hazards, or conditions affecting flight safety."},{"q":"What does AIP stand for?","a":"Aeronautical Information Publication, a document containing permanent aeronautical information essential for air navigation."},{"q":"What authority does a pilot-in-command (PIC) have?","a":"The PIC has final authority and responsibility for the operation and safety of the aircraft during flight."},{"q":"What is the minimum age to hold a PPL?","a":"The minimum age to hold a PPL is 17 years."},{"q":"What is the minimum flight training required for a PPL?","a":"A minimum of 45 hours of flight training is required, including both dual and solo time."},{"q":"How many Annexes does the Chicago Convention have?","a":"The Chicago Convention has 19 Annexes, each covering a different aspect of international civil aviation."},{"q":"What document must a pilot hold to act as pilot-in-command?","a":"A valid pilot licence appropriate to the aircraft type and a current medical certificate."},{"q":"Which ICAO Annex deals with Personnel Licensing?","a":"Annex 1 covers Personnel Licensing, including pilot licences and medical certificates."},{"q":"Which ICAO Annex covers Rules of the Air?","a":"Annex 2 covers the Rules of the Air, which apply over the high seas without exception."},{"q":"What does Annex 8 of the Chicago Convention address?","a":"Annex 8 addresses Airworthiness of Aircraft, covering design and manufacturing standards."},{"q":"Which ICAO Annex covers Aeronautical Information Services?","a":"Annex 15 covers Aeronautical Information Services (AIS)."},{"q":"Which ICAO Annex deals with Aerodrome design and operations?","a":"Annex 14 covers Aerodromes, including physical characteristics, markings, and lighting."},{"q":"What is a Contracting State under the Chicago Convention?","a":"A country that has signed and ratified the Chicago Convention and agreed to follow its provisions and ICAO standards."},{"q":"What does Article 12 of the Chicago Convention require?","a":"Article 12 requires each Contracting State to adopt Rules of the Air that are consistent with ICAO Annex 2."},{"q":"What is the purpose of ICAO?","a":"To promote the safe, orderly, and efficient development of international civil aviation worldwide."},{"q":"What is a State of Registry?","a":"The State on whose register an aircraft is entered, which issues the Certificate of Registration and nationality marks."},{"q":"What are the nationality and registration marks for Thai-registered aircraft?","a":"Thai aircraft carry the nationality mark 'HS' followed by a registration mark (e.g., HS-TPX)."},{"q":"Who is responsible for ensuring an aircraft is airworthy before flight?","a":"The pilot-in-command is responsible for ensuring the aircraft is in an airworthy condition before every flight."},{"q":"What is the validity period of a Class 2 medical for a PPL holder over 40?","a":"24 months (2 years) for pilots aged 40 and over."},{"q":"What is the difference between a licence and a rating?","a":"A licence is the basic qualification to fly (e.g., PPL), while a rating is an additional privilege added to a licence (e.g., night rating, instrument rating)."},{"q":"What is the minimum age to fly solo?","a":"The minimum age to fly solo is 16 years."},{"q":"What happens if a Contracting State differs from an ICAO Standard?","a":"The State must notify ICAO of any differences from ICAO Standards and publish them in the AIP."},{"q":"Which ICAO Annex covers Meteorological Service for International Air Navigation?","a":"Annex 3 covers Meteorological Service for International Air Navigation."},{"q":"What does Annex 11 of the Chicago Convention cover?","a":"Annex 11 covers Air Traffic Services, including ATC, FIS, and alerting service."},{"q":"What does Annex 6 of the Chicago Convention address?","a":"Annex 6 covers the Operation of Aircraft, including commercial air transport and general aviation."},{"q":"What must a pilot do if unable to comply with an ICAO Standard?","a":"The pilot must follow the national regulations of their State, which may differ. Any differences must be published in the AIP."},{"q":"What is the role of the State of the Operator?","a":"The State in which the operator's principal place of business is located. It oversees the operator's compliance with regulations."},{"q":"What privileges does a PPL holder have?","a":"A PPL holder may act as pilot-in-command of aircraft for non-commercial purposes in the category and class specified on the licence."},{"q":"Can a PPL holder fly for hire or reward?","a":"No, a PPL holder cannot fly for hire or reward. Commercial operations require a CPL or ATPL."},{"q":"What is a Type Certificate?","a":"A document issued by the aviation authority certifying that a particular aircraft type design meets all applicable airworthiness requirements."},{"q":"What must be done if an aircraft is involved in an accident?","a":"The accident must be reported to the relevant aviation authority immediately, and the aircraft must not be moved until authorised, unless for safety reasons."},{"q":"What is an Airworthiness Directive (AD)?","a":"A mandatory instruction issued by the aviation authority requiring specific inspection, modification, or action on an aircraft to maintain airworthiness."},{"q":"What currency requirements must a PPL holder maintain?","a":"A PPL holder must have completed a minimum number of flight hours and takeoffs/landings within a recent period to exercise the privileges of the licence."},{"q":"What is the purpose of the Chicago Convention Article 1?","a":"Article 1 establishes that every State has complete and exclusive sovereignty over the airspace above its territory."},{"q":"What is a Certificate of Registration (C of R)?","a":"A document issued by the State of Registry that proves the aircraft is registered in that State and shows the nationality and registration marks."},{"q":"What is the fireproof identification plate requirement?","a":"Every aircraft must carry a fireproof identification plate inscribed with the nationality and registration marks of the aircraft."},{"q":"What does Annex 13 of the Chicago Convention address?","a":"Annex 13 covers Aircraft Accident and Incident Investigation, establishing procedures for investigating aviation occurrences."},{"q":"What is the difference between an accident and an incident?","a":"An accident involves death, serious injury, or substantial aircraft damage during flight operations. An incident is an occurrence other than an accident that affects or could affect safety."},{"q":"What is the pilot's responsibility regarding fatigue?","a":"The pilot must not fly if fatigued or unfit. The PIC must ensure they are in proper physical and mental condition before each flight."},{"q":"What is an aircraft logbook used for?","a":"The aircraft logbook records all maintenance, modifications, inspections, and flight hours to track the airworthiness status of the aircraft."},{"q":"Which ICAO Annex covers Search and Rescue?","a":"Annex 12 covers Search and Rescue (SAR) procedures for aircraft in distress."},{"q":"What is the purpose of Annex 10?","a":"Annex 10 covers Aeronautical Telecommunications, including radio communication and navigation aid specifications."}],"2 Rules of the Air":[{"q":"What is the right-of-way priority order for aircraft?","a":"Balloons have priority over all. Then gliders, then airships, then aeroplanes and helicopters. Power-driven heavier-than-air aircraft give way to all others."},{"q":"When two aircraft converge at the same altitude, who gives way?","a":"The aircraft that has the other on its right shall give way. The aircraft on the right has the right of way."},{"q":"How should two aircraft approaching head-on alter course?","a":"Both aircraft shall alter heading to the right to avoid collision."},{"q":"What is the overtaking rule?","a":"An overtaking aircraft must give way to the aircraft being overtaken by altering heading to the right. The aircraft being overtaken has right of way."},{"q":"What is the minimum safe altitude over a congested area?","a":"1,000 feet above the highest obstacle within 600 metres of the aircraft."},{"q":"What is the minimum safe altitude over non-congested areas?","a":"500 feet above ground or water level."},{"q":"What are VFR weather minima below FL100 outside controlled airspace?","a":"Flight visibility of 5 km, distance from cloud 1,500 m horizontally and 1,000 ft vertically."},{"q":"What are VMC minima at or above FL100?","a":"Flight visibility 8 km, distance from cloud 1,500 m horizontally and 1,000 ft vertically."},{"q":"What are the semicircular cruising levels for VFR?","a":"Magnetic tracks 000-179 degrees: odd thousands plus 500 ft (e.g., 3,500, 5,500). Tracks 180-359 degrees: even thousands plus 500 ft (e.g., 4,500, 6,500)."},{"q":"What colour are aircraft navigation lights?","a":"Red on the left (port) wing, green on the right (starboard) wing, and white on the tail."},{"q":"When must navigation lights be displayed?","a":"From sunset to sunrise and during periods of reduced visibility."},{"q":"If you see red on the left and green on the right of another aircraft at night, what does it indicate?","a":"The aircraft is heading towards you (head-on situation). Both aircraft should turn right."},{"q":"What is a Special VFR (SVFR) clearance?","a":"A clearance that allows VFR flight within a control zone in meteorological conditions below normal VMC, subject to ATC approval."},{"q":"What speed restriction applies below FL100?","a":"Maximum 250 knots indicated airspeed below FL100."},{"q":"What does SERA stand for?","a":"Standardised European Rules of the Air, the common set of rules applied across EASA member states."},{"q":"What action should be taken when an aircraft is in distress?","a":"The aircraft in distress has right of way over all other aircraft. All other aircraft must give way."},{"q":"What is the VFR flight visibility minimum at or below 3,000 ft AMSL in uncontrolled airspace?","a":"5 km flight visibility, clear of cloud with the surface in sight."},{"q":"When two aircraft are on converging tracks at the same level, which one has right of way?","a":"The aircraft on the right has right of way. The other aircraft must give way."},{"q":"An aircraft on final approach has priority over what?","a":"An aircraft on final approach or landing has right of way over aircraft on the ground or in the circuit at a lower stage."},{"q":"What should a pilot do if uncertain about the proximity of other aircraft?","a":"The pilot should maintain vigilance (see and avoid) and take whatever action is necessary to avoid collision."},{"q":"What is the minimum flight visibility for VFR flight in controlled airspace below FL100?","a":"5 km flight visibility in controlled airspace below FL100."},{"q":"What does 'clear of cloud with the surface in sight' mean operationally?","a":"The pilot must fly outside any cloud and must be able to see the ground or water surface. This applies at or below 3,000 ft AMSL or 1,000 ft AGL in uncontrolled airspace."},{"q":"What is the maximum speed below FL100 in controlled airspace?","a":"250 knots IAS, unless otherwise authorised by the appropriate ATS authority."},{"q":"When must a VFR pilot use the semicircular rule for cruising level?","a":"When cruising above the transition altitude on cross-country flights."},{"q":"What is the purpose of the right-hand traffic pattern?","a":"Right-hand patterns may be designated at certain aerodromes to avoid noise-sensitive areas or obstacles. The standard pattern is left-hand unless otherwise published."},{"q":"What must a pilot do before performing aerobatic flight?","a":"The pilot must have proper training, sufficient altitude for recovery, and must not perform aerobatics over congested areas or in controlled airspace without authorisation."},{"q":"What is the rule when approaching to land?","a":"The lower aircraft has right of way, but shall not cut in front of or overtake an aircraft on final approach."},{"q":"If you see only the green navigation light of another aircraft, what does that mean?","a":"You are seeing the starboard (right) side of the aircraft, meaning it is passing from right to left. You have right of way."},{"q":"If you see only the red navigation light of another aircraft at night, what does it indicate?","a":"You are seeing the port (left) side, meaning the other aircraft is crossing from left to right. You must give way because the other aircraft is on your right."},{"q":"What is the minimum height for aerobatic flight?","a":"Aerobatic flight must not be conducted below a height that allows safe recovery, typically a minimum of 3,000 ft AGL for training."},{"q":"What actions should two aircraft on reciprocal tracks take to avoid collision?","a":"Both aircraft must alter heading to the right."},{"q":"What is the significance of the transition altitude?","a":"The transition altitude is the altitude at or below which vertical position is expressed in altitude (feet AMSL with QNH set). Above it, flight levels are used with standard pressure 1013.25 hPa."},{"q":"What is the transition level?","a":"The lowest flight level available for use above the transition altitude."},{"q":"What is the transition layer?","a":"The airspace between the transition altitude and the transition level. Aircraft must not cruise within this layer."},{"q":"What cruising level should a VFR pilot select on a magnetic track of 045 degrees?","a":"An odd thousand plus 500 feet (e.g., 3,500 ft, 5,500 ft) since the track is between 000 and 179 degrees."},{"q":"What cruising level should a VFR pilot select on a magnetic track of 225 degrees?","a":"An even thousand plus 500 feet (e.g., 4,500 ft, 6,500 ft) since the track is between 180 and 359 degrees."},{"q":"An aircraft is being overtaken - from which side must the overtaking aircraft pass?","a":"The overtaking aircraft must alter heading to the right and pass on the right side of the aircraft being overtaken."},{"q":"What is the definition of overtaking in air law?","a":"An aircraft is overtaking when it approaches another from behind on a line forming an angle of less than 70 degrees from the plane of symmetry of the aircraft being overtaken."},{"q":"What should a pilot do when flying in the vicinity of an aerodrome?","a":"The pilot should conform with or avoid the traffic pattern, make all turns to the left unless otherwise indicated, and maintain a proper lookout."},{"q":"Under what circumstances can a pilot deviate from the Rules of the Air?","a":"A pilot may deviate from the rules to the extent necessary to avoid immediate danger or to comply with emergency instructions from ATC."},{"q":"What is simulated instrument flight?","a":"Flight during which mechanical or optical devices restrict the pilot's vision. A safety pilot with adequate outside vision must be present."},{"q":"What is the purpose of anti-collision lights on an aircraft?","a":"Anti-collision lights (red or white flashing/strobe) warn other aircraft of the aircraft's presence and are required during all operations."},{"q":"What is the right of way rule for aircraft taxiing?","a":"An aircraft taxiing must give way to aircraft taking off or about to take off, and must stop and hold at all runway holding positions unless cleared by ATC."},{"q":"What is the minimum horizontal distance from cloud required for VFR flight below FL100 outside controlled airspace?","a":"1,500 metres horizontal distance from cloud."},{"q":"What is the minimum vertical distance from cloud required for VFR flight below FL100?","a":"1,000 feet vertical distance from cloud."},{"q":"What must a pilot do when an emergency is declared?","a":"The pilot must squawk 7700, declare the emergency on the current frequency, and follow emergency procedures. All other aircraft must give way."},{"q":"Can VFR flight be conducted at night?","a":"Yes, but only if the pilot holds a night rating and follows specific night VFR rules, including maintaining contact with ATC in controlled airspace."},{"q":"What is the purpose of the altimeter setting QNH?","a":"QNH is the pressure setting that causes the altimeter to read aerodrome elevation when on the aerodrome. It is used for altitude reference below the transition altitude."},{"q":"What does QFE mean?","a":"QFE is the atmospheric pressure at aerodrome elevation. When set, the altimeter reads zero (or height above the aerodrome) on the ground."},{"q":"What is the standard pressure setting used above the transition altitude?","a":"1013.25 hPa (29.92 inHg), which is the standard ICAO sea-level pressure used for flight levels."}],"3 Airspace and ATS":[{"q":"What are the ICAO airspace classifications?","a":"ICAO classifies airspace from A through G, with A being the most restrictive (IFR only) and G being uncontrolled airspace."},{"q":"Is VFR flight permitted in Class A airspace?","a":"No. Class A airspace is for IFR flights only. VFR flights are not permitted."},{"q":"What service is provided in Class G airspace?","a":"Flight Information Service (FIS) only. No ATC clearance is required in Class G airspace."},{"q":"What is a CTR (Control Zone)?","a":"A controlled airspace extending upward from the surface of the earth to a specified upper limit, established around an aerodrome."},{"q":"What is a TMA?","a":"A Terminal Control Area (TMA) is a controlled airspace established at the junction of ATS routes in the vicinity of one or more major aerodromes."},{"q":"What is an ATZ?","a":"An Aerodrome Traffic Zone, an area of defined dimensions established around an aerodrome for the protection of aerodrome traffic."},{"q":"What is a Danger Area?","a":"An airspace of defined dimensions within which activities dangerous to the flight of aircraft may exist at specified times. Flight is not prohibited but caution is required."},{"q":"What is a Restricted Area?","a":"An airspace of defined dimensions within which the flight of aircraft is restricted in accordance with specified conditions."},{"q":"What is a Prohibited Area?","a":"An airspace of defined dimensions within which the flight of aircraft is strictly prohibited."},{"q":"What transponder code indicates an emergency?","a":"Squawk 7700 indicates an emergency (distress or urgency)."},{"q":"What transponder code indicates radio failure?","a":"Squawk 7600 indicates radio communication failure."},{"q":"What transponder code indicates hijack?","a":"Squawk 7500 indicates unlawful interference (hijack)."},{"q":"What is the difference between FIS and AFIS?","a":"FIS (Flight Information Service) provides flight safety information to all aircraft. AFIS (Aerodrome Flight Information Service) provides information specifically at aerodromes without ATC towers."},{"q":"What is a MATZ?","a":"A Military Aerodrome Traffic Zone, established around military airfields for the protection of military traffic."},{"q":"What is a squawk code?","a":"A four-digit transponder code assigned by ATC to identify an aircraft on radar."},{"q":"What is a Flight Information Region (FIR)?","a":"A defined area of airspace within which Flight Information Service and Alerting Service are provided. Example: Bangkok FIR."},{"q":"In the Bangkok FIR, at what flight level does Class A airspace begin?","a":"Class A airspace in the Bangkok FIR begins at FL285 and above."},{"q":"What class of airspace exists below FL285 within controlled routes in the Bangkok FIR?","a":"Class B airspace exists below FL285 within specific controlled routes in the Bangkok FIR."},{"q":"What airspace classification applies outside controlled areas in the Bangkok FIR?","a":"Class G (uncontrolled) airspace applies outside controlled areas in the Bangkok FIR."},{"q":"What is the objective of Air Traffic Control (ATC) service?","a":"The objective is to prevent collisions between aircraft and to expedite and maintain an orderly flow of traffic."},{"q":"What is an ATC clearance?","a":"An authorization by ATC for an aircraft to proceed under specified conditions. It is based on known traffic and does not guarantee separation from all traffic."},{"q":"Can a pilot refuse an ATC clearance?","a":"Yes. If a clearance is unsuitable or compromises safety, the pilot can request an amended clearance from ATC."},{"q":"What are the two main methods of separation used by ATC?","a":"Vertical separation (using altitude or flight levels) and horizontal separation (using distance or time)."},{"q":"What are the Wake Turbulence Categories?","a":"Super, Heavy, Medium, and Light. These categories determine the separation minima applied between aircraft."},{"q":"What is the wake turbulence time separation for a Light aircraft arriving behind a Super aircraft?","a":"4 minutes separation is required for a Light aircraft arriving behind a Super aircraft."},{"q":"What is the wake turbulence time separation for a Light aircraft arriving behind a Heavy or Medium aircraft?","a":"3 minutes separation is required for a Light aircraft arriving behind a Heavy or Medium aircraft."},{"q":"What is the minimum departure separation for a Light aircraft taking off behind a Heavy aircraft?","a":"2 minutes separation is required for a Light aircraft departing behind a Heavy or Medium aircraft."},{"q":"What is the Alerting Service?","a":"A service that notifies rescue coordination centers of aircraft in need of search and rescue aid, providing details such as call sign, nature of emergency, and last known position."},{"q":"What does the letter P stand for in special airspace designations?","a":"P stands for Prohibited area, where flight of aircraft is strictly prohibited."},{"q":"What does the letter D stand for in special airspace designations?","a":"D stands for Danger area, where activities dangerous to flight may exist at specified times."},{"q":"What does the letter R stand for in special airspace designations?","a":"R stands for Restricted area, where flight is restricted in accordance with specific conditions."},{"q":"What is an example of a Prohibited area in Thailand?","a":"VTP4 Muang Kom is a prohibited area used for military flying and bombing, extending from ground to FL240."},{"q":"What is an example of a Restricted area in Thailand?","a":"VTR3 Hua Hin Palace is a restricted area protecting a Royal Residence, extending from ground to 6,000 ft."},{"q":"What is an example of a Danger area in Thailand?","a":"VTD20 Hua Hin is a danger area designated for civil flight training, extending from ground to 11,000 ft."},{"q":"How are upper and lower limits shown on PDR area designations?","a":"The upper limit (ceiling) is shown first and the lower limit (floor, often GND for ground) is shown after a slash, e.g., VTP36 ALT 5000 ft / GND."},{"q":"What is the Flight Information Service (FIS)?","a":"A service providing advice and information useful for the safe and efficient conduct of flights, including weather reports, NOTAM information, and traffic information."},{"q":"What does ATC separation provide in Class C airspace?","a":"In Class C, IFR aircraft are separated from both IFR and VFR aircraft. VFR aircraft are separated from IFR traffic and receive traffic information on other VFR traffic."},{"q":"What type of service is provided in Class D airspace?","a":"ATC service is provided. IFR flights receive separation from other IFR flights and traffic information about VFR. VFR flights receive traffic information about all other flights."},{"q":"Is ATC clearance required in Class G airspace?","a":"No. Class G is uncontrolled airspace, and no ATC clearance is required. Only Flight Information Service is available."},{"q":"What are the three phases of emergency in the Alerting Service?","a":"Uncertainty phase (INCERFA), Alert phase (ALERFA), and Distress phase (DETRESFA)."},{"q":"Both IFR and VFR are permitted in which airspace classes?","a":"Both IFR and VFR flights are permitted in Classes B, C, D, E, F, and G. Only Class A restricts to IFR only."},{"q":"What is the purpose of a Control Zone (CTR)?","a":"To protect IFR traffic departing from and arriving at an aerodrome by providing controlled airspace from the surface upward."},{"q":"What is radar separation?","a":"Separation achieved by using radar to maintain a minimum horizontal distance between aircraft, varying by radar type and wake turbulence category."},{"q":"What must a VFR pilot obtain before entering Class C airspace?","a":"The pilot must obtain an ATC clearance before entering Class C airspace. Two-way radio communication and a transponder are required."},{"q":"What information does the Alerting Service provide to rescue coordination centers?","a":"Call sign of the aircraft, nature of the emergency, last known position, number of persons on board, and any dangerous goods on board."},{"q":"What is Class B airspace used for?","a":"Class B is controlled airspace allowing both IFR and VFR. ATC provides separation to all aircraft. In the Bangkok FIR, it covers controlled routes below FL285."},{"q":"What is Class E airspace?","a":"Class E is controlled airspace where IFR flights receive ATC separation from other IFR flights. VFR flights receive traffic information only. No ATC clearance is required for VFR."},{"q":"What is the difference between controlled and uncontrolled airspace?","a":"In controlled airspace (Classes A-E), ATC provides separation services. In uncontrolled airspace (Classes F and G), only FIS is provided and no clearance is needed."},{"q":"Why are wake turbulence separation minima important for PPL pilots?","a":"PPL pilots typically fly Light category aircraft, which are most vulnerable to wake turbulence from heavier aircraft. Proper separation protects them from dangerous vortices."},{"q":"What must a VFR pilot do before entering Class D airspace?","a":"The pilot must establish two-way radio communication with ATC and obtain clearance to enter the Class D airspace."}],"4 Aeronautical Information Services":[{"q":"What are the three parts of the AIP?","a":"GEN (General), ENR (En-Route), and AD (Aerodromes)."},{"q":"What is an AIP Supplement?","a":"A temporary change to the AIP of long duration (3 months or longer), containing extensive text or graphics."},{"q":"What is the AIRAC system?","a":"Aeronautical Information Regulation and Control - a system of predetermined dates (every 28 days) for publishing major aeronautical changes."},{"q":"What is a NOTAM?","a":"A Notice to Airmen distributed by telecommunication giving timely knowledge of hazards, changes, or urgent conditions affecting flight safety."},{"q":"What is a Trigger NOTAM?","a":"A NOTAM issued to alert pilots of significant changes published in AIP Amendments or Supplements, ensuring awareness before the effective date."},{"q":"What does PIB stand for?","a":"Pre-flight Information Bulletin - a collated presentation of current NOTAM information relevant to a specific flight, prepared before departure."},{"q":"What is a SNOWTAM?","a":"A special NOTAM reporting hazardous surface conditions on runways, including depth of water, slush, or snow."},{"q":"How often are AIP Amendments published?","a":"AIP Amendments are published on the AIRAC 28-day cycle for significant changes, or as needed for non-AIRAC amendments."},{"q":"What is an AIC?","a":"An Aeronautical Information Circular containing information of an explanatory, advisory, or administrative nature that does not qualify for a NOTAM or AIP inclusion."},{"q":"What information is in the AIP AD section?","a":"Aerodrome-specific data including runway lengths, communication frequencies, approach procedures, and aerodrome charts."},{"q":"What information is in the AIP ENR section?","a":"En-route information including general rules and procedures (ENR 1), ATS airspace (ENR 2), and ATS routes (ENR 3)."},{"q":"Where should a pilot obtain met and NOTAM information before flight?","a":"From the ATS reporting office or briefing facility at the departure aerodrome, or through an electronic briefing system."},{"q":"What is an AIP Amendment?","a":"A permanent change to the text or charts within the AIP that keeps the publication up to date."},{"q":"What is a BIRDTAM?","a":"A NOTAM specifically warning about bird concentrations or migration that could be hazardous to aircraft operations."},{"q":"What is the purpose of the AIP?","a":"To contain aeronautical information of a lasting (permanent) character essential for safe air navigation."},{"q":"Which ICAO Annex governs Aeronautical Information Services?","a":"ICAO Annex 15 governs AIS, ensuring the flow of information necessary for safety and efficiency of air navigation."},{"q":"What is the Integrated Aeronautical Information Package (IAIP)?","a":"The complete package published by a State, containing the AIP, AIP Amendments, AIP Supplements, NOTAMs, and AICs."},{"q":"What does GEN 1 of the AIP contain?","a":"GEN 1 contains national regulations, including differences from ICAO standards and national aviation laws."},{"q":"What does GEN 2 of the AIP contain?","a":"GEN 2 contains tables and codes, including standard units of measurement (nautical miles, feet, knots, hectopascals)."},{"q":"What does GEN 3 of the AIP contain?","a":"GEN 3 contains information about services available, such as AIS, ATS, and meteorological services."},{"q":"What unit of measurement is used for navigation distances in aviation?","a":"Nautical miles (NM) are used for navigation distances."},{"q":"What unit is used for altitudes, elevations, and heights?","a":"Feet (ft) are the standard unit for altitudes, elevations, and heights in aviation."},{"q":"What unit is used for horizontal speed in aviation?","a":"Knots (kt) are used for horizontal speed (airspeed and wind speed)."},{"q":"What unit is used for vertical speed in aviation?","a":"Feet per minute (ft/min) is the standard unit for vertical speed."},{"q":"What unit is used for altimeter settings?","a":"Hectopascals (hPa) are used for altimeter settings in most of the world, including Thailand."},{"q":"In what units is wind direction for landing reported?","a":"Wind direction for landing is reported in degrees magnetic."},{"q":"In what units is visibility reported?","a":"Visibility is reported in kilometres (km). Visibility less than 5 km may be given in metres."},{"q":"What unit is used for runway visual range (RVR)?","a":"Runway visual range is reported in metres (m)."},{"q":"What time reference is used in aviation?","a":"UTC (Coordinated Universal Time) is used, expressed in hours and minutes on a 24-hour clock beginning at midnight."},{"q":"What is the difference between NOTAM Series A and Series C in Thailand?","a":"Series A NOTAMs are for international operations, while Series C NOTAMs are for domestic operations within Thailand."},{"q":"What is ATIS?","a":"Automatic Terminal Information Service - a continuous broadcast of recorded routine aerodrome information on a designated frequency."},{"q":"What information does an ATIS broadcast include?","a":"Aerodrome name, designator letter, runway in use, approach type, wind, visibility, cloud ceiling, temperature, dew point, QNH, and significant weather."},{"q":"How are ATIS broadcasts identified?","a":"Each ATIS broadcast is identified by a phonetic letter (Alpha, Bravo, Charlie, etc.) which changes with each update."},{"q":"What is the Post-flight Information Service?","a":"A service where flight crews report the state of air navigation facilities after landing, such as broken runway lights or inoperative NAVAIDs, which may trigger NOTAMs."},{"q":"What is the length of one AIRAC cycle?","a":"One AIRAC cycle is exactly 28 days."},{"q":"What type of information is published in an AIC?","a":"AICs contain explanatory, advisory, or administrative information, such as new runway utilization guidelines."},{"q":"How does the AIS system ensure timely notification of changes?","a":"Through the AIRAC cycle for planned changes, NOTAMs for urgent changes, AIP Supplements for long-term temporary changes, and AICs for advisory information."},{"q":"What should a pilot do if they discover a broken NAVAID during flight?","a":"Report it to the Post-flight Information Service after landing so that a NOTAM can be issued to warn other pilots."},{"q":"What is the minimum advance notice for AIRAC-published changes?","a":"At least 42 days advance notice is required for AIRAC-published changes to allow time for distribution and database updates."},{"q":"What AIP document covers a temporary runway closure lasting 6 months?","a":"An AIP Supplement, because it is a temporary change of long duration (3 months or longer)."},{"q":"Where in the AIP would you find the tower frequency for a specific aerodrome?","a":"In the AD 2 section, which contains detailed aerodrome information including communication frequencies."},{"q":"Where in the AIP would you find information about the Bangkok FIR airspace structure?","a":"In the ENR 2 section, which covers ATS airspace structure and boundaries."},{"q":"What is the difference between a PIB and a NOTAM?","a":"A PIB is a collated summary of all active NOTAMs relevant to a specific planned route. A NOTAM is an individual notice about a specific change or hazard."},{"q":"How does a pilot confirm they have the latest ATIS information?","a":"The pilot includes the ATIS designator letter in their initial call to ATC, confirming they have the current broadcast."},{"q":"What is the purpose of the AIRAC system for GPS databases?","a":"The 28-day cycle ensures everyone updates GPS and navigation databases simultaneously worldwide, maintaining data consistency."},{"q":"Which AIP section contains differences from ICAO standards?","a":"GEN 1 (National Regulations) contains the State's differences from ICAO standards."},{"q":"What temperature scale is used in aviation meteorology?","a":"Degrees Celsius is the standard temperature scale used in aviation."},{"q":"What is the key difference between AIP Amendments and AIP Supplements?","a":"AIP Amendments are permanent changes. AIP Supplements are temporary changes of long duration (3 months or longer) that will eventually expire."},{"q":"What does AD 3 in the AIP cover?","a":"AD 3 covers heliport information, including heliport data for helicopter operations."},{"q":"What is the purpose of ENR 1 in the AIP?","a":"ENR 1 covers general rules and procedures for en-route flight, including flight rules and ATS procedures applicable within the State."}],"5 Aviation Compliance and Flight Planning":[{"q":"What is a Certificate of Airworthiness?","a":"A document issued by the State of Registry certifying that an aircraft meets applicable airworthiness standards and is safe to fly."},{"q":"What is the minimum fuel requirement for VFR flight?","a":"Sufficient fuel to reach the destination plus a reserve. Typically 30 to 45 minutes reserve depending on national regulations."},{"q":"What happens if the CG is too far forward?","a":"The aircraft becomes nose-heavy, requiring more back pressure on the controls. This increases stall speed and fuel consumption."},{"q":"What happens if the CG is too far aft?","a":"The aircraft becomes tail-heavy and may become unstable. Recovery from stalls and spins may be impossible."},{"q":"What is MTOW?","a":"Maximum Take-Off Weight - the maximum weight at which an aircraft is permitted to take off, as specified in the type certificate."},{"q":"What is a mass and balance calculation?","a":"A calculation performed before flight to ensure the aircraft weight does not exceed limits and the centre of gravity is within the approved envelope."},{"q":"When is a flight plan mandatory?","a":"A flight plan is required for all IFR flights and for controlled VFR flights entering controlled airspace."},{"q":"What is a SARTIME?","a":"Search and Rescue Time - the time by which, if an aircraft has not arrived, search and rescue services should be alerted."},{"q":"What is the pilot's responsibility after landing regarding a flight plan?","a":"The pilot must close the flight plan by reporting arrival to the ATSU at the earliest possible moment to prevent unnecessary search and rescue operations."},{"q":"What does the POH/AFM specify?","a":"Operating limitations, performance data, emergency procedures, and weight and balance information for a specific aircraft."},{"q":"What is the purpose of the Aircraft Technical Log?","a":"To record aircraft maintenance, defects, rectifications, and flight hours to maintain a continuous record of airworthiness status."},{"q":"What is the passenger briefing requirement?","a":"The PIC must brief passengers on safety equipment, emergency exits, seatbelt usage, and specific safety procedures before flight."},{"q":"What is the difference between MEL and CDL?","a":"The MEL lists equipment that may be inoperative for dispatch. The CDL allows operation with missing external parts under certain conditions."},{"q":"What is the pilot's responsibility for pre-flight planning?","a":"The PIC must familiarise themselves with all available information relevant to the flight, including weather, NOTAMs, fuel requirements, and alternate aerodromes."},{"q":"What flight plan info must be filed for cross-country VFR?","a":"Aircraft identification, flight rules, type, departure aerodrome and time, route, cruising level, destination, fuel endurance, persons on board, and emergency equipment."},{"q":"Who issues the Certificate of Airworthiness?","a":"The C of A is issued by the State of Registry (e.g., CAAT for Thai-registered aircraft) and is recognized by other Contracting States."},{"q":"What information is shown on a Certificate of Airworthiness?","a":"Nationality and registration marks, manufacturer and serial number, aircraft category (e.g., Normal/Utility), and date of expiry."},{"q":"What happens if an aircraft fails to maintain airworthiness?","a":"The aircraft becomes ineligible for operation and must be restored to an airworthy condition before it can fly again."},{"q":"What is a fireproof identification plate?","a":"A metal plate carried on every aircraft inscribed with the nationality and registration marks, designed to survive fire for accident identification."},{"q":"What state-issued documents must be carried on board the aircraft?","a":"Certificate of Registration (C of R) and Certificate of Airworthiness (C of A)."},{"q":"What manufacturer documents must be available on board?","a":"The Aircraft Flight Manual (AFM) or Pilot's Operating Handbook (POH)."},{"q":"What are operating limitations?","a":"Restrictions on aircraft operation including loading limits (weight and CG), airspeed limits (Vne, Vno), and power plant limits (RPM, temperatures)."},{"q":"Where can operating limitations be found?","a":"In the Aircraft Flight Manual (AFM), POH, and on placards displayed in the cockpit."},{"q":"What is VNE?","a":"The Never Exceed Speed - the maximum speed the aircraft must not exceed in any operation, marked by a red line on the airspeed indicator."},{"q":"What are aircraft placards used for?","a":"Placards display emergency information or operating limits directly in the cockpit for quick reference during flight."},{"q":"Where must a flight plan be submitted?","a":"To the ATS Reporting Office at the departure aerodrome."},{"q":"How far in advance must a flight plan be filed?","a":"At least 60 minutes before departure."},{"q":"What is Item 8 on the ICAO flight plan form?","a":"Flight Rules and Type of Flight. The letter 'V' is entered for VFR, 'I' for IFR."},{"q":"What is Item 13 on the ICAO flight plan form?","a":"The departure aerodrome (ICAO code) and the Estimated Off-Block Time (EOBT)."},{"q":"What is Item 15 on the ICAO flight plan form?","a":"The route of flight and cruising level."},{"q":"What is Item 19 on the ICAO flight plan form?","a":"Supplementary information including fuel endurance and number of persons on board."},{"q":"What must a pilot do if delayed more than 30 minutes from EOBT for a controlled flight?","a":"Amend or submit a new flight plan."},{"q":"What must a pilot do if delayed more than 60 minutes from EOBT for an uncontrolled flight?","a":"Amend or submit a new flight plan."},{"q":"What should a pilot do if flight plan information changes during flight?","a":"Report changes to the ATSU as soon as practicable, for example if fuel endurance or passenger count has changed."},{"q":"Why is closing a flight plan important?","a":"It prevents unnecessary search and rescue operations. If the pilot does not report arrival, SAR services may be activated."},{"q":"What is a clearance limit?","a":"The point to which an aircraft is granted an ATC clearance. The pilot must not proceed beyond this point without further clearance."},{"q":"What is the readback requirement for ATC clearances?","a":"Flight crew must read back safety-related parts including route clearances, runway clearances, altimeter settings, and SSR codes."},{"q":"What is the closed-loop communication model?","a":"ATC issues a clearance, the pilot reads back safety-critical items, and ATC verifies the readback and corrects any discrepancies."},{"q":"What items must always be read back to ATC?","a":"Route clearances, clearances to enter/land/take off from any runway, runway-in-use, altimeter settings (QNH), and SSR codes."},{"q":"What is the controller's responsibility regarding readbacks?","a":"The controller shall listen to the readback and take immediate action to correct any discrepancies."},{"q":"What is the EOBT on a flight plan?","a":"Estimated Off-Block Time - the estimated time the aircraft will begin to move for departure."},{"q":"What is the difference between a Certificate of Registration and a Certificate of Airworthiness?","a":"The C of R proves the aircraft is registered in a State. The C of A certifies the aircraft meets airworthiness standards and is safe to fly."},{"q":"What are the consequences of operating without a valid C of A?","a":"The aircraft is illegal to fly. Insurance may be void and the operator faces regulatory enforcement and potential criminal charges."},{"q":"What information must the pilot verify in the AFM before flight?","a":"Operating limitations including maximum weights, CG limits, airspeed limits, fuel requirements, and specific restrictions for the aircraft type."},{"q":"Can a pilot accept an ATC clearance that compromises safety?","a":"No. The pilot must decline and request an amended clearance. The PIC has final authority for the safe operation of the aircraft."},{"q":"What is the purpose of an aircraft maintenance release?","a":"It confirms that all required maintenance has been completed and the aircraft is airworthy for the next period of operation."},{"q":"What category might be listed on a Certificate of Airworthiness?","a":"Normal, Utility, Aerobatic, or Commuter, defining the permitted operations and manoeuvres."},{"q":"How does a pilot indicate VFR on the ICAO flight plan form?","a":"By placing the letter 'V' in Item 8 (Flight Rules and Type of Flight)."},{"q":"What is the purpose of the flight plan timeline?","a":"The timeline shows that a flight plan must be filed 60 minutes before EOBT, delays beyond 30 minutes (controlled) or 60 minutes (uncontrolled) require amendment, and the plan must be closed after landing."},{"q":"What happens if the pilot does not close the flight plan after landing?","a":"Search and rescue services may be unnecessarily activated, wasting resources and causing alarm. The pilot must report arrival at the earliest possible moment."}],"6 Aerodrome Declared Distances":[{"q":"What is TORA?","a":"Take-Off Run Available - the length of runway declared available and suitable for the ground run of an aeroplane taking off."},{"q":"What is TODA?","a":"Take-Off Distance Available - the TORA plus the length of any clearway, i.e., TODA = TORA + Clearway."},{"q":"What is ASDA?","a":"Accelerate-Stop Distance Available - the TORA plus the length of any stopway, i.e., ASDA = TORA + Stopway."},{"q":"What is LDA?","a":"Landing Distance Available - the length of runway declared available and suitable for the ground run of an aeroplane landing."},{"q":"What is a clearway?","a":"An area beyond the runway free of intersecting obstacles, over which an aircraft may make a portion of its initial climb. Used to calculate TODA."},{"q":"What is a stopway?","a":"An area beyond the runway capable of supporting an aircraft during an abandoned take-off, marked with yellow chevrons. Used to calculate ASDA."},{"q":"What is a displaced threshold?","a":"A threshold located at a point on the runway other than its physical start. The displaced portion may be used for takeoff but not for landing."},{"q":"How does a displaced threshold affect LDA?","a":"A displaced threshold reduces the LDA because landing aircraft cannot use the portion before the displaced threshold."},{"q":"Can the area before a displaced threshold be used for takeoff?","a":"Yes. The area before a displaced threshold can be used for takeoff and is included in TORA."},{"q":"Where can declared distances be found?","a":"In the AIP under the AD (Aerodrome) section, which lists TORA, TODA, ASDA, and LDA for each runway direction."},{"q":"If a runway is 1,800m with a 200m displaced threshold, what is the LDA?","a":"The LDA is 1,600m (1,800m minus the 200m displaced threshold)."},{"q":"What is the difference between TORA and TODA?","a":"TORA is the runway length for takeoff run only. TODA includes TORA plus any available clearway beyond the runway."},{"q":"What markings indicate a displaced threshold?","a":"Arrows pointing towards the threshold and a threshold bar marking at the displaced position."},{"q":"What does a closed runway marking look like?","a":"A large white X placed on the runway surface indicates a closed runway."},{"q":"What is a starter extension?","a":"An extension at the beginning of the runway that can be used for aircraft to start their takeoff roll, but is not part of the declared TORA."},{"q":"Which ICAO Annex covers aerodrome physical characteristics and declared distances?","a":"ICAO Annex 14 covers Aerodromes, including physical characteristics and declared distances."},{"q":"What is the definition of an aerodrome?","a":"A defined area on land or water intended for the arrival, departure, and surface movement of aircraft."},{"q":"How is runway slope calculated?","a":"Slope (%) = (Elevation change / Runway length) x 100."},{"q":"What is a runway strip?","a":"An area surrounding the runway intended to reduce damage to aircraft running off the runway and to protect aircraft operating on the runway."},{"q":"What is a taxiway strip?","a":"An area intended to protect aircraft operating on the taxiway, kept clear of objects that may endanger taxiing aircraft."},{"q":"What is the formula for TODA?","a":"TODA = TORA + Clearway length."},{"q":"What is the formula for ASDA?","a":"ASDA = TORA + Stopway length."},{"q":"If TORA is 2,100m, clearway is 450m, and stopway is 300m, what is TODA?","a":"TODA = 2,100 + 450 = 2,550m."},{"q":"If TORA is 2,100m and stopway is 300m, what is ASDA?","a":"ASDA = 2,100 + 300 = 2,400m."},{"q":"If TORA is 2,100m with no displaced threshold and no clearway or stopway, what is LDA?","a":"LDA = 2,100m, same as TORA since there is no displaced threshold."},{"q":"What is the purpose of a clearway?","a":"It provides additional distance beyond the runway for takeoff climb, free of obstacles. It increases TODA but not TORA."},{"q":"What is the purpose of a stopway?","a":"It provides additional distance beyond the runway for safe deceleration during an abandoned takeoff. It increases ASDA but not TORA."},{"q":"How are declared distances affected by a displaced threshold?","a":"A displaced threshold reduces LDA but does not affect TORA, TODA, or ASDA for takeoff from that end."},{"q":"What is the difference between physical runway length and declared distances?","a":"Physical length is the total pavement. Declared distances consider displaced thresholds, clearways, and stopways and may differ."},{"q":"How are declared distances calculated for international commercial transport?","a":"Distances are calculated to the nearest metre or feet for precision in performance planning."},{"q":"What are yellow chevrons on a runway surface?","a":"Yellow chevrons mark a stopway - suitable for decelerating during an abandoned takeoff but not for normal operations."},{"q":"What is EDA?","a":"Emergency Distance Available - equal to LDA plus the stopway. It is only for emergency aircraft landing."},{"q":"What is the formula for EDA?","a":"EDA = LDA + Stopway length."},{"q":"How does an intersection takeoff affect declared distances?","a":"It reduces available TORA, TODA, and ASDA because the aircraft starts from a point further along the runway."},{"q":"Why must a pilot compare AFM performance data against declared distances?","a":"To ensure required takeoff and landing distances do not exceed declared distances, considering weight, temperature, wind, and conditions."},{"q":"What is the relationship between takeoff distance required and TORA/TODA?","a":"Takeoff distance required must be less than or equal to TORA for ground run and TODA for total takeoff distance."},{"q":"What is the relationship between landing distance required and LDA?","a":"Landing distance required must be less than or equal to the LDA to ensure the aircraft can stop safely."},{"q":"Can a stopway be used for normal landing?","a":"No. A stopway is only for use during an aborted takeoff and is not included in the LDA."},{"q":"Can a clearway be used for landing?","a":"No. A clearway is only used during the initial takeoff climb and cannot be used for landing."},{"q":"What happens to declared distances for the reciprocal runway direction?","a":"They are calculated separately for each direction and may differ because features like displaced thresholds may exist on only one end."},{"q":"A runway has TORA 2,400m, CWY 500m, SWY 450m, displaced threshold 300m. What is the LDA?","a":"LDA = 2,400 - 300 = 2,100m."},{"q":"A runway has TORA 2,400m, CWY 500m, SWY 450m. What is TODA?","a":"TODA = 2,400 + 500 = 2,900m."},{"q":"A runway has TORA 2,400m, CWY 500m, SWY 450m. What is ASDA?","a":"ASDA = 2,400 + 450 = 2,850m."},{"q":"Why might TORA differ from physical runway length?","a":"If part of the runway is not declared suitable for takeoff or if there is a starter extension that is not part of the declared TORA."},{"q":"On a simple runway with no clearway, stopway, or displaced threshold, how do declared distances compare?","a":"All four distances (TORA, TODA, ASDA, LDA) are equal to the full runway length."},{"q":"What factors affect whether declared distances are adequate for a specific flight?","a":"Aircraft weight, temperature, pressure altitude, wind component, runway slope, and surface condition."},{"q":"How does TODA relate to obstacle clearance?","a":"TODA includes the clearway, which is free of obstacles above a defined slope, allowing safe climb after liftoff."},{"q":"What does it mean when TODA equals TORA?","a":"There is no clearway available. The total takeoff distance must be completed within the runway pavement."},{"q":"What does it mean when ASDA equals TORA?","a":"There is no stopway available. The aircraft must be able to stop within the runway pavement during an aborted takeoff."},{"q":"How does runway slope affect takeoff and landing performance?","a":"An uphill slope increases takeoff distance required and decreases landing distance. A downhill slope decreases takeoff distance but increases landing distance required."}],"7 Aerodrome Visuals and Safety":[{"q":"What does a steady green light from the tower signal to an aircraft in flight?","a":"Cleared to land."},{"q":"What does a steady red light from the tower signal to an aircraft in flight?","a":"Give way to other aircraft and continue circling."},{"q":"What does a flashing green light signal to an aircraft on the ground?","a":"Cleared to taxi or permission to cross the landing area or move onto the taxiway."},{"q":"What does a flashing red light signal to an aircraft on the ground?","a":"Move off the landing area or taxiway and watch out for aircraft."},{"q":"What does a red flare mean?","a":"Notwithstanding any previous instructions, do not land for the time being."},{"q":"What is the standard circuit direction?","a":"Left-hand turns (anti-clockwise) unless otherwise published or indicated."},{"q":"What is the standard circuit height?","a":"Typically 1,000 feet above aerodrome elevation, unless otherwise published."},{"q":"What does a white T on the signals area indicate?","a":"Land and take off on runways only. Taxiing is not confined to hard surfaces."},{"q":"What does a white dumbbell mean?","a":"Movements of aircraft and gliders are confined to hard surfaces (runways and taxiways)."},{"q":"What is the purpose of the windsock?","a":"To indicate wind direction and approximate wind speed. The windsock points in the direction the wind is blowing towards."},{"q":"What is PAPI?","a":"Precision Approach Path Indicator - a visual aid providing glide slope guidance using a row of lights. Two red and two white indicate the correct glide path."},{"q":"What does a red and yellow striped board indicate?","a":"A marker board indicating caution or the boundary of unfit areas on the aerodrome."},{"q":"What does a white flashing light signal to aircraft on the ground?","a":"Vacate the manoeuvring area in accordance with local instructions."},{"q":"What does the signal area contain?","a":"Ground signals used to communicate to aircraft in the air, including the landing T, wind direction indicator, and other visual signals."},{"q":"What does a red and green flare together mean?","a":"Exercise extreme caution."},{"q":"How are runway numbers determined?","a":"Based on the magnetic heading of the runway divided by 10 and rounded to the nearest whole number (e.g., heading 310 degrees = Runway 31)."},{"q":"What colour are runway markings?","a":"Runway markings (numbers, centerline, threshold bars) are painted white."},{"q":"What colour are taxiway markings?","a":"Taxiway centerlines and holding point markings are painted yellow, contrasting with white runway markings."},{"q":"What does a white X marking on a runway indicate?","a":"The runway is closed to all aircraft."},{"q":"What does a yellow X marking on a taxiway indicate?","a":"The taxiway is closed."},{"q":"What is a location sign at an aerodrome?","a":"A sign with yellow text on a black background that identifies the taxiway or runway you are currently on."},{"q":"What is a mandatory instruction sign?","a":"A sign with white text on a red background that must be obeyed, such as runway holding position signs."},{"q":"What is a direction sign at an aerodrome?","a":"A sign with black text on a yellow background indicating the direction to other taxiways or areas."},{"q":"What is the Runway Condition Assessment Matrix (RCAM)?","a":"A matrix used to assess braking action with codes from 6 (Dry) to 0 (Wet Ice)."},{"q":"What RCAM code represents a dry runway?","a":"Code 6 represents a dry runway with maximum braking action."},{"q":"What RCAM code represents wet ice on the runway?","a":"Code 0 represents wet ice with essentially zero braking action."},{"q":"What braking action corresponds to RCAM Code 5?","a":"Code 5 indicates Good braking action on a wet runway surface."},{"q":"What braking action corresponds to RCAM Code 3?","a":"Code 3 indicates Medium braking action, associated with slippery or water/slush conditions."},{"q":"What braking action corresponds to RCAM Code 1?","a":"Code 1 indicates Poor braking action, associated with ice on the runway."},{"q":"What is a SNOWTAM and what does it contain?","a":"A special NOTAM reporting hazardous runway surface conditions including RCAM codes for each runway third and depth of water, slush, or snow."},{"q":"What is VASIS?","a":"Visual Approach Slope Indicator System providing visual descent guidance showing whether the aircraft is above, below, or on the correct glide path."},{"q":"What do all-white PAPI lights indicate?","a":"The aircraft is too high on the approach."},{"q":"What do all-red PAPI lights indicate?","a":"The aircraft is too low on the approach."},{"q":"What does 2 red and 2 white PAPI lights indicate?","a":"The aircraft is on the correct glide path, typically 3 degrees."},{"q":"What does 3 red and 1 white PAPI light indicate?","a":"The aircraft is slightly below the correct glide path."},{"q":"What does 1 red and 3 white PAPI lights indicate?","a":"The aircraft is slightly above the correct glide path."},{"q":"How are obstacles near aerodromes marked during the day?","a":"With alternating red and white bands on tall structures like towers and cranes."},{"q":"How are obstacles near aerodromes marked at night?","a":"With flashing or steady red and white lights to warn pilots."},{"q":"What is the maximum response time for Rescue and Fire Fighting (RFF) services?","a":"The response time must not exceed 3 minutes to any point on the operational runway."},{"q":"What is the principal objective of aerodrome rescue and fire fighting services?","a":"The principal objective is to save lives."},{"q":"What does the Aerodrome Emergency Plan coordinate?","a":"All responding agencies including fire, police, and medical services. It must include a grid map of the aerodrome and vicinity."},{"q":"What information does an emergency report include?","a":"Nature of the emergency, last known position, number of persons on board, and any dangerous goods on board."},{"q":"What is a mandatory instruction marking on the pavement?","a":"A white inscription on a red background painted on the surface, typically showing runway designators to warn of runway proximity."},{"q":"What is the difference between a location sign and a direction sign?","a":"A location sign (yellow on black) shows where you are. A direction sign (black on yellow) shows where other taxiways or runways are."},{"q":"What do light gun signals from ATC replace?","a":"They replace radio communication when radio has failed, allowing ATC to communicate basic instructions using coloured light signals."},{"q":"What does a steady red light from the tower mean to an aircraft on the ground?","a":"Stop. The aircraft must hold its current position."},{"q":"What is an information marking?","a":"A marking on the taxiway or apron: yellow on black replaces a location sign, black on yellow replaces a direction sign."},{"q":"What RCAM code indicates slush or snow conditions?","a":"Code 2 indicates slush/snow conditions on the runway surface."},{"q":"Why is the RFF response time of 3 minutes critical?","a":"Survivability in an aircraft fire decreases rapidly. Quick response maximizes the chance of saving lives from a burning fuselage."},{"q":"What does RCAM Code 4 indicate?","a":"Code 4 indicates a wet and slippery runway surface condition, between wet (Code 5) and water/slush (Code 3)."}]},"02 AGK":{"1 Airframe and Flight Controls":[{"q":"What is the airframe of an aircraft?","a":"The airframe is the complete load-bearing skeleton and skin of the aircraft, including the fuselage, wings, tail assembly, and flying controls."},{"q":"What are the primary functions of the airframe?","a":"Supporting aerodynamic loads in flight, absorbing kinetic impact loads on the ground, and housing crew, passengers, and critical systems."},{"q":"What are the four principal components of an airframe?","a":"Fuselage, wings (mainplanes), tail assembly (empennage), and flying controls."},{"q":"What is the function of the fuselage?","a":"The fuselage is the central body that houses the payload and transfers loads between the wings and tail."},{"q":"What is truss (framework) construction?","a":"A fuselage constructed from welded steel tubes forming a space frame of triangular, rigid geometry. The internal framework absorbs all flight and ground loads."},{"q":"In truss construction, what is the role of the skin?","a":"The skin is merely an aerodynamic covering (fabric or light aluminium) with no primary structural role."},{"q":"What is the monocoque principle of construction?","a":"A single-shell construction where all loads are absorbed entirely by the stressed outer skin. It is lightweight but structurally intolerant of damage."},{"q":"Why is pure monocoque construction impractical for aircraft fuselages?","a":"Cutting doors or windows severely compromises the load-bearing integrity of the entire shell, making it unsuitable for passenger aircraft."},{"q":"What is semi-monocoque construction?","a":"A construction method where the skin bears load but is structurally reinforced by internal members such as formers, frames, longerons, and stringers."},{"q":"What is the most common type of modern light aircraft fuselage construction?","a":"Semi-monocoque construction, which allows for large cutouts like doors and windows by transferring stress around the openings via reinforced framing."},{"q":"What is the function of formers and frames in semi-monocoque construction?","a":"Formers and frames maintain the cross-sectional shape of the fuselage."},{"q":"What is the function of longerons and stringers in semi-monocoque construction?","a":"They run lengthwise to stiffen the skin and prevent buckling."},{"q":"What is the primary function of the wings (mainplanes)?","a":"To generate the lift necessary to support the aircraft's weight and manoeuvre loads."},{"q":"What are the three main wing configurations?","a":"Biplane (box-kite structure, high drag), braced monoplane (external struts, moderate drag), and cantilever monoplane (unbraced, aerodynamically clean)."},{"q":"What is a cantilever wing?","a":"An unbraced wing supported entirely internally at the fuselage. It is aerodynamically clean but requires massive internal strength."},{"q":"What are spars in a wing structure?","a":"The primary load-bearing I-beams running spanwise that absorb upward and downward bending stresses."},{"q":"What is the function of wing ribs?","a":"Ribs run chordwise (front to back), maintaining the aerofoil shape and transferring concentrated aerodynamic loads from the skin to the spars."},{"q":"What do stringers do in a wing?","a":"Stringers run spanwise to give the wing rigidity and stiffen the skin against compression."},{"q":"What is the torsion box in a wing?","a":"The forward section of the wing acting as a rigid tube to resist twisting forces in flight."},{"q":"What is the purpose of the empennage?","a":"The tail assembly is designed to return the aircraft to balanced flight when disturbed, providing longitudinal and directional stability."},{"q":"What provides longitudinal stability?","a":"The horizontal stabiliser (tailplane), which resists uncommanded pitch changes."},{"q":"What provides directional stability?","a":"The vertical stabiliser (fin), which acts like the feathers on an arrow, resisting uncommanded yaw."},{"q":"What are the three axes of flight and their associated rotations?","a":"Longitudinal axis (nose to tail) - roll; lateral axis (wingtip to wingtip) - pitch; normal/vertical axis (top to bottom) - yaw."},{"q":"Where do the three axes of flight intersect?","a":"At the Centre of Gravity (CG) of the aircraft."},{"q":"How are primary flight controls connected to the control surfaces in a light aircraft?","a":"Through a direct mechanical linkage of steel cables, rods, levers, chains, and pulleys connecting the cockpit controls to the wings and tail."},{"q":"What is the pre-flight check phrase for flight controls?","a":"'Full, free, and in the correct sense' - this ensures cables are intact and not jammed."},{"q":"What is a stabilator (all-moving tail)?","a":"A pitch control surface that combines the stabiliser and elevator into a single pivoting slab. It is highly responsive and commonly found on Piper aircraft."},{"q":"How do ailerons produce a roll to the right?","a":"The right aileron moves up (decreasing lift on the right wing) while the left aileron moves down (increasing lift on the left wing), causing the aircraft to roll right."},{"q":"About which axis do ailerons control movement?","a":"Ailerons control roll about the longitudinal axis."},{"q":"What does the rudder control?","a":"The rudder controls yaw about the normal (vertical) axis. Pushing the right pedal deflects the rudder right, yawing the nose right."},{"q":"What are primary stops on flight controls?","a":"Mechanical stops located at the control surface to definitively limit maximum aerodynamic deflection."},{"q":"What are secondary stops on flight controls?","a":"Stops located at the cockpit controls to provide clearance and prevent cable over-tensioning if primary stops are hit."},{"q":"What is aerodynamic flutter?","a":"A rapid, uncontrolled oscillation caused by unbalanced aerodynamic and inertial forces that can cause catastrophic structural failure in seconds."},{"q":"How is flutter prevented on control surfaces?","a":"By fitting a dense weight (mass balance) forward of the control surface's hinge line, bringing the centre of gravity onto or slightly ahead of the hinge line."},{"q":"Where is a mass balance always placed relative to a control surface?","a":"Forward of the leading edge (hinge line) of the control surface."},{"q":"What is the purpose of a trim system?","a":"To reduce the continuous force required by the pilot to hold a control surface in a deflected position to zero, reducing pilot fatigue."},{"q":"In which direction does a trim tab move relative to the main control surface?","a":"The trim tab moves in the opposite direction to the desired main control surface movement."},{"q":"What is a fixed trim tab?","a":"A small metal tab bent on the ground by authorised maintenance technicians only, to correct permanent slight out-of-trim conditions."},{"q":"What are the aerodynamic effects of deploying trailing edge flaps?","a":"Flaps significantly increase lift at low speeds, significantly increase drag, and lower the stall speed."},{"q":"What is the operational benefit of flaps?","a":"Flaps allow shorter take-off and landing distances and permit a steeper descent angle without increasing airspeed."},{"q":"What side effect occurs when flaps are selected?","a":"Selecting flaps causes a noticeable pitch change."},{"q":"What are ruddervators?","a":"Combined control surfaces on a V-tail aircraft that act together as elevators (pitch) and differentially as rudders (yaw)."},{"q":"What are elevons?","a":"Combined elevator and aileron surfaces on delta/tailless aircraft. They act together for pitch and differentially for roll."},{"q":"What do combined control surfaces require in the control system?","a":"A complex mechanical mixer in the control linkages to translate standard pilot inputs into the correct simultaneous movements."},{"q":"What are the four types of structural stress on an airframe?","a":"Tension (stretching), compression (shortening), shear (sliding apart), and torsion (twisting)."},{"q":"During flight, what stresses does the wing experience?","a":"The top of the wing experiences compression and the bottom experiences tension due to upward bending from lift forces."},{"q":"Why are control locks (gust locks) used on parked aircraft?","a":"To prevent wind gusts from violently slamming control surfaces against their mechanical stops, causing severe invisible damage to hinges and cables."},{"q":"How do internal control locks prevent accidental take-off?","a":"Internal locks are designed so it is impossible to open the throttle fully until they are removed."},{"q":"What is the safest fire extinguisher for wheel and brake fires?","a":"Dry powder is the absolute safest and best extinguishant for wheel and brake fires."},{"q":"When is a BCF (Halon) extinguisher safe to use in an enclosed cockpit?","a":"BCF extinguishers are safe for use in an enclosed cockpit only if the cabin is subsequently ventilated."}],"2 Aircraft Landing Gear":[{"q":"What are the three main functions of the landing gear?","a":"Providing a means of manoeuvring on the ground, supporting the aircraft at a convenient height for propeller clearance, and absorbing the kinetic energy of landing."},{"q":"What are the two main landing gear configurations?","a":"Tricycle (nosewheel) and tailwheel (conventional). Tricycle is standard on most modern training aircraft."},{"q":"What is the advantage of tricycle gear over tailwheel?","a":"Better forward visibility on the ground, more stable during ground operations, and less prone to ground looping."},{"q":"Why do light training aircraft feature fixed gear?","a":"Because the drag penalty is offset by simplicity, low cost, and reduced maintenance."},{"q":"What are the penalties of retractable landing gear?","a":"Increased weight, complexity, and maintenance requirements, despite eliminating aerodynamic drag."},{"q":"How do spring steel legs absorb landing shocks?","a":"Spring steel legs consist of a tube or strip of tapered spring steel bolted to the fuselage. The flexing of the steel absorbs landing shocks."},{"q":"How do rubber cord shock absorbers work?","a":"Rubber cord systems direct landing forces against loops of rubber, which flex to absorb the energy."},{"q":"How does an oleo-pneumatic strut work?","a":"It uses compressed air to absorb shock and support the aircraft's weight, while oil forced through a small orifice dampens the rebound."},{"q":"What is the purpose of wheel fairings (spats)?","a":"Spats are fitted to the undercarriage to reduce aerodynamic drag."},{"q":"What is a drawback of wheel spats?","a":"Spats may pick up mud when operating from grass airfields, adding weight and affecting take-off performance."},{"q":"What mechanical locks does retractable gear rely on?","a":"Retractable gear uses uplock mechanisms (gear up) and downlock mechanisms (gear down) to ensure the gear stays securely locked in position."},{"q":"What do the landing gear position indicator lights show?","a":"Usually green lights indicate gear down and locked, red or no light indicates gear up or in transit."},{"q":"What is a squat switch (weight-on-wheels switch)?","a":"A safety system that prevents retraction of the landing gear while the aircraft is on the ground."},{"q":"What is shimmy on a nose wheel?","a":"A rapid, sinusoidal oscillation of the nose wheel caused by tyre sidewall flexibility. At high speeds it can damage the structure."},{"q":"What is the function of a shimmy damper?","a":"A shimmy damper is installed to prevent nose wheel vibrations by dampening oscillations."},{"q":"What are aircraft tyres composed of?","a":"Pneumatic tyres comprising a rubber inner tube inflated with compressed air, and an outer cover that protects the tube and provides a wear surface."},{"q":"What is the ply rating of an aircraft tyre?","a":"The ply rating is an index of the strength of the tyre, not necessarily the actual number of plies."},{"q":"What are awl vents on aircraft tyres?","a":"Small holes that prevent damage by allowing trapped air between plies to escape during low atmospheric pressures at high altitude."},{"q":"What is tyre creep?","a":"The tendency of newly fitted tyres to move slightly around the rim during heavy braking."},{"q":"How is tyre creep identified?","a":"By the misalignment of markings (slippage marks) painted on the tyre sidewall and wheel flange."},{"q":"What environmental hazards must tyres be protected from?","a":"Excessive heat and UV (causing dry rot), moisture (prolonged dampness), and chemical contamination from oil, fuel, and hydraulic fluid."},{"q":"What should be done if oil, fuel, or hydraulic fluid contacts a tyre?","a":"The spillage must be wiped off immediately, as these chemicals cause rapid rubber degradation."},{"q":"What tyre defects should be checked during pre-flight?","a":"Cuts penetrating to the structural cords, bulges indicating internal casing failure, embedded stones, and excessive wear."},{"q":"When is a tyre rendered completely unserviceable?","a":"When cuts penetrate down to the structural cords (visible as white fibrous material)."},{"q":"What does a bulge on a tyre indicate?","a":"A partial failure of the internal casing, making the tyre unserviceable."},{"q":"What is aquaplaning (hydroplaning)?","a":"A condition where a layer of water prevents the tyre from contacting the runway, eliminating braking and steering friction."},{"q":"How is the minimum dynamic aquaplaning speed calculated?","a":"Aquaplaning speed in knots equals 9 multiplied by the square root of the tyre pressure in PSI."},{"q":"If a tyre pressure is 49 PSI, what is the minimum aquaplaning speed?","a":"9 x sqrt(49) = 9 x 7 = 63 knots."},{"q":"How do aircraft brakes function?","a":"Brakes convert the aircraft's kinetic energy into heat energy through friction between brake pads and a rotating disc."},{"q":"What type of brakes do most light aircraft use?","a":"Hydraulic disc brakes consisting of fixed friction pads bearing on a rotating disc made of forged, case-hardened steel."},{"q":"What material are aircraft brake pads made from?","a":"An inorganic friction material designed to withstand high temperatures."},{"q":"What are the three steps in the hydraulic brake system?","a":"Step 1: Brake pedal pressure builds hydraulic pressure in the master cylinder. Step 2: Fluid travels to the slave cylinder. Step 3: Fluid pushes a piston that squeezes the brake pad against the disc."},{"q":"What is the safest fire extinguisher for a wheel or brake fire?","a":"Dry powder is the safest extinguishant to use on wheel and brake fires."},{"q":"How is differential braking used for steering?","a":"Applying just one toe brake pivots the aircraft around that main wheel, allowing tight turns on the ground."},{"q":"How does the parking brake work on most light aircraft?","a":"A hand-operated mechanism that locks hydraulic pressure in the brake lines to keep the brakes applied."},{"q":"What should be checked on the brake system during pre-flight?","a":"Check for hydraulic fluid leaks. If fluid is spotted dripping or on the tyre sidewall, the aircraft is unserviceable."},{"q":"How is nose wheel steering mechanically effected?","a":"Through control rods or cables operated by the rudder pedals."},{"q":"What is the caliper lateral reaction in disc brakes?","a":"When the inner brake pad pushes against the disc, the reaction causes the caliper unit to move, carrying the outer brake pad with it until the disc is squeezed between both pads."},{"q":"Why is excessive braking dangerous?","a":"It generates extreme heat that can cause brake fade, tyre damage, or fire, especially in light aircraft where heat

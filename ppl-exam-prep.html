urn Coordinator sense that the Turn Indicator does not?", "a": "The Turn Coordinator has a canted gimbal axis, so it senses both rate of roll AND rate of turn. The basic Turn Indicator only senses rate of turn (yaw)."}, {"q": "What does the inclinometer (ball) indicate?", "a": "It indicates the quality of a turn: balanced (ball centred), skidding (ball moves to outside of turn, too much rudder), or slipping (ball moves to inside of turn, insufficient rudder)."}, {"q": "What is magnetic variation?", "a": "The angular difference between True North (geographic) and Magnetic North. The mnemonic is: Variation West, Magnetic Best (add); Variation East, Magnetic Least (subtract)."}, {"q": "What is magnetic deviation and how is it corrected?", "a": "Deviation is local compass error caused by magnetic interference from aircraft metals and electronics. It varies with heading and is recorded on a compass deviation card mounted near the compass after a compass swing procedure."}, {"q": "What is magnetic dip and how does the compass compensate for it?", "a": "Magnetic dip is the tendency of the compass magnet to tilt downward toward the magnetic poles. The compass compensates by pendulously suspending the magnet assembly to keep it relatively level."}, {"q": "What is the ANDS mnemonic for compass acceleration errors?", "a": "Accelerate North, Decelerate South (in the Northern Hemisphere). When accelerating on east/west headings, the compass falsely indicates a turn toward north; when decelerating, it indicates a turn toward south."}, {"q": "On which headings do compass acceleration errors occur, and on which are they absent?", "a": "Acceleration errors occur on east and west headings due to the inertia of the pendulously mounted compass magnets. They are minimal or absent on north and south headings."}, {"q": "What is the NESL mnemonic for compass turning errors?", "a": "North Early, South Late (Northern Hemisphere). When turning through north, the compass leads (shows the heading early). When turning through south, the compass lags (shows the heading late)."}, {"q": "On which headings are compass turning errors maximum and minimum?", "a": "Turning errors are maximum when passing through north and south headings, and minimum when passing through east and west headings."}, {"q": "What is liquid swirl in the magnetic compass and what effect does it have?", "a": "When the aircraft turns, the liquid inside the compass bowl tends to rotate with the bowl, dragging the compass magnet with it. This increases turning errors, particularly when turning through north."}, {"q": "What is a compass swing?", "a": "A calibration procedure that compares the aircraft compass reading to an accurate datum compass on multiple headings. It identifies and minimises deviation errors, and the residual deviations are recorded on the deviation card."}, {"q": "What is the purpose of the pendulous erection system in the Attitude Indicator?", "a": "It uses gravity-driven pendulous vanes to continuously correct the gyro toward the true vertical (Earth's gravity), compensating for precession and friction that would otherwise cause the AI to drift from the correct reference."}]}, "03 POF": {"1 Aviation Physics Fundamentals": [{"q": "What is the ISA standard sea-level pressure in hPa and inches of mercury?", "a": "1013.25 hPa (29.92 inHg)."}, {"q": "What is the ISA standard sea-level temperature?", "a": "15 degrees Celsius (59 degrees Fahrenheit)."}, {"q": "At what rate does temperature decrease with altitude in the ISA model?", "a": "Approximately 2 degrees Celsius per 1,000 feet (the lapse rate)."}, {"q": "What is the relationship between static pressure and altitude?", "a": "Static pressure decreases as altitude increases because there is less atmosphere above to exert weight."}, {"q": "What does Bernoulli's principle state about the relationship between air velocity and pressure?", "a": "As the velocity of an airflow increases, its static pressure decreases, and vice versa. Total pressure (static + dynamic) remains constant in a streamline."}, {"q": "What is dynamic pressure and how is it calculated?", "a": "Dynamic pressure is the pressure due to the motion of air, calculated as one-half times air density times velocity squared (q = 1/2 rho V squared)."}, {"q": "What is the difference between laminar and turbulent airflow?", "a": "Laminar flow consists of smooth, parallel streamlines with low friction drag. Turbulent flow is chaotic and irregular, producing higher friction drag."}, {"q": "What is the continuity equation and what does it tell us?", "a": "It states that in a streamtube, the product of cross-sectional area and velocity is constant (A1 x V1 = A2 x V2). If the tube narrows, velocity increases."}, {"q": "How does air density change with increasing temperature?", "a": "Air density decreases as temperature increases because warmer air molecules are spaced further apart."}, {"q": "Define the chord line of an aerofoil.", "a": "The chord line is the straight line joining the leading edge to the trailing edge of an aerofoil."}, {"q": "What is the angle of attack (AoA)?", "a": "The angle between the chord line of the wing and the direction of the relative airflow."}, {"q": "How does humidity affect air density?", "a": "Higher humidity decreases air density because water vapour molecules are lighter than the nitrogen and oxygen molecules they displace."}, {"q": "What is Newton's Third Law and how does it relate to lift generation?", "a": "For every action there is an equal and opposite reaction. The wing deflects air downward (downwash), and the reaction force pushes the wing upward, contributing to lift."}, {"q": "What happens to the free-stream airflow as it passes over the curved upper surface of a wing?", "a": "The airflow accelerates over the curved upper surface, decreasing static pressure and creating a pressure differential that generates lift."}, {"q": "What is density altitude?", "a": "Density altitude is pressure altitude corrected for non-standard temperature. It represents the altitude in the standard atmosphere at which the current air density would be found."}, {"q": "A pilot is departing from a high-elevation airport on a hot day. How is air density affected and what is the performance consequence?", "a": "Air density is significantly reduced (high density altitude). This reduces engine power, propeller efficiency, and aerodynamic lift, resulting in degraded aircraft performance requiring longer take-off distances."}], "2 Lift and Drag": [{"q": "Write the lift equation.", "a": "Lift = CL x 1/2 x rho x V squared x S, where CL is the coefficient of lift, rho is air density, V is true airspeed, and S is wing area."}, {"q": "Which variable in the lift equation has the greatest effect on lift and why?", "a": "Velocity (V), because it is squared. Doubling airspeed quadruples the lift produced (all else equal)."}, {"q": "What is the coefficient of lift (CL) and what primarily changes it?", "a": "CL is a dimensionless number representing the lifting effectiveness of the aerofoil. It is primarily changed by altering the angle of attack."}, {"q": "What happens to CL as angle of attack increases up to the critical angle?", "a": "CL increases approximately linearly with angle of attack until the critical angle (around 16 degrees for training aircraft), where it reaches CL MAX and then drops sharply as the wing stalls."}, {"q": "What are the two main categories of drag?", "a": "Parasite drag (form, skin friction, and interference drag) and induced drag (drag due to lift production)."}, {"q": "How does parasite drag change with airspeed?", "a": "Parasite drag increases with the square of airspeed. Doubling speed quadruples parasite drag."}, {"q": "How does induced drag change with airspeed?", "a": "Induced drag decreases as airspeed increases, because a lower angle of attack is needed at higher speeds to maintain the same lift."}, {"q": "What causes induced drag?", "a": "Induced drag is caused by wingtip vortices that result from high-pressure air beneath the wing spilling over to the low-pressure region above, creating a downwash that tilts the lift vector rearward."}, {"q": "What is the significance of the speed where total drag is minimum (VMD)?", "a": "VMD is the speed at which parasite drag equals induced drag, giving the best lift-to-drag ratio (L/D MAX). It is the speed for maximum range and best glide."}, {"q": "What is the aspect ratio of a wing and how does it affect induced drag?", "a": "Aspect ratio is the ratio of wingspan to mean chord. A higher aspect ratio wing (long and narrow) produces less induced drag because wingtip vortices affect a smaller proportion of the total span."}, {"q": "What is form drag?", "a": "Form drag is caused by the shape of the aircraft disrupting the airflow, creating a turbulent wake and low-pressure area behind the object. Streamlining reduces form drag."}, {"q": "What is interference drag?", "a": "Interference drag is generated where two surfaces meet (e.g., wing-fuselage junction), causing airflow disruption greater than the sum of drag from each surface alone. Fairings are used to reduce it."}, {"q": "What is the Centre of Pressure (CP)?", "a": "The CP is the single point on the chord line where the total aerodynamic force (lift and drag) is considered to act."}, {"q": "How does the Centre of Pressure move with changes in angle of attack?", "a": "As angle of attack increases, the CP moves forward. As angle of attack decreases, the CP moves rearward. At the stall, the CP shifts rapidly rearward."}, {"q": "What is skin friction drag and how can it be reduced?", "a": "Skin friction drag results from the viscosity of air creating friction as it flows over the aircraft surface. It is reduced by keeping surfaces smooth and clean, and by maintaining laminar flow as long as possible."}, {"q": "An aircraft is flying at VMD. If the pilot slows down, what happens to total drag and why?", "a": "Total drag increases because the aircraft enters the region of reversed command (back side of the drag curve), where the rapid rise in induced drag more than offsets any decrease in parasite drag."}], "3 Aircraft Weight and Thrust": [{"q": "What are the four forces acting on an aircraft in flight?", "a": "Lift, Weight, Thrust, and Drag."}, {"q": "In straight and level unaccelerated flight, what is the relationship between the four forces?", "a": "Lift equals Weight, and Thrust equals Drag. The aircraft is in equilibrium with zero net force."}, {"q": "Through which point does the Weight force act?", "a": "Weight acts vertically downward through the Centre of Gravity (CG)."}, {"q": "What is the difference between mass and weight?", "a": "Mass is the quantity of matter in an object (measured in kg). Weight is the force of gravity acting on that mass (Weight = Mass x g), measured in Newtons."}, {"q": "How is thrust generated by a piston-engine propeller aircraft?", "a": "The engine turns the propeller, which is an aerofoil that accelerates a mass of air rearward. By Newton's Third Law, the reaction force propels the aircraft forward."}, {"q": "What is the thrust line?", "a": "The thrust line is the imaginary line along which the engine's thrust force acts, typically along the propeller shaft axis."}, {"q": "What is a pitching moment and what causes it?", "a": "A pitching moment is a rotational tendency around the lateral axis. It is caused when forces (Lift, Weight, Thrust, Drag) do not act through the same point, creating force couples."}, {"q": "If thrust acts above the drag line, what pitching tendency does this create?", "a": "A nose-down pitching moment, because the thrust-drag couple rotates the aircraft nose-down."}, {"q": "What propeller effects cause yaw in a single-engine aircraft?", "a": "Slipstream effect (spiraling air striking the vertical fin), torque reaction, asymmetric blade effect (P-factor), and gyroscopic precession."}, {"q": "What is the slipstream effect on a clockwise-rotating propeller (as seen from the cockpit)?", "a": "The spiraling slipstream strikes the left side of the vertical fin, creating a yawing force to the left. The pilot must apply right rudder to counteract this."}, {"q": "What is P-factor (asymmetric blade effect)?", "a": "At high angles of attack, the descending propeller blade has a higher effective angle of attack and produces more thrust than the ascending blade, causing a yaw toward the side of the ascending blade."}, {"q": "When is P-factor most pronounced?", "a": "P-factor is most pronounced at high power settings combined with high angles of attack, such as during take-off and slow flight."}, {"q": "What is torque reaction?", "a": "By Newton's Third Law, if the propeller rotates clockwise (as seen from the cockpit), the aircraft tends to roll in the opposite direction (left/counterclockwise)."}, {"q": "How does the aircraft maintain balance in straight and level flight if the CG is ahead of the CP?", "a": "The horizontal tailplane produces a downward aerodynamic force that balances the nose-down pitching moment created by the CG being ahead of the CP."}, {"q": "What happens to aircraft performance if weight increases but thrust remains constant?", "a": "Higher weight requires more lift, meaning a higher angle of attack or higher speed. This increases induced drag, reduces excess thrust, degrades climb performance, and increases stall speed."}], "4 Flight Forces and Turns": [{"q": "In a steady coordinated turn, why must lift be greater than weight?", "a": "The lift vector must be tilted to provide a horizontal component (centripetal force) for the turn, so total lift must increase to keep the vertical component equal to weight."}, {"q": "What is load factor?", "a": "Load factor (n) is the ratio of total lift produced to the aircraft's weight. In straight and level flight, load factor is 1g."}, {"q": "What is the load factor in a 60-degree banked level turn?", "a": "2g. The load factor equals 1 divided by the cosine of the bank angle; cos(60) = 0.5, so n = 2."}, {"q": "How does bank angle affect stall speed?", "a": "Stall speed increases with bank angle. The stall speed in a turn equals the straight-and-level stall speed multiplied by the square root of the load factor."}, {"q": "By how much does stall speed increase in a 60-degree bank turn?", "a": "Approximately 41%. The square root of 2 (the load factor) is about 1.41."}, {"q": "What is the correct way to enter a coordinated turn?", "a": "Apply aileron to establish the desired bank angle, use rudder to coordinate (prevent adverse yaw), and apply back pressure on the elevator to maintain altitude and increase the load factor."}, {"q": "What is adverse yaw?", "a": "When ailerons are applied, the down-going aileron creates more induced drag than the up-going aileron, causing the nose to yaw opposite to the direction of the turn."}, {"q": "How is adverse yaw counteracted?", "a": "By applying rudder in the direction of the turn (same direction as the aileron input) to coordinate the turn. Differential ailerons also help reduce adverse yaw."}, {"q": "What does the slip ball indicate in a turn?", "a": "A centered ball indicates coordinated flight. Ball displaced inward (toward the turn) indicates a slip; ball displaced outward indicates a skid."}, {"q": "What is a slip in a turn?", "a": "A slip occurs when there is insufficient rate of turn for the bank angle (too little rudder or too much bank). The aircraft sideslips toward the inside of the turn."}, {"q": "What is a skid in a turn?", "a": "A skid occurs when there is too much rate of turn for the bank angle (too much rudder). The aircraft slides outward from the turn."}, {"q": "What is rate 1 turn and what bank angle approximation is used?", "a": "A rate 1 turn is 3 degrees per second (360 degrees in 2 minutes). The approximate bank angle is TAS/10 + 7 degrees."}, {"q": "Why does an aircraft tend to overbank in a steep turn?", "a": "The outer wing travels faster and generates more lift than the inner wing, creating a rolling moment that increases the bank. The pilot must apply a slight opposite aileron to prevent overbanking."}, {"q": "What is the radius of turn affected by?", "a": "Radius of turn depends on TAS and bank angle. Higher speed increases radius; steeper bank decreases radius."}, {"q": "During a level turn, what happens if the pilot fails to increase back pressure?", "a": "The vertical component of lift will be less than weight, so the aircraft will descend (lose altitude) during the turn."}, {"q": "Can an aircraft exceed its structural load limits in a steep turn? Explain.", "a": "Yes. In very steep bank angles (above about 75 degrees for Normal category), the load factor exceeds the structural limit of +3.8g, risking structural damage."}], "5 Lift Augmentation": [{"q": "What is the primary purpose of flaps?", "a": "To increase the wing's coefficient of lift (CL MAX), allowing the aircraft to fly at slower speeds for take-off and landing without stalling."}, {"q": "How do flaps increase lift?", "a": "Flaps increase the camber and, depending on type, the effective wing area. This increases CL MAX, allowing more lift at a given airspeed."}, {"q": "What are the four main types of trailing edge flaps?", "a": "Plain flap, split flap, slotted flap, and Fowler flap."}, {"q": "Which flap type is most aerodynamically efficient and why?", "a": "The Fowler flap, because it increases both camber and wing area, and the slot between the flap and wing re-energises the boundary layer, giving the highest CL MAX increase with less drag penalty."}, {"q": "How do flaps affect the stall speed?", "a": "Flaps decrease the stall speed because they increase CL MAX, meaning less airspeed is needed to produce the required lift."}, {"q": "How do flaps affect the critical angle of attack?", "a": "Flaps decrease the critical angle of attack. The wing stalls at a lower AoA with flaps extended compared to the clean configuration."}, {"q": "What is the effect of flaps on drag?", "a": "Flaps significantly increase drag, especially at large deflection angles. Initial flap settings produce more lift than drag, but full flap settings produce proportionally more drag."}, {"q": "Why are only partial flaps typically recommended for take-off?", "a": "Partial flaps provide a useful lift increase to shorten the ground roll, but without the excessive drag penalty that full flaps would create, which would degrade the climb angle."}, {"q": "What is the purpose of leading edge devices such as slats?", "a": "Slats re-energise the boundary layer over the wing's upper surface by directing high-energy air through a slot, delaying flow separation and increasing the critical angle of attack and CL MAX."}, {"q": "How does a slat differ from a slot?", "a": "A slot is a fixed gap in the wing leading edge. A slat is a movable leading edge surface that, when deployed, creates a slot. Slats can be retracted for clean cruise flight."}, {"q": "What happens to approach speed when flaps are deployed for landing?", "a": "Approach speed decreases because flaps lower the stall speed. The reference speed (VREF) is based on 1.3 x VSO (stall speed in landing configuration with flaps)."}, {"q": "Why do flaps allow a steeper approach angle?", "a": "The high drag produced by full flaps allows the aircraft to descend at a steeper angle without accelerating, improving obstacle clearance on approach."}, {"q": "What is VFE?", "a": "VFE is the maximum speed at which flaps may be extended (the top of the white arc on the airspeed indicator). Exceeding VFE with flaps deployed risks structural damage."}, {"q": "What effect do flaps have on the pitching moment?", "a": "Flap deployment generally causes a nose-down pitching moment because the increased lift acts behind the CG, and the increased drag acts below the thrust line. The pilot must re-trim."}, {"q": "A pilot is on short final and retracts the flaps suddenly. What is the immediate danger?", "a": "Sudden flap retraction causes an immediate loss of CL MAX and a rise in stall speed. The aircraft may stall or sink rapidly if airspeed is insufficient for the clean configuration."}, {"q": "What is a split flap and what is its distinguishing characteristic?", "a": "A split flap is hinged at the lower surface of the trailing edge only; the upper surface remains fixed. It produces good lift increase but very high drag, making it less efficient than slotted or Fowler flaps."}], "6 Aircraft Stability and Control": [{"q": "What are the three axes of an aircraft and the movement associated with each?", "a": "Longitudinal axis (roll), lateral axis (pitch), and normal/vertical axis (yaw). All three axes intersect at the Centre of Gravity."}, {"q": "What are the three primary flight controls and which axis does each control?", "a": "Ailerons control roll (longitudinal axis), elevator controls pitch (lateral axis), and rudder controls yaw (normal axis)."}, {"q": "What is the difference between stability and control?", "a": "Stability is the aircraft's natural tendency to return to its original state after a disturbance. Control is the pilot's ability to intentionally manoeuvre the aircraft."}, {"q": "Define positive static stability.", "a": "The initial tendency of an aircraft to return toward its original attitude after being disturbed."}, {"q": "What is positive dynamic stability?", "a": "After a disturbance, the aircraft oscillates with decreasing amplitude over time, eventually returning to the original state. It requires positive static stability first."}, {"q": "What provides longitudinal (pitch) stability?", "a": "Primarily the horizontal tailplane (stabiliser), which provides a correcting balancing moment about the lateral axis when the aircraft is disturbed in pitch."}, {"q": "How does a forward CG affect longitudinal stability?", "a": "A forward CG increases longitudinal stability, making the aircraft very stable but requiring heavier control forces. It also increases stall speed due to the larger downward tail force needed."}, {"q": "How does an aft CG affect stability and safety?", "a": "An aft CG decreases longitudinal stability, making the aircraft less stable and more manoeuvrable but creating dangerous stall/spin characteristics and potentially making recovery impossible."}, {"q": "What provides lateral (roll) stability?", "a": "Primarily wing dihedral (wings angled upward from root to tip). A swept wing planform and high wing mounting also contribute."}, {"q": "Explain how dihedral provides lateral stability.", "a": "When a wing drops, the aircraft sideslips toward the lower wing. Due to dihedral, the lower wing meets the relative airflow at a higher AoA, generating more lift and rolling the aircraft back to level."}, {"q": "What provides directional (yaw) stability?", "a": "The vertical fin (keel surface), which acts like a weathervane. When the aircraft yaws, the fin generates a correcting aerodynamic force to realign the aircraft with the airflow."}, {"q": "What is a spiral dive and what stability imbalance causes it?", "a": "A spiral dive is an increasing descending turn caused by strong directional stability combined with weak lateral stability. A wing drop causes yaw, which reinforces the roll, tightening the spiral."}, {"q": "What is the secondary effect of rudder input?", "a": "Roll. Applying rudder yaws the aircraft, causing the outer wing to speed up and produce more lift, inducing a roll in the direction of the yaw."}, {"q": "What is the secondary effect of aileron input?", "a": "Yaw (adverse yaw initially, then a sideslip-induced yaw). Rolling the aircraft causes a sideslip, which produces a secondary yaw due to the keel effect of the fin."}, {"q": "What is the purpose of a trim tab?", "a": "To relieve the pilot from holding constant control pressure by using a small hinged surface on the trailing edge of a control surface to aerodynamically hold it in the desired position."}, {"q": "How does a balance tab differ from an anti-balance tab?", "a": "A balance tab moves opposite to the control surface to assist the pilot (lightens stick forces). An anti-balance tab moves in the same direction as the control surface to increase stick forces and provide better control feel."}, {"q": "What is aerodynamic balancing of a control surface?", "a": "Placing part of the control surface area ahead of the hinge line (using horns, inset hinges, or internal balances) so that aerodynamic forces assist the pilot, reducing the stick force required to deflect the surface."}, {"q": "What does the elevator primarily control in steady flight?", "a": "Airspeed. By changing the pitch attitude, the elevator adjusts the angle of attack, which determines the equilibrium airspeed."}], "7 Stalls Spins and Flight Limits": [{"q": "At what angle of attack does a typical training aircraft stall?", "a": "Approximately 16 degrees, which is the critical angle of attack where CL MAX is exceeded."}, {"q": "Does a stall depend on airspeed or angle of attack?", "a": "A stall occurs at a specific critical angle of attack, not a specific airspeed. However, the airspeed at which this angle is reached varies with weight, load factor, and configuration."}, {"q": "What are the warning signs of an approaching stall?", "a": "Abnormally high nose attitude with decreasing airspeed, sloppy and ineffective flight controls, stall warning horn sounding, and eventually physical airframe buffeting."}, {"q": "What is the standard stall recovery procedure?", "a": "1) Move the control column centrally forward to reduce angle of attack. 2) Apply smooth full power. 3) Once unstalled and airspeed builds, smoothly recover to level flight."}, {"q": "How does increased weight affect stall speed?", "a": "Increased weight increases stall speed. The heavier aircraft must fly at a higher AoA for a given speed, reaching the critical AoA at a higher airspeed."}, {"q": "How does deploying flaps affect the critical angle of attack and stall speed?", "a": "Flaps decrease both the critical angle of attack and the stall speed. They change the wing shape, increasing CL MAX."}, {"q": "How does ice contamination on the wing affect stalling?", "a": "Ice decreases the critical angle of attack and increases stall speed. It disrupts smooth airflow over the wing, causing earlier flow separation."}, {"q": "What is the formula for stall speed in a turn?", "a": "Turn stall speed = Straight stall speed x square root of load factor."}, {"q": "What is an accelerated stall?", "a": "A stall that occurs at a speed higher than the normal 1g stall speed, caused by a load factor greater than 1 (e.g., during a steep turn or abrupt pull-up). The aircraft can stall at any attitude."}, {"q": "If a wing drops during a stall, should the pilot use ailerons to level the wings?", "a": "No. Using ailerons increases the AoA on the dropping wing, deepening the stall. The correct action is to apply opposite rudder to arrest the yaw while pitching forward to unstall."}, {"q": "What is a spin?", "a": "A spin is an aggravated, uncoordinated stall resulting in autorotation: one wing is more deeply stalled than the other, creating a self-sustaining yaw/roll descent."}, {"q": "What is the golden rule for spin avoidance?", "a": "An aircraft cannot spin if it is not stalled. Maintain safe airspeeds and coordinated flight (ball centered) to prevent spins."}, {"q": "What is the standard spin recovery procedure?", "a": "Throttle idle, ailerons neutral, apply full opposite rudder (against the direction shown by the turn needle), then move the control column progressively forward to reduce AoA. Once rotation stops, centralize rudder and ease out of the dive."}, {"q": "How can you identify spin direction using instruments?", "a": "The turn needle on the turn and slip indicator is the most reliable instrument; it will be fully deflected in the direction of the spin. Airspeed is low and fluctuating, unlike a spiral dive."}, {"q": "What is the V-n diagram (manoeuvre envelope)?", "a": "A graph plotting load factor (g) against airspeed (V) that shows the aircraft's aerodynamic and structural limits, including the stall boundary, maximum positive/negative load factors, and critical V-speeds."}, {"q": "What are the positive and negative load factor limits for a Normal category aircraft?", "a": "+3.8g positive and -1.52g negative."}, {"q": "What is VA (manoeuvring speed)?", "a": "The maximum speed at which full control deflection can be applied without exceeding the structural load limits. At or below VA, the aircraft will stall before the structure breaks."}, {"q": "Why must an aircraft be slowed to VA or below in turbulence?", "a": "At VA, a sudden gust will cause the wing to stall before generating enough force to exceed the structural limit. Above VA, gusts can produce loads that exceed the structural limit and damage the airframe."}, {"q": "What is the structural safety factor built into certified aircraft?", "a": "1.5 times the limit load. The ultimate load is 1.5 times the published limit load, beyond which structural failure may occur."}, {"q": "What is VNE?", "a": "VNE (Never Exceed speed) is the absolute maximum speed, marked by the red line on the airspeed indicator. Exceeding it risks flutter, structural failure, or loss of control."}], "8 Take-Off Performance": [{"q": "What is the standard screen height for take-off distance for light single-engine aircraft?", "a": "50 feet."}, {"q": "What is the formula for Take-Off Distance Required (TODR)?", "a": "TODR = Ground Roll + Initial Climb (airborne distance from lift-off to 50 ft screen height)."}, {"q": "What is the minimum take-off safety speed relative to stall speed?", "a": "Take-off safety speed must be at least 1.2 times the stalling speed (VS)."}, {"q": "What is TORA?", "a": "Take-Off Run Available: the physical length of runway declared available and suitable for the ground run, measured from threshold to threshold."}, {"q": "What is TODA?", "a": "Take-Off Distance Available = TORA + Clearway. The clearway is an obstacle-free zone beyond the runway that does not need to support the aircraft's weight."}, {"q": "What is ASDA?", "a": "Accelerate-Stop Distance Available = TORA + Stopway. The stopway is a designated extension capable of supporting the aircraft's weight for an aborted take-off."}, {"q": "What is the golden rule of take-off planning?", "a": "The calculated TODR must NEVER exceed the TODA. If TODR exceeds TODA, the departure is not legal or safe."}, {"q": "How does a 10% increase in aircraft mass affect TODR?", "a": "A 10% increase in mass results in approximately a 20% increase in TODR."}, {"q": "How does high density altitude (hot and high) affect take-off performance?", "a": "It reduces engine power, propeller thrust, and aerodynamic lift (requiring higher TAS for lift-off), resulting in a massive increase in TODR."}, {"q": "How does a headwind affect take-off distance?", "a": "A headwind reduces TODR by providing free airspeed before the aircraft moves, reducing the required groundspeed for lift-off."}, {"q": "How does a tailwind affect take-off distance?", "a": "A tailwind drastically increases TODR because the aircraft must accelerate to a much higher groundspeed to achieve the required airspeed for lift-off."}, {"q": "What is the rule of thumb for runway slope effect on take-off?", "a": "1% upslope increases TODR by approximately 5%. Downslope benefit should not be factored into calculations; treat it as an uncalculated safety margin."}, {"q": "What are the TODR penalties for non-paved surfaces?", "a": "Dry grass adds approximately 20% to TODR. Wet grass/soft ground adds 30-40%. Snow/slush can make take-off impossible."}, {"q": "What safety factor should be applied to the calculated TODR for general aviation?", "a": "Multiply the final calculated TODR by 1.33 to obtain the safe take-off distance."}, {"q": "What is the difference between gross and net performance?", "a": "Gross performance is the POH data assuming a new aircraft and professional test pilot. Net performance accounts for wear and tear, average pilot skills, and real-world weather, and is always worse than gross."}, {"q": "Using the clock rule, what is the effective headwind component if the wind is 60 degrees off the nose?", "a": "Exactly 50% of the total wind speed."}, {"q": "How do take-off flaps affect ground roll versus climb angle?", "a": "Take-off flaps shorten the ground roll by increasing CL MAX and lowering lift-off speed, but they degrade the initial climb angle due to increased drag."}, {"q": "A pilot calculates a TODR of 400m on a paved surface. The runway is wet grass with a 2% upslope. What is the factored TODR?", "a": "Apply wet grass (+35%): 400 x 1.35 = 540m. Apply 2% upslope (+10%): 540 x 1.10 = 594m. Apply safety factor: 594 x 1.33 = 790m (approximately)."}], "9 Climb and Cruise Performance": [{"q": "What is the difference between best angle of climb speed (VX) and best rate of climb speed (VY)?", "a": "VX gives the steepest climb angle (most height per ground distance) for obstacle clearance. VY gives the highest rate of climb (most height per unit time) for reaching cruise altitude quickly."}, {"q": "What aerodynamic condition defines VX?", "a": "VX occurs at the speed of maximum excess thrust (greatest difference between thrust available and thrust required/drag)."}, {"q": "What aerodynamic condition defines VY?", "a": "VY occurs at the speed of maximum excess power (greatest difference between power available and power required)."}, {"q": "Is VX faster or slower than VY?", "a": "VX is always slower than VY."}, {"q": "In a steady climb, is lift greater than, equal to, or less than weight?", "a": "Lift is less than weight. A rearward component of weight acts along the flight path (apparent drag), and thrust must overcome both aerodynamic drag and this weight component."}, {"q": "How does increased weight affect the angle of climb?", "a": "Increased weight increases induced drag and thrust required, reducing maximum excess thrust and resulting in a shallower climb angle. VX speed also increases."}, {"q": "How does wind affect rate of climb (FPM)?", "a": "Wind does NOT affect the aerodynamic rate of climb (FPM). It only affects the climb angle relative to the ground: headwind steepens the ground path, tailwind flattens it."}, {"q": "What is the service ceiling?", "a": "The altitude at which the maximum achievable rate of climb drops to exactly 100 feet per minute."}, {"q": "What is the absolute ceiling?", "a": "The altitude where power available equals power required (the curves touch). Excess power is zero, rate of climb is 0 FPM, and level flight is possible at only one speed."}, {"q": "What is a cruise climb and why is it used?", "a": "A cruise climb is flown at a speed faster than VY with a lower pitch attitude. It sacrifices maximum FPM for better forward visibility, improved engine cooling, and more ground distance covered en-route."}, {"q": "What speed gives maximum endurance and what is its aerodynamic basis?", "a": "VMP (minimum power speed) gives maximum endurance. It corresponds to the lowest point on the power required curve, meaning the least fuel burn per unit time."}, {"q": "What speed gives maximum range and what is its aerodynamic basis?", "a": "VMD (minimum drag speed) gives maximum range. It is the speed with the best lift-to-drag ratio, meaning the most distance per unit of fuel."}, {"q": "Is VMD faster or slower than VMP?", "a": "VMD is always faster than VMP."}, {"q": "Does wind affect endurance?", "a": "No. Wind has no effect on endurance because endurance depends on time airborne and fuel flow rate, not ground distance covered."}, {"q": "How does a headwind affect maximum range, and what should the pilot do?", "a": "A headwind reduces maximum range because groundspeed decreases. The pilot should fly slightly faster than VMD to minimize time spent fighting the wind."}, {"q": "What happens to VY (IAS) as altitude increases?", "a": "VY indicated airspeed decreases with altitude (though VY TAS increases). The power gap shrinks and the point of maximum excess power shifts."}, {"q": "In a power-off glide, what speed gives maximum glide distance?", "a": "VMD (best L/D speed). Weight has no effect on the maximum glide angle, but a heavier aircraft glides at a faster speed along the same glide path."}, {"q": "Does weight affect the maximum glide angle?", "a": "No. A heavier aircraft glides at the same angle as a lighter one, but at a higher speed. The glide ratio (L/D) is independent of weight."}], "10 Landing Performance": [{"q": "How is landing distance measured?", "a": "From 50 feet above the threshold (screen height) to a full stop, including the airborne approach phase, flare, touchdown, and ground braking roll."}, {"q": "What is VREF and how is it calculated?", "a": "VREF is the reference landing speed at the 50 ft screen height. It must be at least 1.3 times VSO (stall speed in landing configuration with flaps and gear down)."}, {"q": "What is LDA?", "a": "Landing Distance Available: the length of runway declared suitable for landing, which may be shorter than the physical runway due to displaced thresholds or obstacles."}, {"q": "What is the golden rule for landing distance planning?", "a": "The calculated Landing Distance Required (LDR) must NEVER exceed the LDA. If it does, the pilot must divert or reduce landing weight."}, {"q": "How does a 10% increase in weight affect landing distance?", "a": "Approximately a 10% increase in landing distance, due to higher VSO, higher VREF, higher touchdown speed, and greater momentum to dissipate."}, {"q": "Why does high density altitude increase landing distance?", "a": "In low-density air, TAS is higher than IAS for the same indicated approach speed. Higher TAS means higher groundspeed at touchdown, requiring more distance to stop."}, {"q": "What are the environmental penalty rules for altitude and temperature on landing distance?", "a": "Each 1,000 ft increase in altitude adds approximately 5% to landing distance. Each 10 degrees C above standard temperature adds approximately 5% to landing distance."}, {"q": "How does a headwind affect landing distance?", "a": "A headwind shortens landing distance by reducing groundspeed at touchdown. For calculations, use only 50% of the reported headwind component."}, {"q": "How does a tailwind affect landing distance?", "a": "A tailwind dangerously extends landing distance by increasing groundspeed. For calculations, use 150% of the reported tailwind component."}, {"q": "What is the landing distance penalty for a wet grass runway?", "a": "+35% (factor 1.35). This is the highest common surface penalty for landing."}, {"q": "What is the landing distance penalty for a wet paved runway?", "a": "+15% (factor 1.15), due to reduced braking friction."}, {"q": "What landing distance penalty does short dry grass add?", "a": "+15% (factor 1.15)."}, {"q": "What is the effect of a downslope runway on landing distance?", "a": "Gravity counteracts braking, increasing landing distance. Every 1% of downslope adds approximately 5% to landing distance required."}, {"q": "What safety factor should be applied to the calculated landing distance?", "a": "Multiply the corrected landing distance by 1.43 to obtain the safe operational landing distance."}, {"q": "What role do flaps play in landing performance?", "a": "Full flaps increase CL MAX (lowering VSO and VREF for a slower approach), create massive profile drag (allowing a steeper descent angle for obstacle clearance), and result in a shorter landing distance."}, {"q": "How do landing performance graphs assume the aircraft is configured?", "a": "Power off (idle) from the 50 ft screen height, full landing flaps deployed, paved level dry runway, and maximum braking applied immediately upon touchdown."}, {"q": "Are landing correction factors added or multiplied together?", "a": "They are multiplied (chained) together, not added. For example, wet grass (x1.35) and 2% downslope (x1.10) gives a total factor of 1.35 x 1.10 = 1.485."}, {"q": "A pilot calculates a gross landing distance of 500m from the POH. The runway is wet grass with 1% downslope. What is the safe operational LDR?", "a": "Apply wet grass (x1.35): 675m. Apply 1% downslope (x1.05): 709m. Apply 1.43 safety factor: 709 x 1.43 = approximately 1,014m."}]}, "04 HPL": {"1 Aviation Human Factors": [{"q": "What percentage of aviation accidents are attributed to human factors?", "a": "Approximately 75% of aviation accidents are caused by human factors."}, {"q": "What does the SHELL model stand for in aviation human factors?", "a": "Software, Hardware, Environment, Liveware (self), and Liveware (others). It models how the human (central Liveware) interacts with each element."}, {"q": "Who is at the centre of the SHELL model?", "a": "The human operator (Liveware) is at the centre, interacting with all other components."}, {"q": "What is the 'Swiss Cheese' model of accident causation?", "a": "James Reason's model showing that accidents occur when holes (failures) in multiple layers of defences align, allowing a hazard to pass through all barriers."}, {"q": "What is the difference between an active failure and a latent failure?", "a": "Active failures are immediate unsafe acts by the operator (e.g., pilot error). Latent failures are pre-existing system weaknesses such as poor design or inadequate training that remain dormant until triggered."}, {"q": "In the SHELL model, what does the Liveware-Hardware interface refer to?", "a": "The interaction between the human and the physical aircraft systems, controls, and instruments, including ergonomic design considerations."}, {"q": "What is the Liveware-Software interface in the SHELL model?", "a": "The interaction between the human and non-physical aspects such as procedures, checklists, manuals, and regulations."}, {"q": "A pilot misreads a checklist due to poor font size. Which SHELL interface does this represent?", "a": "The Liveware-Software (L-S) interface, as it involves the interaction between the pilot and procedural/documentation design."}, {"q": "What is the purpose of Crew Resource Management (CRM)?", "a": "CRM aims to improve flight safety by optimising the use of all available resources including crew communication, teamwork, decision-making, and workload management."}, {"q": "What does the 'Environment' component in the SHELL model include?", "a": "Both the physical environment (temperature, noise, vibration, altitude) and the organisational environment (company culture, regulations, economic pressures)."}, {"q": "What is a 'dirty dozen' in human factors?", "a": "Twelve common human factors that contribute to maintenance and aviation errors, including complacency, lack of knowledge, distraction, lack of teamwork, fatigue, lack of resources, pressure, lack of assertiveness, stress, lack of awareness, norms, and lack of communication."}, {"q": "How does the Swiss Cheese model help prevent accidents?", "a": "By ensuring multiple independent layers of defence exist so that a failure in one layer is caught by subsequent layers, preventing the holes from aligning."}, {"q": "A co-pilot is too intimidated to speak up about a captain's error. Which SHELL interface is compromised?", "a": "The Liveware-Liveware (L-L) interface, which covers interpersonal communication and crew dynamics."}, {"q": "What is 'situational awareness' in aviation human factors?", "a": "The pilot's perception and understanding of the current flight environment and the ability to project what will happen next. Loss of situational awareness is a major cause of accidents."}, {"q": "Why is human factors training important for pilots?", "a": "Because human error cannot be entirely eliminated, training helps pilots recognise limitations, manage errors, and use defensive strategies to maintain safety."}, {"q": "What is an 'error chain' in aviation?", "a": "A sequence of events or errors that, individually minor, combine and escalate toward an accident. Breaking any link in the chain can prevent the accident."}], "2 Atmospheric Human Performance": [{"q": "What is the composition of the atmosphere by volume?", "a": "Approximately 78% nitrogen, 21% oxygen, and 1% other gases (argon, CO2, etc.). This ratio remains constant up to about 100,000 ft."}, {"q": "What is the standard sea-level atmospheric pressure in hPa (mb)?", "a": "1013.25 hPa (millibars)."}, {"q": "How does atmospheric pressure change with altitude?", "a": "Pressure decreases with increasing altitude. It halves approximately every 18,000 ft."}, {"q": "What is partial pressure and why is it important for pilots?", "a": "Partial pressure is the pressure exerted by each individual gas in a mixture (Dalton's Law). The partial pressure of oxygen decreases with altitude, reducing oxygen availability for breathing."}, {"q": "At what altitude does the partial pressure of oxygen begin to significantly affect an unacclimatised pilot?", "a": "Above approximately 10,000 ft, the reduced partial pressure of oxygen can cause noticeable performance degradation without supplemental oxygen."}, {"q": "What is Dalton's Law of Partial Pressures?", "a": "The total pressure of a gas mixture equals the sum of the partial pressures of each individual gas. Each gas exerts pressure proportional to its percentage in the mixture."}, {"q": "What is Boyle's Law and how does it affect the body at altitude?", "a": "Boyle's Law states that gas volume is inversely proportional to pressure (at constant temperature). As altitude increases and pressure decreases, trapped gases in the body expand, causing ear pain, sinus pain, and gastrointestinal discomfort."}, {"q": "What is Henry's Law and its relevance to aviation?", "a": "Henry's Law states that the amount of gas dissolved in a liquid is proportional to the partial pressure of that gas. At altitude, reduced pressure causes dissolved nitrogen to form bubbles in blood/tissues, potentially causing decompression sickness."}, {"q": "What are the four layers of the atmosphere from lowest to highest?", "a": "Troposphere, stratosphere, mesosphere, and thermosphere. Most aviation occurs in the troposphere and lower stratosphere."}, {"q": "What is the tropopause?", "a": "The boundary between the troposphere and stratosphere, at approximately 36,000 ft at mid-latitudes. Temperature stops decreasing and remains roughly constant above this level."}, {"q": "What is the standard temperature lapse rate in the troposphere?", "a": "Approximately 2 degrees Celsius per 1,000 ft (or 1.98 degrees C per 1,000 ft in the ISA)."}, {"q": "What is the ISA standard temperature at sea level?", "a": "15 degrees Celsius (59 degrees Fahrenheit)."}, {"q": "Why is humidity a concern for pilots regarding human performance?", "a": "Low humidity at altitude causes dehydration, which impairs cognitive function and increases fatigue. Pilots should drink water regularly during flight."}, {"q": "What happens to the boiling point of water at high altitude?", "a": "The boiling point decreases as atmospheric pressure drops. At around 63,000 ft (Armstrong Line), body fluids can boil at body temperature."}, {"q": "A pilot ascends rapidly from sea level to 18,000 ft. What approximate fraction of sea-level pressure remains?", "a": "Approximately half (about 500 hPa), since atmospheric pressure halves roughly every 18,000 ft."}, {"q": "How does temperature typically change in the stratosphere?", "a": "Temperature remains approximately constant or increases slightly in the stratosphere due to ozone absorbing UV radiation."}], "3 Pilot Physiology": [{"q": "What are the two divisions of the nervous system?", "a": "The Central Nervous System (CNS), consisting of the brain and spinal cord, and the Peripheral Nervous System (PNS), connecting the CNS to the rest of the body."}, {"q": "What are the two subdivisions of the autonomic nervous system?", "a": "The sympathetic nervous system (fight or flight response) and the parasympathetic nervous system (rest and digest)."}, {"q": "What is the function of haemoglobin in the blood?", "a": "Haemoglobin in red blood cells binds with oxygen in the lungs and transports it to body tissues. It has a much higher affinity for carbon monoxide than oxygen."}, {"q": "Why is carbon monoxide (CO) dangerous for pilots?", "a": "CO binds to haemoglobin approximately 200-250 times more readily than oxygen, forming carboxyhaemoglobin and preventing oxygen transport. Even small amounts can cause significant impairment."}, {"q": "What are the symptoms of carbon monoxide poisoning?", "a": "Headache, dizziness, nausea, confusion, impaired judgement, cherry-red skin coloration, and eventually unconsciousness. Symptoms are insidious and may be mistaken for other conditions."}, {"q": "What should a pilot do if carbon monoxide contamination is suspected in the cockpit?", "a": "Immediately shut off the cabin heater, open air vents and windows, use supplemental oxygen if available, land as soon as possible, and seek medical attention."}, {"q": "What is the process of respiration at the cellular level?", "a": "Oxygen from inhaled air diffuses across the alveolar membrane into the blood, while carbon dioxide diffuses from the blood into the alveoli to be exhaled. This gas exchange is driven by partial pressure differences."}, {"q": "What is hyperventilation?", "a": "Excessive breathing rate that reduces blood CO2 levels, causing tingling, dizziness, muscle spasms, and potentially unconsciousness. It is often triggered by stress or anxiety."}, {"q": "How should hyperventilation be treated in flight?", "a": "Consciously slow the breathing rate, talk or sing to regulate breathing, and breathe into a bag if available to restore CO2 levels. Address the underlying cause of stress."}, {"q": "How can a pilot distinguish between hyperventilation and hypoxia?", "a": "Both share similar symptoms (dizziness, tingling). The key difference: hypoxia improves with supplemental oxygen, while hyperventilation improves by slowing breathing rate. If in doubt, use supplemental oxygen first."}, {"q": "What percentage of the body's oxygen consumption does the brain use?", "a": "The brain uses approximately 20-25% of the body's total oxygen supply despite being only about 2% of body weight."}, {"q": "What is the function of the semicircular canals?", "a": "Three fluid-filled canals in the inner ear that detect angular acceleration (rotational movement) in three planes, providing the brain with information about head and body rotation."}, {"q": "What is the vestibular system?", "a": "The balance system located in the inner ear, comprising the semicircular canals (detecting rotation) and the otolith organs (detecting linear acceleration and gravity)."}, {"q": "What is the 'fight or flight' response?", "a": "An automatic sympathetic nervous system response to perceived danger that increases heart rate, blood pressure, and blood sugar while redirecting blood to muscles, preparing the body for action."}, {"q": "Why is smoking particularly harmful for pilots?", "a": "Smoking introduces carbon monoxide into the blood (reducing oxygen-carrying capacity), effectively raising the pilot's physiological altitude by several thousand feet and worsening the effects of hypoxia."}, {"q": "What is spatial disorientation?", "a": "A condition where the pilot cannot correctly determine their position, attitude, or motion relative to the earth's surface due to conflicting or unreliable sensory inputs, especially in IMC."}], "4 Altitude Physiology": [{"q": "What is hypoxia?", "a": "A condition where body tissues, especially the brain, do not receive sufficient oxygen to function properly. It is the most significant physiological threat at altitude."}, {"q": "What are the four types of hypoxia?", "a": "Hypoxic (reduced oxygen in inhaled air, e.g., altitude), anaemic (reduced oxygen-carrying capacity, e.g., CO poisoning), stagnant (reduced blood flow, e.g., G-forces), and histotoxic (cells unable to use oxygen, e.g., alcohol)."}, {"q": "What is the Time of Useful Consciousness (TUC) at 25,000 ft?", "a": "Approximately 3-5 minutes. TUC decreases rapidly with altitude; at 40,000 ft it is only 15-20 seconds."}, {"q": "What is the Time of Useful Consciousness (TUC) at 40,000 ft?", "a": "Approximately 15-20 seconds. This is barely enough time to don an oxygen mask."}, {"q": "What are the early symptoms of hypoxia?", "a": "Euphoria, impaired judgement, reduced self-criticism, personality changes, drowsiness, and a false sense of well-being. These are insidious because the pilot often feels fine."}, {"q": "At what cabin altitude is supplemental oxygen required for the crew in unpressurised aircraft?", "a": "Above 10,000 ft cabin altitude for prolonged exposure. Regulations typically require crew oxygen above 10,000 ft after 30 minutes and at all times above 12,000-13,000 ft (varies by regulation)."}, {"q": "What is decompression sickness (DCS) and when does it occur?", "a": "DCS occurs when dissolved nitrogen forms bubbles in the body due to rapid pressure reduction. Symptoms include joint pain (the bends), skin irritation (the creeps), chest pain (the chokes), and neurological symptoms."}, {"q": "Why should a pilot avoid scuba diving before flying?", "a": "Scuba diving saturates body tissues with nitrogen under pressure. Flying too soon after diving causes nitrogen to form bubbles as cabin pressure decreases, leading to decompression sickness. Wait at least 12-24 hours depending on dive profile."}, {"q": "What is the recommended minimum wait time before flying after a non-decompression dive?", "a": "A minimum of 12 hours after a single no-decompression dive, and 24 hours or more after repetitive dives or dives requiring decompression stops."}, {"q": "What causes 'the bends' in altitude physiology?", "a": "Nitrogen gas bubbles forming in joints and tissues due to a rapid reduction in ambient pressure, typically above 25,000-30,000 ft or after recent scuba diving at lower altitudes."}, {"q": "How does alcohol affect susceptibility to hypoxia?", "a": "Alcohol causes histotoxic hypoxia by impairing cells' ability to use oxygen. It also impairs judgement independently, and the effects of both combine to severely degrade performance at altitude."}, {"q": "What effect do trapped gases have during ascent?", "a": "Gases trapped in body cavities (sinuses, middle ear, gastrointestinal tract) expand according to Boyle's Law as altitude increases, causing pain in blocked sinuses or ears, and abdominal discomfort."}, {"q": "What is barotrauma?", "a": "Physical damage to body tissues caused by pressure differences, typically in the middle ear or sinuses during climb or descent when the Eustachian tube or sinus ostia are blocked."}, {"q": "A pilot who smokes 20 cigarettes a day effectively raises their physiological altitude by how much?", "a": "Approximately 3,000-5,000 ft due to carbon monoxide binding to haemoglobin and reducing oxygen-carrying capacity."}, {"q": "What is the cabin altitude above which all occupants must use supplemental oxygen?", "a": "Above approximately 13,000-14,000 ft cabin altitude (exact limit varies by jurisdiction), supplemental oxygen is required for all occupants."}, {"q": "What is the most dangerous characteristic of hypoxia for pilots?", "a": "Its insidious onset. The pilot often feels euphoric and confident while their judgement and motor skills are deteriorating, making self-diagnosis extremely difficult."}], "5 Aviation Visual Performance": [{"q": "What are the two types of photoreceptor cells in the eye?", "a": "Rods (for dim/peripheral/night vision, no colour detection) and cones (for bright/central/colour vision, concentrated in the fovea)."}, {"q": "What is the fovea and why is it important for pilots?", "a": "The fovea is a small area in the centre of the retina packed with cones, providing the sharpest visual acuity. Pilots use foveal vision for reading instruments and identifying distant objects."}, {"q": "What is the blind spot in the eye?", "a": "The point where the optic nerve exits the retina, which contains no photoreceptors. Objects in this area cannot be seen, making systematic scanning essential for collision avoidance."}, {"q": "How long does full dark adaptation take?", "a": "Approximately 30-45 minutes for the rods to fully adapt to darkness. Cones adapt within about 5-7 minutes but are not sensitive enough for true night vision."}, {"q": "Why should pilots use red cockpit lighting at night?", "a": "Red light stimulates cones for instrument reading but does not significantly affect rod adaptation, helping preserve night vision."}, {"q": "What is the 'empty field myopia' phenomenon?", "a": "In featureless conditions (haze, fog, over water), the eyes relax to a default focus distance of about 1-2 metres, making it impossible to spot distant traffic. Pilots should focus on distant objects or infinity to counteract this."}, {"q": "What scanning technique should pilots use for collision avoidance?", "a": "A systematic scan moving in small segments (10-15 degrees), pausing briefly at each segment to allow the fovea to detect objects. Continuous sweeping is ineffective because the eye cannot detect stationary objects during movement."}, {"q": "What are the main visual illusions during approach and landing?", "a": "Runway width illusion (wider runway = illusion of being too low; narrower = too high), slope illusion (upslope = too high, fly low; downslope = too low, fly high), and the black hole effect (no visual references = fly too low)."}, {"q": "What illusion does a wider-than-normal runway create on approach?", "a": "The illusion of being lower than actual altitude, causing the pilot to fly a higher approach and risk overshooting."}, {"q": "What illusion does a narrower-than-normal runway create?", "a": "The illusion of being higher than actual altitude, causing the pilot to fly a lower approach and risk undershooting."}, {"q": "What is the black hole approach illusion?", "a": "When approaching over featureless terrain (water/dark area) at night with only runway lights visible, the pilot perceives being too high and flies dangerously low, risking controlled flight into terrain."}, {"q": "An upward sloping runway creates what illusion and what danger?", "a": "The illusion of being too high on approach, causing the pilot to fly a shallower/lower path than intended, with the danger of undershooting the runway."}, {"q": "What is autokinesis?", "a": "A visual illusion at night where a stationary light appears to move when stared at against a dark background. It can cause a pilot to mistake a fixed light for another aircraft."}, {"q": "What is presbyopia?", "a": "Age-related loss of the eye's ability to focus on near objects due to hardening of the lens. It typically begins around age 40 and may require reading glasses for cockpit instruments."}, {"q": "How does hypoxia affect vision?", "a": "Vision is one of the first functions affected by hypoxia. Night vision can deteriorate as low as 5,000 ft due to reduced oxygen supply to the retina, and colour perception and acuity degrade with increasing altitude."}, {"q": "Why is a 10-15 degree off-centre scan technique recommended at night?", "a": "At night, the fovea (central vision) has poor sensitivity because it contains only cones. Looking 10-15 degrees off-centre uses the rod-rich peripheral retina, which is far more sensitive in low light."}], "7 Fitness to Fly": [{"q": "What does the IMSAFE checklist stand for?", "a": "Illness, Medication, Stress, Alcohol, Fatigue, Eating/Emotion. It is a personal fitness-to-fly self-assessment tool pilots should use before every flight."}, {"q": "What is the minimum time between consuming alcohol and flying (8-hour rule)?", "a": "A minimum of 8 hours must elapse between alcohol consumption and acting as a flight crew member ('bottle to throttle'). Many authorities recommend longer, and pilots must have zero residual effects."}, {"q": "How does fatigue affect pilot performance?", "a": "Fatigue degrades attention, decision-making, reaction time, and situational awareness. It is cumulative and can be as impairing as alcohol intoxication."}, {"q": "What is the circadian rhythm and how does it affect pilots?", "a": "The body's internal 24-hour biological clock controlling sleep-wake cycles, body temperature, and hormone release. Disruption (jet lag, shift work, night flying) degrades performance and increases fatigue."}, {"q": "When is the circadian low point (WOCL)?", "a": "The Window of Circadian Low is typically between 0200-0600 local body time, when alertness and performance are at their lowest."}, {"q": "Why are over-the-counter antihistamines a concern for pilots?", "a": "Many antihistamines cause drowsiness, impaired reaction time, and reduced cognitive function. Their sedating effects can persist for 24 hours or more and are incompatible with flying."}, {"q": "How long should a pilot wait after a general anaesthetic before flying?", "a": "A minimum of 48 hours for minor procedures, but often much longer depending on the type of anaesthesia and surgery. Pilots must consult an Aviation Medical Examiner (AME)."}, {"q": "What effect does dehydration have on pilot performance?", "a": "Dehydration impairs concentration, increases fatigue, causes headaches, and reduces cognitive ability. Pilots should drink water regularly, especially on long flights in low-humidity cabin environments."}, {"q": "What is the recommended minimum sleep before flying?", "a": "A minimum of 8 hours of rest opportunity with at least 6 hours of actual sleep in the 24 hours before duty."}, {"q": "Why is blood donation a fitness-to-fly concern?", "a": "Blood donation reduces the blood's oxygen-carrying capacity temporarily. Pilots should not fly for at least 24-48 hours after donating blood."}, {"q": "What is acute fatigue versus chronic fatigue?", "a": "Acute fatigue results from short-term factors (long duty, poor sleep) and is cured by rest. Chronic fatigue is long-term accumulated tiredness from ongoing stress, inadequate rest, or illness that requires extended recovery."}, {"q": "How does hypoglycaemia (low blood sugar) affect a pilot?", "a": "It causes weakness, confusion, irritability, sweating, trembling, and impaired decision-making. Pilots should eat regular, balanced meals and avoid skipping meals before or during flights."}, {"q": "What are the signs that a pilot should not fly due to illness?", "a": "Any condition that causes fever, pain, dizziness, impaired hearing or vision, nausea, or cognitive impairment. Even a common cold can be disqualifying due to pressure equalisation problems."}, {"q": "Why is self-medication dangerous for pilots?", "a": "The underlying condition may be incapacitating, and many medications have side effects (drowsiness, dizziness, visual disturbance) that degrade flying ability. All medication use must be cleared by an AME."}, {"q": "What is sleep debt?", "a": "The cumulative effect of not getting enough sleep over time. It builds up and cannot be fully recovered with a single long sleep. It progressively degrades cognitive performance."}, {"q": "At what blood alcohol level is a pilot considered unfit to fly?", "a": "Any detectable blood alcohol is generally considered unfit. The legal limit in most jurisdictions is 0.02% (20 mg/dL) or zero, but impairment begins well before reaching this level."}], "8 Pilot Information Processing": [{"q": "What are the four stages of the basic information processing model?", "a": "Detection (receiving information), Perception (interpreting information), Decision (selecting a response), and Action (executing the response), with a Feedback loop."}, {"q": "What is meant by the brain being a 'single-channelled' processor?", "a": "The central decision maker (brain) can only consciously process one decision at a time. It cannot truly multitask; instead it rapidly switches between tasks."}, {"q": "What is the capacity of short-term (working) memory?", "a": "7 plus or minus 2 unrelated items, retained for approximately 10-20 seconds. It is highly sensitive to interruption."}, {"q": "What is 'chunking' in the context of working memory?", "a": "Grouping related pieces of information into meaningful units (chunks) to increase the effective capacity of short-term memory. For example, grouping a phone number into area code segments."}, {"q": "What are the three types of long-term memory?", "a": "Semantic (general knowledge and facts), Episodic (personal events and experiences), and Procedural (motor skills and learned procedures)."}, {"q": "How long does iconic (visual) sensory memory last?", "a": "Approximately 0.5 to 1 second."}, {"q": "How long does echoic (auditory) sensory memory last?", "a": "Approximately 2 to 8 seconds, which is longer than iconic memory and allows replaying recently heard sounds."}, {"q": "What is sensory adaptation (habituation)?", "a": "The tendency of sensory receptors to reduce their response to continuous, unchanging stimuli over time. A pilot may stop noticing constant engine noise or vibration."}, {"q": "What are motor programmes (skills)?", "a": "Learned sequences of movements stored in long-term procedural memory that can be executed without conscious thought, freeing the brain for other tasks."}, {"q": "What are the three phases of developing a motor programme?", "a": "Cognitive phase (conscious thought for each action), Associative phase (integrating separate components), and Automatic phase (smooth execution without conscious control)."}, {"q": "What is the difference between an unconditioned reflex and a conditioned reflex?", "a": "Unconditioned reflexes are instinctive (e.g., blinking) and provide the fastest reaction. Conditioned reflexes are learned through association and training, providing fast but not instantaneous responses."}, {"q": "What does the performance/arousal curve (Yerkes-Dodson Law) describe?", "a": "An inverted-U relationship: performance is poor at low arousal (complacency), peaks at optimal arousal, and deteriorates again at high arousal (overload/narrowed attention)."}, {"q": "What is the approximate human error rate for simple tasks?", "a": "Approximately 1 error in every 100 actions for simple tasks. Errors are cumulative and can form error chains."}, {"q": "What is 'selective attention' in aviation?", "a": "The ability to filter sensory inputs for relevance, such as hearing your own callsign among radio chatter (the cocktail party effect)."}, {"q": "What is 'divided attention'?", "a": "The ability to rapidly switch focus between multiple tasks, giving the appearance of multitasking. It is essential for scanning instruments while monitoring outside references."}, {"q": "What cognitive illusion occurs when approaching a narrow runway?", "a": "A narrow runway creates the illusion of being too high, causing the pilot to fly a lower approach with risk of undershoot."}, {"q": "What is the black hole effect on approach?", "a": "When approaching over dark, featureless terrain at night, the pilot perceives being too high, resulting in flying too low with risk of controlled flight into terrain (undershoot)."}, {"q": "What is perception in information processing?", "a": "The process of converting raw sensory information into a meaningful mental structure. It is influenced by expectations, experience, and mental models, meaning we tend to see what we expect to see."}], "9 Aviation Decision Making": [{"q": "What four factors affect decision making in aviation?", "a": "Skill, knowledge, and experience; emotional state and motivation; health; and tiredness and fatigue."}, {"q": "What does the DODAR decision-making model stand for?", "a": "Diagnose (the problem), Options (develop alternatives), Decide (on the best option), Act/Execute (the decision), and Review (consequences). It is a cyclical process."}, {"q": "What is 'press-on-itis'?", "a": "The dangerous tendency to continue with an original plan despite deteriorating conditions or new information suggesting a change of course. It is a common factor in weather-related GA accidents."}, {"q": "What is the formula for risk in aviation decision making?", "a": "Risk = Probability x Impact. Pilots should cultivate risk awareness and fly within personal limits."}, {"q": "What are the 7 guidelines for decision making?", "a": "1) Continually evaluate all information, 2) Recognise the real situation, 3) Identify the problem, 4) Consider solutions based on limits and time, 5) Weigh up the risks, 6) Make the decision and act, 7) Monitor and re-evaluate."}, {"q": "What percentage of aviation accidents occur during taxi, takeoff, or landing?", "a": "Approximately 75% of all aviation accidents occur during the taxi, takeoff, or landing phases."}, {"q": "What is complacency and when is it most likely to occur?", "a": "Complacency is a state of reduced vigilance due to under-arousal. It occurs on routine, low-demand flights and leads to carelessness and inattention. Counter it by setting clear flight objectives."}, {"q": "What impact does mental overload have on decision making?", "a": "Mental overload (over-arousal/high pressure) always leads to degraded performance, narrowed attention, deteriorated logical judgement, and increased error rate."}, {"q": "How should a pilot respond to a bad decision already in progress?", "a": "Do not hesitate to change a flawed action. Beware of press-on-itis. 'To err is human; to persist is of the Devil.'"}, {"q": "What is the value of experience in aviation decision making?", "a": "Experience makes decision-making easier through practice, routine skills become second nature (automatised), and less experienced pilots can supplement by talking with instructors."}, {"q": "What should a pilot do if weather is marginal for a passenger flight?", "a": "Reschedule immediately. Do not attempt marginal weather flights with passengers."}, {"q": "What should a junior pilot do if flying with an experienced pilot acting dangerously?", "a": "Immediately question their course of action. Human factors studies show junior pilots often stay silent, but safety concerns must always be voiced regardless of rank difference."}, {"q": "How does the PIC maintain command?", "a": "By planning thoroughly, not being rushed, maintaining situational awareness, and asking ATC for help early when needed."}, {"q": "What does leadership in aviation decision making include?", "a": "Forward planning, situational awareness, and knowing limitations. It does NOT include aggressive assertiveness."}, {"q": "Why is aviation considered a 'dynamic environment' for decision making?", "a": "Conditions constantly change. A good decision now might be a bad decision in 5 minutes. Pilots must remain flexible and continuously re-evaluate."}, {"q": "What are the Golden Rules of Flying regarding weather?", "a": "Never trust weather to improve without proof. Plan every detail, think ahead of the aircraft, and if conditions deteriorate, do not hesitate to divert or turn back."}], "10 Aviation Verbal Communication": [{"q": "What must be established before flight when two qualified pilots are aboard?", "a": "The Pilot-in-Command (PIC) must be clearly designated before the flight begins."}, {"q": "When should a passenger safety briefing be given?", "a": "Before engine start. There is no time for instructions during an actual emergency."}, {"q": "What should a passenger safety briefing include?", "a": "Operation of harnesses/seatbelts, unlatching doors prior to forced landings, safe evacuation paths (away from the propeller), and emergency procedures."}, {"q": "What is the standard phraseology for transferring aircraft control?", "a": "'I have control' (said by the pilot taking control) and 'You have control' (said by the pilot relinquishing control). This hand-over/take-over procedure prevents dual inputs or nobody flying."}, {"q": "What are the three criteria for good communication in aviation?", "a": "Clarity, conciseness, and unambiguity. All instructions and advice must be clear and avoid vague language."}, {"q": "What personality traits act as barriers to effective cockpit communication?", "a": "Arrogance (dismissing advice), aggression/authoritarian behaviour (intimidating others into silence), impulsiveness (acting without communicating intent), and resignation (stopping communication entirely)."}, {"q": "What is 'patter' in aviation instruction?", "a": "Standardised teaching language used by flight instructors to ensure consistency in learning across different instructors and training environments."}, {"q": "What should a pilot do when they do not understand an ATC instruction?", "a": "Never guess. Always ask ATC to 'Say Again' and clarify any ambiguities. Safety depends on clear understanding."}, {"q": "What is active listening in aviation communication?", "a": "A two-way communication process involving careful listening and reading back critical instructions to verify understanding. The cycle is: Transmitter (intent) sends a message, Receiver (decodes), and Read-back (verification)."}, {"q": "What is the purpose of a pre-take-off emergency brief?", "a": "To establish clear boundaries and expectations for emergency actions, e.g., 'If we have an engine failure before rotation, I will halt the aircraft.' It prepares both crew members for immediate action."}, {"q": "What criteria make a good pre-flight briefing?", "a": "Keep it short to avoid information overload, ensure information is highly relevant, and conclude with a Q&A session."}, {"q": "What is the 'resignation' hazardous attitude in communication?", "a": "A 'what's the use?' attitude where the crew member stops communicating entirely, failing to share vital safety information."}, {"q": "How does an 'open cockpit' environment improve safety?", "a": "By encouraging questions from passengers and crew, maintaining a calm approachable demeanour, and using the extra pair of eyes. It fosters free flow of safety information."}, {"q": "What is the danger of an authoritarian captain?", "a": "An excessively authoritarian captain intimidates crew members into silence, preventing vital safety information from being communicated. This has been a causal factor in many accidents."}, {"q": "What three key points summarise Topic 10 (Verbal Communication)?", "a": "1) Clear PIC designation before flight, 2) Mandatory safety briefs before flight, 3) Avoid aggressive or arrogant attitudes that block communication."}, {"q": "Why is internal cockpit communication as important as ATC communication?", "a": "Smooth internal interactions prevent critical errors such as miscommunication about who is flying, missed checklist items, or failure to share important observations about the flight situation."}], "11 Aviation Stress Management": [{"q": "What is the definition of stress in aviation human factors?", "a": "Stress is not the event itself, but the body's physiological and psychological response to the demands placed upon it by stressors."}, {"q": "What is the difference between a stressor and stress?", "a": "A stressor is the event or circumstance that causes the response. Stress is the body's reaction to that stressor. Stressors can be physical, mental, or emotional."}, {"q": "Is stress always negative for pilot performance?", "a": "No. A certain level of stress (optimal arousal) is natural and necessary to keep a pilot alert and vigilant. Only excessive stress degrades performance."}, {"q": "What is 'arousal' in the context of stress?", "a": "Arousal is a person's physiological and mental readiness to respond to a stressor. It varies widely between individuals based on personality and experience."}, {"q": "What happens during under-arousal?", "a": "Too little stimulation leads to boredom, drowsiness, and low performance. The pilot may miss critical information."}, {"q": "What happens during over-arousal?", "a": "Too much stimulation/pressure causes attention to narrow (funnelling), performance deteriorates rapidly, and errors increase."}, {"q": "What determines a pilot's stress level according to the perceived demand model?", "a": "Stress depends on perceived demand versus perceived ability, not actual demand versus actual ability. High perceived demand combined with low perceived ability produces high stress."}, {"q": "How does successful task completion affect future stress?", "a": "Successfully completing a demanding task reduces future stress for the same situation by increasing perceived ability and building confidence (positive feedback mechanism)."}, {"q": "Are stress factors cumulative?", "a": "Yes. Multiple minor stressors (physical + emotional) add up and can compound to produce disproportionately high overall stress and major impairment."}, {"q": "What are the two main categories of cockpit stressors?", "a": "Environmental stressors (noise, temperature, vibration) and operational stressors (workload, lack of experience, emergencies)."}, {"q": "How can a pilot manage environmental stress in the cockpit?", "a": "Use high-quality noise-attenuating headsets, regulate cabin temperature, and organise charts/materials to reduce workload."}, {"q": "How can operational stress be mitigated?", "a": "Through thorough pre-flight planning, flying within personal limits, and flying with instructors regularly to maintain proficiency."}, {"q": "What is the highest-rated life stressor on the Life Event Scale?", "a": "Death of a spouse or partner, rated at 100 points."}, {"q": "What should a pilot do if suffering from severe domestic stress?", "a": "If you cannot leave personal troubles on the ground, do not fly. Life stress profoundly impacts flying performance and safety."}, {"q": "How should a pilot handle being rushed by ATC during pre-takeoff checks?", "a": "Do not let ATC rush you. Use 'Standby' if needed, and never skip checklist items. Safety takes priority over expediency."}, {"q": "What is the rule for resuming a checklist after an interruption?", "a": "Always go back at least one item from where you were interrupted to avoid missing a critical check."}, {"q": "What are three strategies for avoiding airborne stress?", "a": "Adopt a professional approach, learn from mistakes through self-debriefing, and do not hesitate to divert or turn back when conditions deteriorate."}], "12 Cockpit Human Factors": [{"q": "What is anthropometry?", "a": "The study of human body measurements. It dictates cockpit workspace dimensions to accommodate the range of pilot sizes."}, {"q": "What percentage range of the population do cockpits typically cater to?", "a": "The middle 90% of the adult population (5th to 95th percentile). It is impossible to design for every extreme body size."}, {"q": "What is the difference between static and dynamic anthropometric measurements?", "a": "Static measurements are fixed dimensions (height, shoulder width, leg length). Dynamic measurements assess how far a person can reach or stretch while seated, which is critical for control accessibility."}, {"q": "What is the Eye Datum (Design Eye Position)?", "a": "A specific vertical reference point around which the cockpit is built. Sitting at this level ensures a clear view of both instruments and the outside world with minimal head movement."}, {"q": "What are the consequences of sitting too high above the Eye Datum?", "a": "Good downward view, but upward outside view is obstructed by the roof, and the view of flight instruments is poor."}, {"q": "What are the consequences of sitting too low below the Eye Datum?", "a": "Good view of instruments, but poor forward outside visibility and the undershoot area on approach is obscured, creating a landing hazard."}, {"q": "In the standard 'T' instrument layout, which instrument is in the centre?", "a": "The Artificial Horizon (Attitude Indicator) is central, with the Airspeed Indicator on the left, Altimeter on the right, and Direction Indicator di
